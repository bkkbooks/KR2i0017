front:
  text: 南唐書序傳曰太熙之後述史者幾乎罵矣唐季五代大盜割據各亦有史而太熙之風往往有之南唐􅎊滅史官髙逺慮貽後悔悉取史草焚之而死徐鉉湯恱奉太宗皇帝敕追録所聞而忘逺取近率皆踈略先祖太博元康世家金陵知多南唐故事旁搜舊史遺文并集諸朝野之䏻道其事者未及撰次遽捐館舍今輒不自料纂先志而成之列為三十卷雖有愧於筆削而誅亂尊王亦庶幾焉崇寧乙酉春正月陽羡馬令南唐書序
  hash: sha256:7101364c24ce16ff6042aa70b9a01d261d5a45f2a07649702a7dd88343726182
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2i0017_SBCK_000-1a}
body:
  text: 馬令撰嗚呼五代之亂符璽竊于大盜中國變于夷狄先王之禮樂制度掃地盡矣李氏初據江淮建唐廟以隆親與夫祖契丹而絶其父者孰韙始郊祀于圎丘與夫尚野祭而焚𥿄䋋者孰重五代之君若彼南唐之制若此則正統疑于不存而僣竊疑于無罪也豫作此書尊天子于中原而僣僞之事則不為南唐諱者豈無意哉蓋尊天子所以一天下之統書其僣所以著李氏之罪其統既一其罪既著則竊土賊民者無遁刑于天下後世矣昔孔子作春秋非徒載其陳言也竊耴其義以為人道之大法而巳豫之所論有合于此者弗可不察也王通之作元經第以進退南北而亂其正統輒自比于孔子曰春秋元經于王道是輕重之權衡且孔子所書彼善于此則有之而正統常在于周通之所書者宋魏之間其統未嘗一也使後世擾擾而不知其正者必自通始嗚呼法春秋而不知春秋之法者豈特王通乎南唐書目録卷第一先主書卷第二嗣主書卷第三嗣主書卷第四嗣主書卷第五後主書卷第六女憲傳元恭宋后种氏光穆鍾后昭惠周后周后保儀黃氏徐主永興公主余洪妻鄭氏附渤海吳媛附卷第七宗室傳楚王景遷晋王景遂齊王景逹江王景逖太子兾慶王茂韓王從善鄧王從益吉王從謙從度傳亡從信傳亡宣城公仲宣卷第八義飬傳徐宣祖徐知訓徐知詢稌知誨子景遼子景逰徐知諌徐知證徐知諤卷第九列傳周本李德誠王輿李章王安韋建髙審思卷第十列傳李建勳常夢錫嚴續潘承祐遊簡言張延翰徐玠李夷鄴卷第十一列傳刁彥䏻周宗馬仁𥙿何敬洙柴克宏劉宗俊王崇文邊鎬卷第十二列傳盧文進李金全王彥儔林仁肇陳誨申屠令堅卷第十三儒者傳韓熙載江文蔚髙越孫魴卷第十四儒者傳劉洞江為汪台符史虗白郭昭慶康仁傑伍喬周彬夏寶松徐鍇卷第十五隱者傳江夢孫沈彬陳貺陳陶許堅毛炳顔詡鄭元素卷第十六義死傳劉仁贍孫晟張彥䏻鄭昭業附卷第十七義死傳皇甫暉孟堅陳喬劉彥貞朱令贇胡則卷第十八廉隅傳姚景魯崇範馬文義許規苛政傳張宣李德柔卷第十九誅死傳禇仁規王建封茫仲敏附李德明皇甫繼勳鍾謨張巒傳亡餘附鍾謨潘佑李平卷第二十黨與傳宋齊丘卷第二十一黨與傳陳覺李徴古馮延巳馮延魯魏岑查文徽卷第二十二歸明傳蕭儼劉承勳邵拙舒雅盧絳劉茂忠李元清陸昭符卷第二十三歸明傳朱弼孟賔于子歸唐潘賁蒯鼇羅頴盧郢丘旭黃載湯悅附張洎附徐鉉附卷第二十四方術傳吳紹木平和尚李冠道士談紫霄潘扆女冠耿先生卷第二十五談諧傳申漸髙李家明楊名髙王感化彭利用附卷第二十六浮屠傳小長老北僧附玄寂應之妖賊傳張遇賢諸祐卷第二十七叛臣傳劉澄朱元劉從效附卷第二十八滅國傳閩王氏殷卷第二十九滅國傳楚馬氏卷第三十建國譜世系譜南唐書目録終
