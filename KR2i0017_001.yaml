body:
  text: 南唐書卷之一先主土運中圯諸侯䟦扈基搆自吳紹于唐祚作先主書先主姓李唐宗室裔也小字彭奴其父榮榮之父志志之父超超蚤䘚志爲徐州判司因家焉榮性謹厚適丁世亂晦迹民間號李道者彭奴以光啓四年生於彭城未名故書小字流寓濠泗吳武王楊行宻克濠州得之竒其状貌飬以爲子而楊氏諸子不能容行宻以乞徐温乃姓徐名知誥温嘗夢水中黄龍十數温獲一龍而寤翌日得知誥知誥奉温以孝聞従温出不如意杖而逐之及歸拜迎門温驚曰爾在此也知誥泣曰爲人子捨父母何適父怒而歸母子之常也温由是愛之逮壯身長七尺廣䫙隆凖精彩鑠人語聲清暢常緩行従者濶歩不能及相工云此龍行虎歩也従温攻伐身先士䘚爲樓船軍使以舟兵屯金陵柴再用攻宣州用其兵殺李遇以功拜昇州刺史時江淮𥘉定州縣吏多武夫務賦歛爲戰守知誥獨好學接禮儒者能自勵爲勤儉以寛仁爲政逺近嚮風郡政大治徐温鎭潤州以昇宣常池黄爲属温聞知誥理昇州有善政徃視之見其府庫充實城壁修整乃徙治之而遷知誥潤州刺史知誥𥘉不欲徃屢求宣州温不與時温嫡子知訓爲淮南節度副使秉國政知誥至京口不樂旣而知訓爲朱瑾所殺温居金陵未及聞知誥居潤州近廣陵得先聞即日以州兵渡江定亂遂爲淮南節度副使温至以次子知詢等皆少用知誥猶愈於他人因畱輔政宋齊丘曰潤州之命實天賛也𥘉徐氏諸子不齒知誥而知訓尤悖嘗召知誥飲酒伏劒士欲害之行酒吏刁彦能酒至知誥以手爪搯之知誥悟𧺫走乃免後日誥自潤州入覲知訓與飲於山光寺又欲害之徐知諌以謀告知誥知誥𧺫遁去知訓以劒授刁彦能使追殺之及於中塗而還紿以不及由是得免及知訓死温意潤州預謀就知訓廨有土室繪畫温像身𬒳五木諸弟皆執縛受刑而畫知訓衮冕正座皆署其名温見之唾曰狗死遲矣知誥因得䟽其罪惡由是内外全活者甚衆而死者猶數家知訓與僧修睦親狎得偽䜟數𥿄皆修睦手書温求修睦殺之越人寇毗陵温伐越知誥以王府兵㑹戰於無錫前軍敗賊乗之甚急温暴得熱疾不能治軍知誥率所領疾戰大破之斬首數千級越人棄輜重夜遁時四境底定惟越人爲梗因此請平而兵甲遂戢知訓之用事也常陵弱楊氏而驕侮諸将遂以見殺及知誥秉政乃寛刑法推恩信𧺫延賔亭以待四方之士引宋齊丘駱知詳王令謀爲舘客士有覉旅於吳者皆齒用之常隂使人察視民間有凶荒匱乏者賙給之盛暑未嘗張蓋操扇左右進蓋必却之曰士衆尚多暴露我何用此以故温雖遥秉大政而吳人頗歸知誥武義元年拜左僕射知政事漸復朝廷紀綱脩典禮舉法律以抑強暴中外謂之政事僕射温行軍司馬徐玠勸温以已子代知誥温遣子知詢入廣陵謀代知誥秉政㑹温病䘚知詢奔還金陵嗣温爲節度使諸道都統所爲多不法常謀知誥知誥使諭之入朝遂留爲左統軍吳主僣帝號改元乾貞知誥欲自尊大故奉楊溥尊號書溥僣號則南唐之罪著矣知誥累遷侍中中書令太尉都督中外諸軍事封潯陽公改封豫章公大和三年公出鎭金陵如温之制以長子景通爲司徒平章事居中輔政以王令謀宋齊丘爲左右僕射同平章事四年封公爲東海郡王五年進封齊王始書小字書名既而書公書王以見其漸六年召景通至金陵爲鎭海軍節度副使以其次子景遷爲太保平章事與令謀等秉國政天祚元年王進位太師天下兵馬大元帥二年景遷病以次子景遂爲門下侍郎叅知政事冬安逺軍盧文進来降三年閩越諸國皆遣使勸進人望已歸於是加殊禮建齊國置宗廟以宋齊丘爲左丞相徐玠爲右丞相冬十月受吳禪攝太尉楊璘奉上皇帝璽綬國號大齊改元昇元䇿吳主曰受禪者臣知誥謹上䇿皇帝爲高尚思玄弘古讓皇帝追尊考温爲武皇帝自温以上不追尊則復姓之心見矣子景通吳王景遂夀王景逹信王弟知證江王知諤饒王以建康爲西都廣陵爲東都十有二月已戼朔日有白虹二以楊州海陵縣爲㤗州割㤗興鹽城興化如臯四縣属焉以海陵制置使禇仁規爲刺史廬州周本卒凡書某州某人皆其節度使帝輟視朝一日食不舉樂書帝者以見其僣極惡重也凢書帝書詔書制其罪同甲午皇后宋氏受寳册是歲閩王昶貢方物于京師天子使散騎常侍盧損如閩册昶閩王不受閩自鏻巳僣帝號改元矣既稱帝故不受王爵凢書京師皆中原也書天子尊正統以别諸國僣僞二年春三月壬子日有白虹二壬申大星流于東方夏四月遷譲皇于丹陽以王輿爲浙西節度使留後馬思譲爲丹陽宮使以嚴兵守之徐氏諸子屢請帝復姓帝謙抑不忍忘徐氏恩下其議百官百官皆請乃復姓李改名昇國號大唐遂考服属當建王恪後建唐廟祀髙祖太宗以下如唐舊典追尊建王恪爲孝靜皇帝廟號定宗超爲孝平皇帝廟號成宗志爲孝安皇帝廟號惠宗榮爲孝徳皇帝廟號慶宗奉徐武皇廟號義祖徐氏二王如𥘉諸孫皆郡公女郡縣主齊臺門下侍郎張居詠中書侍郎李建勲皆平章事吳中書侍郎張延翰爲右僕射平章事以􅐚州李章鎭廬州神武統軍王安爲百勝軍節度使秋七月一時無事則書首月冬十月戊寅天子受徽號于契丹曰英武眀義皇帝尤非常故書錢元瓘以嘉興縣爲秀州十有一月以歩騎八萬講武于銅橋賜將吏以下金帛有差譲皇殂帝率百官素服哀臨命有司供具如吳舊禮諡曰睿十有二月福州亂連重遇弑其君昶立王子䂀王子延政爭立於是僣位于建州國號大殷他國悉書者爲保大三年取閩張本吳世子璉先娶帝女是爲永興公主璉以公主故爲中書令康化軍節度使三年春正月丙申詔曰比者干戈相接人無定主地易而弗蓺桑隕而弗𧖟衣食日耗朕甚憫之其嚮風靣内者有司計口給食願耕植者授之土田仍復三歲租役於嘻仁不異逺化無泄邇其務宣流以稱朕意二月池州楊璉䘚以統軍王彦儔爲康化軍節度使詔公卿以下議定郊祀門下侍郎平章事居詠中書侍郎平章事建勲等議曰孔子云郊祀后稷以配天宗祀文王於眀堂以配上帝此萬世不易之法也昔長孫無忌請祀髙祖於圎丘以配昊天上帝祀太宗於眀堂以配上帝蓋得之矣今國家嗣興唐祚追尊孝徳而以神堯爲肇祀之祖宜以神堯配天於圎丘以孝徳配上帝於眀堂禮也其服物制度古有常儀一切僞飾碩皆罷去奏可司徒齊丘請依春秋郊以四月上辛常夢錫駁曰案禮天子之郊以冬至不卜日魯侯之郊以仲春卜上辛今之四月非郊之時齊丘固爭遂用夏四月夏讀爲夏啇之夏魯用周之四月郊議者多哂之詔曰禮莫重於享帝孝莫大於隆親事實重大承以輕眇可謂無其徳而用其事祗加畏焉於嘻爾公爾侯各揚厥職不供廼事國有常典夏四月上辛始郊祀於圎丘大赦境内是夜月當以子𥘉沒而升壇之際皎然如晝衆咸異之遍行封賞羣臣請上徽號不許固請之帝曰朕以眇躬託于民上夙夜祗畏常恐弗類矧廼徽號用揚虚美是重弗類固不許因此廢徽號之禮州郡言符瑞者十數帝曰譴告在天聰眀自民魯以麟削莾以符亡常謹天戒猶懼或失之符瑞何爲哉皆抑而勿揚言五代同居者七家其尤著者江州陳氏元和給事中京之後宗族七百口每日設廣席長㓜以次坐而共食有畜犬百餘共一牢食一犬不至諸犬爲之不食建書樓於别墅以延四方之士肄業者多依焉鄊里率化獄訟希少逺近歎異之皆蠲復征役旌表門閭秋七月庚子朔日有蝕之八月鄂州張宣䘚以潤州留後王輿代金吾衛大將軍馬仁𥙿出爲鎭海軍節度使留後冬十月四年春正月夏四月樞宻使周宗出爲奉化軍節度使六月安州節度使李金全来降遣鄂州屯營使李承𥙿帥師迎之承𥙿與晉將馬全節安審暉戰于安陸承𥙿及禆將叚處恭戰死監軍通事舎人杜光鄴及其兵五百人𬒳執天子厚賜之遣還帝致書于晉復送光鄴等請以敗軍行法天子又遣之帝以甲士臨淮拒之乃止天子晉髙祖也書帝致書于晉惡其抗也以金全爲宣威統軍洪州李徳誠䘚以宣州徐玠代以江州徐知證爲寧國軍節度使梁王徐知諤䘚秋八月廬州李章䘚以潤州馬仁𥙿代以天威統軍盧文進爲鎭海軍節度使冬十月幸東都存省故老宴于舊宅踰月還十有二月左僕射平章事張延翰䘚五年春正月􅐚州王安䘚以統軍賈浩爲百勝軍節度使三月誅㤗州刺史禇仁規夏四月秋九月壬子有星孛于天市錢元瓘䘚佐嗣位冬十有二月葬吳越文穆王凡他國廢立䘚葬弑殺告問通則書六年春三月廬州馬仁𥙿䘚以滁州刺史周鄴爲保信軍節度使留後夏四月南漢劉龑䘚玢嗣位葬劉龑僣諡天皇大帝以其僣極惡重故書與吳越異龑音儼劉氏僞撰此字以爲名自云取飛龍在天之義遷譲皇子孫於海陵號永寜宫嚴兵守之絶不通人久而男女自爲匹偶吳人多哀憐之猶書吳人者以其思舊之民也詔吳王景通爲太子景通表曰古之立太子所以崇正嫡息覬覦如臣兄弟禀承聖教實爲敦睦碩寢此禮三表許之乃以大元帥總百揆改封齊王以駕部郎中馮延巳爲元帥府掌記夀州髙審思䘚以侍衞諸軍都虞候姚景爲清淮軍節度使六月乙丑天子崩晉髙祖秋七月丞相大司徒宋齊丘爲鎭南軍節度使以洪州徐玠爲司徒侍中帝曰豫章大司徒維桑也衣錦晝行古人所貴以錦𫀆賜之齊丘至鎭衣以視事羣臣咸謂江淮之地頻年豐稔兵食旣足士樂爲用天意人心未厭唐徳宜廣土字攻自潭越始帝曰吾少長軍旅見干戈之爲民患甚矣吾不忍復言兵革使彼民安則吾民亦安矣吳越災宫室府庫甲兵殆盡羣臣復請乗其弊帝曰今大敵在北北方平則諸國可尺書召之何以兵爲輕舉者兵之大忌宜畜財飬銳以俟時焉使使唁越于武林厚幣以賙其闕冬十月詔曰前朝失御强梗崛𧺫大者帝小者王不以兵戈利勢弗成不以殺戮威武弗行民受其弊蓋有年也或有意於息民者尚以武人用事不能宣流徳化其宿學巨儒察民之故者嵁巖之下徃徃有之彼無路光亨而進以拊傴爲嫌退以清寜爲樂則上下之情將何以通簡易之政將何所議乎昔漢世祖數年之間𬒳堅執鋭提戈斬馘一日晏然而兵革之事雖父子之親不以一言及之則兵爲民患其来尚矣今唐祚中興與漢頗同而眇眇之身坐制元元之上思所以舉而錯之者㷀㷀在疚罔有所發三事大夫可不務乎自今宜舉用儒者以𥙷不逮於是稍用儒臣漸去苛察又將修復故事爲後代法未果行而帝疾作七年春二月詔曰廼公廼侯越百執事欽承嗣命命爾保元子璟祗肅天鑒社稷宗廟永有終我不敢知曰其基永昌我亦不敢知曰墜命罔後天不爾諶祐于有徳厥位艱哉翌日殂于路寢夀五十六葬永陵諡光文肅武孝髙皇帝廟號烈祖徐鉉曰烈祖少長䘮亂知人艱苦故不以富貴自處唯務節儉身爲宰相事飬父母如禮飲食皆親侍或週疾不解帶温常責諸子曰汝軰能如是乎及建號即金陵使府爲宫唯加鴟尾欄檻而已終不改作接見親族如家人禮尊長者親拜之晚年服金石藥性多躁怒百司奏事必至厲聲訶責羣臣或正色抗辭以對事理明白必歛容慰勉之旬日之後多有恩澤故人思盡力决死刑用三覆三奏之法文武亡殁子孫随才以叙不限資廕或營其婚嫁㓜未堪任與其無嗣者内帑以給之有親老者倍其數死王事者下至卒伍皆三年給其全俸故士無貴賤悉亡身外之憂嗚嘑積厚者流澤逺積薄者流澤狹不其然乎舜之後千餘年而有陳陳亡而田氏專政於齊禹之後千餘年而有𣏌𣏌削而勾踐得志於越後世之君建大義於一時而徳不若舜禹者亦随其澤之逺近而興𧺫焉故晉以天下䘮於狄人而瑯瑘繼之唐以天下篡於朱梁而烈祖紹之然則盜名器操生殺制一方之命抗萬乗之勢者豈非天歟烈祖之𧺫雖無雄才大畧而深沈寛𥙿本於天性幸而適丁中原擾攘之際故數年之間有足觀者南唐書卷之一
