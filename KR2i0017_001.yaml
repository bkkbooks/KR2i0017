body:
  text: 南唐書卷之一先主土運中圯諸侯跋扈基搆自吳紹于唐祚作先主書先主姓李唐宗室裔也小字彭奴其父榮榮之父志志之父超超蚤卒志為徐州判司因家焉榮性謹厚適丁世亂晦迹民間號李道者彭奴以光啓四年生於彭城未名故書小字流寓濠泗吳武王楊行密克濠州得之竒其狀貌飬以為子而楊氏諸子不能容行密以乞徐溫乃姓徐名知誥溫嘗夢水中黃龍十數溫獲一龍而寤翌日得知誥知誥奉溫以孝聞從溫出不如意杖而逐之及歸拜迎門溫驚曰爾在此也知誥泣曰為人子捨父母何適父怒而歸母子之常也溫由是愛之逮壯身長七尺廣䫙隆凖精彩鑠人語聲清暢常緩行從者濶步不能及相工云此龍行虎步也從溫攻伐身先士卒為樓船軍使以舟兵屯金陵柴再用攻宣州用其兵殺李遇以功拜升州刺史時江淮𥘉定州縣吏多武夫務賦斂為戰守知誥獨好學接禮儒者能自勵為勤儉以寬仁為政逺近嚮風郡政大治徐溫鎮潤州以升宣常池黃為屬溫聞知誥理升州有善政往視之見其府庫充實城壁修整乃徙治之而遷知誥潤州刺史知誥𥘉不欲往屢求宣州溫不與時溫嫡子知訓為淮南節度副使秉國政知誥至京口不樂既而知訓為朱瑾所殺溫居金陵未及聞知誥居潤州近廣陵得先聞即日以州兵渡江定亂遂為淮南節度副使溫至以次子知詢等皆少用知誥猶愈於他人因留輔政宋齊丘曰潤州之命實天贊也𥘉徐氏諸子不齒知誥而知訓尤悖嘗召知誥飲酒伏劒士欲害之行酒吏刁彥能酒至知誥以手爪搯之知誥悟起走乃免後日誥自潤州入覲知訓與飲於山光寺又欲害之徐知諌以謀告知誥知誥起遁去知訓以劒授刁彥能使追殺之及於中塗而還紿以不及由是得免及知訓死溫意潤州預謀就知訓廨有土室繪畫溫像身𬒳五木諸弟皆執縛受刑而畫知訓衮冕正座皆署其名溫見之唾曰狗死遲矣知誥因得疏其罪惡由是內外全活者甚衆而死者猶數家知訓與僧修睦親狎得僞䜟數𥿄皆修睦手書溫求修睦殺之越人寇毗陵溫伐越知誥以王府兵㑹戰於無錫前軍敗賊乘之甚急溫暴得熱疾不能治軍知誥率所領疾戰大破之斬首數千級越人棄輜重夜遁時四境底定惟越人為梗因此請平而兵甲遂戢知訓之用事也常陵弱楊氏而驕侮諸將遂以見殺及知誥秉政乃寬刑法推恩信起延賔亭以待四方之士引宋齊丘駱知詳王令謀為館客士有羇旅於吳者皆齒用之常隂使人察視民間有凶荒匱乏者賙給之盛暑未嘗張蓋操扇左右進蓋必却之曰士衆尚多暴露我何用此以故溫雖遙秉大政而吳人頗歸知誥武義元年拜左僕射知政事漸復朝廷紀綱修典禮舉法律以抑強暴中外謂之政事僕射溫行軍司馬徐玠勸溫以已子代知誥溫遣子知詢入廣陵謀代知誥秉政㑹溫病卒知詢奔還金陵嗣溫為節度使諸道都統所為多不法常謀知誥知誥使諭之入朝遂留為左統軍吳主僣帝號改元乾貞知誥欲自尊大故奉楊溥尊號書溥僣號則南唐之罪著矣知誥纍遷侍中中書令太尉都督中外諸軍事封潯陽公改封豫章公大和三年公出鎮金陵如溫之制以長子景通為司徒平章事居中輔政以王令謀宋齊丘為左右僕射同平章事四年封公為東海郡王五年進封齊王始書小字書名既而書公書王以見其漸六年召景通至金陵為鎮海軍節度副使以其次子景遷為太保平章事與令謀等秉國政天祚元年王進位太師天下兵馬大元帥二年景遷病以次子景遂為門下侍郎參知政事冬安逺軍盧文進來降三年閩越諸國皆遣使勸進人望已歸於是加殊禮建齊國置宗廟以宋齊丘為左丞相徐玠為右丞相冬十月受吳禪攝太尉楊璘奉上皇帝璽綬國號大齊改元升元䇿吳主曰受禪者臣知誥謹上䇿皇帝為高尚思玄弘古讓皇帝追尊考溫為武皇帝自溫以上不追尊則復姓之心見矣子景通吳王景遂夀王景逹信王弟知證江王知諤饒王以建康為西都廣陵為東都十有二月已卯朔日有白虹二以楊州海陵縣為泰州割泰興鹽城興化如臯四縣屬焉以海陵制置使禇仁規為刺史廬州周本卒凡書某州某人皆其節度使帝輟視朝一日食不舉樂書帝者以見其僣極惡重也凡書帝書詔書制其罪同甲午皇后宋氏受寶册是歲閩王昶貢方物于京師天子使散騎常侍盧損如閩册昶閩王不受閩自鏻巳僣帝號改元矣既稱帝故不受王爵凡書京師皆中原也書天子尊正統以别諸國僣僞二年春三月壬子日有白虹二壬申大星流于東方夏四月遷讓皇于丹陽以王輿為浙西節度使留後馬思讓為丹陽宮使以嚴兵守之徐氏諸子屢請帝復姓帝謙抑不忍忘徐氏恩下其議百官百官皆請乃復姓李改名升國號大唐遂考服屬當建王恪後建唐廟祀髙祖太宗以下如唐舊典追尊建王恪為孝靜皇帝廟號定宗超為孝平皇帝廟號成宗志為孝安皇帝廟號惠宗榮為孝德皇帝廟號慶宗奉徐武皇廟號義祖徐氏二王如𥘉諸孫皆郡公女郡縣主齊臺門下侍郎張居詠中書侍郎李建勳皆平章事吳中書侍郎張延翰為右僕射平章事以􅐚州李章鎮廬州神武統軍王安為百勝軍節度使秋七月一時無事則書首月冬十月戊寅天子受徽號于契丹曰英武眀義皇帝尤非常故書錢元瓘以嘉興縣為秀州十有一月以步騎八萬講武于銅橋賜將吏以下金帛有差讓皇殂帝率百官素服哀臨命有司供具如吳舊禮諡曰睿十有二月福州亂連重遇弒其君昶立王子䂀王子延政爭立於是僣位于建州國號大殷他國悉書者為保大三年取閩張本吳世子璉先娶帝女是為永興公主璉以公主故為中書令康化軍節度使三年春正月丙申詔曰比者干戈相接人無定主地易而弗藝桑隕而弗𧖟衣食日耗朕甚憫之其嚮風靣內者有司計口給食願耕植者授之土田仍復三歲租役於嘻仁不異逺化無泄邇其務宣流以稱朕意二月池州楊璉卒以統軍王彥儔為康化軍節度使詔公卿以下議定郊祀門下侍郎平章事居詠中書侍郎平章事建勳等議曰孔子云郊祀后稷以配天宗祀文王於眀堂以配上帝此萬世不易之法也昔長孫無忌請祀髙祖於圎丘以配昊天上帝祀太宗於眀堂以配上帝蓋得之矣今國家嗣興唐祚追尊孝德而以神堯為肇祀之祖宜以神堯配天於圎丘以孝德配上帝於眀堂禮也其服物制度古有常儀一切僞飾碩皆罷去奏可司徒齊丘請依春秋郊以四月上辛常夢錫駁曰案禮天子之郊以冬至不卜日魯侯之郊以仲春卜上辛今之四月非郊之時齊丘固爭遂用夏四月夏讀為夏啇之夏魯用周之四月郊議者多哂之詔曰禮莫重於享帝孝莫大於隆親事實重大承以輕眇可謂無其德而用其事祗加畏焉於嘻爾公爾侯各揚厥職不供乃事國有常典夏四月上辛始郊祀於圎丘大赦境內是夜月當以子𥘉沒而升壇之際皎然如晝衆咸異之遍行封賞羣臣請上徽號不許固請之帝曰朕以眇躬託于民上夙夜祗畏常恐弗類矧乃徽號用揚虛美是重弗類固不許因此廢徽號之禮州郡言符瑞者十數帝曰譴告在天聰眀自民魯以麟削莾以符亡常謹天戒猶懼或失之符瑞何為哉皆抑而勿揚言五代同居者七家其尤著者江州陳氏元和給事中京之後宗族七百口每日設廣席長幼以次坐而共食有畜犬百餘共一牢食一犬不至諸犬為之不食建書樓於别墅以延四方之士肄業者多依焉鄊里率化獄訟希少逺近歎異之皆蠲復征役旌表門閭秋七月庚子朔日有蝕之八月鄂州張宣卒以潤州留後王輿代金吾衛大將軍馬仁𥙿出為鎮海軍節度使留後冬十月四年春正月夏四月樞密使周宗出為奉化軍節度使六月安州節度使李金全來降遣鄂州屯營使李承𥙿帥師迎之承𥙿與晉將馬全節安審暉戰于安陸承𥙿及禆將假處恭戰死監軍通事舍人杜光鄴及其兵五百人𬒳執天子厚賜之遣還帝致書于晉復送光鄴等請以敗軍行法天子又遣之帝以甲士臨淮拒之乃止天子晉髙祖也書帝致書于晉惡其抗也以金全為宣威統軍洪州李德誠卒以宣州徐玠代以江州徐知證為寧國軍節度使梁王徐知諤卒秋八月廬州李章卒以潤州馬仁𥙿代以天威統軍盧文進為鎮海軍節度使冬十月幸東都存省故老宴于舊宅踰月還十有二月左僕射平章事張延翰卒五年春正月􅐚州王安卒以統軍賈浩為百勝軍節度使三月誅泰州刺史禇仁規夏四月秋九月壬子有星孛于天市錢元瓘卒佐嗣位冬十有二月葬吳越文穆王凡他國廢立卒葬弒殺告問通則書六年春三月廬州馬仁𥙿卒以滁州刺史周鄴為保信軍節度使留後夏四月南漢劉龑卒玢嗣位葬劉龑僣諡天皇大帝以其僣極惡重故書與吳越異龑音儼劉氏僞撰此字以為名自云取飛龍在天之義遷讓皇子孫於海陵號永寧宫嚴兵守之絶不通人久而男女自為匹偶吳人多哀憐之猶書吳人者以其思舊之民也詔吳王景通為太子景通表曰古之立太子所以崇正嫡息覬覦如臣兄弟禀承聖教實為敦睦碩寢此禮三表許之乃以大元帥總百揆改封齊王以駕部郎中馮延巳為元帥府掌記夀州髙審思卒以侍衛諸軍都虞候姚景為清淮軍節度使六月乙丑天子崩晉髙祖秋七月丞相大司徒宋齊丘為鎮南軍節度使以洪州徐玠為司徒侍中帝曰豫章大司徒維桑也衣錦晝行古人所貴以錦𫀆賜之齊丘至鎮衣以視事羣臣咸謂江淮之地頻年豐稔兵食既足士樂為用天意人心未厭唐德宜廣土字攻自潭越始帝曰吾少長軍旅見干戈之為民患甚矣吾不忍復言兵革使彼民安則吾民亦安矣吳越災宫室府庫甲兵殆盡羣臣復請乘其弊帝曰今大敵在北北方平則諸國可尺書召之何以兵為輕舉者兵之大忌宜畜財飬鋭以俟時焉使使唁越于武林厚幣以賙其闕冬十月詔曰前朝失御强梗崛起大者帝小者王不以兵戈利勢弗成不以殺戮威武弗行民受其弊蓋有年也或有意於息民者尚以武人用事不能宣流德化其宿學巨儒察民之故者嵁巖之下往往有之彼無路光亨而進以拊傴為嫌退以清寧為樂則上下之情將何以通簡易之政將何所議乎昔漢世祖數年之間𬒳堅執鋭提戈斬馘一日晏然而兵革之事雖父子之親不以一言及之則兵為民患其來尚矣今唐祚中興與漢頗同而眇眇之身坐制元元之上思所以舉而錯之者㷀㷀在疚罔有所發三事大夫可不務乎自今宜舉用儒者以𥙷不逮於是稍用儒臣漸去苛察又將修復故事為後代法未果行而帝疾作七年春二月詔曰乃公乃侯越百執事欽承嗣命命爾保元子璟祗肅天鑒社稷宗廟永有終我不敢知曰其基永昌我亦不敢知曰墜命罔後天不爾諶祐于有德厥位艱哉翌日殂于路寢夀五十六葬永陵諡光文肅武孝髙皇帝廟號烈祖徐鉉曰烈祖少長喪亂知人艱苦故不以富貴自處唯務節儉身為宰相事飬父母如禮飲食皆親侍或周疾不解帶溫常責諸子曰汝輩能如是乎及建號即金陵使府為宫唯加鴟尾欄檻而已終不改作接見親族如家人禮尊長者親拜之晚年服金石藥性多躁怒百司奏事必至厲聲訶責羣臣或正色抗辭以對事理明白必斂容慰勉之旬日之後多有恩澤故人思盡力决死刑用三覆三奏之法文武亡殁子孫隨才以叙不限資廕或營其婚嫁幼未堪任與其無嗣者內帑以給之有親老者倍其數死王事者下至卒伍皆三年給其全俸故士無貴賤悉亡身外之憂嗚呼積厚者流澤逺積薄者流澤狹不其然乎舜之後千餘年而有陳陳亡而田氏專政於齊禹之後千餘年而有𣏌𣏌削而勾踐得志於越後世之君建大義於一時而德不若舜禹者亦隨其澤之逺近而興起焉故晉以天下喪於狄人而琅瑘繼之唐以天下篡於朱梁而烈祖紹之然則盜名器操生殺制一方之命抗萬乘之勢者豈非天歟烈祖之起雖無雄才大略而深沈寬𥙿本於天性幸而適丁中原擾攘之際故數年之間有足觀者南唐書卷之一
