body:
  text: 南唐書卷之二嗣主書第二民靡有定誰其奠之弃師閩楚命委輿尸作嗣主書嗣主諱璟字伯玉𥘉名景通烈祖元子也美容止器字髙邁性寬仁有文學甫十歲吟新竹詩云棲鳯枝梢猶軟弱化龍形狀巳依稀人皆竒之起家為尚書郎吳讓皇見之曰吾諸子皆不及也纍遷諸衛大將軍典治軍旅撫納將校烈祖出鎮金陵拜璟司徒平章事知內外諸軍事加諸道副都統烈祖受禪封吳王纍遷太尉中書令諸道元帥録尚書事改封齊王既當儲副之地而固讓再三謙虛下士常若弗及烈祖殂授顧命猶讓諸弟辭益堅侍中徐玠以衮冕𬒳之曰大行付殿下以神器之重殿下固守小節非所以遵先㫖崇孝道也乃嗣位改元保大太常博士韓熙載上疏曰踰年改元古之制也事不師古弗可以訓時雖可其奏而制書巳行遂改元冊母宋氏為皇太后妃鍾氏為皇后弟景遂改封燕王弟景逹改封鄂王弟景逖改封保寧王長子兾南昌王文武進位有差洪州宋齊丘入為左丞相江州周宗入為右丞相以元帥府掌書記馮延已為諌議大夫翰林學士夏四月戊申朔日有食之中書侍郎平章事李建勳罷為昭武軍節度使南漢劉晟弒其君玢晟自立為帝不書僣者玢之前巳僣也五月司徒兼侍中徐玠卒秋七月燕王景遂改封齊王拜諸道兵馬大元帥太尉中書令鄂王景逹改封燕王拜副元帥宣告中外以兄弟相傳之意以元子南昌王兾為江都尹東都留守書元子以見景遂之不得襲位也景遂固讓不許蕭儼上疏其略曰夏商之後父子相傳不易之典惟仰循古道以𥙿後昆疏奏不報冬十月庚戌有星孛于東方妖賊張遇賢聚衆十餘萬陷䖍州諸縣諸縣舊史失名䖍州城守遇賢據白雲洞命洪州營屯都虞候嚴思禮通事舍人邊鎬討賊鎬思禮擒遇賢及賊副黃伯雄謀主僧曺景全斬於建康市以嚴思禮為海州刺史邊鎬為洪州屯營諸軍都虞候貶百勝軍節度使賈浩為監門衛將軍罪貶故書使池州安置以饒州刺史李翺為百勝軍節度使留後十有二月下令中外庶政並委齊王景遂參決文武百司唯樞密副使魏岑查文徽得白事餘非召對不得見蕭儼上書極論曰元帥開府人猶驚駭况委之大政而羣臣不得時見臣恐中外隔絶姦人得志非陛下之利也書奏不報侍衛軍都虞候賈崇詣閣求見曰臣事先朝二十餘年每見延接踈逺未嘗壅隔羣下之情罔有不逹今陛下始即位所委任者何人而頓與羣臣謝絶深居邃處而欲聞民瘼猶惡隂而入乎隧道也臣老矣長不復奉顔色因涕泗嗚咽帝深為感動引與之坐賜食而出始以手札批喻儼等曰旻天不弔降此鞠凶越豫小子常恐弗類于厥德用災于厥躬故退處恭默思底于道而壅隔之弊以為卿憂惟豫小子實生厲階由是所下之令遂寢時宋齊丘周宗為左右丞相齊丘專執而宗純謹自守及上心既悟齊丘乃言其非便帝曰公何不早誨我遂罷齊丘為浙西節度使齊丘黨與隆熾造作飛語以誣宗宗泣而上訴帝知之弗問此為明年宗出張本宋齊丘上表乞歸九華舊隱許之賜號九華先生封青陽公食青陽一縣二年春正月右丞相周宗罷除江西節度使門下侍郎平章事張居詠罷除浙西節度使二月辛卯日有白虹二三月左衛上將軍盧文進卒夏閩人朱文進連重遇弒其君曦重遇立文進使來告亂囚其使議伐閩以民疫釋閩使遣之夏四月秋七月鄂州王輿卒以神武統軍韋建為武清軍節度使備書官職者新命也書某州某人代者移鎮也夀州姚景卒以濠州劉崇俊代以楚州刺史劉彥貞為濠州觀察使九月庚午朔日有食之冬十有二月馮延巳為翰林學士承㫖水部貟外郎馮延魯為中書舍人延魯鋭於功名欲興建州之役乃贊中書舍人查文徽為江西安撫使翰林待詔臧循者嘗賈於閩具知山川險易為文徽陳進兵之計文徽因是請伐閩乃命邊鎬率洪州屯兵與文徽俱行遂入建陽王延政遣統軍使吳承祐以逰兵巡福州境紿曰唐助我討賊大軍至矣福州信之連重遇殺朱文進禆將林仁翰殺重遇函其首歸承祐延政以其子繼昌守福州親率衆以拒我師五郡之兵大集五郡福建江漳泉敵勢甚盛文徽等次于蓋竹退復屯建陽啓求濟師三年春二月遣祖全恩何敬洙率萬人以應文徽與延政陳隔水全恩使建陽降將孟堅潜師出其後禆將武彥暉馬存貴以輕鋭繼之腹背夾擊延政大敗以餘兵城守閩人李仁逹殺其君之子繼昌前年以福州降延政故以延政為君及其統軍吳承祐立雪峯僧卓儼眀為主儼眀無統御之略仁逹又殺之而自稱留後遣使來降即以仁逹為威武軍節度使延政益不振建州之險要曰西巖延平津相繼而平夏四月秋七月庚辰星見而風雨八月甲子朔日有食之遂克建州執王延政歸于建康授羽林大將軍安化軍節度使封鄱陽王泉州刺史王繼勳漳州刺史王繼成汀州刺史許文縝皆請降因而鎮撫之諸將下建州兵無節制剽掠甚衆閩人失望帝以出師有功不録其過升建州為永安軍以祖全恩為節度使查文徽為撫州刺史何敬洙為楚州刺史偏將王建封先登功第一為信州刺史全恩未拜而卒以廬州王崇文鎮建州泉州禆將從效劫刺史王繼勳使之入朝從效自領州事於是王繼成許文縝皆至建康以繼勳為池州團練使繼成為和州刺史文縝為蘄州刺史即以劉從效為泉州刺史冬十月皇太后宋氏殂以延平津為劒州割建州之劒浦汀州之沙縣屬焉以建州禆將陳誨為劒州刺史以龍衛都虞候劉仁贍為武清軍節度使升泉州為清源軍以泉州刺史劉從效為節度使四年春正月陳覺諷齊王景遂言宋齊丘先朝布衣之舊委諸山林不允中外之望帝使景遂至青陽召之起拜太傅奉朝請而已以撫州李建勳為左僕射門下侍郎平章事中書侍郎馮延已拜平章事吏部尚書徐連為鎮海軍節度使二月壬戌朔日有食之命建州製的乳茶號曰京挺臘茶之貢自此始罷貢陽羡茶夏四月侍衛諸軍都虞候賈崇為奉化軍節度使留後葬元恭皇后于永陵六月夀州劉崇俊卒以濠州觀察使劉彥貞為清淮軍節度使侍衛諸軍都虞候郭全義出為濠州觀察使以劉崇俊子範為滁州刺史建州之役府庫中耗民不堪命故李仁逹劉從效皆羈縻而已至是諸將請討之不許宋齊丘薦陳覺為福建路宣諭使說仁逹入覲不從覺還至建安矯制發建汀撫信之師及防戍之兵掩其不意徑至城下時魏岑安撫漳泉聞覺起兵亦擅發兵應覺帝大怒馮延巳等為言兵集行不可止乃以王崇文為招討使王建封為副使益兵以㑹之馮延魯為南面監軍使魏岑為東面監軍使陳覺為諸軍監軍使仁逹送欵於吳越吳越以兵三萬應之覺等爭功進退不相應延魯及吳越戰延魯敗績諸軍皆潰帝怒遣使者鎖覺延魯至金陵而馮延巳為宰相宋齊丘亦預三公稍解之貟外郎韓熙載諌曰臣觀覺等罪不容誅但齊丘延已內為陳請所以得全且擅興者不罪則疆埸生事喪師者獲存則行陳解體請行顯戮以重軍威帝曰齊丘延巳有自咎之表無請赦之辭覺等五木𬒳體一家狼藉永不録用與死何殊乃流覺蘄州流延魯舒州齊丘惡之貶熙載和州司馬冬十有二月壬戌契丹及晉師戰于中渡晉師敗績丙寅杜重威李守貞以王師降于契丹癸酉張彥澤引蕃騎陷京師彥澤剽劫屠害甚衆晉帝奉表納璽於戎主以其失利勢故不書天子是歲中原無主密州刺史皇甫暉青州刺史王建及㳂淮諸戍皆來降方且疲兵東南不暇北顧馮延巳延魯魏岑陳覺皆以姦回得用人情不平既流延魯及覺而延巳為相岑亦居近密於是御史中丞江文蔚疏其罪曰二凶雖去未稱民情四罪盡除方眀國典帝大怒貶文蔚江州司士參軍亦罷延已為太子少傳岑為太子洗馬漳州禆將林贊堯殺監軍周承義以叛討平之以泉州禆將董思安為漳州刺史思安辭以父名章命改漳州為南州副使劉從願殺思安自領州事南州復為漳州南唐書卷之二
