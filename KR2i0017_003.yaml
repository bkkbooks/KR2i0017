body:
  text: 南唐書卷之三嗣主書第三五年春正月晉帝舉族出封丘門虜主次于京城北不見帝虜不與之見也猶書曰京城者甚虜之惡也文武百官素服紗帽俯伏俟罪虜主命起之親加慰撫遂入都城據大內改京師為都城晉無君也己丑斬張彥澤於東市以其剽劫之罪庚寅洛京留守景延廣自扼其喉死辛卯虜廢晉帝為光祿大夫檢校太尉封負義侯黃龍府安置此中原之事悉書者以下文使來告故也虜使來告曰晉少主逆命背約自貽廢黜吾主欲與唐繼先世之好將册命唐為中原主帝命近臣對曰唐守江淮社稷已固與梁宋阻隔若爾主不忘先好惠錫行人受賜多矣其他不敢拜命之辱遣兵部侍郎賈潭報聘帝歎曰閩役憊矣其能抗衡中原乎以齊王景遂為太弟燕王景逹為元帥改封齊王元子南昌王兾為副元帥封燕王依前東都留守安樂公茂為侍衛諸軍都虞候二月丁已朔虜改晉都為大遼國肆青改元會同猶謂之晉都者漢未立也不謂之京師者中原無主也不書赦不與虜赦中國也辛未漢帝即位天子即位易代則書改晉開運四年為天福十二年中原改元不書此書會同非常也漢稱天福十二年亦非常也三月宣州徐知證卒夏四月丙子太白晝見以皇甫暉為神衛軍都虞候秋八月以太傳宋齊丘為鎮南軍節度使周宗為寧國軍節度使錢佐卒保襲位冬十有一月壬子雨木冰辛酉雨木冰癸酉雨木冰十有二月越人胡進思廢其君倧囚於義和院錢俶入是歲馬希範卒希廣襲位六年春正月越人立俶遷倧于東府丁丑天子崩漢髙祖以太子少傅馮延巳為昭武軍節度使夏四月廬州周鄴卒五月葬楚文昭王葬吳越忠獻王越亂故緩六月庚寅朔日有食之秋漢伐河中圍李守貞守貞遣從事朱元李平奉表來乞師以潤州李金全為西面行營招撫使夀州劉彥貞為副諌議大夫查文徽為監軍使兵部侍郎魏岑為沿淮巡撫使聞河中平遽班師冬十有一月髙從誨卒保庸嗣位葬南平文獻王七年春正月淮北諸盜來附以神武都虞候皇甫暉禆將張巒蕭處恭帥師出海泗諸郡以右散騎常侍張義方為監軍使納賊帥咸師朗以歸二月以中書舍人嚴續為奉化軍節度使以江州賈崇為神武統軍侍衛諸軍都指揮使夏四月壬申太白晝見贈故廬山江夢孫國子司業六月癸酉朔日有食之秋七月殺天威統軍都虞候王建封八月以建州王崇文鎮廬州以諌議大夫查文徽為永安軍節度使留後冬十有二月日暈三重八年春正月詔曰春秋日食地震星孛木冰可謂甚矣比者災異仍多豈人君不德以召之耶抑亦天心之仁愛而譴告之也朕甚惕焉曩者兵連閩粵武夫悍將不喻朕意而務為窮黷以至父征子餉上違天意下奪農時咎將誰執在豫一人其大赦境內窮民無告者大賜粟帛二月以東都留守燕王兾為潤宣二州大都督鎮京口宣州周宗為東都留守福州許言吳越戍兵亂殺李仁逹而遁遣人告急于境建州節度使查文徽以興兵故書使劒州刺史陳誨以舟師應之文徽留誨屯江口進至西門伏兵發文徽𬒳執誨與越人戰大敗之獲其將馬先進葉仁安等歸于建康帝送先進等還越越亦歸文徽夏四月以劒州刺史陳誨為永安軍節度使秋七月冬十有一月甲子朔日有食之乙酉天子崩漢隱帝楚朗州節度使馬希蕚遣使來乞師遂以楚州屯兵攻潭州殺希廣杖其妻死於市左右用事者皆臠割之希蕚自稱楚王邊鎬統信州屯兵以覘楚十有二月漢將郭威領大軍北征壬子次澶州何福進率壯士擁威為天子書此以見中原治亂九年春正月周帝即位劉旻稱帝於太原以其曲在周故不曰僣𥘉契丹犯河南晉帝北遷韓熙載上書曰陛下有經營天下之志當在今時若戎主遁歸中原有主安輯稍定則未可圗也時以連兵南閩至此方議北征熙載又上書曰郭氏姦雄雖有國日淺而為理巳固兵若輕舉非獨無成亦且有害乃命李金全耀兵於淮上而止夏四月秋七月樂安公茂卒冬十月楚人徐威陳遷魯公綰陸孟俊執其君馬希蕚囚于衡山立王子希崇十有一月楚人廖偃等招合蠻獠復立希蕚為楚王楚國大亂邊鎬以信州屯兵出宜春討長沙破其軍於龍回關徐威等以希崇降希蕚亦送欵于鎬鎬盡遷馬氏之族于金陵以希蕚為洪州大都督封楚王希崇為舒州節度使以邊鎬為湖南節度使鄂州劉仁贍以舟師趨嶽州嶽州降以將軍宋德權為嶽州刺史以客省引進使任鎬為監軍使以馬光惠為朗州節度使留後宋齊丘拜太師固辭復為太傅十年春正月分洪州髙安縣置筠州割清江萬載上臯屬焉以湖南行營糧料使王紹顔為刺史三月以撫州馮延已為左僕射平章事右僕射孫晟守本官平章事潤州徐連中書侍郎平章事夏四月丙戍日有食之五月司徒致仕李建勳卒秋劉晟取桂管將軍張巒爭之不克朗州禆將劉言執留後馬光惠送建康言自領州事遣李建期屯益陽將討劉言而楚地新定府庫空虛宰相馮延已以克楚為功不欲取費於國乃重斂其民以給軍邊鎬不能振撫楚人皆怨帝亦惡之謂馮延巳孫晟曰湖湘之役楚民厭亂求息肩於我今欲罷桂陽之師解益陽之戍即授劉言以節鉞使自安輯其民吾亦得惠飬湘衡之地如是則逺邇完實二蕃在吾度內爾公等亟行之無為後悔孫晟即欲奉行延已曰吾以偏師克全楚天下驚動今三分喪二何以為功遂稽其命未幾劉言遣王進逵破益陽殺建期等乘勝攻長沙邊鎬遁歸所在屯戍相繼散走獨張巒全師而還且戰且行取資於道嶽州刺史宋德權監軍使任鎬皆棄城走帝大怒削邊鎬官流饒州戮宋德權任鎬于大社斬禆將申洪泰尹建于都門外以張巒為信州刺史延已等自劾起之孫晟請罪不已乃罷為右僕射冬十有二月洪州大都督馬希蕚入覲留建康弗遣十有一年春二月周行馮據潭州三月建康大火踰月廬舍營署殆盡夏五月以太傳宋齊丘為鎮南軍節度使秋七月以鄂州劉仁贍為神武統軍侍衛都指揮使以濠州觀察使何敬洙為武清軍節度使大蝗八月不雨冬十月築楚州白水塘以溉田命州縣陂塘堙廢者修復之十有二月水冰十有二年春正月大星墜于東北聲如雷兖州節度使慕容彥超遣使來乞師以拒周出兵數千至淮北不書將校舊史失之為周師所敗俘其將校于京師天子平彥超釋唐俘諭之曰歸語爾主朕誅逆命何苦來援帝亦悔之漢末遣使潭州市茶會邊鎬平馬氏例俘于金陵由是引對慰勞以上茗萬斤遣之壬辰天子崩周太祖自前年八月不雨至于三月民大飢疫死者大半下令郡縣煮粥以食之劉旻乞師于契丹以寇潞州天子親征大敗之休兵潞州大饗將士斬敗將樊受能等七十餘人軍威大振進圍太原遣符彥卿史彥超等北控圻口以斷契丹援路彥卿等敗績彥超戰沒天子遽班師書以見世宗威略為眀年伐我張本夏五月丁亥月重輪秋七月契丹使其舅來聘升元中宋齊丘選宫嬪雜以珠貝羅綺泛海北通契丹欲賴之以復中原而虜使至則厚幣遣還逮至淮北輒使人刺之復遣使沿海齎琛寶以報聘虜意晉人殺其使數犯中原至是館虜使於清風驛夜宴更永盜斬其首契丹自此不至蓋中原間之也冬十月十有三年春二月以門下侍郎嚴瀆守本官平章事夏四月以夀州劉彥貞為神武統軍侍衛諸軍都指揮使以劉仁贍為清淮軍節度使三月周伐蜀秋七月蜀使來聘冬十月東都留守周宗乞罷鎮詔曰嵩嶽降靈誕生良弼佐我先朝施及朕躬尚賴保釐底于成績而遽爾請罷豈朕不德不能優禮勳舊而致然也昔蕭何守巴蜀而髙祖無西顧之患寇恂守河內而光武無分民之嫌今任公以何恂之事宜強飯扶力以副朕意於嘻國之安危惟兹淮甸愼始成終非公而誰所請宜不允宗以老病三表乃許守司徒致仕以中書舍人馮延魯為工部侍郎東都留守以侍衛諸軍都虞候賈崇為東都屯營使十有一月周師來伐李榖為都部署攻夀州帝召洪州宋齊丘還都齊丘請徴諸郡兵屯於淮泗以禆將有才略者主之聲言偏師敵人不測其實必難輕進春水時至糧道阻隔懸軍日久自當遁去然後遣使請平彼必樂從議者不同遂止劉彥貞督兵以抗周師江州皇甫暉帥師為援李榖退屯正陽天子命李重進為竒兵以要彥貞彥貞追榖至正陽重進與榖腹背擊之彥貞大敗死于陳諸軍皆潰張全約以其衆奔夀春自楊氏王吳淮甸之人不識干戈者二十餘年及彥貞敗民皆恟懼帝欲親拒周師中書舍人喬匡舜極諌貶匡舜臨川親行之議亦寢天子先詔錢俶攻常宣二州以撓我師於是吳越伺間攻常州刺史趙仁澤𬒳執將軍柴克宏救常州大敗越人斬首千餘級獲其將吏數十人皆斬於京口拜克宏奉化軍節度使天子營于淝水之陽徙正陽橋于下蔡林仁肇皇甫暉爭之不勝暉走滁州天兵追殺之以周師為天兵太祖主兵故也遂下滁州帝惡之遣泗州牙將王知朗至滁州稱唐皇帝奉書願效貢賦陳兄弟之禮天子不答東都留守馮延魯光州刺史張紹舒州刺史周祚泰州刺史方訥皆棄城走延魯削髮偽為僧遁歸周人執之蘄州禆將李福殺其刺史王承雋降周帝益惡之始改名景以避周廟諱遣翰林學士鍾謨文理院學士李德明奉表稱臣獻犒軍牛五百頭酒二千石金銀羅綺數千請割夀濠泗楚光海六州以求罷兵天子不報謨等皆留行在分兵襲下楊泰帝遣人懷蠟丸書走契丹求救為邊將所執光州刺史張承翰降周天子至淮南下詔撫安楊氏之後帝聞之命園苑使尹延範自泰州徙讓皇一族于京口延範殺其子弟六十餘人以其婦女渡江周先鋒使劉重進得其玉硯瑪瑙碗翡翠瓶以獻周楊氏遂絶帝罵曰小人以不義之名纍我腰斬延範歸之以專殺之罪南唐書卷之三
