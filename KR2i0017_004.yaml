body:
  text: 南唐書卷之四嗣主書第四十有四年春正月遣司空孫晟禮部侍郎王崇質奉表于周辭益卑服削去帝號天子猶不荅留晟等弗遣鍾謨請歸取表盡獻江北之地天子許之遣崇質徳眀還始賜江南書曰自有唐失御天歩多艱六紀于兹瓜分鼎峙自爲聲教各擅蒸黎交結四夷憑陵上國華風不競否運所鍾凢百有心孰不興憤朕擅一百州之富庻握三十萬之甲兵農戰交修士䘚樂用苟不能恢復内地申畫邊疆便議班旋直同戲劇至於削去尊稱願輸臣節孫權事魏蕭察奉周古也雖然今則不取但存帝號何爽歲寒儻堅事大之心必不迫人于險徳眀等歸盛稱周天子英武帝尤惡之宋齊丘陳覺等皆以割地無益而徳眀賣國以圗利帝怒斬徳眀二月遣元帥景逹帥師應夀春陳覺爲監軍使拜邊鎬爲大將許文縝副之中書舍人韓熈載上䟽請罷監軍使不報司徒致仕周宗䘚三月江州柴克宏䘚諸郡屯田相率𧺫義以農器爲兵襞帋爲鎧處處保聚號曰甲軍周師苦之景逹等趨夀州其將朱元李平唐進克復舒蘄㤗三州夏大雨周師在楊滁和者皆却諸將請要其險隘擊之宋齊丘曰擊之怨深不若縦之以爲徳誡諸將閉壁不得要戰周師皆集於夀州故諸州雖復而夀春之圍益固天子駐于渦口猶欲再幸楊州宰相范質以師老泣諌乃班師以李重進攻廬州向訓守楊州訓請棄楊州併力以攻夀春乃封府庫付主者遣淮南舊將按巡城中秋毫不犯而去淮人大悅皆負糗糧以送周師秋七月楊光滁和復歸于我冬十有一月周殺我行人孫晟十有五年春元帥景逹命其將朱元等屯紫金山築甬道以餉夀州二月天子復来伐徙下蔡橋于渦口爲鎭淮軍築二城以夾淮周師連破紫金山諸寨監軍陳覺乞罷朱元帝遣大将楊守忠代元且召之元憤怒叛降周諸軍皆潰許文縝邊鎬𬒳擒景逹以州兵奔還金陵三月丁未劉仁贍病且死其副孫羽等以夀州降仁贍病䘚夏四月巳巳天子班師亂兵焚楊州民皆徙江南秋七月冬十月天子復来伐圍濠州刺史郭廷謂降周泗州守将范再遇叛降周廷謂不書叛者力不支也㤗州亦潰周師歩騎數萬水陸齊進軍士作檀来之歌聲聞數十里檀来者但来也北人語音十有二月天子駐于楚州城北十有六年春正月大赦改元交㤗周師攻楚州守将張彦能鄭昭業城守益堅城壊彦能昭業戰死周人屠其城而戍之丁未海州潰壬辰靜海軍潰周人盡得海㤗楊楚之地丁卯周人次楊州癸酉次瓜州三月壬午朔次㤗州丁亥復次楊州辛卯遂幸迎鑾以臨大江周自屠楚州貶書人其後駐幸皆書次至迎鑾復書幸不泯其實也時楊㤗滁和夀濠泗光海等州已爲周得廼遣陳覺奉表獻廬舒蘄黃畫江以爲界天子許之賜書曰皇帝恭問江南國主勞其良苦而已四年而後克亦巳憊矣夏五月下令去帝號稱國主奉周正朔以交㤗元年爲顯徳五年鍾謨遇延魯至自京師國主復遣謨等奉表拜成且請傳位始降號稱國主傳位不曰傳乎某人者景遷爲太弟時未定也天子優詔勞安之傳位之意遂止以謨爲禮部侍郎延魯户部侍郎以行營應援使林仁肇爲浙西節度使前廬州孫漢威爲奉化軍節度使贈劉仁贍太師追封衛王孫晟太傳追封魯國公劉彦貞中書令張彦能侍中其餘将士死國難者追贈有差秋泉州劉従効奉表貢于京師天子不納冬十月禮部侍郎常夢錫䘚十有二月流陳覺于饒州流李徴古于洪州皆殺之放宋齊丘于青陽太弟景遷固請歸藩於是以長子兾爲太子以景遷爲洪州大都督封晋王齊王景逹爲撫州大都督信王景逷爲百勝軍節度使昇元𥘉括定民賦每正苗一斛别輸三斗於官廪授鹽二斤謂之鹽米至是淮甸鹽埸皆入於周遂不支鹽而輸米如𥘉以爲定式顯徳六年春正月宋齊丘縊死于青陽夏晋王景遂䘚秋七月鍾謨請鑄大錢以一當十文曰永通泉貨以信州刺史張巒爲天徳軍使九月太子兾䘚𥘉丹陽古銘曰天子兾州人以兾應之未幾䘚識者謂兾州趙地也眀年皇朝受命之符爾次子從嘉封吳王居東宫鍾謨曰從嘉輕肆請立紀國公從善國主怒貶謨爲國子司業立從嘉爲太子天子使人謂國主曰吾與汝大義巳定終慮後世不汝容可及吾世修城隍治要害爲子孫計國主因營緝諸城謀遷都于洪州曰建康與敵境隔江而巳又在下流敵兵若至閉門自守借使外諸侯能救國難即爲劉𥙿陳霸先爾今吾徙豫章據上流而制根本上策也羣臣多不欲惟樞宻使唐鎬賛成之夏六月熒惑守心光芒相射癸巳天子崩周世宗秋七月升洪州爲南昌建南都冬十月流鍾謨于饒州賜死貶張巒爲宣州副使殺之十有二月罷鑄大錢明年周亡編年之法絶筆於周亡者清風發而羣隂伏理固然也雖然無所述而遂泯其實則何以著李氏之罪故名器服物慶賞刑威直書其僣将以正其罪爾建隆元年臣属于皇朝夏四月太子太傳馮延巳卒是歲李重進使来乞師拒之遣馮延魯入貢以聞二年春以世子従嘉監國國主如南都所過慰勞守宰存問髙年疾苦㑹齊王景逹于廬山歷覽勝境與従臣譚宴浹日而去三月至南都以何洙爲奉化軍節度使敬洙去敬字避皇朝諱豫章迫隘宮府營署皆不能容羣臣日夕思歸國主悔怒唐鎬慙懼發瘍卒六月國主殂于南都年四十有六在位十有九年秋七月國主之䘮至自豫章羣臣請殯别宮世子手札不許辭甚哀切書世子手札未即位也見後主書乃殯于萬夀殿遣使入朝乞追復帝號太祖皇帝許之諡眀道崇徳文宣孝皇帝葬順陵廟號元宗先諡而後書葬者因其請號順文勢也徐鉉曰嗣主工筆札善騎射賔禮大臣敦睦九族每聞臣民不獲其所者輒諮嗟傷憫形於顔色随加救療居處服御節儉得中𥘉立有經營四方之志邪臣阿謟職爲厲階晩歲悔之已不及矣少有至性仍懐髙世之量始出閤即命於廬山瀑布前構書齋爲他日終焉之計及迫於紹襲遂捨爲開先精舎常患民間侈靡第宅衣服咸爲節制驅惰逰之人率歸農業及大漸之際群鶴翔于空雙龍據殿屋遂奄然而化嗚呼甚哉守成之難也非特守之難而授之者尤難非授之難而知其可受者爲難商有天下成湯作之太甲守之而中有不類之憂嚮非阿衡之佐則求其思庸之復也難矣周有天下武王作之成王守之而中有流言之變嚮非周公征之則求其鳧鷖之雅也亦難矣以唐太宗之豐功大業一正天下建不拔之基而晋王之立殺父之臣失父之政䘚至於大亂矧不及於太宗者乎元宗即位一十九年有經營四方之志約巳慎刑勤政如一嚮非任用羣小屏棄忠良國用不殫於閩楚師旅不棄於淮甸則庻幾完成之君也志有之曰楊者易生之木也一人植之十人㧞之無生楊矣以新造之唐而守之非道不㡬乎朝蒔而夕揠其亡也不旋踵故周世宗以衰世之鋒一鼓而十四州之地掇如也悲夫南唐書卷之四
