front:
  text: 南唐書卷之五後主書第五嗚呼春秋之時君薨眀年正月公即位自桓公始宣成而下未嘗革也昭公薨于乾侯定公於眀年夏六月戊辰即位者其故何哉蓋非常之變起於不可測非常之禮行於不得已古之人觀會通以應世則處非常之變用非常之禮者皆禮經之所不得而考也義起於情而已矣且諸侯薨于路寢而昭公客死於乾侯者非常之變起於不測也嗣君釋冕反喪而定公即位於眀年六月者非常之禮行於不得已也元宗殂於豫章後主留守建康必待喪還既殯而後即位其偶合於定昭之事乎且聖人制禮立天下之大經為天下之大防也情偽之變無窮而禮之所載有常以有常之禮御無窮之變則亦隨其宜而已矣故禮不盡而義有餘則禮以義起義不足而禮有餘則義以禮逹君子邅變亂而無矌於禮者在審其義爾大喪禮之大典禮經載之詳矣而曽子之所問者禮經有所不及也變禮之不測曽子問載之詳矣而國君薨于外世子立于內者曽子問有所不及也非趨時而合義其孰能與於此哉德雖不競孰匪天亡日月俱照爝火銷光作後主書後主名煜字重光𥘉名從嘉元宗第六子也少而聰慧善屬文工書畫𥘉封安定郡公淮上兵起為神武軍都虞候沿淮巡撫使纍遷諸衛大將軍諸道副元帥封鄭王太子兾卒四兄皆早亡以次為嗣改王吳拜尚書令知政事建隆二年元宗南遷立煜為太子監國六月元宗殂於豫章七月喪還建康太子即位尊母鍾氏為太后太后父名太章故改號聖尊后妃周氏為國后封弟從善為韓王南都留守從益鄧王從謙宜春王從度昭平郡公從信文陽郡公以右僕射嚴續為司空依前平章事大赦境內文武進位有差罷諸路屯田使委所屬令佐與常賦俱征𥘉南唐屯田置使專掌至此罷其使而屯田佃民絶公吏之撓八月鄂州王崇文卒以南郊巡檢使黃延謙為武清軍節度使留後冬十月以南都留守韓王從善為司徒兼侍中諸道兵馬副元師以鄧王從益為司空南都留守下令諸司無職事官四品以下至九品日二貟待制於內殿泉州劉從效遣其子紹基來貢三年劉從效卒州人立其次子紹鎡為留後紹基未還統軍使陳洪進執紹鎡并其族送于金陵推立其副張漢思漢思老不任事洪進逐之自稱留後國主即以洪進為清源軍節度使以紹基為殿直軍都虞候紹鎡為監門衛中郎將句容尉張祕上言為理之要詞甚激切國主手批慰喻召為監察御史以神武統軍朱業為寧國軍節度使以潤州林仁肇為神武統軍秋七月建州陳誨卒禮部尚書潘承祐卒以江州何洙為左武衛上將軍封芮國公以宣州朱業鎮江州以神武統軍林仁肇為寧國軍節度使乾德元年夏左武衛上將軍何洙卒秋七月以兵部尚書遊簡言知尚書省遷右僕射是歲南平髙繼沖歸于京師國除𥘉金陵臺閣殿庭皆用鴟吻自乾德後朝廷使至則去之使還復用二年春正月始用鐡錢以鐡錢使户部侍郎韓熙載為兵部侍郎勤政殿學士𥘉烈祖將殂謂元宗曰德昌宫泉布億萬緡以給軍用吾死善修鄰好北方有事不可失也及元宗即位兵屢起德昌泉布既竭遂鑄唐國錢其文曰唐國通寶又鑄大唐通寶與唐國錢通用數年漸弊百姓盜鑄極為輕小保大末兵窘財乏鍾謨改鑄大錢以一當十文曰永通泉貨徑寸七分重十八銖字八分書背面勻好皆有周郭謨誅遂廢至是有鐡錢之議每十錢以鐡錢六雜銅錢四既而不用銅錢民間但以鐡錢貿易物價增涌民復盜鑄頗多芒刺不及官埸圎淨雖重其法犯者益衆至末年銅錢一當鐡錢十禮部侍郎湯悅上言泉布屢變亂之招也且豪民富商不保其資則日益思亂纍數百言不報夏鄂州黃延謙卒以宣州林仁肇代九月封長子仲寓清源公次子仲宣宣城公冬十月仲宣卒追封岐王十有一月國后周氏殂三年春葬昭惠后于懿陵蜀孟昶俘于京師國除以江州朱業為神武統軍侍衛都軍使以虔州留後柴克貞為奉化軍節度使夏以司空平章事嚴續鎮潤州秋九月聖尊后鍾氏殂召南都留守鄧王從益還都以鄂州林仁肇為南都留守南昌尹葬光穆皇后于順陵朝廷許元宗追復帝號故鍾氏稱皇后四年夏五月以吉州刺史楊守忠為武清軍節度使留後秋十月神武統軍朱業卒十有二月潤州嚴續卒五年春命兩省侍郎諌議大夫給事中中書舍人集賢勤政殿學士分夕於光政殿宿直國主引與談論或至夜分開寶元年夏江王景逖卒冬十有一月納后周氏昭惠之母弟也二年春以左僕射遊簡言兼門下侍郎平章事夏簡言卒以禮部侍郎湯悅為門下侍郎平章事知制誥張洎上疏曰恱非經綸之才不宜處鈞衡之地國主以悅文學舊臣特加奬用乃罷洎職冬較獵于青龍山還憩大理寺親録囚徒原貸甚衆韓熙載奏獄訟有司之事囹圄之中非車駕所至請捐內帑錢三百萬充軍資庫用國主從之曰繩愆糾謬其熙載之謂乎天子詔國主諭南漢稱臣劉鋹怒執我行人龔慎儀三年中書侍郎韓熙載卒贈平章事命境內崇修佛寺又於禁中廣署僧尼精舍多聚徒衆國主與后頂僧伽帽衣袈裟誦佛經拜跪頓顙至為瘤贅由是建康城中僧徒逮至數千給廩米緡帛以供之四年春劉鋹俘于京師國除夏四月齊王景逹卒遣弟韓王從善入朝留于京師授泰寧軍節度使國主表求從善還國
