body:
  text: 不許自從善不還四時宴會皆罷登髙賦文以見意曰原有鴒兮相從飛嗟嗟季兮不來歸常怏怏以國蹙為憂冬有商人上密事請往江陵竊燒皇朝戰艦國主懼事泄不聽商人遁去五年春皇朝屯師漢陽鄂州楊守忠以聞人心大恟乃貶損制度下書稱教改中書門下省為左右內侍府尚書省為司會府御史臺為司憲府翰林為文館樞密院為光政院降封韓王從善為南楚國公鄧王從益為江國公吉王從謙為鄂國公其餘官號多有改易殿庭始去鴟吻每遇皇朝使至國主衣紫𫀆備藩臣禮使退服御如𥘉六年春皇朝使中書舍人盧多遜來聘國主願受封拜不許洪州林仁肇卒冬中書舍人潘佑薦衛尉卿李平判司農寺又薦平知司會府羣情紛紛以為朋黨佑上書極言時政凡七章不止有家國隂隂如日將暮之辭國主惡之乃收平下大理自縊妻子徙饒州次收佑佑自剄毋及妻子徙虔州七年皇朝使閣門使梁逈來聘從容謂國主曰今歲國家有柴燎之禮當入助祭國主唯唯不答秋中書舍人李穆賫詔曰朕以仲冬有事于圎丘思與卿同閲犧牲國主辭以疾穆反命遂決進取九月王師自荆湖直趨池州池州主將戈彥棄城走遂克池州進軍當塗將軍張溫鄭彥華杜真相繼敗績下教去開寶年號公私牘籍稱甲戍歲江南自周世宗後不復用兵僅二十年老將已死主兵者皆新進少主以功名自負輒抗王師聞兵興踊躍言利害者日有十數及遇等敗北中外奪氣戒嚴城守國主遣徐鉉周惟簡奉表乞緩師不答王師進屯建業城南十里時雖下池州及姑熟餘郡皆未奉命糧道阻隔樊若水請於采石繫浮橋以利轉挽每歲大江春夏暴漲謂之黃花水及王師至水皆退小故識者知其有天命焉吳越圍常州軍使余成禮劫刺史禹萬誠以降吳越進圍京口議者以京口要害之地當得良將守之乃拜親吏劉澄鎮海軍節度使留後以凌波軍都虞候盧絳為援澄已懷嚮背因説絳還金陵而自率將吏降越袁州萍鄉制置使劉茂忠破潭師於境內拜茂忠袁州刺史八年春閲民為師徒升元𥘉均量民田以定科賦自二緡以上出一卒號義師中有别籍分居又出一卒號新擬生軍民有新置物産者亦出一卒號新擬軍又於客户內有三丁者抽一卒謂之圍軍後改為拔山軍使物力户為帥以統之保大中許郡縣村社競渡每歲端午官給綵假俾兩兩較其遲速勝者加以銀碗謂之打標舟子皆籍其名至是盡搜為卒謂之凌波軍又率民間傭奴贅壻謂之義勇軍又募豪民能自備緡帛兵器招集無賴亡命謂之自在軍又括百姓自老弱外能𬒳堅執鋭者謂之排門軍并屯田白甲之類凡一十三等皆使扞敵守把夏誅神衛統軍諸軍都虞候皇甫繼勳秋洪州節度使朱令贇將兵一十五萬屯潯陽湖口與諸將議曰令若前進而王師反據我後則上江阻隔退乏糧道亟為虜矣乃以書招南郡留守劉克貞代鎮湖口克貞以病留令贇亦未進國主纍促之令贇以長筏大艦帥水陸諸軍至虎蹲洲與王師遇舟筏俱焚令贇死餘衆皆潰金陵受圍經歲城中斗米者相救藉自潤州降後不聞外信或云令贇巳敗國主猶意其不實冬百姓疫死士卒乏食訹云大軍決以十有一月乙未破城國主議遣其子清源公仲宇出通降欵左右以謂堅壘如此天象無變豈可計日取降是日城果陷宫中圖籍萬卷尤多鍾王墨迹國主嘗謂所幸保儀黃氏曰此皆纍世保惜城若不守爾可焚之無使散逸及城陷文籍盡煬光政使陳喬曰吾當大政使國家致此非死無以謝乃自縊死諸將戰沒者猶數十人升元寺閣崇構因山為基髙可十丈平旦閣影半江梁時為瓦棺閣至南唐民俗猶因其名士大夫暨豪民富商之家美女少婦避難於其上逮數百人越兵舉火焚之哭聲動天一旦而燼大將曺彬整軍成列至其宫門門開國主跪拜納降彬答拜為之盡禮先是宫中預積薪煜誓言社稷失守當携血屬赴火既降無國主之號故書名既見彬彬諭以歸朝俸祿有限費用日廣當厚自齎裝一歸有司之籍即無及矣遣煜入治裝禆將梁逈田欽祚力爭以謂苟有不虞咎將誰執彬笑而不答逈等固諌彬曰彼能出降安能死乎翌日治舟彬遣健卒五百人為津致輜重登舟一卒負籠下道旋彬立斬之負擔者罔敢蹉跌煜以藏中黃金分遺近臣辦裝張佖得金二百兩詣彬自陳不受請奏其事彬以金輸官而不以聞煜舉族冒雨乘舟百司官屬僅千艘煜渡中江望石城泣下自賦詩云江南江北舊家鄊三十年來夢一埸吳苑宫闈今冷落廣陵臺殿巳荒涼雲籠逺岫愁千片雨打歸舟淚萬行兄弟四人三百口不堪間坐細思量至汴口登普光寺擎拳讃念久之散施緡帛甚衆九年春俘至京師封遺命侯授左千牛衛上將軍太宗皇帝登極改封隴西公太平興國三年公病書公者皇朝所封也命翰林醫官視疾中使慰諭者數四翌日薨在偽位十有五年年四十二追封吳王以王禮葬洛京之北印山江南人聞之巷哭設齋王著雜説百篇時人以為可繼典論又妙於音律舊曲有念家山王親演為念家山破其聲焦殺而其名不祥乃敗徴也復書王者皇朝追封也徐鉉日嗣主諸子皆孝而後主特甚敦睦親族亦無不至唯以好生富民為務常欲群臣和於朝不欲聞人過章疏有糾謫稍訐者皆寢不報酷好古道而國削勢弱羣臣多守常充位不克如意歎曰天下無周公仲尼吾道不可行也已刑法太寬亦無過此及大兵之際上下感恩故人無異志威令不素著故莫盡死力蓋亦天授大宋非人謀所及也嗚呼隋文帝𥘉輔政于周內有五王之難外罹尉遲回司馬消難王謙之亂方是時指鹿逐兔未知適從武夫悍將誰無覬覦蕭巋承武皇享國之長有席卷山南之勢而區區敬慎不敢連衡廽等者信其臣柳莊之言預知隋公之必興故也矧乃蕞爾江南獲覩真人之作而不為之退聽其罪當如何哉李氏有國肇於天福盛於開運削於顯德亡於開寶豈非有幸於亂世而不容於治世歟以周世宗之時削國降號稽首稱藩其勢固已蹙矣及屬皇朝普天之下莫不翹首太平而猶竊土賊民十有六年外示柔服內懷僣偽豈非所謂逆命者哉及其計窮勢迫身為亡虜猶有故國之思何大愚之不靈也若此後主樂府詞云故國夢𥘉歸覺來雙淚垂又云小園昨夜又西風故國不堪翹首月明中皆思故國者也南唐書卷之五
