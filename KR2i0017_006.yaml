body:
  text: 南唐書卷之六女憲傳第一嗚呼古之欲明明德於天下者先治其國欲治其國者先齊其家齊家之法在於女憲而女之所以為憲者母傾城之哲也母索家之言也究德性之厚原道化之本不過於以順為事以貞為節而已順貞以化天下何往不格哉是故觀刑二女虞舜惟帝徽傳太姒西伯惟王帝王之德配天地而推其本始以言之必自於閨閫之近者凡以天下之本在國國之本在家故也易曰夫夫婦婦而家道正正家而天下定作女憲傳先主元恭皇后宋氏不知其世裔也幼為亂兵略取義祖得之常置帳下會先主喪其正室義祖指宋氏謂先主曰是必有福今以乞女先主御之不書蒸之者義祖首惡也生嗣主及景遷景遂景逹遂立為繼室治內有法不苟言笑常以端嚴自持雖妾媵之間儼如賔客義祖死于建業知詢等督先主奔赴先主欲往宋氏從容諌曰移孝為忠臣子之常况權重身危而輒罷所執何異太阿倒持柄不在我矣先主大悟因寢其行而命周宗赴金陵天祚二年封齊王妃先主受禪册命為皇后升元末先主服餌金石性多暴怒左右賴后以芘者甚衆嗣主即位上册為皇太后每元宗朝太后言惟勞其良苦而已至於治理無一言及之常曰婦人預外事非國之福也保大三年殂葬永陵諡元恭先主种氏不知其品秩也江西良家女性警悟通書計常靚糚去飾而態度間雅宛若神仙𥘉進入宫年甫十六久不得幸宋后數數薦引既承恩寵服御輒亞於后而諸宫罕得進御及生江王景逖僣侈尤甚一日先主幸元子齊王宫遇其親理樂器先主大怒切責數日种氏乘間言景逖才過齊王先主作色曰子之過父戒之常理也國家大計女子何預遂叱內臣捽庭下去簮珥幽于别宫數月命削髮為尼先主殂种氏泣曰人彘骨醉復見於此矣其後歸景逖宫宋太后屢欲井心賴元宗保全之竟以夀終每於后不書妖艷而於嬪殺詳言之嗣主光穆皇后鍾氏虔州刺史太章之女太章𥘉為禆將義祖用之以殺張皓既而自大先主欲繩之義祖曰昔無太章吾族赤矣汝曺安所託乎今日富貴太章力也背之不可乃命以太章女配嗣主義祖𥘉見歎曰非此兒不敵此女嗣主起家自尚書郎至于將相鍾氏始封縣君纍加國夫人升元中封齊王妃嗣主即位册為皇后后少長當貴不事玩好副笄大練淡如也既居大位歲時賜豫必先諸姒然後及中宫以故嗣主樂推諸弟而終無間言者后勉之為多淮上兵起國步多艱后亦損常膳不舉樂者數月後主即位册為太后以父為太章故號聖尊后乾德三年聖尊后殂葬順陵諡光穆嗚呼南唐建國始僣皇后之號及其衰削猶有國后之稱至於六宫品秩雖無所考而內夫人之品保儀之秩各因事見其餘名號僣擬天子亦可知矣後主昭惠后周氏小字娥皇大司徒宗之女甫十九歲歸于王宮通書史善音律尤工琵琶元宗賞其藝取所御琵琶時謂之燒槽者賜焉燒槽之説即蔡雍焦桐之義或謂熖材而斫之或謂因爇而存之元宗南幸豫章詔音存問以令婦稱後主即位册為國后后雖在妙齡婦順母儀宛如老成唐之盛時霓裳羽衣最為大曲罹亂瞽師曠職其音遂絶後主獨得其譜樂工曹生亦善琵琶按譜粗得其聲而未盡善也后輒變易訛謬頗去窪淫繁手新音清越可聽後主嘗演念家山舊曲后復作邀醉舞恨來遲新破皆行于時中書舍人徐鉉聞霓裳羽衣曰法曲終慢而此聲太急何耶曹生曰其本實慢而宮中有人易之然非吉徴也歲餘周后子毋繼死後主國步浸微音之所起實由人心而嘽緩噍殺治亂應之豈虗言乎后生三子皆秀嶷其季仲宣僄寧清峻后尤鍾愛自鞠視之后既病仲宣甫四歲保育於别院忽遘暴疾數日卒后聞之哀號顛仆遂致大漸後主朝夕視食藥非親嘗不進衣不解帶者纍夕后雖病亟爽邁如常謂後主曰婢子多幸託質君門冒寵乘華凡十載矣女子之榮莫過於此所不足者子殤身殁無以報德遂以元宗所賜琵琶及常臂玉環親遺後主又自為書請薄葬越三日沐浴正衣糚自內含玉殂于瑶光殿之西室時乾德二年十一月甲戍也享年二十九眀年正月壬午遷靈柩于園寢後主哀苦骨立杖而後起譏之也何譏爾鍾太后在故也自為誄曰天長地久嗟嗟蒸民嗜欲既勝悲歎糾紛緣情攸宅觸事來津資盈世逸樂鮮愁殷沉烏逞兔茂夏凋春年彌念曠得故亡新闕景頽岸世閲川奔外物交感猶傷昔人詭夢髙唐誕誇洛浦搆屈平虛亦憫終古况我心摧興哀有地蒼蒼何辜殱豫伉儷窈窕難追不祿于世玉潤珠融殞然破碎柔儀俊德孤映鮮雙纎穠挺秀婉孌開揚艷不至冶慧或無傷盤紳奚誡慎肅惟常環珮爰節造次有章含顰發笑擢秀騰芳鬢雲留鑒眼彩飛光情瀾春媚愛語風香瓌姿稟異金冶昭祥婉容無犯均教多方茫茫獨逝捨我何鄊昔我新婚燕爾情好媒無勞辭筮無違報歸妹邀終咸爻協兆俯仰同心綢繆是道執子之手與子偕老今也如何不終往告嗚呼哀哉志心既逹孝愛克全殷勤柔握力沂危言遺情眄眄哀淚漣漣何為忍心覽此哀編絶艷易凋連城易脆實曰能容壯心是醉信美堪餐朝飢是慰如何一旦同心曠世嗚呼哀哉豐才富藝女也克肖采戲傳能奕碁逞妙媚動占相歌縈柔調兹鼗爰質竒器傳華翠虬一舉紅袖飛花情馳天降思棲雲涯發揚掩抑纎緊洪奢窮幽極致莫得徴瑕審音者仰止逹樂者興嗟曲演來遲破傳邀舞利撥迅手吟商逞羽制革常調法移往度剪遏繁態藹成新矩霓裳舊曲韜音淪世失味齊音猶傷孔氏故國遺聲忍乎湮墜我稽其美爾揚其祕程度餘律重新雅製非子而誰誠吾有類今也則亡永從遐逝嗚呼哀哉該兹碩美鬱此芳風事傳遐祀人難與同式瞻虛館空尋所蹤追悼良時心存目憶景旭雕甍風和繡額燕燕交音洋洋接色蝶亂落花雨晴寒食接輦窮歡是宴是息含桃薦實畏日流空林雕晚籜蓮舞踈紅煙輕麗服雪瑩修容纎眉範月髙髻凌風輯柔爾顔何樂靡從蟬響吟愁槐凋落怨四氣窮哀萃此秋晏我心無憂物莫能亂絃爾清商艷爾醉盼情如何其式歌且宴寒生蕙幄雪舞蘭堂珠籠暮捲金爐夕香麗爾渥丹婉爾清揚猒猒夜飲豫何爾忘年去年來殊歡逸賞不足光隂先懷悵怏如何倐然巳為疇曩嗚呼哀哉孰謂逝者荏苒彌踈我思妹子永念猶𥘉愛而不見我心燬如寒暑斯疚吾寧御諸嗚呼哀哉萬物無心風煙若故唯日唯月以隂以雨事則依然人乎何所悄悄房櫳孰堪其處嗚呼哀哉佳名鎮在望月傷娥雙眸永隔見鏡無波皇皇望絶心如之何草樹蒼蒼哀摧無際歷歷前歡多多遺致絲竹聲悄綺羅香杳想渙乎忉怛恍越乎憔悴嗚呼哀哉歲云莫兮無相見期情瞀亂兮誰將因依維昔之時兮亦如此維今之心兮不如斯嗚呼哀哉神之不仁兮斂怨為德既取我子兮又毀我室鏡重輪兮何年蘭襲香兮何日嗚呼哀哉天漫漫兮愁雲曀空曖曖兮愁煙起娥眉寂寞兮閉佳城哀寢悲氛兮竟徒爾嗚呼哀哉日月有時兮龜蓍既許簫笳凄咽兮旗常是舉龍輀一駕兮無來轅金屋千秋兮永無主嗚呼哀哉木交枸兮風索索鳥相鳴兮飛翼翼弔孤影兮孰我哀私自憐兮痛無極鳴呼哀哉應寤皆感兮何響不哀窮求弗獲兮此心隳摧號無聲兮何續神永逝兮長乖嗚呼哀哉杳杳香魂茫茫天步抆血撫櫬邀子何所苟雲路之可窮兾傳情於方士嗚呼哀哉每於花朝月夕無不傷懷如又見桐花發舊枝一樓煙雨暮凄凄憑欄惆悵人誰會不覺澘然淚眼低層城無復見嬌姿佳節纏哀不自持空有當年舊煙月芙蓉池上哭娥眉皆因后作又嘗與后移植梅花于瑶光殿之西及花時而后已殂因成詩見意曰殷勤移植地曲檻小欄邊共約重芳日還憂不盛妍阻風開步障乘月溉寒泉誰料花前後娥眉却不全此不特敘其幽思且以興內助之艱難而不得與之同樂又云失却煙花主東君自不知清香更何用猶發去年枝此足以見光景於人無情而人於景物不可認而有之也悲夫至於書靈筵手巾云浮生苦憔悴壯歲失嬋姢汗手遺香漬䀶眉染黛煙書琵琶背云侁自肩如削難勝數縷絛天香留鳳尾餘暖在檀槽觸物寓意類如此𥘉烈祖為刺史時后父宗給使左右及贊禪代尤為親信元宗以宗為社稷元老故聘其女為吳王妃克相其夫顯於諸子而身居國毋可謂賢也陵曰懿陵諡昭惠方是時南唐雖去帝號而其餘制度尚未減損如元宗之葬猶稱皇帝故昭惠雖謂之國后而羣臣國人皆稱曰皇后焉後主繼室周后昭惠之母弟也警敏有才思神彩端靜二后之貌見周宗傳昭惠感疾后常出入卧內而昭惠未之知也一日因立帳前昭惠驚曰妹在此耶后幼未識嫌疑即以實告曰既數日矣昭惠惡之返卧不復顧昭惠殂后未勝禮服待年宫中明年鍾太后殂後主服喪故中宮位號久而未正至開寶元年始議立后為國后南唐享國日淺而三世皆娶于藩邸故國主婚禮議者不一詔中書舍人徐鉉知制誥潘佑與禮官參議鉉曰婚禮吉不用樂佑以為今古不相沿襲固請用樂鉉曰案古房樂無鍾鼓佑曲引詩窈窕淑女鍾鼓樂之則房樂宜有鍾鼓后𥘉見君後魏書有后先拜後起帝後拜先起之文鉉因此以為夫婦之禮人倫之本承祖宗主祭祀請答拜佑以為王者婚禮不可與庶人同請不答拜又車服之制互有矛盾議久不決後主令文安郡公徐逰評其是非時佑方寵用逰希旨奏佑為是既而逰病疽鉉戲謂人曰周孔亦有祟乎將納采後主先令校鵝代白鴈𬒳以文繡使銜書侈靡不經類如此及親迎民庶觀者或登屋極至有墜瓦而斃者后自昭惠殂常在禁中後主樂府詞有􅙳幭步香階手提金縷鞋之類多傳于外至納后乃成禮而已翌日大宴羣臣韓熙載以下皆為詩以諷焉而後主不之譴歸于京師去號位從夫之爵太平興國三年隴西公薨周氏亦薨後主保儀黃氏世為江夏人父守忠遇亂流徙湘湖事馬氏為禆將馬希蕚之難守忠死之邊鎬下湖南得黃氏甫數歲竒其貌內後宮後主即位選為保儀容態華麗冠絶當世顧眄顰笑無不妍姣其書學伎能皆出於天性後主雖屬意會小周專房由是進御稀而品秩不加第以掌墨寶而已墨寶書籍之類黃氏服勤降體以事小周故同時美女率多遇害而黃氏獨不邅譴以其事之盡也𥘉元宗後主皆妙於筆札慱收古書有獻者厚賞之宮中圖籍萬卷尤多鍾王墨迹皆繫保儀所掌都城將陷後主謂黃氏曰此皆吾所寶惜城若不守即焚之無使散逸及城陷圖籍俱煬靡有遺者黃氏隨後主俘至京師卒嗚呼魯文公成禮于齊春秋譏之謂其非婚姻之正也矧周氏御於宮中者數年然後以迎禮歸之吁可怪哉周官九嬪世婦女御有德則充否則闕焉故無常數而又掌于冡宰則知先王之所以治內至正而盡禮也後世德不勝色肆情敗度怨女以千數淫費以萬計况亂世乎以烈祖之英傑尚困於种氏牝雊之徴幾致家索元宗適丁兵革擾攘女謁之盛舊史不載觀其樂府艷麗則天機亦淺矣後主二周抑又甚焉故豫悉書之皆不免為春秋之罪人也徐主義祖長女也性姻睦動循禮法嘗偃蹇擇配𥘉義祖疑李德誠有二志德誠不自安因使其子建勳入謁義祖義祖見之大驚曰有子如此非惡人也以主妻之烈祖受禪徐為郡公主建勳為宰相上章改時政許之建勳密表曰制置大事若可以臣下請是以善歸巳以過歸君也請宣中旨行之表未報而建勳命中書舍人草制給事中常夢錫奏建勳專造制書烈祖大怒欲罷建勳徐主入謂烈祖曰吾父在日兄不嘗求兒與李郎耶何棄之速烈祖曰此國事也吾與李郎親舊如故召入禁中慰喻久之建勳致政賜號鍾山公徐主四時拜賜自稱鍾山老媪而不稱所封郡國蓋將有所激也元宗優容之先建勳卒永興公主烈祖女也烈祖為吳相秉政以女為吳世子璉妃及禪代宋齊丘請離其婚烈祖不許封永興公主人每稱為公主則流涕憤惋或問其故曰吾為冡婦而廟不血食可不悲乎諸兄惡之烈祖曰內夫家而外父家婦人之德也何罪之有乃以吳世子為中書令池州節度使璉卒主亦繼卒吳人哀之嗚呼三代而下彤史詳矣南唐載籍疏脫婦順女憲不可得而書也老媪之稱流涕之感其旨微哉余洪妻鄭氏洪事王延政為大將會南唐平建州鄭氏有殊色為亂兵略取禆將王建封逼之鄭氏志不可奪劫以利刃亦不為屈建封嗜人肉而略婦人百許人日殺一人以食引鄭示之曰汝懼乎鄭曰願早充庖為幸多矣建封終不忍殺以獻查文徽文徽見之曰國色也將以薦牀席鄭大罵曰王師弔伐凡義夫節婦宜加旌賞以勵風俗王司徒出於卒伍不識禮義且無足怪君侯知書為國大將當有表率群下風化逺方乃欲加非禮於一婦人以逞其欲妾有死而巳速殺為惠徽大慙下令城中召其夫付之吳媛其先汴州浚儀人唐史臣兢之後也父志野義不食梁粟僑廬陵務德不矅媛生數歲口無戲言順奉姆教宛如夙授豪民假生五十而無子因以禮聘之歸假氏為繼室生子期月假生卒父母以其少而美俾移所天媛𠢐面自誓志不可奪抱孤嬰以奉舅姑􅓢㸑溫凊皆躬為之教其子為成人而生業益厚韓熙載使江西録其清節云南唐書卷之六
