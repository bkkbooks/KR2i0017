body:
  text: 南唐書卷之七宗室傳第二嗚呼性有善惡法有賞刑弗可槩論也漢鑒秦之弊而宗戚子弟茅土過制魏規漢之失而黃𥘉之後宗戚虚封襲漢則善惡兼容㳂魏則賢否并棄賞刑惡得而辨哉唐有天下子弟得預外任格則庸否則威故入爲尚書九卿出爲都督刺史間有人焉南唐宗室委任尤重豈㳂唐之舊歟抑亦董之得其道歟蓋天下分裂君無世臣臣無定主委任宗室猶愈於他人故也作宗室傳楚王景遷烈祖第二子元宗母弟也㓜警悟讀書一覽輙不忘及長美姿儀風度和雅尚吳公主爲駙馬都尉而服用素儉不事華侈烈祖愛其純謹大和三年烈祖出鎮金陵以元宗爲司徒平章事居中輔政宋齊丘每忌元宗欲自結於景遷乃薦陳覺爲景遷教授以賈其聲聞齊丘叅决時政多爲不法輙歸過於元宗而盛稱景遷之美烈祖於是召元宗至金陵授鎮海軍節度副使即以景遷爲太保平章事代秉國政有奪嫡之漸此齊丘謀也所以然者以景遷㓜懦他日得國授之巳爲元老易於窺竊烈祖覺之遂罷齊丘以爲已副景遷猶摠大政天祚二年景遷病請以允弟自代乃拜其弟景遂爲門下侍郎叅政事景遷䘚葬飲馬池之陽禪代之後諸子例封王爵保大𥘉元宗改封諸弟追贈景遷楚王命江文蔚爲碑以表其墓以其蚤死無子故後主亡國詩云兄弟四人三百口謂元宗景遂景逹景逷也景遷不與焉晋王景遂烈祖第三子元宗母弟也制行雅循有君子之風天祚二年景遷病不能輔政即以景遂爲門下侍郎叅政事父子四人迭輔吳政政在李氏也烈祖受禪封夀王譲皇殂於丹陽景遂徃督䘮事望柩哀慟觀者恱之元宗即位改王燕俄以景遂代儲副固譲不許遂立爲太弟景遂因易字曰退身以示不處之志叅摠政事時有獻替間與朝士官屬飲宴賦詩嘗以玉杯行酒座客傳翫以爲寳賛善張易乗醉擲之曰貴寳輕士殿下得無累乎座皆失色而景遂歛容謝之由是待易愈謹易遷工部侍郎泛海使契丹景遂手䟽曰朝臣如張易者宜置諸左右不宜使之泛不測之淵投足逺夷元宗荅以此行非易不可遂行顯徳五年累表譲儲副乞守舊封授江西道兵馬大元帥封晋王適當危疑啓求大臣以自副命兵部侍郎李徴古副之以徴古傲很専恣陵忽過甚景遂欲斬徴古而自拘於有司寮吏諌止一日暴疾嚮空顧揖退謂左右曰上帝命我代許旌陽遂䘚年三十七復贈太弟諡文成齊王景逹字子通烈祖第四子元宗之母弟也順義四年旱七月既望雩祀得雨景逹以是日生因小字雨師成童爽悟與羣兒異烈祖器之𥘉封信王元宗即位改封鄂王景遷侍中進封燕王及景遂爲太弟以景逹爲元帥中書令徙王齊爲理嚴察人多憚之好神仙脩錬之事記室徐鍇獻述仙賦以諷遂絶所好嘗従元宗逰苑中乗小舟而覆左右惶駭景逹入水負元宗出性非善水而能蹈之者忠誠之至也元宗多與宗戚近臣曲宴如馮延已陳覺魏岑之徒喧笑無度景逹每呵責之嘗與延已會飲延已欲以詭佞賣恩佯醉撫景逹背曰爾不得忘我景逹大怒入白元宗請致之死元宗慰諭而已出謂所親曰吾悔不先斬以聞太子讃善張易従容謂景逹曰羣小構扇其禍不細大王力未能去自宜隱忍景逹由是罕預曲宴每𬒳召輙辭以疾景逹雖剛毅而不歷軍容及爲元帥帥師淮上軍政皆出於陳覺署𥿄尾而已朱元叛諸軍大敗景逹與覺遁還金陵上印綬尋拜浙西節度使景逹復以用兵之地固辭改撫州元帥自淮南敗績日以酣飲爲務及至鎮委任寮屬怠於視事後主即位就加太師尚書令奉以叔父之禮開寳四年䘚於鎮年四十七追贈太弟葬廬山諡孝昭江王景逷字宣逺烈祖第五子也烈祖𥘉受禪以十二月二日爲仁夀節南唐誕節唯此一見因事而書以示其僣景逷以是日生故小字仁夀烈祖嬖其母种氏而景逷爲季由是愛遇之意過於諸子及种氏得罪景逷尚㓜元恭皇后鞠之如巳出烈祖以其母嘗有改立之請故封爵不加以逺嫌也至元宗即位始封保寧王改封信王出爲䖍州節度使簡易節儉􅐚人安之時諸王大臣皆喜浮屠而獨景逷非毀佛書專以六經名教爲事贑縣令䘚成䘮之日其尉邵繼良張樂飲酒景逷立奏黜之書記孫峴每能諌其過失景逷爲之加禮及峴卒厚給其家時人以此美之後主即位徙王江就拜侍中𨳩寳元年卒年三十二贈中書令諡昭順太子兾元宗元子𥘉封東平郡公元宗即位徙王南昌避儲副之位留守東都保大三年立景遂爲太弟以兾爲燕王依前東都留守八年移鎮潤州周師至廣陵越人宼常州元宗以兾尚少不習軍事召還都兾會将吏問之禆将趙鐸曰大王爲元帥之重衆心所恃一郤足則部下搖矣兾乃奏多壘之秋義無就逸乞校用以死報國元宗許之乃命柴克宏将兵爲援以救常州克宏未至樞宻副使李徴古遣使追而代之兾奏克宏可用果敗越師擒獲甚衆先是有吳以来戰獲将士皆不殺至是兾盡殺之越人不敢西嚮者二十年顯徳五年始還儲副之地叅决國事蒞下有法未㡬䘚有司以其靖難之功諡宣武句容尉張洎兾所薦進士也上書論之以太子之徳承順孝愛而巳不當摽顯武功以垂後世非防㣲杜漸之㫖也其言甚切元宗善之下其議有司改諡文獻洎由是知名改上元尉遷監察御史兾之門人若是亦可想見其爲人也慶王茂字子松元宗第二子甫數歲容貌秀澈有成人風封安樂公拜侍衛諸軍都虞候時有木平和尚者言人禍福夀夭輙驗元宗以茂見之曰其餘不足問所欲知者夀數爾木平爲書九十乙字後至十九歲䘚追贈慶王葬建業城南五里命韓熈載碑以表之韓王従善元宗第七子後主之母弟也𥘉封紀國公後主即位進王韓器識沉邃尤喜武畧開寳中江南迫蹙後主憂之従善自請朝京師以紓國難乃奉表朝貢太祖恱之留授㤗寧軍節度使錫賚頗優因命従善貽書後主督之入覲従善曰臣兄以庸菲之才嗣守宗廟陛下垂覆載之恩許其入朝實千載一遇敢不奉詔従善遂爲書喻以上意而後主不従王師之討兆於此也金陵平従善病䘚𥘉従善與鍾謨親狎嘗有改立之請謨亦由此得罪元宗殂於豫章獨従善扈従因懐非望就徐逰求遺詔逰正色不與至建業具其事以聞後主不問待之愈厚従善奉使不返其妻泣詣後主後主無以爲辭每聞其至輙避之妻憂思䘚國人哀之鄧王従益元宗第八子也警敏有文𥘉封舒公進王鄧開寳𥘉出鎮宣州後主率近臣餞綺霞閣自爲詩序以送之其畧云秋山滴翠暮壑澄空愛公此行暢乎遐覽其詩有咫尺煙江㡬多地不須懐抱重凄凄之句君臣𢋫賦可爲盛事徐鉉詩云禁裏花光似水清林煙池影共離情暫移黃閤只三載却望紫垣都數程滿坐清風天子送隨車甘雨郡人迎綺霞閣上詩題在従此還應有頌聲最爲警䇿五年南唐貶損制度従益去王爵封江國公後事亡吉王従謙元宗第九子後主母弟也風采峭整喜爲律詩動有規誨後主燕間嘗與侍臣弈従謙甫數歲侍側後主命賦觀碁詩曰竹林二君子盡日竟沉吟相對終無語爭先各有心恃強斯有失守分固無侵若筭機籌處滄滄海未深後主賞歎乆之始封鄂公俄王宜春徙封吉開寳五年損制度降封鄂國公後事亡従慶傳亡従信傳亡宣城公仲宣後主子也小字瑞保三歲讀孝經若成誦然聞奏樂輙審音調宫中燕侍頗合禮度出見士大夫改容顧揖如成人禮乾徳二年䘚年四歲始封宣城公追贈岐王諡懐獻母昭恵先病聞仲宣死哀苦增劇遂至於殂故後主挽辭曰珠碎眼前珍花凋世外春未銷心裏恨又失掌中身玉笥猶殘藥香奩巳染塵前哀将後感無淚可沾巾又艶質同芳樹浮危道畧同正悲春落實又苦雨傷叢穠麗今何在飄零事巳空沉沉無問處千載謝東風皆并其母子悼之𥘉仲宣䘚後主哀甚然恐重傷昭恵常黙坐飲泣而已因爲詩以寫志云永念難消釋孤懐痛自嗟雨深秋寂寞愁引病增加咽絶風前思昏矇眼上花空王應念我窮子正迷家吟詠數四左右爲之泣下嗚呼春秋魯君未踰年而䘚者書子䘚以其不全乎君也先君未葬而嗣君䘚者書子某䘚猶云父前子名也皆不作諡太子兾有諡固非春秋之法至於仲宣㓜殤則又甚矣東晋瑯瑘世子䘚而賀循以爲不可作諡君子謂其知禮南唐書卷之七
