body:
  text: 南唐書卷之七宗室傳第二嗚呼性有善惡法有賞刑弗可槩論也漢鑒秦之弊而宗戚子弟茅土過制魏規漢之失而黃𥘉之後宗戚虛封襲漢則善惡兼容㳂魏則賢否并棄賞刑惡得而辨哉唐有天下子弟得預外任格則庸否則威故入為尚書九卿出為都督刺史間有人焉南唐宗室委任尤重豈㳂唐之舊歟抑亦董之得其道歟蓋天下分裂君無世臣臣無定主委任宗室猶愈於他人故也作宗室傳楚王景遷烈祖第二子元宗母弟也幼警悟讀書一覽輒不忘及長美姿儀風度和雅尚吳公主為駙馬都尉而服用素儉不事華侈烈祖愛其純謹大和三年烈祖出鎮金陵以元宗為司徒平章事居中輔政宋齊丘每忌元宗欲自結於景遷乃薦陳覺為景遷教授以賈其聲聞齊丘參决時政多為不法輒歸過於元宗而盛稱景遷之美烈祖於是召元宗至金陵授鎮海軍節度副使即以景遷為太保平章事代秉國政有奪嫡之漸此齊丘謀也所以然者以景遷幼懦他日得國授之巳為元老易於窺竊烈祖覺之遂罷齊丘以為已副景遷猶總大政天祚二年景遷病請以允弟自代乃拜其弟景遂為門下侍郎參政事景遷卒葬飲馬池之陽禪代之後諸子例封王爵保大𥘉元宗改封諸弟追贈景遷楚王命江文蔚為碑以表其墓以其蚤死無子故後主亡國詩云兄弟四人三百口謂元宗景遂景逹景逖也景遷不與焉晋王景遂烈祖第三子元宗母弟也制行雅循有君子之風天祚二年景遷病不能輔政即以景遂為門下侍郎參政事父子四人迭輔吳政政在李氏也烈祖受禪封夀王讓皇殂於丹陽景遂往督喪事望柩哀慟觀者恱之元宗即位改王燕俄以景遂代儲副固讓不許遂立為太弟景遂因易字曰退身以示不處之志參總政事時有獻替間與朝士官屬飲宴賦詩嘗以玉杯行酒座客傳玩以為寶贊善張易乘醉擲之曰貴寶輕士殿下得無纍乎座皆失色而景遂斂容謝之由是待易愈謹易遷工部侍郎泛海使契丹景遂手疏曰朝臣如張易者宜置諸左右不宜使之泛不測之淵投足逺夷元宗答以此行非易不可遂行顯德五年纍表讓儲副乞守舊封授江西道兵馬大元帥封晋王適當危疑啓求大臣以自副命兵部侍郎李徴古副之以徴古傲很専恣陵忽過甚景遂欲斬徴古而自拘於有司寮吏諌止一日暴疾嚮空顧揖退謂左右曰上帝命我代許旌陽遂卒年三十七復贈太弟諡文成齊王景逹字子通烈祖第四子元宗之母弟也順義四年旱七月既望雩祀得雨景逹以是日生因小字雨師成童爽悟與羣兒異烈祖器之𥘉封信王元宗即位改封鄂王景遷侍中進封燕王及景遂為太弟以景逹為元帥中書令徙王齊為理嚴察人多憚之好神仙修錬之事記室徐鍇獻述仙賦以諷遂絶所好嘗從元宗逰苑中乘小舟而覆左右惶駭景逹入水負元宗出性非善水而能蹈之者忠誠之至也元宗多與宗戚近臣曲宴如馮延已陳覺魏岑之徒喧笑無度景逹每呵責之嘗與延已會飲延已欲以詭佞賣恩佯醉撫景逹背曰爾不得忘我景逹大怒入白元宗請致之死元宗慰諭而已出謂所親曰吾悔不先斬以聞太子讃善張易從容謂景逹曰羣小構扇其禍不細大王力未能去自宜隱忍景逹由是罕預曲宴每𬒳召輒辭以疾景逹雖剛毅而不歷軍容及為元帥帥師淮上軍政皆出於陳覺署𥿄尾而已朱元叛諸軍大敗景逹與覺遁還金陵上印綬尋拜浙西節度使景逹復以用兵之地固辭改撫州元帥自淮南敗績日以酣飲為務及至鎮委任寮屬怠於視事後主即位就加太師尚書令奉以叔父之禮開寶四年卒於鎮年四十七追贈太弟葬廬山諡孝昭江王景逖字宣逺烈祖第五子也烈祖𥘉受禪以十二月二日為仁夀節南唐誕節唯此一見因事而書以示其僣景逖以是日生故小字仁夀烈祖嬖其母种氏而景逖為季由是愛遇之意過於諸子及种氏得罪景逖尚幼元恭皇后鞠之如巳出烈祖以其母嘗有改立之請故封爵不加以逺嫌也至元宗即位始封保寧王改封信王出為䖍州節度使簡易節儉􅐚人安之時諸王大臣皆喜浮屠而獨景逖非毀佛書專以六經名教為事贑縣令卒成喪之日其尉邵繼良張樂飲酒景逖立奏黜之書記孫峴每能諌其過失景逖為之加禮及峴卒厚給其家時人以此美之後主即位徙王江就拜侍中開寶元年卒年三十二贈中書令諡昭順太子兾元宗元子𥘉封東平郡公元宗即位徙王南昌避儲副之位留守東都保大三年立景遂為太弟以兾為燕王依前東都留守八年移鎮潤州周師至廣陵越人寇常州元宗以兾尚少不習軍事召還都兾會將吏問之禆將趙鐸曰大王為元帥之重衆心所恃一郤足則部下搖矣兾乃奏多壘之秋義無就逸乞校用以死報國元宗許之乃命柴克宏將兵為援以救常州克宏未至樞密副使李徴古遣使追而代之兾奏克宏可用果敗越師擒獲甚衆先是有吳以來戰獲將士皆不殺至是兾盡殺之越人不敢西嚮者二十年顯德五年始還儲副之地參决國事蒞下有法未幾卒有司以其靖難之功諡宣武句容尉張洎兾所薦進士也上書論之以太子之德承順孝愛而巳不當摽顯武功以垂後世非防微杜漸之㫖也其言甚切元宗善之下其議有司改諡文獻洎由是知名改上元尉遷監察御史兾之門人若是亦可想見其為人也慶王茂字子松元宗第二子甫數歲容貌秀徹有成人風封安樂公拜侍衛諸軍都虞候時有木平和尚者言人禍福夀夭輒驗元宗以茂見之曰其餘不足問所欲知者夀數爾木平為書九十乙字後至十九歲卒追贈慶王葬建業城南五里命韓熙載碑以表之韓王從善元宗第七子後主之母弟也𥘉封紀國公後主即位進王韓器識沉邃尤喜武略開寶中江南迫蹙後主憂之從善自請朝京師以紓國難乃奉表朝貢太祖恱之留授泰寧軍節度使錫賚頗優因命從善貽書後主督之入覲從善曰臣兄以庸菲之才嗣守宗廟陛下垂覆載之恩許其入朝實千載一遇敢不奉詔從善遂為書喻以上意而後主不從王師之討兆於此也金陵平從善病卒𥘉從善與鍾謨親狎嘗有改立之請謨亦由此得罪元宗殂於豫章獨從善扈從因懷非望就徐逰求遺詔逰正色不與至建業具其事以聞後主不問待之愈厚從善奉使不返其妻泣詣後主後主無以為辭每聞其至輒避之妻憂思卒國人哀之鄧王從益元宗第八子也警敏有文𥘉封舒公進王鄧開寶𥘉出鎮宣州後主率近臣餞綺霞閣自為詩序以送之其略云秋山滴翠暮壑澄空愛公此行暢乎遐覽其詩有咫尺煙江幾多地不須懷抱重凄凄之句君臣𢋫賦可為盛事徐鉉詩云禁裏花光似水清林煙池影共離情暫移黃閣只三載却望紫垣都數程滿坐清風天子送隨車甘雨郡人迎綺霞閣上詩題在從此還應有頌聲最為警䇿五年南唐貶損制度從益去王爵封江國公後事亡吉王從謙元宗第九子後主母弟也風采峭整喜為律詩動有規誨後主燕間嘗與侍臣奕從謙甫數歲侍側後主命賦觀碁詩曰竹林二君子盡日竟沉吟相對終無語爭先各有心恃強斯有失守分固無侵若算機籌處滄滄海未深後主賞歎久之始封鄂公俄王宜春徙封吉開寶五年損制度降封鄂國公後事亡從慶傳亡從信傳亡宣城公仲宣後主子也小字瑞保三歲讀孝經若成誦然聞奏樂輒審音調宫中燕侍頗合禮度出見士大夫改容顧揖如成人禮乾德二年卒年四歲始封宣城公追贈岐王諡懷獻母昭惠先病聞仲宣死哀苦增劇遂至於殂故後主挽辭曰珠碎眼前珍花凋世外春未銷心裏恨又失掌中身玉笥猶殘藥香奩巳染塵前哀將後感無淚可沾巾又艷質同芳樹浮危道略同正悲春落實又苦雨傷叢穠麗今何在飄零事巳空沉沉無問處千載謝東風皆并其母子悼之𥘉仲宣卒後主哀甚然恐重傷昭惠常默坐飲泣而已因為詩以寫志云永念難消釋孤懷痛自嗟雨深秋寂寞愁引病增加咽絶風前思昏矇眼上花空王應念我窮子正迷家吟詠數四左右為之泣下嗚呼春秋魯君未踰年而卒者書子卒以其不全乎君也先君未葬而嗣君卒者書子某卒猶云父前子名也皆不作諡太子兾有諡固非春秋之法至於仲宣幼殤則又甚矣東晋琅瑘世子卒而賀循以為不可作諡君子謂其知禮南唐書卷之七
