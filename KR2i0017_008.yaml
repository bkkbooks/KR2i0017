body:
  text: 南唐書卷之八義飬傳第三嗚呼大亂之世三綱五常掃地盡矣故動干戈於骨肉假父子於異類皆滅天性之厚而反人倫之正也烈祖之奉徐溫彌篤於諸子者豈得巳哉抑為之而巳傳曰蹍市人之足則辭以放驁兄則以嘔大親則巳矣由是觀之親踈恩義不亦逺乎作義飬傳徐溫字端美海州昫山人烈祖之飬父也剛毅寡言罕與人交衆中凛然可畏目為徐瞋會唐末大亂販鹽為盜從吳武王楊行密起合淝徑兵數萬號其軍為黑雲長劒所與舉事者劉威陶雅之徒號三十六英雄獨溫未嘗有戰功行密用其謀殺朱延夀以功遷右衙指揮使始預謀議行密病出長子渥為宣州觀察使溫私謂渥曰今王有疾而出嫡嗣必有姦人為謀若它日召子非溫使者慎無應命渥涕泣謝溫而去行密病甚命判官周隱作符召渥隱慮渥幼弱不任事勸行密用舊將有威望者代主軍政乃薦大將劉威行密未許溫與嚴可求入問疾行密以隱議告之溫等大驚遽詣隱所計事隱未出而溫見隱作召符猶在案上急取遣之渥見溫使者乃行行密卒渥嗣立召隱罵曰汝欲賣吾國者復何面目見楊氏乎遂殺之渥之入廣陵也留帳下兵三千於宣州以其腹心陳璠范遇將之既入立惡溫與張皓典衙兵召璠等為東院馬軍以自備而溫皓共惡璠等侵權因擁衙兵入拽璠等斬之渥由是失政而心憤未能發溫皓益不自安共遣羣盜入寢中弒渥渥説羣盜能反殺溫等者皆為刺史羣盜皆諾唯紀詳不從執渥縊殺之𥘉溫皓之謀弒渥約分其地以臣於梁及渥死皓欲背約自立溫患之問其客嚴可求可求曰皓雖剛愎而暗於成事此易為也明日皓列劒戟府中召諸將議事自大將朱瑾而下皆去衛從然後入皓問諸將誰當立者諸將莫敢對皓三問可求前密啓曰方今四境多虞非公主之不可然恐為之太速且今外有劉威陶雅李簡李遇皆先王一等人也公雖自立未知此輩能降心以事公否不若輔立幼主漸以歲時待其歸心然後可也皓不能對可求因趨出書一教內袖中率諸將入賀諸將莫知所為及出教宣之乃渥母史氏教言楊氏創業艱難而嗣主不幸隆演以次當立告諸將以無負楊氏而善事之辭旨激切聞者感動皓氣色皆沮卒無能為隆演乃得立皓由此與溫有隙諷隆演出溫潤州可求謂溫曰今捨衙兵而出外郡禍行至矣溫亦憂之可求因説皓曰公與徐溫同受顧托議者謂公奪其衙兵是將殺之信乎皓曰事巳行巳安可止可求曰甚易也明日從皓與諸將造溫可求陽責溫曰古人不忘一飯之恩况公楊氏二世將今幼嗣新立多事之時乃求居外以苟安乎溫亦陽謝曰公等見留不願去也由是不行皓覺可求有附溫意將殺之可求詣溫謀先殺皓隂使鍾大章選壯士三十人就衙堂斬皓大章諾之而溫猶疑其不果夜半往約曰盜有老母懼事不成且止大章曰言已出口寧可已乎明日遂殺皓及紀祥等歸以弒渥之罪入白渥母史氏史氏泣曰吾兒年幼禍亂若此得保百口以歸合淝公之惠也溫遂專政隆演備位而已宣州節度使李遇心尤不平溫乃遣徐玠使越而道過宣州因説遇入覲遇𥘉許之玠乘酒呼曰君言入謁是良圖也不爾則為反矣遇怒曰君言遇反且殺景王者誰也溫乃使柴再用族遇於宣州行密舊將人人自疑溫因偽下之恭謹如見行密諸將乃安八年溫遷行軍司馬潤州刺史鎮海軍節度使同平章事十年遣招討使季濤攻越戰于臨安禆將曹筠奔于越濤敗𬒳執溫聞遣人語筠曰吾用汝為將汝軍有求吾不能給是吾過也赦筠妻子不誅厚遇之秋越人攻毗陵溫戰于無錫筠感溫前言臨陳奔歸遂敗越兵十二年封溫齊國公兼浙西招討使始就鎮潤州以升常宣池黃六州為齊國城升州建大都督府十四年溫徙治之以其子知訓輔隆演於廣陵而大政溫遙決之知訓為朱瑾所殺烈祖自潤州先入遂得政溫雖姦詐多疑而善用將吏江西劉信圍虔州久不克信使人説談全播出降遣使報溫溫怒曰信以十倍之衆攻一城不下而反用説客降之何以威敵國笞其使者而遣之曰吾以笞信也因命濟師遂破全播或誣信逗留將反信聞之因自獻捷至金陵見溫溫與信博信斂骰子厲聲祝曰劉信欲背吳願為惡采苟無二心當成渾化溫遽止之擲六子皆赤溫慙自以巵酒飲信然終疑之及唐師伐蜀溫急召信至廣陵以為右統軍託以內備遂奪其地溫客尤見信者唯駱知祥嚴可求可求善籌畫知祥長於財利溫常以軍旅問可求國用問知祥吳人謂之嚴駱溫亦自喜為智詐尤得吳人之心𥘉隨行密破趙鍠諸將皆爭取金帛溫獨據餘米作粥以食餓者十六年溫請隆演即皇帝位不許又請以吳王稱制乃許遂建國改元拜溫大丞相都督中外諸軍事封東海郡王隆演卒溫越次立其弟溥順義七年溫又請溥即皇帝位未許而溫病卒年六十六追贈齊王諡曰武烈祖受禪諡武皇帝廟號義祖知訓溫長子也少學兵法不能竟尤喜劒士角抵之戲怙溫權勢多為不法溫出鎮潤州留知訓輔政常陵侮諸將而對吳主隆演無君臣禮隆演幼懦嘗飲酒樓上命優人髙貴卿侍酒知訓為參軍隆演鶉衣髽髻為蒼鶻知訓因使酒罵座語侵隆演隆演愧耻泣涕而知訓愈陵辱之左右扶隆演起去知訓殺一吏乃止李德誠有女樂知訓求之德誠曰此輩皆有所生且復年長不足以接貴人俟求少妙者進之知訓對德誠使者罵曰吾殺德誠并取其妻亦易爾𥘉學兵於朱瑾瑾力教之後因求馬於瑾瑾不與遂有隙夜遣壯士殺瑾瑾手刃數人瘞舍後知訓知曲在已隱而不聞俄出瑾為靜淮節度使瑾詣知訓别且願獻前馬知訓喜往謁瑾家瑾妻出拜知訓答拜瑾以笏擊踣遂斬知訓提其首入告吳主曰為國去賊為民除害在今日矣吳主驚曰彼有父在吾不敢預聞瑾怒曰竪子不足與語遂自殺坐誅者數家𥘉宿衛將李球馬謙挾隆演登樓取庫兵以誅知訓陳于門橋知訓與戰頻却朱瑾適自外來以一騎前視其陳曰不足為也因反顧一麾外兵爭進遂斬球謙亂兵皆潰瑾嘗有德於知訓者也及其凶終吳人皆謂曲在知訓知訓凶悖多見烈祖書與刁彥能傳此不復書知詢溫第二子也烈祖秉吳政威權寖盛金陵行軍司馬徐玠諷溫曰居中輔政之重不宜假於他人宜以親子代之溫即遣知詢入覲謀代烈祖輔政而溫暴卒知詢奔還金陵爵位如溫而知詢暗懦待諸弟不厚徐玠知其終敗乃輸誠於烈祖知詢內為諸弟所構外為徐玠所賣而不知也意以已控強兵居重地烈祖雖管大政而無兵去之甚易溫喪未終屢請烈祖至金陵烈祖反使人諭之入朝因疏其罪狀責授左統軍知詢面數烈祖曰先王之喪是為人子而不親臨反罪我耶烈祖曰聞爾懸劒待我我亦不憚獨迫於君命不得往爾為人臣而畜乘輿非反而何周廷望者知詢之親吏嘗偽貢欵於烈祖時得烈祖之隂謀以告知詢知詢將入朝廷望諌止不從既行廷望曰公之此行有往日而無還日泣送之至是知詢以廷望之言質烈祖烈祖曰以爾所為告我者亦廷望也遂斬廷望知詢𬒳譴金陵為之一空後數歲知詢復起為潤州節度使往時幕府皆去獨李建勳隨之知詢至鎮常會寮佐談宴終日遂絶顧望移鎮江西卒於任知誨溫第三子也溫卒知詢守金陵所為多不法知誨每得其隂謀以告烈祖知詢之敗知誨構之為多烈祖德之以為江西節度使知誨先娶吳功臣吕師道女非嫡出知誨常切齒因醉刺殺之後呂氏數為厲知誨惡之請僧誦經為陳因果僧亦見呂氏曰吾不解此志在報冤爾及鎮江西歲餘吕氏不復見知誨喜甚有家人自淮南廽於江心遇綵舟有婦人漸邇視之乃吕氏也招家人曰為我謝相公善自愛我今它適矣因遺繡履曰相公謂爾不信以此示之家人至江西首語其事以履示知誨知誨熟視未畢輒見呂氏在側曰爾謂我真不來耶頃刻知誨暴卒以知詢代鎮江西遇其喪於中塗知詢撫棺哭曰弟用心如此吾亦不怨但何面目見先王於地下聞者傷之烈祖受禪追尊溫為義祖徐氏諸子封拜與李氏同而知誨之後特優子景遼景逰出入宫禁預聞機務專掌浮屠修造之事當時言蠧政者以二人為首景遊後避元宗諱改名逰及事後主封文安郡公尤信任焉知諫溫第四子也爽悟喜文徐氏諸子知諫最為雅循𥘉知訓輔政無所醖藉溫留知諫隂助之諸將常惡知訓陵巳而以知諫為長者烈祖自潤州入覲知訓會飲山光寺是日知訓大沉酗決欲害烈祖知諫以謀告烈祖烈祖獲免後事亡其不書封爵者皆卒于吳也魏王徐知證溫第五子也在吳歷刺史節度使烈祖受禪封江王改王魏徐氏諸子知證最為長年及元宗之世尤見優禮每入宫元宗輒以家人遇之親捧觴為夀自起舞以祝之知證亦以叔父自處卒年四十三梁王徐知諤溫第六子也起家為太子中舍纍遷刺史節度使知詢敗以知諤為金陵尹烈祖受禪封饒王進王梁知諤博采竒物寶貨充牣其家有蜀客持鳳頭至自言得於南蠻賈者知諤以錢五十萬易之其頭正類雄雞廣可五寸冠上正平可以為枕朱冠紺毛金喙星眼飛禽之枯首也來自萬里而毛羽不脫文彩如生人咸異之嘗逰秫山除地為廣場編虎皮為大幄率寮屬會于下號曰虎帳忽遇暴風飄虎帳碎如飛蝶知諤驚遽棄歸數日病卒嗚呼惟厲與崇君子難言存而勿論可也呂氏之事載于别録陳公彭年作也其辭典雅頗有史法而公歸皇朝參大政為名臣顧其言可不諒耶南唐書卷之八
