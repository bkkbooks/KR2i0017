body:
  text: 南唐書卷之九列傳第四周本舒州宿松人漢南郡太守瑜之後祠廟隴畞皆在子孫守故土者猶數十户本少孤貧嘗在田里獨格猛虎唐末大亂投楊行宻軍中以勇敢聞常先登深入蒙犯矢石身無完肌及歸營自燒鐡烙其創飲㗖言笑自若軍中猛将皆服之累遷淮南馬歩軍使天祐五年楊氏始得江西撫州刺史危全諷率諸郡兵十萬来爭其地屯于象牙潭楚人取髙安爲之援江南守将劉威告急判官嚴可求薦本可用時本従軍圍蘇州不克耻之稱疾不出可求即卧内強𧺫之本曰蘇州之役非彼強我弱也蓋上将權輕下皆專命故爾今必見用願無任偏禆可求爲言楊氏許之得選兵七千使救髙安本曰楚人非欲取髙安也爲全諷聲援爾若先敗全諷楚人必走乃疾趨象牙潭劉威要之宴犒不留或曰賊勢甚盛宜審觀形勝計定而後進何其遽也本曰賊有十倍之衆使吾軍知之必将奪氣須乘其銳而用之既至指授諸将戮力急攻大破其軍擒全諷諸郡之兵皆潰楚人果遁吉州刺史彭玕信州刺史危仔昌棄城走於是江西之地始定以本爲信州刺史越将陳璋據衢州歸欵越人圍之本受命以兵迎璋既至越人解圍陣於城下璋以其衆来奔禆将吕師道曰敵去我咫尺而陣不動是輕我也必擊之本曰吾受命迎陳使君陳君今在此吾事訖矣何爲復戰且彼近而不動必有以待我也擊可勝乎待其先動擊未晚也璋亦以爲然乃還越人躡之至中道宿半夜佯驚棄輜重走先設伏於道左越人急追至伏所前後夾擊盡殱其衆越人累至皆敗之唐荘宗入洛陽吳遣司農卿盧蘋使于洛陽荘宗問吳之名将存否而本預焉由是召入爲雄武統軍出爲夀州節度使移鎮廬州拜太尉中書令封西平王本不知書而愛重儒士賔禮寮屬不撓其權吏民愛之性純朴伎藝無能者唯軍旅之事則如夙習烈祖将受禪徐玠周宗等以本及李徳誠皆位望隆重故諷之以爲推戴之首本以昬耄仍不知時變皆少子祚左右其事時吳宗室臨川王𪷟廢處瀝陽聞将授終乃殺監守者與親信二騎趨詣本本将見之祚固執不可本怒曰我家郎君也何不使我一見祚閉中門拒之濛𬒳殺吳室遂移本随衆至建康勸進由是愧恨數月而䘚子鄴有戰功亦至廬州節度使李徳誠廣陵人也少事宣州趙鍠爲給使吳攻宣州鍠敗徳誠及韓球猶隨左右城中推立禆将周進思爲主鍠使徳誠徃諭進思以城降徳誠暴得熱疾委頓不能受命乃使球徃進思斬球擲其首於外徳誠是夕即愈鍠死事吳武王常従征討累遷淮南馬歩軍使擒安仁義於潤州以功拜潤州留後歷撫䖍洪三鎮加中書令封南平王烈祖建齊國徳誠率諸将勸進乃其子建勲之謀也昇元中徳誠自洪州入朝烈祖以徳誠前代功臣父子皆叅佐命優禮之聞其来覲遣内夫人迎於道六官之職因事以書其僣百寮候於門朝堂設幄爲具每有大議遣執政就第諮問信王景逹先娶徳誠女烈祖復姓有司以同姓非禮制曰南平王國之元老婚不可離信王妃可氏南平楊氏将帥徳誠最無大功特以姻婭顯逹而名位夀考諸将莫及有子二十人建勲爲相而建封爲将相無阿黨將死國事君子善之其餘皆任右職建勲别傳王輿少與兄綰俱事吳武王輿始爲小校従周本伐危全諷将戰本親臨賊水柵分命諸将指山頭一小營謂輿曰徃攻彼以撓賊輿唯唯不行本曰爾憚徃耶輿曰公必若以輿爲可使願得此柵攻之徃彼何爲本大喜曰亦知此爲賊要害耶乃命之輿乘輕舟先進破其前鋒因排柵而入諸軍乘之遂擒全諷累遷諸軍都虞候譲皇之世祿去公室掌禁兵者尤難其人烈祖以輿爲控鶴都虞候持重有法出爲光州刺史先是輿兄子拯爲海州副使叛入北方以爲刺史聞輿在光州間遣親信通書幣輿執之以聞因求罷郡復爲控鶴都虞候遷左金吾大将軍除浙西節度使従譲皇至潤州移鎮鄂州監軍甄庭堅與輿不恊或告庭堅交通境外烈祖使中使繫庭堅下大理輿先知之宻見庭堅曰可乘輕舟自歸闕庭無與中使遇庭堅懼従其計遂獲免由是寮屬稱其長者輿少時従軍圍潤州爲大弩射中右耳自左耳出旁一人中之猶死輿卧病百許日及愈耳亦不聾又嘗攻頴州夜夢道士告之曰旦有流星下墜能避當富貴及旦輿仗劒倚柵木驅士攻城城中飛大石正中其柵及輿鎧甲之半皆糜碎而輿無傷輿曰所夢流星是也由此自負終爲使相䘚年七十四兄綰爲􅐚州節度使先䘚李章廬江人従吳武王爲騎将與朱瑾相悅瑾殺徐知訓自剄義祖入誅瑾黨章與同事六人當斬五人巳斬次至章戾聲曰四郊多壘而斬壮士耶時馬仁𥙿監斬壮其言聞於烈祖釋之隷洪州爲軍校累遷雄武軍都虞候左街使章雖老而心尚壮善撫士䘚勤於職務出爲䖍州節度使爲理嚴重禁戢左右賔禮寮屬會周本䘚移鎮廬州加中書令䘚年九十王安廬江人也少投吳武王爲親兵武王嘗升髙塜望敵安捧匜器侍側左右皆注目前視陣旁有執槊者疾走徑趨王所左右驚惕失措安置匜器於地取弓射之一發而殪徐内弓弢中復捧器如𥘉顔色不變武王竒之曰汝有器度當至富貴因加奨㧞累遷袁州刺史歷典數郡皆以沉黙寛厚爲理事烈祖爲神武統軍代李章爲䖍州節度使䘚年七十三韋建少居吳武王軍中嘗従征討以膂力聞後隷䖍州王綰爲禆将郡境曠逺旁接谿洞群盗充斥建率勵勇士所至克獲百姓頼之累遷諸軍都虞候爲左衛使出爲袁州刺史建不知書而性淳厚清靜自處無所侵撓郡中大治數年入爲統軍以劉仁贍代之仁贍敏晤親綜簿書時有釐革郡政益治而百姓猶思建焉歷任皆如是至老不衰出爲鄂州節度使䘚年八十髙審思少事楊行宻以驍勇聞於軍中劉信平􅐚州審思爲禆将屢立戰功審思爲人重厚寡言烈祖竒之常使綜領親兵拜夀州節度使增修城隍守備甚嚴或謂之曰以公威畧守此堅城何懼而過爲畏懦也審思曰兵機多變不可不懼過爲之防上䇿也顯徳之役夀州城隍最堅亦審思之遺績爾後事舊史亡南唐書卷之九
