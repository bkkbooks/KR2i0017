body:
  text: 南唐書卷之十列傳第五嗚呼論其時則南唐號為文獻之地繩以法則可嘉之士無幾幸而獲全始終者菰蘆之才信有之矣李建勳字致堯南平王德誠之子𥘉德誠守潤州秉燭夜出候者以聞而徐溫疑其有變徙鎮江州德誠猶不自安乃遣建勳入謁溫溫見之歎曰有子如是非惡人也即以女妻建勳起家為金陵巡官徐溫卒知詢代鎮而建勳仍佐幕府及知詢𬒳徴寮屬皆受譴獨建勳自全烈祖出鎮金陵以為副使預禪代之計拜中書侍郎平章事元宗即位東宫官屬稍稍侵權罷建勳為撫州節度使召拜司空乃營亭榭於鍾山適意泉石纍表乞骸骨以司徒致仕賜號鍾山公先是宋齊丘退居青陽號九華先生未幾一徴而起時論薄之建勳年齒未衰時望方重或謂曰公未及老無大疾苦遽有是命欲復為九華先生耶建勳曰平生常笑宋公輕出處吾豈敢違素心自知非夀考者欲求數年間適爾因為詩以見志曰桃花流水須相信不學劉郎去又來建勳博覽經史民情政體無不詳練惜乎怯而無斷未嘗忤㫖故雖有藴藉而卒不得行其為詩少時猶浮靡晚年頗清淡平易見稱於時保大十年卒臨卒顧謂門人曰吾死斂以布素曠野深瘞任民耕闢不須封樹暨甲戌之役公卿塋域越人發掘殆盡而獨建勳以不知葬所獲免常夢錫字孟圗少警悟通書記事岐王李茂貞為秦隴判官茂貞卒從儼襲位𥙷寶雞令從儼左右有惡之者夢錫渡淮詣廣陵烈祖辟致門下薦為大理司直從至金陵為觀察推官烈祖受禪拜殿中侍御史禮部貟外郎每從容奏事烈祖以為有識量命直中書省參掌詔命夢錫重厚詞氣方直多知故事除給事中時以樞密院隸門下機務多委焉夢錫數言時政繁碎宜修復舊典為後代法又言宋齊丘陳覺姦邪馮延已魏岑並小人不宜左右春宫元宗即位許以翰林學士待之而以齊丘故黜為池州節度判官及齊丘罷召為户部郎中遷諫議大夫翰林學士時特置宣政院於內庭命夢錫專掌逾年罷宣政院為學士如𥘉既而姦黨愈熾夢錫終不能勝遂稱病縱酒希復朝謁㑹鍾謨李德眀分掌吏兵二部以夢錫人望求為長吏以自重乃除户部尚書知省事固辭不獲署𥿄尾而已夢錫無子以其壻王繼沂掌家務或言繼沂亂內夢錫盡出妻妾室為之一空奏黜繼沂于􅐚州時馮延已為相劾夢錫貶饒州團練副使病留廣陵東都留守周宗常敦喻之眀年牽復尋改吏部侍郎轉禮部尚書割地之後公卿在座有言及大朝者夢錫笑曰羣公常欲致君為堯舜何故今日自為小朝耶座皆失色每公集往往喑嗚大咤以故不為士大夫景慕然其循公忘私固亦古之遺直也顯德五年卒年六十一踰月宋齊丘敗元宗歎曰夢錫生平欲殺齊丘恨不使見之贈左僕射嚴續字興宗父可求善籌畫為吳相續以父廕𥙷千牛備身遷祕書郎烈祖以女妻之少長貴勢性恭恪恂恂如也烈祖受禪為兵部侍郎尚書左丞元宗即位改禮部尚書中書侍郎方宋齊丘用事續常守正不為黨附常夢錫屢言齊丘姦黨元宗謂夢錫曰吾觀大臣中唯嚴續能中立雖然無與援者卿可助之夢錫因喻㫖於續續亦善遇之不盡用其言也及夢錫罷宣政院續亦出為池州刺史頃之復為中書侍郎兼三司使出守江西久而不召數歲入為中書侍郎知尚書省尋拜門下侍郎平章事割地之後罷為少傅元宗南遷拜左僕射使輔太子居守後主即位改司空平章事其後機務歸樞密院續亦與羣輩不協遂出鎮浙西逾年稱疾罷歸卒於私第晚歲尤屈身下士旌别善惡夀春人劉奐有學識性方言直動多忤物續薦之為監察御史起居舍人時論善之續自以少貴倦學命羣從子弟皆礪以儒業諸子及孫舉進士者十餘人續疾病不亂與賔客談論如平常後主使內夫人問之續遺託國事言不及私又極陳羣臣所宜用捨者辭氣慷慨翌日卒潘承祐晋安人仕吳為光州司法參軍郡有大獄羣吏不直承祐固爭之不得因棄官歸閩嶺及王氏據閩仕至大理少卿王延政鎮建州辟為度支判官延政與福州搆隙承祐極諫不納會晋安使至延政大閲以誇示之辭氣益悖承祐長跪固諌其言甚切延政大怒謂軍士曰汝可為我食判官肉承祐曰與其不義而生孰若抱義而死事勢如此蚤死為幸久之乃解及延政僣號以為吏部尚書而用其幸臣楊思恭為僕射承祐復爭遂逐承祐歸私第查文徽下建州以禮致之元宗以為衛尉少卿遷鴻臚卿委以南方之事升降人物制置郡縣多用其言薦陳誨林仁肇皆著功效老病乞骸骨以禮部尚書致仕卒於洪州西山其子慎修官至貟外郎嗚呼續薦劉奐以其直承祐薦陳誨林仁肇以其忠忠直之效獨立於亂世難矣哉然非忠直之難而知其忠直者為尤難豫於續承祐有取焉游簡言字敏中其先建安人父恭登進士第有名於時仕吳為駕部貟外郎知制誥簡言少孤力學起家為祕書省正字烈祖鎮金陵辟為户曹參軍掌元帥府文翰遷觀察巡官及禪代歷虞部貟外郎知制誥中書舍人保大中為翰林學士禮部侍郎守職恭恪國家之務非其任者未嘗肯言貞介獨立不為阿附元宗重之俄判中書省兼兵部選事及淮上兵起越人背盟寇毗陵乃除簡言中書侍郎奉使讓越先見其子遜為千牛備身而後行至境召還元宗南遷以簡言輔太子居守辭以不能事少貴乃令從行後主即位𥘉未之知後頗重之自吏部尚書遷左僕射委以南省之事簡言躬親簿領督責稽緩勵以威嚴寮吏畏之於是六職辦集以執方不為群輩所附人有請托者必固違戾不復顧其理道數年以疾辭不許及拜相而疾亟卒年五十七張延翰字德華宋州碭山人少逰長安後避亂江淮事吳為鹽城令有治績遷楚州行軍司馬烈祖輔政以潯陽為封邑乃以延翰為工部郎中判江州入為知雜侍御史張宣以功臣為左街使率意驕暴延翰劾之由是豪猾屏跡遷禮部侍郎時貢院未備士有獻書可采者隨即考試公平詳審士論美之兼知選事吏不容姦畏之如神眀進擢孤寒不附貴勢元宗輔政大臣中唯重延翰謂左右曰張君凡所議論必盡公正咸有條理至於簿領無不明白吾得傾心信之由是六司總領殆遍及禪代拜中書侍郎平章事延翰有時望當其作相人以為晚既而多病機務廢闕烈祖素以國器推重不許免相醫藥勞問不絶于道卒年五十七士大夫歎惜之贈太傅徐玠字藴圭彭城人也敏幹有辭辨事郡帥崔洪為軍吏與洪同歸于吳吳武王署玠為糧料使拜吉州刺史貪猥不治罷之徐義祖出鎮潤升辟玠行軍司馬性詭佞善揣人意㑹烈祖輔政人望頗歸玠諷義祖曰居中輔政之重不可假於異姓宜以嫡子代之溫即遣其子知詢入廣陵將代烈祖輔政㑹溫暴卒知詢還金陵拜升州節度使如溫之制所為多不法玠知其必敗反自結於烈祖烈祖出鎮金陵仍以玠為行軍司馬與周宗李建勳孫晟首贊禪代遂拜右丞相出鎮宣州玠妻楊吳武王女也先適宣州節度使李遇之子義祖攻宣州族誅遇楊以王女免更適玠至是玠得宣州楊感憤卒玠連鎮宣洪二郡皆以貪濁為理營求百端人多鄙之罷鎮復相位拜司徒兼侍中特以舊人崇其虛名實不與政好修飬服餌常以賤價市丹砂之最下者其鄙嗇如此保大元年卒李夷鄴不知何許人也升元中為翰林學士烈祖殂大臣欲以宋后監國命中書侍郎孫晟草遺詔夷鄴曰此非先㫖必姦人詐為大行嘗云婦人預政亂之本也安肯自作禍階且嗣君明德聞於天下汝曹何遽為亡國之事乎若遂宣行吾對百寮裂之必矣於是監國之議遂寢元宗即位語夷鄴曰疾風徑草於卿見之夷鄴性率易好飲酒不拘小節常遺親友書曰今宵好月能相過乎赴召者甚衆夷鄴巳醉指酒壺曰本用相待酒興輒來自倒之矣其踈豁多類此嗚呼士之可貴者信義而已履信抱義而不奪於勢利則終始一節尚何渝哉徐玠始甚構先主既而附之以䦧知詢與夫崔湜反覆於彥範三思之間者何異𥘉徐溫忌李遇功使玠伺隙旋覆遇宗楊氏遂以讐人為所天及觀舊治乃感憤卒嚮也不能即死以全其節既又二於新人而懷其舊與夫從一而終者異矣南唐書卷之十
