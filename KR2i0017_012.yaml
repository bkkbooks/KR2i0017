body:
  text: 南唐書卷之十二列傳第七盧文進字大用范陽人也為劉守光騎將唐莊宗攻范陽文進先降拜蔚州刺史莊宗以屬其弟存矩存矩為新州團練使統山後八軍莊宗與劉鄩相拒於莘召存矩會兵擊鄩存矩募山後徑兵數千人課民出馬民以十牛易一馬山後之人皆怨而兵又不樂南行至祁溝關聚而謀為亂文進有女少而美存矩求為側室文進以其大將不敢拒雖與心常歉之也因與亂軍殺存矩反攻新州不尅攻武州又不尅遂奔于契丹契丹使守平州明宗即位文進自平州率衆數萬歸唐明宗得之喜甚以為善成軍節度使居歲餘徙鎮威勝加同平章事入為上將軍出鎮昭義徙安逺晉髙祖立與契丹約為父子文進懼不自安天福元年冬殺其行軍司馬姚知兆副使杜重貴送欵於烈祖烈祖遣祖全恩以兵二千陳于安陸俟文進出殿之而至文進居數鎮頗有善政兵民愛之其將行也從數騎至營中别其禆將李藏機等告以避契丹之意將士皆拜為訣烈祖以文進為天雄統軍宣潤節度使文進身長七尺狀貌偉然自其奔契丹也數引契丹攻掠幽薊虜其人民教契丹以中國織絍工作無不備契丹由此益強同光中契丹數以輕騎出入塞上攻掠幽趙人無寧歲唐兵屯涿州歲時饋運自瓦橋關至幽州嚴斥堠常苦鈔奪為唐患者十餘年皆文進為之也及其來奔始晦迹務恭謹禮接文士謙謙若不足其所談論近代朝廷儀制臺閣故事而已未嘗言兵入為武衛上將軍以病卒𥘉文進攻新州不克夜走墜塹一躍而出明日視之乃郡之黑龍潭也絶岸數丈深不可測又嘗有大蛇徑至座間引首及膝文進取食飼之而去由是自負反復南北終無挫衄焉李金全其先出於土谷渾金全少為唐明宗厮飬以驍勇善騎射常從戰伐以功為刺史天成中為龍武節度使務為貪暴罷歸獻馬百匹居數日又獻明宗謂曰卿患馬多耶何進獻之數也且卿在涇州治狀如何無乃以馬為事乎金全慙不能對徙鎮橫海久之罷為右衛上將軍晉髙祖時安州屯防使王暉殺節度使周瓌髙祖遣金全將騎兵千人以往下詔招暉許為刺史又以信箭諭安州不戮一人且戒金全曰無失吾信金全未至襄州安從進意暉必走江南以精兵遮其要路暉聞金全來果西走為從進兵所殺金全後至得暉餘黨數百人皆送京師暉之亂也大掠城中三日金全利其所掠資因擒其將武克和等十餘人殺之克和呼曰王暉首亂猶賜之信誓以為刺史我等何罪反見殺耶若朝廷之命何以示信苟將軍持詔而殺降亦將不免也晉髙祖不能詰即以金全為安逺軍節度使金全左都押衙胡漢榮用事所為多不法晉髙祖患之不欲因漢榮以纍功臣為選廉吏賈仁沼代之且召漢榮漢榮教金全留巳而不遣金全客龐令圖諫曰仁沼昔事王晏球有大功晏球欲厚賞之仁沼退而不言此天下之忠臣也及頒賜所俘物仁沼悉以分故人親戚之貧者此天下之廉士也宜納仁沼而遣漢榮漢榮聞之夜使人殺令圗而鴆仁沼天福五年夏晉髙祖以馬全節代金全而仁沼二子欲詣京師訴其父冤漢榮大懼紿金全曰前日天子召漢榮公違詔而不遣仁沼之死其二子將訴于朝今以全節代公是召公對獄也金全信之遂送𣢾于烈祖晉髙祖發兵三萬授馬全節討之烈祖遣鄂州屯營使李承𥙿帥師迎之金全來奔行至泌川引領北望涕泣而訣承𥙿入安州大掠而還為晉兵所躡大敗我師於馬黃谷承𥙿戰死烈祖以金全為天威統軍遷潤州節度使漢隱帝時李守貞以河中反乞兵於金陵金全與查文徽等出師沭陽諸將鋭於進取金全獨以為逺不相及乃止保大九年以金全為大將耀兵淮上方與諸將會食候言澗有羸兵數百欲掩之金全不許曰過澗者斬及暮伏兵四起旌旗蔽日金鼓聞數十里金全曰適可與戰乎及歸語人曰吾得全軍而還為功大矣其後不復用卒於鎮王彥儔上蔡人也少為本郡軍校同光末諸郡皆亂同輩六人告彥儔曰天下紛紛能者先立我輩空自困可相與起事彥儔紿曰吾當宿直爾以兵入吾為內應是夜六人果至彥儔伏劒盡斬之呼刺史曰彥儔巡警無狀姦盜竊發幸伏其罪矣請公親出以安衆刺史出彥儔又斬之自領州事衆不附遂來奔于吳烈祖以為都押衙纍遷和州刺史入為天威統軍彥儔自以發迹凶亂於是小心勤恪烈祖善之親至其家拜其父及烈祖受禪拜池和節度使時給事中常夢錫左遷池州幕府彥儔待之盡禮人稱其有識量焉林仁肇建陽人也剛毅有膂力姿質偉岸文身為虎兒因謂之林虎兒事閩為禆將閩亡潘承祐薦之署為軍校周世宗征淮甸仁肇將偏師出援夀州攻城南大寨斬獲甚衆遂破濠州水柵以功授淮南屯營應援使周人據正陽浮橋以為糧道仁肇率敢死士載芻藁舉火焚橋遡流逆風火弗及熾合戰不克仁肇殿而退周駙馬都尉張永德猿臂善射發無不斃追仁肇射之矢至仁肇輒格去永德驚曰彼有人焉未可逼也及割地拜潤州節度使移鎮武昌會李重進以楊州叛朝廷討平之而淮南諸郡所守各不過千人仁肇密説後主曰中原承衰亂之後前年征蜀今取交廣還往數千里兵必罷弊請假臣兵數萬北渡直抵夀春分據正陽因其思舊之民纍年之粟復取淮甸勢如轉丸仍乞臣起兵之日聞于北朝言臣據兵竊叛事成歸國否則請族臣家以明陛下之無二後主驚曰爾無妄言宗社危矣乾德三年以仁肇為洪州節度使留守南都仁肇素出於偏伍雖在將帥之位常與士卒均食同服以故多得士心又與皇甫繼勳朱令贇輩不協因搆仁肇求援皇朝欲自王江西後主潛使人鴆之仁肇少有風疾口氣頗臭醫工云肺掩不正及遇鴆而家人訝其不臭翌日卒𥘉仁肇見知於陳喬喬曰令仁肇將外吾掌機務國雖迫蹙未易圖也及仁肇死喬歎曰事勢如此而殺忠臣吾不知其死所矣此為喬死張本陳誨建安人也始生數月足徑能履其父異之因小字阿鐡及長趫捷有勇又呼為陳鐡事王氏有戰功建州𬒳圍誨數出挑戰唐兵多苦之及城陷為王建封所獲將殺之誨走自歸查文徽文徽禮之復以為將使領兵招懷散亡文徽數表其能閩人潘承祐亦薦之授劒州刺史破馬先進以功拜建州節度使委以南方之事誨繕修守備郡政無斁周師伐淮甸誨遣其子德誠率師赴難夀春之役諸將多逗撓唯德誠力戰未嘗挫衄師還拜德誠和州刺史誨由是恩寵日加改其軍名忠義以旌之諸子皆至顯職在鎮十年以疾求罷乃以其弟劒州刺史謙為留後召誨還都疾甚後主親往視之未幾卒申屠令堅山東人也無賴好博膂力絶人晉漢之間為盜犯法械送京師未至謂守吏曰吾不死則為健卒因市酒為訣守者皆醉令堅破械逃去保大七年附賊帥咸師明來歸起卒伍纍遷偏將淮甸兵起出援夀春與林仁肇同破城南大寨左右奮擊前無徑敵遂復濠州以功授神衛軍都虞候後主即位常掌親兵開寶五年除吉州刺史委以邊務頗有節制後主歸于京師委諭順命令堅私約袁州刺史劉茂忠不降未發而令堅卒南唐書卷之十二
