body:
  text: 南唐書卷之十四儒者傳下第九劉洞廬陵人也少逰廬山學詩於陳貺精思不懈至浹日不盥貺卒猶居二十年詩長於五言自號五言金城後主即位詣金陵獻詩百篇後主覽其首篇石城懷古云石城古岸頭一望思悠悠幾許六朝事不禁江水流後主掩卷為之改容不復讀其餘者洞羇旅二年俟召不報遂還廬陵與同門夏寶松相善陳貺嘗謂巳詩埒賈島洞亦自言有浪仙之體恨不得與之同時言詩也􅐚州陳德誠尤重其詞學及金陵受圍洞為詩署于路旁云千里長江皆渡馬十年飬士得何人又云翻憶潘郎章奏內隂隂日暮好沾巾𥘉潘佑表云家國隂隂如日將暮洞以譏之開寶八年卒其遺集行于世賈島字浪仙江為其先宋州人避亂建陽遂為建陽人逰廬山白鹿洞師事處士陳貺居二十年有風人之體時金陵𥘉復唐制以進士取人為有題白鹿寺詩云吟登蕭寺旃檀閣醉倚王家玳瑁筵元宗南遷駐于寺見其詩稱善久之為由是傲肆自謂俯拾青紫乃詣金陵求舉屢黜于有司為怏怏不能自巳欲束書亡越而會同謀者上變按得其狀伏罪為嘗吟隋堤柳詩云錦纜龍舟萬里來醉鄉繁盛忽塵埃空餘兩岸千株柳雨葉風花作恨媒盛傳于時汪台符歙州人也能文章通古今有王佐才聞烈祖移鎮金陵台符上書陳民間利害十餘條大率以富國阜民為務烈祖善之而宋齊丘疾其才髙屢為詆訾台符由是不平齊丘始字超回台符貽書誚之曰聞足下齊大聖以為名超亞聖以稱字齊丘大慚改字子嵩因使親信誘台符乘舟痛飲推沉石城蚵蚾磯下升元中限民田物畜髙下為三等科其均輸以為定制又使民入米請鹽貨鬻有征稅舟行有力勝皆用台符之言史虗白山東人世儒學與韓熙載友善唐晉之間中原多事遂因熙載渡淮聞宋齊丘總相府事虗白放言曰彼可代而相矣齊丘欲窮其伎因宴寮屬而致虗白酒數行出詩百詠俾賡焉恣女奴玩肆多方撓之虗白談笑獻酬筆不停綴衆昉大驚及見烈祖説之曰今據江淮摘煮山海人民豐阜咸洛之地陛下之先業世亂久矣人思舊德反斾長驅易若屈指烈祖雖善其説然以𥘉基方輯睦鄰境未暇北顧乃署郡從事虗白耻其𥘉言之失意頗不平遂南逰廬山以詩酒自娛元宗即位韓熙載薦之召見問為治之理虗白曰臣草野之人漁釣而巳邦國大計不敢預知因醉溺于殿陛元宗曰真處士也賜田五頃遣還及畫江為界虗白為割江賦以誚云舟車有限沿汀島以俱間魚鱉無知尚浮遊而不止元宗南遷至星子渚復召至問處士隱居有所得乎對曰臣得漁父一聯云風雨掇却屋全家醉不知元宗變色久之復賜粟帛遣歸卒于家年六十七郭昭慶其先為廬陵禾川人父鵬保大𥘉進士官至大理司直或告故南平王鍾鏄夫人與僧通姦大理卿蕭儼案法議徙鵬曰法之行自貴者始遂曲法誅之人皆以為冤會宋齊丘得罪鵬坐黨免官卒昭慶博通經史擬元經作唐春秋三十卷著治書五十篇皆引古以勵今獻之為左右所沮俾就舉進士昭慶不平復上書曰臣所述皆先聖之遺旨以懲勸褒貶為任其餘摘裂章句輔綴雕蟲臣自少耻而不為因得召對輔楊子尉不受復歸禾川邑宰覽之修謁往候昭慶不與之見宰銜之會閲編户乃籍昭慶為新擬軍昭慶復走金陵再獻經國治民論各十餘篇大抵皆指述池州采石堤要害備禦之處及東海隅可以拓之之略後主覽而恱之遂署為著作郎常以才名自居然朝無引援久之不遷開寶歲貢方物箋表及使命廷勞燕餞之辭一出於昭慶皇朝諸公亦推其辭藻徐鉉徐鍇尤嫉之鍇前通謁而不署名銜昭慶怒乃詬而擲之由是有隙昭慶之居與客將李師義為鄰而師義與鍇為姻婭鍇因令師義召昭慶飲潛置鴆于酒昭慶飲之不疑詰旦入朝及階而仆扶出遂絶諸竅皆出血昭慶前所獻治書內有禁絶三篇多天文孫吳之術及經國論等皆行于世唯唐春秋為鉉鍇所匿康仁傑泉州人也少祝髮為僧喜儒學頗自勵因遊江淮會陳德誠出次池陽仁傑以詩投之有紅斾渡江霞蘸水青蛇出篋雪侵衣之句德誠勉令就仕乃薦仁傑于執政者仁傑易儒服至金陵會羣公旬沭宴升元閣仁傑造席和登閣詩有雲散便凝千里望日斜長占半城隂之句座皆大驚後主聞之問左右曰仁傑如何人或對曰亦詩中苦吟者也然其逺人慕化而至宜姑息而已時陳洪進據漳泉遂召問其風土民俗仁傑對答無滯仍獻所業授鄂州文學輔溧陽簿考滿出吉州括量屯田仁傑視肥磽稽田疇無不允當性循素儉門無私謁其所進待乃儒生名士吟噱終日曾不少怠晚年彌苦其志嘗以詩召嘉禾峯僧云只在此山寧有意向來求佛本無心時皆稱善入授汾陽令及金陵敗仁傑亦卒伍喬廬江人也性嗜學以淮人無出巳右者遂渡江入廬山國學苦節自勵一夕見人掌自牖隙入中有讀易二字倐爾而却喬默審其祥取易讀之探索精微逮數年山下有僧夜夢人指大星曰此伍喬星也僧與喬𥘉不相知逹旦入國學訪問得喬喜甚勉之進取喬以匱乏告僧輒罄槖豫之喬出與郡計明年春試畫八卦賦霽後望鍾山詩是歲同試數百人𥘉中有司之選者必延之升堂而加慰飲焉先是宋貞觀登坐張洎續至主司覽程文遂揖貞觀南坐而引洎西首酒數行喬始上卷主司讀之驚嘆乃以貞觀處席北辟洎居南登喬為賔首覆考榜出喬果第一洎第二貞觀第三時稱主司精於衡鑑元宗命勒喬程文于石以為永式署宣州幕府考滿遷考功郎卒于官周彬和川人也杜門讀書不治産業其妻讓曰君家兄弟皆力田畞以致豐羡而獨不調玩故𥿄以自困寧有益耶彬笑曰耕田不如耕道非兒女子所知也聞烈祖鎮金陵招辟儒生彬因獻所習烈祖善之禪代之後制度草創無取士之科會有事于南郊彬著郊望論數千言廣陳前古得失上之署諸衛巡官元宗與夀王景遂貽書交辟置之門下賜豫頗優告歸省母以所得金玉繒幣陳列于庭彬顧其妻曰伯叔田畞孰愈妻曰此男子之事非婦人所能知彬素鄙於鄉里至是猶有嫚言者親友以告彬笑曰昔魯人俚孔子謂之東家丘况庸人乎授大理司直以母憂歸葬謁禾川令直造其廳署令詰之曰君雖朝省直寮其如桑梓何彬怒因自誓曰吾不歸令于兹有如白日服闋詣建康以前官出宰禾川前令靦顔而去為政廉平鄉里率化有爭訟者以理和解之秩滿邑人詣郡乞留連任七考纍遷尚書郎卒于官夏寶松廬陵吉陽人也少學詩於建陽江為為羇旅卧病寶松躬嘗藥餌夜不解帶為德之與處數年終就其業與詩人劉洞俱顯名于當世百勝軍節度使陳德誠以詩美之曰建水舊傳劉夜坐螺川新有夏江城蓋劉洞嘗有夜坐詩最為警䇿而寶松有宿江城詩云鴈飛南浦砧𥘉斷月滿西樓酒半醒又曉來羸驥依前去目斷遙山數點青故德誠紀之其為當時延譽類如此晚進儒生求為師事者多齎金帛不逺數百里輻輳其門寶松黷貨每授弟子未嘗會講唯資帛稍厚者背衆與議而紿曰詩之旨訣我有一葫蘆兒授之將待價由是多私賂焉徐鍇字楚金與兄鉉同有大名於江左鍇第進士纍遷屯田郎中知制誥集賢殿學士鉉鍇兄弟俱參近侍而其文相軋議者方晉之二陸云鍇著質論十餘篇後主札批其首後主文集復命鍇為序君臣上下互為賁飾儒者榮之鍇以開寶八年卒于金陵圍城中卒之踰月南唐亡鉉略附歸明傳南唐書卷之十四
