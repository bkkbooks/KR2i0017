body:
  text: 南唐書卷之十五隱者傳第十嗚呼古之所謂隱士者道德足乎巳而時命大謬則泊然自適於性命之真而非違物離人以為髙也物與人莫為之纍而已矣此伯夷叔齊朱張柳下惠之徒所以有德於天下後世也自秦漢而下士之隱者雖不足以語此而前史載之詳矣南唐之士僅可觀者敘次于左作隱者傳江夢孫字聿修潯陽人也博綜經史儒行髙潔烈祖輔政辟置門下薦為祕書郎久之夢孫自陳迃儒無所禆益且平生讀書意在施惠於民而後已因求一縣以自效烈祖曰縣邑非所以優賢者不許固求之乃輔天長令烈祖召之從容示以誥指庭下地曰今日受此明日即趨走於彼矣如何夢孫曰苟遂素志無恤其他乃授之至縣吏告曰正廳甚凶前令居之鬼怪畢見請陳設便廳夢孫固不可曰長吏不居正廳非禮也禮上之夕若數十人傾倒几案呌嘯甚喧夢孫從容整衣冠呪曰夢孫為縣令合居此廳爾為鬼神應有祠宇丘墓安得爭此即命復陳設如𥘉自此寂然無患後人安之其治以簡易仁恕為事邑人大悅踰年稱疾求歸田里躬勤耒耜事繼毋甚謹每晨夜具潔服問安侍膳訖乃集諸生講禮朝廷纍召不起保大中卒年八十五贈國子司業沈彬筠陽髙安人讀書能詩屬唐末亂離南遊湘湖隱于雲陽山十餘年與僧虗中齊已為詩侶迄不遇世乃歷名山治方術烈祖鎮金陵命所屬郡縣辟致之彬知其欲取吳國因獻畫山水詩云尺素隱清輝一毫分險阻授校書郎入輔吳世子璉於東宫未幾乞罷以尚書郎致仕禪代之後絶不求進髙安士人多為給其粟帛元宗南遷彬年逾八十詣南昌求見曰臣自處山野世事不預臣妻謂臣曰汝主人郎君今為天子兾接清光死且不朽元宗優禮待之賜粟帛遣還署其子元為祕書省正字彬尤工詩而未嘗喜名如再過金陵詩云玉樹歌終王氣收鴈行髙送石城秋江山不管興亡事一任斜陽伴客愁又都門送客詩云岸柳蕭踈野荻秋都門行客莫回頭一條灞水清如劒不為離人割斷愁皆盛稱於士大夫惜乎簡編散失不得見其全集彬學方外之術迄無所異唯手植一樹命諸子曰吾死葬此及彬卒發之得石椁一上有篆刻八字云開成二年夀椁一所因就葬焉陳貺南閩人性沉淡志操古朴而不苟於仕進一卧廬山三十年學者多師事焉元宗以幣致之布裘鹿鞹進止間肆因獻景陽臺懷古詩云景陽六朝地運極自依依一會皆同是到頭誰論非酒濃沉逺慮花好失前機見此尤宜戒正當家國肥元宗稱善欲授以官貺固不受賜粟帛遣還舊隱卒年七十陳陶世居嶺表以儒業名家陶挾册長安聲詩曆象無不精究常以台鉉之器自負恨世亂不得逞升元中至南昌將詣建康聞宋齊丘秉政凡所進擢不愜士論自料與齊丘不合乃築室於西山日以詩酒為事會宋齊丘出鎮南昌陶志不屈而齊丘亦不為之薦辟陶作詩自詠曰一顧成周力有餘白雲間釣五溪魚中原莫道無麟鳳自是皇家結網踈陶少與水部貟外郎任晼相善嘗以詩遺之云好向明朝薦遺逸莫教千古弔靈均元宗雖聞其詩名而未及召之會有星孛陶歎曰國家其幾亡乎既而果失淮甸陶所居幽邃性尤嗜鮓元宗南遷至落星灣欲有所問而恐陶不盡言因偽使人賣鮓至陶門陶果出啖鮓喜甚賣者曰官舟抵落星矣翁知之乎陶笑曰星落不還元宗至南都未幾殂不還之説果驗陶後以修飬煉丹為事有詩云乾坤見了文章懶龍虎成來印綬踈又云長愛真人王子喬五松山月伴吹簫任他浮世悲生死獨駕蒼龍入九霄又題徐稚亭詩云伏龍山橫洲渚地人如白蘋自生死洪崖成道二千年唯有徐君播青史陶所遁西山先産藥物數十種陶採而餌之開寶中常見一叟角髮𬒳褐與老媪貨藥於市獲錢則市鮓對飲旁若無人既醉行舞而歌曰藍採禾藍採禾塵世紛紛事更多爭如賣藥沽酒飲歸去深崖拍手歌或疑為陶之夫婦云許堅不知其家世或曰晉長史穆之裔形陋而怪或寓廬阜白鹿洞桑門道館行吟自若幘巾芒屩短襴至骭亦無齎裝唯自負布囊常括不解每沭浴不脫衣就溪澗出而暵之或問其故則言天象昭布雖白晝亦常參列人自昧之爾其可祼裎乎堅癖嗜魚或得大魚則全體而烹不加醯鹽熟即啖之逰溧陽下山寺吟詩曰地枕吳溪與越峯前朝恩賜雲泉額南唐以大唐為前朝竹林層建鴈塔髙石室幽棲幾禪伯荒榛蕪沒蒼苔深古池香泛荷花白客有經年説二林落日猿啼情脈脈後或居茅山或入九華適意往返人不能測舊與樊若水相善若水北度後因轉挽于江南遇堅于簡寂觀勉之以仕則顰蹙不答堅嘗至陽羡人不之識一日涉西津凌波濶步若平地然衆昉神之不知其所在云毛炳豐城人也好學不能自給因隨里人入廬山每與諸生曲講苟獲資鏹即市酒盡醉時彭會好茶而炳好酒或嘲之曰彭生説賦茶三斤毛氏傳經酒半升炳聞之小哂而巳自後或逰螺川諸邑遇酒即飲不醉不止嘗宿于酒家大醉悮坐爐炭主人出之翌日尻痛炳疑因酒乖忤遭其笞撻訊之乃知又嘗醉于道旁有里首張谷掖之而起炳瞑目曰起豫者為誰對曰張谷也炳呵之曰毛炳不干於張谷張谷不學於毛炳醉者自醉醒者自醒醒醉之道兩者固殊安用掖為復呵之曰汝可速去無撓豫卧由是人頗重之是真全於酒者也後聚生徒數十講誦於南臺山逮數年自署于齋壁云先生不在此千載只空山因大醉一夕卒有詩集傳于世顔詡魯郡公真卿之後唐末徙居木川詡少孤兄弟數人事繼毋以孝聞雅辭翰謹禮法多循先業逮末年一門百口家法嚴肅男女異序少長敦睦子姪二十餘人皆服儒業每延賓侣寓門下者常十數詡晨暮延揖飲饌燕笑未嘗不躬自接對雖遇姻戚沖孺亦為之冠帶盡禮就所居第依泉石築亭榭開軒四敞則碧鮮叢繞翠微環列蕭爽之趣杜絶塵囂水部貟外郎孟賓于嘗以詩美之云園林蕭爽聞來久欲訪因循二十秋此日開襟吟不盡碧山重疊水長流又司農卿何蒙殿中丞蒯鼇史館孫伯純各為詩序以述其幽隱詡聞子弟有與賓客戲者未嘗靣責手寫韋昭博奕論署于屋壁使之自愧家人未嘗見其喜愠𥘉季父非理據鄉人桑詣邑求治令尹下詡評之詡償以巳緡其訟遂止卒年七十餘鄭元素京兆華原人也少習詩禮避亂南逰隱居于廬山青牛谷髙卧四十餘年採薇食蕨絃歌自若搆椽剪茅於舍後會集古書殆至千餘卷元素溫韜之甥也自言韜發昭陵從埏道下見宫室制度閎麗不異人間中為正寢東西廂列石牀牀上石函中有鐡匣悉藏前世圖書鍾王墨迹𥿄墨如新韜悉取之韜死元素得之為多嗚呼業不素修自羣鹿豕斯謂之隱者樵夫牧子之事爾非吾所謂隱也故隱士儒術出處雖異易地則皆然或曰江夢孫沈彬嘗仕矣而列于隱士劉洞史虛白嘗隱矣而列于儒術何哉曰彬與夢孫志於隱而仕不得已焉洞與虛白志於仕而隱不得巳焉豫何容心乎亦各成其志而已至如陳陶翻然有改而所得多矣志不足言之也南唐書卷之十五
