body:
  text: 南唐書卷之十六義死傳上第十一嗚呼大哉君乎猶天之覆焉猶地之載焉天地以為籠而東西南北鬼方殊域無出於天地之度內則君臣之義孰可逃哉此事君者無適而非君也且人情莫不喜安存而惡危亡也及以身事人而與君同戚則由是而循義由是而死節將以終吾身而巳又豈偷生忍耻以獲罪於天下後世歟禮曰大夫死衆士死制子思曰如伋去君誰與守此君臣之義盡矣雖然仕以行道而致君為堯舜躋時為太平者君子之所欲也所欲者不可必得則不擇地而安之不臨難而免之者亦所以行吾道也故唐虞之際君臣都俞於廟堂之上則所謂守節循義者存之而弗試不幸罹於亂世而人君戚戚於憂勞之地則上焉學士大夫下焉武夫悍卒披肝瀝膽夷險一節忠義皎然貫諸白日之上是亦衰世之意也魏鄭公所以願為良臣而不願為忠臣者可謂有意於致君矣嗚呼三代而下縉紳先生多能言之五代之際霸據角立君無世臣臣無定主而視神器為蘧廬則士之全節者無幾劉仁贍之守孤城孫晟之不負永陵一壞土與夫張彥能皇甫暉孟堅陳喬劉彥貞朱令贇胡則之徒雖非蹈道有足稱者作義死傳劉仁贍字守惠彭城人也父金事吳武王為濠滁二州刺史以驍勇知名仁贍為將輕財重士法令嚴肅頗通兵法事烈祖為左監門衛將軍黃袁二州刺史拜武昌軍節度使平楚之役仁贍以舟師克巴陵撫納降附人皆恱集入掌親軍出鎮夀州先是每歲淮水淺涸分兵屯守謂之把淺監軍吳廷紹以為境上無事虗費糧用悉罷之仁贍以為不可未及報而周師猥至郡人皆恐仁贍神氣間暇部分守禦有若平常群情乃安五代史周師先至而後以仁贍守夀州比先除仁贍而後周師至據江南録野録遺事别録皆與此同當以此書為是彥貞輩不用其言以至喪敗故仁贍軍令益信用周饒計破城南大寨剋獲甚衆仁贍按兵城守世宗圍之數重以方舟載炮自淝河中流擊其城又束巨竹數十竿上施版屋號為竹龍載甲士以攻之又決其水寨入淝河攻之百端自正月至于四月不能下而歲大暑霪雨彌旬周兵營寨水深數尺淮淝暴漲炮舟竹龍皆飄南岸為唐兵所焚周兵多死世宗東趨濠梁以李重進為廬夀都招討使元宗遣元帥齊王景逹等列寨紫金山下為夾道以屬城中而重進與張永德兩軍相疑不協仁贍屢請出戰景逹不許由是憤惋成疾明年正月世宗復至淮上盡破紫金山寨壞其夾道淮兵大敗諸將多見擒而廣陵馮延魯光州張經舒州周祚泰州方訥泗州范再遇等或走或降皆不能守江南君臣亦皆震懾奉表稱臣願割土地輸貢賦以效誠欵而仁贍獨堅守不可下世宗使江南使者孫晟等至城喻仁贍降晟望城中改其辭呼曰無隳臣節援兵即至矣仁贍於是城守益堅仁贍子崇諌幸其父病謀與諸將出降仁贍立命斬之監軍使周廷搆哭于中門救之不得於是士卒皆感泣願以死守三月仁贍病甚喘喘垂死其副使孫羽詐為仁贍書以城降世宗命舁仁贍至帳前歎嗟久之賜以玉帶御馬復使入城飬疾是日卒世宗制曰劉仁贍盡忠所事抗節無虧前代名臣幾人可比豫之南伐得爾為多乃拜仁贍檢校太尉兼中書令天平軍節度使仁贍不能受而卒年五十八世宗遣使弔祭喪事官給追封彭城郡王以其子崇讃為懷州刺史賜莊宅各一區元宗聞仁贍卒哭之慟及贈太師焚其誥曰魂兮有知鑒周惠耶歆吾命耶夜夢仁贍拜墀下若受命然夀州故治夀春世宗以其難尅遂徙城下蔡而復其軍曰忠正曰吾以旌仁贍之節也孫晟𥘉名鳳又名忌密州人也好學有文辭尤工於詩少為道士居廬山簡寂宫嘗畫唐詩人賈島像置于屋壁晨夕事之簡寂宫道士惡晟為妖以杖驅出之易儒服北之趙魏謁唐莊宗于鎮州莊宗以晟為著作佐郎天成中朱守殷鎮汴州辟為判官守殷反伏誅晟乃棄其妻子亡命陳宋之間安重誨惡晟以謂教守殷反者晟也畫其像購之不可得遂族其家晟來奔于吳時烈祖輔政多招四方之士得晟喜甚晟為人口吃遇人不能道寒暄已而坐定談辨風生聽者忘倦烈祖尤愛之引與計議多合意以為右僕射與馮延已並相元宗晟輕延已為人嘗曰金碗玉杯而盛狗屎可乎晟事烈祖元宗二十餘年官至司空家益富驕每食不設几案使衆妓各執一器環立而侍號肉臺盤時人多效之周世宗征淮元宗懼始遣泗州牙將王知朗至滁州奉書以求和世宗不答又遣翰林學士鍾謨文理院學士李德明奉表稱臣不答乃遣禮部尚書王崇質副晟奉表謨與晟等皆言唐願割夀濠楚泗光海六州之地歲貢百萬以佐軍而世宗已取滁楊濠泗諸州欲盡取淮南乃止因留使者不遣而攻夀州益急謨等曰願陛下寬臣五日之誅容臣還取江南表盡獻江北諸州世宗許之遣供奉官安弘道押德明崇質南還而謨與晟皆見留德明等既還元宗悔不肯割地世宗亦以暑雨班師留李重進張永德等分攻廬夀州兵所得楊泰諸州皆不能守唐兵復振重進與永德兩軍相疑有隙永德上書言重進反世宗不聽𥘉晟之奉使也語崇質曰吾行必不免然吾終不忍負永陵一坯土及崇質還而晟留與鍾謨俱至京師館于都亭驛待之甚厚每朝會入閣使班東省官後召見必飲以醇酒已而周兵數敗盡失所得諸州世宗憂之召晟問江南事晟不對世宗怒亟召侍衛軍虞候韓通收晟下獄及其從者二百餘人皆殺之晟臨刑世宗猶遣近臣問之晟終不對神色怡然正其衣冠南望而拜曰臣以死報國乃就刑其後世宗頗憐晟忠悔殺之元宗聞晟死贈魯國公張彥能為楚州守將周師伐淮南諸郡皆降獨楚州不可下周人圍之數月城中兵食殆盡而彥能與其副鄭昭業城守益堅世宗親督兵洞屋穿穴而焚之彥能昭業戰死餘衆皆死誓無降者世宗屠其城嚴兵以戍之元宗嘉彥能忠贈侍中南唐書卷之十六
