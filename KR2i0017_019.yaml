body:
  text: 南唐書卷之十九誅死傳第十五嗚呼三代之際刑不上大夫而霸者之命亦曰無專殺大夫則古之所以任大夫者未嘗不以賢而所以待大夫者未嘗不以禮及其世亂刑濫故殺之之甚有見於春秋者書人以殺殺以其罪也稱國以殺殺不以其罪也是以為人君而不通春秋之義者必蒙首惡之名為人臣而不通春秋之義者必陷誅死之罪後世君子耻於自明而為小人之所誣則賢不肖駢死於市朝而陷其君於首惡之名者無世無之良史所以直筆書之使後世為臣者知法之不可犯為君者知刑之不可濫如陳蕃李固之死君子觀之未嘗不扼腕而歎之董卓王甫之死君子觀之未嘗不憮然而快之是其刑之當否雖千載之後猶足以感發人之喜怒也南唐享國日淺可名之士無幾而誅死太半如宋齊丘陳覺李徴古李德明鍾謨張巒禇仁規王建封范冲敏皇甫繼勳林仁肇潘佑李平皆死於非命就其未死之行以考之則知其所死者不能無當否矣然則南唐之亡非人亡之亦自亡也為國而自去其股肱譬諸排空之鳥而自折其羽翮孰有不困者哉昔孔子適晋至河而還者聞晋殺竇鳴犢舜華也故曰刳胎而麟不至覆巢而鳳不翔君子惡傷其類也作誅死傳禇仁規字可則廣陵人也始為軍中小吏勤幹敏給可𬒳繁使纍除右職出為海陵鹽監使海陵民好爭訟吏多不能直乃以仁規兼縣事所部魚鹽竹葦之地財用所出國家每有大役常賦不能給仁規使行視民家所有舉籍取之事訖則以次償備罔有逋遺以故民不甚怨而供億公費不知限極烈祖喜之及以海陵為泰州遷仁規為刺史不移治所政亦如故晚年國家少事仁規掊克不已多入私門刑罰滋暴加以奢縱宣徽使陳覺有宿嫌密啓其狀侍御史王仲連亦劾之烈祖陽不問而隂欲罷其郡㑹將東巡乃召以為靜江軍都虞候督舟師以從及還都遂留不遣仁規方承恩遇猥𬒳摧折不勝忿恚乃上書自陳無過而為讒佞所間辭甚訐斥烈祖下其事命陳覺充泰州按鞠使仁規聞覺往按歎曰吾嘗孤立所知者主上而巳陳覺首搆吾事而今以屬之何以自明遂自劾即日收付大理賜死妻子徙和州王建封少為軍校驍勇任俠平建州功冠諸將拜信州刺史為人剛鷙無所忌憚及陳覺等矯命討李仁逹建封帥師圍福州與諸將爭功城垂尅而先退諸軍由此潰散遂失晋安元宗大怒陳覺馮延魯皆𬒳流竄而建封不自安元宗召還慰撫之使掌禁兵建封怙罪愈多僣侈時魏岑鍾謨李德明皆當清要而岑詭佞尤甚謨及德明亦輕脫俱不協衆望戶部貟外郎范沖敏頗耿介負氣深疾岑等而與建封相善以建封方𬒳寵任可去羣黨因勸建封上書歷詆用事者請盡去羣小進用正人元宗大怒以其武臣握禁兵不當干預國政流建封池州賜死于路沖敏棄市李德明不知何許人也落魄負大節纍遷兵部貟外郎文理院學士周世宗伐淮甸下滁州元宗懼先遣牙將王知朗奉書于世宗不答未幾楊光舒泰蘄相次潰元宗益懼乃遣德明與鍾謨奉表稱臣請獻夀濠泗楚光海六州以求罷兵世宗亦不答德明與鍾謨皆留行在明年元宗復使孫晟王崇質削去帝號願效貢賦世宗猶不答於是鍾謨等見世宗英武而師甚盛乃曰願陛下寬臣五日之誅還取江南表盡獻江北諸州世宗許之遣供奉官安弘道押德明崇質還江南而謨晟皆見留德明等歸盛稱世宗英武元宗惡之宋齊丘陳覺等皆以割地無益德明賣國以圖利元宗大怒命斬德明于市而益兵以拒周初德明與鍾謨皆以尚書郎待制恃恩用事百官側目號為鍾李及謨還因覆案齊丘黨與追贈德明袁州刺史皇甫繼勳江州節度使暉之子少以父廕為軍校常從暉軍中滁州之役暉力戰甚急繼勳欲遁暉操戈擊之弗及遂逸以暉死事故繼勳恩澤優渥纍遷將軍池饒二州刺史性謹厚勤於為理吏民安輯入為諸軍都虞候數年南唐老將亡殁殆盡繼勳雖少遂拜大將軍資産優贍而錫賚頗優於是營第宅侈車服畜妓樂備珍美擇近郊之地植花構亭珠翠環列擬於王室及王師來伐繼勳保惜資富無效死之志欲後主速降而口不敢發每於衆中但言國數窮促而已或聞敗績則怡愈竊喜或有敢死之士請出效命則杖而拘之由是軍情忿恚百姓切齒近臣屢以為言後主優容之後託以軍旅稀復朝見召之亦不至後主於是不能容乃親巡城勞軍還誘繼勳入宫責其流言不用命之狀收付大理始出門而衆軍之士雲集臠割繼勳頃刻而盡嗚呼天屬之厚不可薄也於其所厚而薄之則其它無不薄矣皇甫繼勳叛父於垂死之際及其事君又可知也忠孝人之大倫而不忠不孝者無容於天地之度內然則繼勳之死豈特人怨哉鍾謨字仲益㑹稽人也僑建康少爽悟博學屬文頴脫時輩元宗寵用之拔自下位纍遷吏部郎中顯德中周師下楊光等州元宗遣謨與李德明奉表於世宗未報而孫晟王崇質繼至謨等謂世宗曰唐畏陛下神武保無二心願歸取表盡獻淮甸之地世宗許之遣德明崇質還江南而晟與謨皆留行在既而江南拒命世宗大怒案誅晟及館中二百餘人同死獨赦謨以為耀州司馬謨在耀州以詩貽其州將其略云翩翩歸盡塞垣鴻殷殷驚開蟄戶蟲渭北離愁春色裏江南家事戰城中江南暨周平世宗召謨授衛尉卿放還國謨作詩以獻其略云三年耀武羣侯服一日廽鑾萬國春南北通歡永無事謝恩歸去老陪臣世宗覽而恱之賜黃金五百兩意將以間其君臣也元宗果銜之謨歸為禮部侍郎判尚書省國政悉秉於中臺相府但紏轄而巳謨既秉權鑄大錢改制度恃其才能挾中朝之勢尤橫恣不法世宗每遣使至必賜詔存問時太子兾參惣庶政謨薦其所知閻式為太子司議郎百司關啓多由之𥘉李德明與謨善德明之死給事中唐鎬與宋齊丘同議至是鎬不自安又頗納賄謨知之面詰其狀鎬大懼及謨復使周以世宗之言覆按齊丘黨與陳覺李徴古以下皆伏誅鎬益懼㑹信州刺史張巒入為天威軍都虞候常詣謨第相歡或至夜分鎬時掌樞要因搆謨與巒謀為不軌元宗疑之太子兾卒從嘉以次當立而謨曰從嘉輕肆請立紀國公從善元宗大怒尚以世宗之故未即加誅乃罷其職為國子司業及世宗崩遂貶謨著作佐郎饒州安置遣中使領侍衛軍十人即日監督上道馳驛發遣家屬自後而去謨時病風眩作絶句十餘章其辭皆悽愴至郡月餘遣人就縊殺之謨尤好古碑奉使中原每道旁碑碣必駐馬歷覽嘗見龜趺大碣半沒水中謨欣然解衣以手捫揣默記其文他日水涸以所録本就證之無差其爽邁如此𥘉使者至謨望拜曰臣無負國使者曰詔問孫晟獨死狀謨復拜曰臣聞命矣遂就縊巒亦賜死于宣州潘佑散騎常侍處常之子氣宇孤峻閉門讀書不營資産文章贍逸尤敏於論議時譽藹然中書舍人陳喬戶部侍郎韓熙載薦之以祕書省正字釋褐俄直崇文館輔後主於東宫後主即位遷虞部貟外郎史館修撰後主納后歷代久無其禮開元禮亦多闕博士陳致雍習知㳂革隨事𥙷正後主使徐鉉與佑參議佑立論以沮之文彩可觀後主竒其議頗見施用由是恩寵日洽改知制誥明年居中用事極論時政無所廽避後主手札敦喻佑七表不止因請休官逺去乃徙佑􅌹知國史悉罷其職時江南衰削國步多艱佑所上諌疏有家國隂隂如日將暮之辭後主惡之又其所薦黜與時輩不協因誣以他事劾佑佑自剄毋及妻子徙饒州佑自言其毋方娠夢古衣冠人告曰我顔延之也與夫人為子及生七歲始能語曰兒悮傷白龍為上帝所罰也因吟詩曰只因騎折玉龍腰謫在人間三十六至是果以三十六歲卒李平𥘉為河中李守貞從事漢隱帝立守貞據城叛隱帝命周太祖討之守貞遣平與朱元奉表來乞師未返而河中平遂留江南越人寇毗陵平自言有武略因以為將固辭乃遷衛尉少卿使領偏師巡江北進逼蘄州周師先遁平入保其城即以為蘄州刺史㑹朱元叛元宗恐其不自安召之還都使者失㫖鎖平送建康元宗慰勉之拜建州節度副使徴為衛尉卿平本好神􅋖修飬之事而動多怪妄自言􅋖人神鬼常與通接潘佑亦好仙平因與親善之言佑父處常今巳為􅋖官而已與佑亦􅋖官也家置靜室人莫能窺佑既獲用請復井田法深抑豪民有買貧户田者使即還之又依周禮造民籍復造牛籍曠土盡令種桑薦平判司農寺以督之命行于下急如星火州縣吏胥因以為姦百姓大擾聚而為亂後主知立法之病即罷之佑復薦平知尚書省由是羣議紛紛以為壞法殃民皆由平始乃先收平下大理使收佑佑自剄平縊于獄妻子徙䖍州明年宥其家廩給之南唐書卷之十九
