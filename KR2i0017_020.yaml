body:
  text: 南唐書卷之二十黨與傳上第十六嗚呼漢以黨錮衰唐以朋黨滅漢唐之亂雖愚者與知焉迨乎利害相攻則爲之而不知其非盖亦蔽於好惡之情而巳南唐之士亦各有黨智者觀之君子小人見矣或曰宋齊丘陳覺李徴古馮延巳延魯魏岑查文徽爲一黨孫晟常夢錫蕭儼韓熈載江文蔚鍾謨李徳明爲一黨而或列爲黨與或各叙于傳者何哉盖世衰道䘮小人阿附以消君子而君子小人反類不合故自小人觀之因謂之黨與而君子未嘗有黨也予之所論一入于黨與則宜無君子而各著于篇者未必皆小人嗚呼弗可不察也作黨與傳宋齊丘豫章人也其父誠爲江西鍾傳副使䘚於任時天下巳亂經籍道熄齊丘獨好學有大志及鍾傳敗齊丘益窮隨衆東下糊口於倡優魏氏烈祖時爲昇州刺史延四方之士齊丘依焉因以鳳皇臺詩見志曰嵯峨壓洪泉岝峉撑碧落宜哉秦始皇不驅亦不鑿上有布政臺八顧背城郭山蹙龍虎健水黒螭蜃作白虹欲吞人赤驥相􅏼爍畫棟泥金碧石路盤磽确倒掛哭月猿危立思天鶴鑿池飬蛟龍栽松棲鸑鷟梁間燕教鶵石罅虵懸殻飬花如飬賢去草如去惡日晚嚴城鼓風来蕭寺鐸掃地驅塵埃剪蒿除鳥雀金桃帶葉摘緑李和衣嚼貞竹無盛衰媚柳先榣落塵飛景陽井草合臨春閣芙蓉如佳人廽首似調謔當軒有直道無人肯駐脚夜半䑕窸窣天隂鬼㪣啄松孤不易立石醜難安着自怜啄木鳥去蠧終不錯曉風吹梧桐樹頭鳴嚗嚗峩峩江令石青苔何淡薄不話興亡事舉首思眇邈吁哉未到此𥚹劣同尺蠖籠鶴羡鳬毛猛虎愛蝸角一日賢太守與我觀槖籥徃徃獨自語天帝相唯諾風雲偶不来寰宇銷一略我欲烹長鯨四海爲鼎鑊我欲取大鵬天地爲矰􅗤安得生羽翰雄飛上寥廓烈祖竒其才以國士待之歙人汪台符投書于烈祖齊丘忌其名頗排斥之齊丘本字超囬台符因是貽書侮之曰聞足下齊大聖以爲名超亞聖以爲字齊丘慙即改字子嵩隨烈祖鎮京口入定朱瑾之難雖叅謀議而怯於鼔鐸故不預戰功烈祖輔政勵精爲理脩舉禮法以遏强衆親附卿士寛徭薄賦人用安輯齊丘頗有力焉烈祖欲進用之而爲徐義祖所惡乃以爲殿直軍判官凢十年義祖䘚始拜右司貟外郎累遷左諌議兵部侍郎居中用事期以相之齊丘自以名望甚淺欲爲退譲以自重乃告如豫章改葬其父因入九華山啓求退居吳主連徴不至元宗時爲大将軍烈祖使元宗親徃敦迫乃起除中書侍郎遷右僕射平章事烈祖出鎮金陵以元宗入輔政委齊丘左右之齊丘於是益樹朋黨潜自封殖時烈祖權位日隆中外皆知有禪代之勢而烈祖恭謹守道懼羣下不恊欲待嗣君齊丘亦盛賛其說與烈祖意合烈祖次子景遷吳主之壻也美姿儀風度和雅烈祖鍾愛特甚齊丘使陳覺爲景遷教授以賈其聲價齊丘叅决時政多爲不法輙歸過於元宗而盛稱景遷之美㡬有奪嫡之計所以然者以吳主少而烈祖老必不能待他日得國授於景遷景遷易制巳爲元老威權無上矣此其日夕之謀也烈祖覺之乃召齊丘如金陵以爲巳副遥兼節度使無所關預従容而已行軍司馬徐玠副使李建勲判官孫晟賈潭吳相王令謀都校周宗之徒相爲推挽决行大事既建齊國以齊丘爲左丞相遷司空徐玠爲右丞相明年烈祖即位徐玠爲使相張居詠張延翰李建勲皆平章事周宗爲樞宻使齊丘但遷司徒而巳自悼失計復耻無功不勝其忿受宣之日聞制辭云布衣時陛下乃一刺史爾今日爲天子可不用老臣矣拂衣而出闔門請罪烈祖但遜辭以喻之不爲改官齊丘乆之計無所出乃更上書請議遷譲皇他郡以絶人望吳世子璉烈祖子壻也又請絶其婚而斥逺之其詞云非獨婦人有七出夫有罪亦可出之聞者莫不大笑居數年復自陳以輔相之重不可不與政烈祖許其入中書視事又以两省事多委給事舎人而中外䌓劇之務皆在尚書省乃求知尚書省事亦許之於是悉取朝廷附巳者分掌六司下及胥史皆用所親吏視事數月有親吏夏昌圖者盗官錢三百萬齊丘特判貸其死烈祖大怒切責所司刑部官吏自劾請罪乆之乃解昌圗坐斬齊丘卧疾不出烈祖遣夀王景遂徃問之許其出鎮本州旬日遂𧺫拜洪州節度使委任羣小政事不治所居舊里愛親坊改爲衣錦坊大啓第宅窮極宏壮居坊中人皆使修飾牆屋門巷極備華潔民不堪命相率逃去坊中爲之空前後四任本州其行事多類此在富貴權要之地三十年唯欲人之順巳其一言不同者必𬒳排擯酷好術數凢天文地理占相卜祝之徒在門下者數十人厚禄以給之相傳言齊丘少時曾夢乗龍上天凢文武百司皆布朋黨每國家有善政其黨輙但言宋公之爲也事有不合羣望者則曰不用宋公之言也每舉一事必知物議不可則羣黨競以巧詞先爲之地及有論議者皆以墮其計中羣臣敢言者常夢錫蕭儼江文蔚韓熈載等十數人而常蕭尤甚夢錫性𥚹而簡言儼無文而辭䌓碎故皆不能勝然雖正人切齒而流俗䟽逺之人猶瞻仰以爲元老故趨附者益多及國家多難因欲遂其窺竊之計䘚以此敗元宗謂近臣曰齊丘之才安能當此大難不過率國中以降自爲功爾窺竊之計與當大難之事皆具陳喬陳覺傳及放歸青陽即舊第之外别院處之重門外鎻穴牆以給食明年自縊死年七十三諡醜謬齊丘𥘉舘于倡妓魏氏藉其貲給遂以爲正室亦封國夫人無子以従子摩詰爲嗣及後主即位召其妻子還建康舘給之連坐者皆宥齊丘爲文有天才而寡學不經師友議論詞尚詭誕多違戾先王之㫖自以古今獨歩書札不工亦自矜衒而嗤鄙歐虞之徒馮延巳亦工書逺勝齊丘而佯爲師授以求媚齊丘謂之曰子書非不善然不能精意徃徃似虞世南其何堪也其狂瞽如此承二君不世之恩而自䧟刑辟識者知其有天道焉嗚呼俗說江南堅甲精兵雖數十萬而長江天塹險過湯池可當十萬國老宋齊丘機變如神可當十萬周世宗欲取江表故齊丘以反間死斯言殆非君子之說閭巷小人之語也龍衮因是著于野錄以欺惑後世而後世之人亦頗信之且民之至愚欺之則易信况齊丘益樹朋黨以賈譽於當時自非特立獨行之士安能知其妄僞哉孔子嘗以郷人皆好之爲未可蓋郷人之情未必公也不如郷人之善者好之則信善矣嗚呼善人吾不得見則齊丘之事安所考信哉蓋亦考其所言與其所行而巳觀其著書云畫者不敢易圖像苟易之必有咎刻者不敢侮木偶苟侮之必貽禍始制作於我又要敬於我又寘禍於我此意以社稷之功自任而無復君臣之禮也又云見食象者食牛不足見戴冕者戴冠不足則窺竊之計於是乎萌矣予以是知齊丘之所言也伐南閩攻仁逹以空其國用逐常夢錫韓熈載江文蔚以間其忠言予以是知齊丘之所行也然則齊丘之死自速辜爾謂之反間者妄也南唐書卷之二十
