body:
  text: 南唐書卷之二十黨與傳上第十六嗚呼漢以黨錮衰唐以朋黨滅漢唐之亂雖愚者與知焉逮乎利害相攻則為之而不知其非蓋亦蔽於好惡之情而巳南唐之士亦各有黨智者觀之君子小人見矣或曰宋齊丘陳覺李徴古馮延巳延魯魏岑查文徽為一黨孫晟常夢錫蕭儼韓熙載江文蔚鍾謨李德明為一黨而或列為黨與或各叙于傳者何哉蓋世衰道喪小人阿附以消君子而君子小人反類不合故自小人觀之因謂之黨與而君子未嘗有黨也豫之所論一入于黨與則宜無君子而各著于篇者未必皆小人嗚呼弗可不察也作黨與傳宋齊丘豫章人也其父誠為江西鍾傳副使卒於任時天下巳亂經籍道熄齊丘獨好學有大志及鍾傳敗齊丘益窮隨衆東下糊口於倡優魏氏烈祖時為升州刺史延四方之士齊丘依焉因以鳳皇臺詩見志曰嵯峨壓洪泉岝峉撑碧落宜哉秦始皇不驅亦不鑿上有布政臺八顧背城郭山蹙龍虎健水黑螭蜃作白虹欲吞人赤驥相􅏼爍畫棟泥金碧石路盤磽確倒掛哭月猿危立思天鶴鑿池飬蛟龍栽松棲鸑鷟梁間燕教雛石罅蛇懸殼飬花如飬賢去草如去惡日晚嚴城鼓風來蕭寺鐸掃地驅塵埃剪蒿除鳥雀金桃帶葉摘緑李和衣嚼貞竹無盛衰媚柳先榣落塵飛景陽井草合臨春閣芙蓉如佳人廽首似調謔當軒有直道無人肯駐腳夜半鼠窸窣天隂鬼㪣啄松孤不易立石醜難安著自憐啄木鳥去蠧終不錯曉風吹梧桐樹頭鳴嚗嚗峩峩江令石青苔何淡薄不話興亡事舉首思眇邈吁哉未到此𥚹劣同尺蠖籠鶴羡鳬毛猛虎愛蝸角一日賢太守與我觀槖籥往往獨自語天帝相唯諾風雲偶不來寰宇銷一略我欲烹長鯨四海為鼎鑊我欲取大鵬天地為矰􅗤安得生羽翰雄飛上寥廓烈祖竒其才以國士待之歙人汪台符投書于烈祖齊丘忌其名頗排斥之齊丘本字超回台符因是貽書侮之曰聞足下齊大聖以為名超亞聖以為字齊丘慙即改字子嵩隨烈祖鎮京口入定朱瑾之難雖參謀議而怯於鼓鐸故不預戰功烈祖輔政勵精為理修舉禮法以遏强衆親附卿士寬徭薄賦人用安輯齊丘頗有力焉烈祖欲進用之而為徐義祖所惡乃以為殿直軍判官凡十年義祖卒始拜右司貟外郎纍遷左諌議兵部侍郎居中用事期以相之齊丘自以名望甚淺欲為退讓以自重乃告如豫章改葬其父因入九華山啓求退居吳主連徴不至元宗時為大將軍烈祖使元宗親往敦迫乃起除中書侍郎遷右僕射平章事烈祖出鎮金陵以元宗入輔政委齊丘左右之齊丘於是益樹朋黨潜自封殖時烈祖權位日隆中外皆知有禪代之勢而烈祖恭謹守道懼羣下不協欲待嗣君齊丘亦盛贊其說與烈祖意合烈祖次子景遷吳主之壻也美姿儀風度和雅烈祖鍾愛特甚齊丘使陳覺為景遷教授以賈其聲價齊丘參决時政多為不法輒歸過於元宗而盛稱景遷之美幾有奪嫡之計所以然者以吳主少而烈祖老必不能待他日得國授於景遷景遷易制巳為元老威權無上矣此其日夕之謀也烈祖覺之乃召齊丘如金陵以為巳副遙兼節度使無所關預從容而已行軍司馬徐玠副使李建勳判官孫晟賈潭吳相王令謀都校周宗之徒相為推挽决行大事既建齊國以齊丘為左丞相遷司空徐玠為右丞相明年烈祖即位徐玠為使相張居詠張延翰李建勳皆平章事周宗為樞密使齊丘但遷司徒而巳自悼失計復耻無功不勝其忿受宣之日聞制辭云布衣時陛下乃一刺史爾今日為天子可不用老臣矣拂衣而出闔門請罪烈祖但遜辭以喻之不為改官齊丘久之計無所出乃更上書請議遷讓皇他郡以絶人望吳世子璉烈祖子壻也又請絶其婚而斥逺之其詞云非獨婦人有七出夫有罪亦可出之聞者莫不大笑居數年復自陳以輔相之重不可不與政烈祖許其入中書視事又以兩省事多委給事舍人而中外繁劇之務皆在尚書省乃求知尚書省事亦許之於是悉取朝廷附巳者分掌六司下及胥史皆用所親吏視事數月有親吏夏昌圖者盜官錢三百萬齊丘特判貸其死烈祖大怒切責所司刑部官吏自劾請罪久之乃解昌圗坐斬齊丘卧疾不出烈祖遣夀王景遂往問之許其出鎮本州旬日遂起拜洪州節度使委任羣小政事不治所居舊里愛親坊改為衣錦坊大啓第宅窮極宏壯居坊中人皆使修飾牆屋門巷極備華潔民不堪命相率逃去坊中為之空前後四任本州其行事多類此在富貴權要之地三十年唯欲人之順巳其一言不同者必𬒳排擯酷好術數凡天文地理占相卜祝之徒在門下者數十人厚祿以給之相傳言齊丘少時曾夢乘龍上天凡文武百司皆布朋黨每國家有善政其黨輒但言宋公之為也事有不合羣望者則曰不用宋公之言也每舉一事必知物議不可則羣黨競以巧詞先為之地及有論議者皆以墮其計中羣臣敢言者常夢錫蕭儼江文蔚韓熙載等十數人而常蕭尤甚夢錫性𥚹而簡言儼無文而辭繁碎故皆不能勝然雖正人切齒而流俗疏逺之人猶瞻仰以為元老故趨附者益多及國家多難因欲遂其窺竊之計卒以此敗元宗謂近臣曰齊丘之才安能當此大難不過率國中以降自為功爾窺竊之計與當大難之事皆具陳喬陳覺傳及放歸青陽即舊第之外别院處之重門外鎖穴牆以給食明年自縊死年七十三諡醜謬齊丘𥘉館于倡妓魏氏藉其資給遂以為正室亦封國夫人無子以從子摩詰為嗣及後主即位召其妻子還建康館給之連坐者皆宥齊丘為文有天才而寡學不經師友議論詞尚詭誕多違戾先王之㫖自以古今獨步書札不工亦自矜衒而嗤鄙歐虞之徒馮延巳亦工書逺勝齊丘而佯為師授以求媚齊丘謂之曰子書非不善然不能精意往往似虞世南其何堪也其狂瞽如此承二君不世之恩而自陷刑辟識者知其有天道焉嗚呼俗說江南堅甲精兵雖數十萬而長江天塹險過湯池可當十萬國老宋齊丘機變如神可當十萬周世宗欲取江表故齊丘以反間死斯言殆非君子之說閭巷小人之語也龍衮因是著于野録以欺惑後世而後世之人亦頗信之且民之至愚欺之則易信况齊丘益樹朋黨以賈譽於當時自非特立獨行之士安能知其妄僞哉孔子嘗以鄉人皆好之為未可蓋鄉人之情未必公也不如鄉人之善者好之則信善矣嗚呼善人吾不得見則齊丘之事安所考信哉蓋亦考其所言與其所行而巳觀其著書云畫者不敢易圖像苟易之必有咎刻者不敢侮木偶苟侮之必貽禍始制作於我又要敬於我又置禍於我此意以社稷之功自任而無復君臣之禮也又云見食象者食牛不足見戴冕者戴冠不足則窺竊之計於是乎萌矣豫以是知齊丘之所言也伐南閩攻仁逹以空其國用逐常夢錫韓熙載江文蔚以間其忠言豫以是知齊丘之所行也然則齊丘之死自速辜爾謂之反間者妄也南唐書卷之二十
