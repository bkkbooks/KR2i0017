body:
  text: 南唐書卷之二十一黨與傳下第十七陳覺宋齊丘之客也齊丘薦為楚王景遷教授纍遷兵部侍郎宣徽使覺在外姦佞苛酷及居家不能制義於一妻其妻李氏妬悍親執庖㸑不置妾媵宋齊丘嘗選三婢豫之頗有容質李氏亦無戁色奉事三婢禮如舅姑晨夕承侍未嘗輒離左右人問其故則曰此令公寵幸之人見之若面令公敢倨慢耶三婢不自安求還宋第覺唯唯聽從而巳李仁逹據福州齊丘因薦覺有智略可使喻㫖於仁逹必不勞寸刃坐致闕下元宗許之乃以覺為福州宣喻使既至說仁逹入覲仁逹曰安撫未定請俟它年入覲覺還至建安耻說之不行乃矯制發建汀撫信之兵往討之既而諸軍皆潰士之戰死者無幾國用遂為一空於是鎖覺送建康中外皆謂其必誅而齊丘上表為請乃赦之流覺于蘄州未幾復用如𥘉及救夀春又與朱元有私隙而窘之太甚卒致元叛淮甸既陷舉國震恐齊丘等因之以圗變覺與李徴古俱為樞密副使徴古每於言議無復臣禮覺請元宗深居後宫委國事於宋公臣時得入奉從容談釋老而已元宗以羣情方撓不欲暴其事及使中原回乃罷近職覺以世宗之命告元宗曰江南連年拒命知是宰相嚴續所為可殺以謝過元宗知其與續有宿嫌也不信鍾謨請覆實其事乃遣謨告謝責巳言非續之罪世宗大驚曰續果能如是乃忠於所事也何罪之有朕為天下主肯教人殺忠臣乎謨還報元宗乃下令數覺前後罪惡貶饒州安置使殺于路李徴古冝春人也升元末第進士時宋齊丘廣樹黨與以張聲勢徴古常出入門下保大中與陳覺同掌機密淮甸兵起劉彥貞敗死人心惱懼元宗歎曰吾家國一至於此因泣下徴古曰陛下當以兵力拒敵泣有何益杯酒過量耶乳保不至耶元宗變色左右皆戰栗徴古亦自若又與陳覺乘間言社稷禍在朝夕請陛下燕居深宫國事盡付宋齊丘以紓喪亂元宗以戎事未戢隱忍不發及畫江罷兵鍾謨至自京師判尚書兼三省之政權勢特甚尤切齒齊丘黨與常曰人臣窺國理不可容及陳覺奉使中原欲矯世宗之命殺嚴續謨乞復使周覆實其事齊丘黨與遂敗貶徴古洪州殺之馮延巳字正中廣陵人也父令頵事本郡為軍吏烈祖署為歙州鹽鐡院判官禆將樊思藴作亂燒營而火及令頵第叛卒皆釋兵救火其得人心如此時刺史骨言病甚中外不知存否人心惱惱延已年十四徒步入見言復傳言教出謝將吏人情乃安及長有辭學多伎藝烈祖以為祕書郎使與元宗逰處纍遷駕部郎中元帥府掌書記與陳覺友善自結於宋齊丘以固恩寵同府在巳上者稍以計遷出之元宗愛其多能而嫌其輕脫貪求特以舊人不能離也孫晟面數之曰君常鄙晟晟知之矣晟文筆不如君也技藝不如君也談諧不如君也諛佞不如君也然上置君於親賢門下者期以道藝相輔不可誤邦國大計也聞者韙其言烈祖季年亦惡之復為常夢錫彈劾必欲斥去未果而烈祖殂元宗即位延已喜形於色未聽政屢入白事一日數見元宗不悅曰書記自有常職此各有所司何其繁也由是少止遂與宋齊丘更相推唱拜諌議大夫翰林學士復與其弟延魯交結魏岑陳覺查文徽侵損時政時人謂之五鬼保大四年自中書侍郎拜平章事時論不平出鎮撫州亦無善政延已無才而好大言及再入相乃言巳之智略足以經營天下而人主躬親庶務宰相備位何以致理於是元宗悉以庶政委之奏可而巳延巳遲疑顧望責成胥吏之手又常笑烈祖戢兵以為齷齪無大略安陸之役喪兵數千而輟食咨嗟者旬日此田舍翁安能成大事如今上暴師數萬於外而宴樂擊鞠不輟此則真英雄主也故蠧國殃民實此之由為相之後動多徇私而故人親戚殆於謝絶與弟延魯如仇讐延魯所生乃延巳之繼毋也亦至踈隔既失湖湘人皆歸咎延巳自劾元宗復使親政割地之後始乞罷相乃罷為宫傅逾年卒年五十七著樂章百餘闋其鶴沖天詞云曉月墜宿雲披銀燭錦屏幃建章鐘動玉繩低宫漏出花遲又歸國謡詞云江水碧江上何人吹玉笛扁舟逺送瀟湘客蘆花千里霜月白傷行色明朝便是關山隔見稱於世元宗樂府辭云小樓吹徹玉笙寒延巳有風乍起吹皺一池春水之句皆為警册元宗嘗戲延巳曰吹皺一池春水干卿何事延巳曰未如陛下小樓吹徹玉笙寒元宗恱𥘉蕭儼深惡延已常廷斥之及儼為大理卿斷獄失入舉朝皆欲誅儼獨延已力爭以為赦前失入罪不當死儼終獲免人皆韙之以謂裴冕損怨無以加此延魯延已異母弟也𥘉為江都判官纍遷水部貟外郎中書舍人延魯鋭於進趨常欲用事四方以要功名延巳詰曰士以文行飾身勤恪居職則寵光至矣何用行險以圖祿利延魯曰兄自能如此弟不能愔愔待循資為宰相也建州之役雖查文徽尸其事而延魯實贊之閩人先苦王氏亂政聞唐師至皆伐木開道壺漿奉迎既尅建州軍無節制大掠數日民不堪命故雖下其地而人皆解體劉從效李仁逹之徒得以鳩集其民專據郡縣者因其隙也及陳覺矯命討晋安表言朝夕可克元宗不得巳發諸路兵應之延魯亦請行拜南面監軍使李仁逹求救於越越人遣兵助守既而延魯魏岑王崇文等各領兵萬數四靣俱至圍城數匝聲動天地有國以來出師之盛未之有也延魯等各務為已功掎角不相應諸將皆怠莫肯用命故兵勢雖盛而城久不下越之救兵無所施力欲出不可越人復以舟師浮海而至旁岸阻濘不可登延魯軍中集射之舟人戢矢如蝟延魯曰城所以不下者恃此救也今不與之戰則褁糧坐甲何為哉不如却軍俟其登岸盡殺之城必降矣禆將孟堅諫曰賊勢巳窮堅壁困之功在漏刻延魯不聽越人登岸果致死力延魯遇敵先走其下皆潰孟堅死之諸軍相次亦潰士之戰死者無幾而軍資器械委棄略盡元宗大怒命鎖延魯陳覺至建康韓熙載劾奏請置之死宋齊丘固爭乃流延魯于舒州未幾復用為東都留守延魯𥘉至自晋安身𬒳五木鎖鑰甚固延巳歎曰弟不肯為循資宰相一至於此兄弟由是有隙淮甸兵起延魯棄楊州削髮為沙門逃歸周人執之歸于京師時誚之曰執節分符始作大軍之帥披緇削髮潜為行腳之僧割地之後世宗以為刑部侍郎遣歸報聘遂留金陵拜戶部侍郎建隆𥘉李重進來乞師元宗命延魯出告其使曰吾不相救非乏兵也大丈夫不得志而反固有之矣但不得其時爾昔周世宗𥘉崩人心未一上黨作亂大兵北征君不以此時反今天下晏然乃以一城之地抗萬乘之師此自速死爾吾安能救速死之人乎太祖皇帝親征延魯入貢太祖曰爾國連吾叛臣乎延魯徐曰陛下徒問之而未知之乃以實對太祖頷之因曰朕以大軍渡江爾國能拒朕乎延魯曰重進天下之姦雄陛下一鼓平之蕞爾江南安足以抗天威但士大夫感其主恩有必死之志陛下能棄數萬之卒與之血戰則可矣且大江設險風波不常儻進未尅城退乏糧道亦官守之責也太祖笑曰聊戲卿爾吾與江南大義巳明何至於此乃頒師以上皆見陳彭年别録魏岑字景山鄆州人也篤學強識而拙於屬文常逰覽四方凡天下山川勝勢風土美惡無所不知避亂淮南署郡從事久不得志數以計䇿干宋齊丘薦授校書郎尤好諛佞善揣人意元宗即位鋭意天下有尅復中原之志岑請親祀南郊元宗曰俟天下為一然後告謝天地及下南閩意以為諸國可指麾而定岑因侍宴自言臣少逰元城好其風物陛下平中原日臣獨乞任魏州元宗許之岑趨墀下拜謝人皆以為佞保大六年李守貞乞師以岑兼㳂淮巡撫使聞守貞敗罷為屯田使入為兵部侍郎拜樞密副使後事亡查文徽不知何許人也用宋齊丘薦授元帥府掌書記遷祕書郎元宗即位拜中書舍人保大中閩人連重遇朱文進弒其君曦遣使告亂馮延巳請執其使以伐閩俄以民疫寢其議文徽獨以為可討王延政首亂宜攻自建州議者多不從唯馮延魯贊之翰林待詔臧循者與文徽同閈嘗賈於閩具知山川險易為陳進兵之計文徽因是決行邊鎬帥洪州屯兵與文徽㑹建安之民苦王氏亂政皆伐木開道以迎我師遂下建陽方且傳檄諭福州而王延政先遣統軍使吳承祐以逰兵巡福州境紿曰唐為我討賊大軍至矣福州信之禆將林仁翰殺連重遇函其首歸承祐延政以其子繼昌守福州親帥衆以拒文徽文徽始以福州之亂伐閩至此延政巳平福州五郡之兵大集敵勢甚盛文徽等次于蓋竹退復屯建陽啓求濟師臧循監偏師屯邵武縣縣民擒之斬于建州市元宗復遣祖全恩何敬洙率萬人至建陽與延政隔溪水而陳全恩使建陽降將孟堅潜師出其後禆將武彥思馬存貴以輕鋭繼之腹背夾擊延政大敗退而城守福州復亂李仁逹殺繼昌及吳承祐以卓儼明為主儼明老僧也徒衆數千目有重瞳垂手過膝故推立之既而無統御之略仁逹復殺之而自稱留後延政益不振建州之險要曰西巖延平津相繼下俄克建州執王延政歸于建康漳泉汀皆平而唯福州羈縻而巳遂以文徽為撫州刺史入為諌議大夫拜建州節度使及陳覺矯命敗績福州遂屬吳越後二年福州詐言吳越戍兵亂殺李仁逹而遁文徽與劒州刺史陳誨帥舟師應福州以兵出迎誨曰越人謨信謨信無信也閩人語音未可速進文徽曰久則生變乘其未定亟取之留誨屯江口進至西門伏兵發文徽𬒳擒誨與越人戰大敗之獲其將馬先進等元宗送先進等還越越亦歸文徽後事亡南唐書卷之二十一
