body:
  text: 南唐書卷之二十二歸明傳上第十八嗚呼生草昧之世事偏據之國君臣上下冥行而巳矣及其一覩聖人之化而得其所歸則何異於離蔀屋之幽即天日之鑒哉故南唐之士及事皇朝者皆謂之歸明而歸明之士未必皆善也作歸明傳蕭儼廬陵人也甫十歲詣廣陵以童子擢第及長志量穩正交不苟合授祕書省正字烈祖受禪遷大理司直拜刑部郎中明清平恕號稱職烈祖季年性辨急羣臣多貽訶責陳覺居近職不自安請告數月烈祖殂覺以宣遺詔日出參儼劾曰陳覺側聆私室以俟升遐請案其罪不許元宗即位委政齊王景遂馮延巳魏岑之徒因以隔絶中外儼上書極論遂出聽政升元之法禁以良人為賤賣奴婢者通官作劵至是馮延魯等欲廣置妓妾因矯遺制許民私賣巳子儼駁曰此非大行之命延魯矯為之爾昔延魯為東都判官上疏貧民不自給者聽鬻已子大行問臣臣曰往者陛下出府金以贖民子故得天下歸心大寶自至今乃許民賣子以資豪民非防微之道也由是延魯之請不行今復行之故知其矯先旨也議者以遺詔巳出不可改遂行烈祖山陵儼與韓熙載江文蔚同定禮儀諡法遷大理卿兼給事中因斷獄失入用事者欲誅之賴宰相馮延巳固爭以謂赦前失入罪不當死遂貶南昌令因歸葬廬陵幞巾素𥚑詣郡廳設拜敬守桑梓言談服御不改鄉俗會宴故老姻舊語笑雍穆俄復舊官後主𥘉嗣位屢與嬖幸對奕儼入白事舉奩投于地後主大怒曰汝與魏徴孰愈儼從容曰臣若非魏徴陛下亦非太宗矣後主默然罷奕儼秉身方直彈奏不阿百官貴戚斂祍避之歸皇朝以老病居鄉里因訟至郡言辭舛錯郡倅不知其疾以為愚謬乃詰之曰江南用汝輩為正卿不亡何待卒年七十至無一金劉承勳不知何許人也美風度善數計事烈祖為郡從事改糧料判官出納無弊號為稱職遷德昌宫使南唐自吳建國保有江淮籠山澤之利帑藏頗盈德昌宫其外府也金帛泉貨多在焉禪代之後邦國新造而簿籍淆亂鉤校不明承勳由是多入私家盜用無算家畜妓樂逮百數人每置一妓費數百緡而珠金服飾亦各稱此承勳善為詭佞常以寶貨遺賂權要故雖朱門甲第窮極富侈而久弗之譴太祖皇帝既平荆湖詔江南具舟運湖中米承勳請行乃督巨艘數百柁自長沙抵迎鑾本以姦心預自結於皇朝為異時計及金陵平承勳歸于京師首陳運米事以為巳績太祖曰此李煜勤王之職豈汝功耶特弗敘用既而窮困祼袒丐食於路不勝其苦凍餒而卒邵拙宣城人也孤峭不撓博通經史飲酒常至百盞偶沉􅒬遂絶飲雖筵宴終日唯茶漿而巳著書埒韓柳有詩三百篇尚書郎孫邁為之序命曰廬嶽集曹郎趙慶以詩貽之云邁古文章金鸑鷟出羣行止玉麒麟歸皇朝就應制科有司以聞未詔而卒郡將哀之籍其裝得拙手書史傳文集三百卷藏于官府時悼其苦學能文而不得逹于名位或議其詩有萬國未得雨孤雲猶在山之句斯為應矣門人袁氏買地葬之舒雅世為宣城人姿容秀發以才思自命因隨計金陵以所學獻于吏部侍郎韓熙載熙載一見如疇昔館給之雅性巧黠應答如流熙載待之為忘年之交出入卧內曽無間然熙載性懶不拘禮法常與雅易服燕戲猱雜侍婢入末念酸以為笑樂或云熙載所著格言半雅之辭逮數年會熙載知貢舉以雅為第一朝野無間者以雅之才為當也歸皇朝守舒州出見山水竒秀田疇沃壤遂有終焉之志考滿以本官掌靈仙觀卒盧絳字晉卿南昌人也讀書略通大義不事事常以博奕角抵為務鄉里鄙之絳慙憤入廬山國學與諸葛濤蒯鼇相善諸生篋笥稍豐輒強取之山下桑門亦苦其無賴號為廬山三害會朱弼為國子助教規其過遂亡去往還澗壁遇大雪乏薪絳恃膂力踊折簷桶燒之病痁且死夜夢白衣婦人頗有姿色歌菩薩蠻勸絳樽酒其辭云玉京人去秋蕭索畫簷鵲起梧桐落欹枕悄無言月和殘夢圎背燈惟暗泣甚處砧聲急眉黛小山攢芭蕉生暮寒歌數闋因謂絳曰子之疾食蔗即愈詰朝求蔗食之疾果差逮數夕又夢前白衣麗人曰妾乃玉真也他日富貴相見於固子坡絳寤襟懷豁然唯不測固子坡之説後入金陵詣後主上書陳京口至澗壁要衝之地宜立柵屯戍其餘利害數十事書上未報復為書詣光政陳喬喬與語數日大竒之因表署為本院承旨經營制置頗見幹績俄轉沿江諸營兵馬監押絳於是召募無賴少年便習舟楫水道者得馬雄王川軍等數千人立為偏禆使督卒伍日習水戰節以金鼓麾以旗幟廽舟轉戈皆如節制時有一舟應節稍遲即斬其舟長復試之可使泝逆流蹈巨浪常於海門遮獲越人船舫鹽貨獻于金陵後主賞其功拜上柱國及王師克池州授陵波軍都虞候沿江都部署王師屢攻秦淮口水柵絳數拒之皇甫繼勳鄭彥華等忌絳功名出巳説後主遣絳出援丹陽絳率所部百艘為八字陳突圍出至京口麾兵三戰越人三北就拜絳太師自絳出建康水陸之攻愈急絳還赴難會宣州叛乃授絳宣州節度使討平之金陵既平諸郡皆下絳獨不順殺歙州刺史龔慎儀謀奔嶺表朝廷數遣使喻旨絳遂降授冀州團練使會龔慎儀姪頴為右讃善大夫上言求復季父之讐乃命斬絳絳臨刑有白衣婦人同斬姿貌宛如所夢問其受刑之地即固子坡也婦人姓耿名玉真其夫死與前婦之子通當極法與絳同斬焉劉茂忠廬陵安城人也貌魁雄善用大矟剽略旁縣頗為民患縣吏捕獲之械送本郡會赦減死論時上江羣盜趙晟蕭榮等聚徒數百郡縣捕之彌年不獲茂忠於是自陳擒晟等以贖餘罪郡將釋之示以恩信茂忠感憤因亡入賊中與捕吏為內應討平之署茂忠諸色捕捉軍頭又廬陵有吳先等招集亡命居鷓鴣洞四出攻剽茂忠掩擊殆盡遂斬先持其首詣郡奏授吉州兵馬監押繕理城隍戎事整肅遷袁州萍鄉制置以捍潭衡之境因縱獵出界潭人拒之茂忠怒乘勢大略至灃陵而還潭衡巡撫使祖洎惡其犯境欲襲取之會冬至日意茂忠宴飲乃帥步騎數千亟趣萍鄉屯寨皆遁候騎告急座皆惱懼茂忠飲啖自若酒數行報騎又至將士請行茂忠笑曰日旰矣此時出師主將不利潛出竒兵躡潭人後焚橋梁伏道左然後躬擐甲胄去寨十里與潭師遇合戰逮晡勝負未決茂忠下馬持大矟深入敵陳所向無前潭人奔還而橋路已絶旁遇伏兵腹背擊之殺傷殆盡遂執其副使以軍禮見之後主嘉其功拜袁州刺史未幾金陵平後主入朝吉州刺史申屠令堅約茂忠為亂事未發而令堅卒茂忠遂降舟次淮口修謁稱袁州刺史關津吏擲刺于地大罵曰亡國之俘何刺史也遂以榜帖贊見將階其廳署朱復叱之令執杖庭參至京師授登州刺史數月朱抵罪羈管適隸登州茂忠令日兩衙立於庭下朱慙憤死南唐季世每除節度刺史皆質其家于都城茂忠守袁州金陵城破而亡其妻女茂忠意為軍士所略及歸京師潛使女奴賣衣於諸營得其狀以聞遂取還之後因據枵夜坐庭下忽一人自外躍劒刺茂忠茂忠以􅑎自悍連舉數四而枵逮絶刃不能中會左右執送軍巡按斬之乃略女兵也茂忠微時所持大矟後將有鬪戰則夜響嘗與潭人桃戰親持奮擊前無堅敵左右中者皆洞胸脅茂忠因敗其膊至是疾作臂不能舉數日卒李元清濠州人也周世宗征淮南其父聚鄉里義士襞𥿄為鎧號白甲軍與官軍同守濠州水寨周人驅駱駝為前鋒濠人驚駭不戰而潰元清渡江居建業趫捷有勇走及奔馬常入梁宋伺周人情狀開寶中以吉州永新與潭衡接境因改永新為制置以元清充使每數月一託病不衙潛入潭部人不之知先是夏賦準貢見緡民苦之元清奏請納帛一匹折錢一千以為定制常以便宜科率民無怨望總諸科物十餘萬數漕運入金陵以濟國用金陵平例歸京師元清偽為目疾召驗之揮刃而目不瞬遂放歸濠上卒陸昭符金陵秣陵人開寶末朝廷問罪江南惱懼後主遣潘慎修入貢且求緩師昭符時為進奏使以其物數難辦請市於富民石守信家得絹十萬匹後主以昭符善計度纍加任使金陵平盧絳入歙州胡則據江州昭符集逃民欲應絳則朝廷遣使宣喻示以恩信昭符送𣢾朝廷祿之昭符嘗為常州刺史常州當吳越之衝城邑荒虗戶不滿千數昭符為理寬簡招納散亡未幾戶口蕃庶如𥘉一日坐郡廳忽遇雷電繞庭官吏震懾昭符撫案叱之雷霆頓止及舉案幃得大鐡索重數百斤人尤駭之而昭符神色自若命收鐡索付官庫以示後人南唐書卷之二十二
