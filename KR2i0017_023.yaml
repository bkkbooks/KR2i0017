body:
  text: 南唐書卷之二十三歸明傳下第十九朱弼字君佐建安人也精䆒五傳旁貫數經開寳中詣金陵一舉以關頭中第授國子助教知廬山國學生徒數百苦無頼軰如盧絳諸葛濤蒯鼇之徒事飲博多横逆學官曠職循縁而巳及弼至性本嚴重動持禮法毎升堂講釋生徒環立各執疑難問辯鋒起弼應聲解説莫不造理雖題非巳出而事實聮綴宛若宿構以故諸生誠服皆循規範絳等稍稍引去四方肄業者多造焉弼短一足時謂之跛子先生及建康平例入京師授衡山簿居官廉潔事上無謟毎俸給不充則虗腹度日妻子服御寒暄不繼時皆歎服出見衡嶽崇峻遂有終老之志秩滿致仕守嶽廟令食本官俸數年䘚四壁蕭然衣衾棺歛皆資于故人君子以爲清嗚呼學校者國家之矩範人倫之大本也唐末大亂干戈相㝷而橋門璧水鞠爲茂草馴至五代儒風不競其來乆矣南唐跨有江淮鳩集典墳特置學官濱秦淮開國子監復有廬山國學其徒各不下數百所統州縣徃徃有學方是時廢君如吳越弑主如南漢叛親如閩楚亂臣賊子無國無之唯南唐兄弟輯睦君臣奠位監於他國最爲無事此亦好儒之効也皇朝初離五代之後詔學官訓校九經而祭酒孔維檢討杜鎬苦於訛舛及得金陵藏書十餘萬卷分布三舘及學士舎人院其書多讐校精審編秩完具與諸國本不類昔韓宣子適魯而知周禮之所在且周之典禮固非魯可存而魯果能存其禮亦爲近於道矣南唐之藏書何以異此孟賓于湖湘連上人少孤力學事毋以孝聞天祐末工部侍郞李若虚廉察沅湘賓于以詩數百篇自命爲金鼇集獻之若虗稱善採警冊數聮譽諸朝廷由是詩名益振明年春擢進士第未㡬以離亂還鄉㑹馬殷開府辟爲零陵従事亦不顯用及馬氏敗賓于自歸南唐授豐城簿遷塗陽令黷貨當死時李昉事皇朝爲翰林學士乃賓于同年進士也聞賓于縲紲以詩遺之曰㓜携書劒别湘潭金牓標名第十三昔日聲塵喧洛下近年詩價滿江南後主見詩貸之復其官俄致仕隱于玉笥山自號羣玉峯叟踰年後主以水部貟外郞𧺫之金陵平歸老連上秘閣馬致恭以詩送之其落句云今日還家莫惆悵不同初上渡頭船䘚年八十三賓于好賄毎爲佐令輙有贓汚故雖負詩名人不多之初歸江南生子名歸唐亦䏻詩肄業廬山國學甞得瀑布詩云練色有窮處寒聲無㫁時隣房生亦得此聮遂交爭之助教不䏻辨訟于江州各以全篇意格定之而歸唐爲勝開寳中授秘書省正字出爲吉州民掾歸于京師累遷大理丞時江州郡吏有仕于皇朝者指歸唐曰此乃訟詩生也以罪貶袁州司戸䘚潘賁字子文宜陽人也七歲能詩性謇特自負才器以藐勢位既而動多屯躓五舉猶爲白丁及屬皇朝左僕射沈義倫竒其才致門下賁凡三過省帷每廷試輙以目疾止故賁嘗與故人書云八叨殿試三對天顔㑹沈公薨遺表薦之表上而賁疾作謂人曰挾冊爲儒聖僞兩朝白首塲屋不登一第豈非命耶吾受沈公知遇過厚生不䏻報死得事公於泉下足矣誥下而賁巳䘚年六十沈氏諸子買棺葬之蒯鼇宣城人也善屬文有才思嘗曰夫文章者所以逹道徳之本發才智之藴使㫖勝於辭理過於文爲得之矣其餘摘裂章句鉤校屬耦綺麗悅目清新泪耳則吾不知也聞者善之鼇少亦無頼常與盧絳爲友後頗改過以廉直自勵苟寒燠畧備則一介不干於人甞有歙州龍尾硯友人欲之而口不言鼇心與之而未及遺一日友人不告而去鼇乃悔恨躡至數舎與之時有不給而躬謁於人苟愆其期後雖固予亦弗之受其抱信義如此歸于皇朝擢進士第以殿中丞致仕隱于廬山數年䘚羅頴南昌人也經傳渉獵與里人彭㑹友善皆以詞賦稱開寳中詣金陵舉進士第例以黄衣守選及王師問罪後主銜璧頴再應郷舉下第道經漢髙祖廟頴題詩其落句云嫚侮羣豪誇大度可怜容得辟陽侯少頃輙自免冠鞠伏廟廷口陳自咎之言掖而去數日䘚頴初就舉金陵試銷刑鼎賦儒術之本論有司以鄧及爲第一頴爲末綴牓既上後主遷頴第二手筆圈其名頴是夕夢黒氣環身有長人自上挽而出之盧郢金陵人也好學有才藝而膂力過人善吹鐡笛乾徳中後主以韓徳覇爲在城烽火使常督無頼軰旦暮廵警諸科士人㣲犯禁徃徃罹鞭朴㑹徳覇出郢調笛不輟使數䘚捕郢郢奮肱搏之䘚不䏻逼郢遂去後與黃夢錫等自國子監出行遇徳覇不避其呵導徳覇駐騎詬曰汝等乞索軰殊不知憲制敢無禮耶因叱左右收郢等郢等爭投瓦石擊走其導従毆徳覇傷目徳覇詣後主訴之後主譲曰國子監先帝教育賢材之地孤亦頼此軰與之共治汝闘監前是必越分陵辱士人既爲戎帥不䏻自扞宜其見毆遂罷徳覇職郢由是横肆益甚明年春試王度如金玉賦郢唱第爲第一徐鉉娶郢妹鉉嘗受後主㫖撰文數日不䏻就因語郢郢曰願試爲之因弄百鈞石毬以較力少頃引酒一巵復弄如初若是者數四鉉視之曰非吾徒也其何䏻爲且試詰之郢曰既就矣命筆吏口授而書之鉉大驚遂以郢文進後主謂鉉曰語勢酋健似非卿作鉉以實對郢由是知名歸皇朝累遷南全守頗著治蹟病䘚丘旭字孟陽宣城農家子也少以畜産爲事弱冠始讀書學爲辭章因隨計金陵凡九舉而曳白者六七然自勵彌篤不以爲耻既而困窘無進取意秋試將邇寡嫂劉敬問行期旭以匱乏告劉曰苟濟榮望雖孤兒可鬻况貲用乎於是罄槖遣之旭不得巳再就郷舉明年春試徳厚載物賦旭爲第一釋褐歸郷而家人猶疑其未調暨郷老酋長謁賀郡吏改署里名乃知上第及金陵平例歸于京師𥙷鎮将數年詣南曹叙理㑹吕公蒙正判銓聞旭名問曰汝非䏻爲賦者乎對曰江南獻賦適爲第一吕公曰乆聞爾名謂爲古人乃並世耶因令取所集旭初著文多爲人取去無留巾笥者輒於書肆訪之獲舊本獻焉吕公憐之薦授令錄遷京秩䘚于衡州旭甞纂自古賢俊遺言爲賓朋宴語行于世其爲詞賦得有唐程度體後人以爲法黄載字元吉其先江夏人世爲農載弱冠釋耒耜就學于廬山事􅐚人劉元亨篤志自勵精䆒經史䏻爲文章一舉不中第嘆曰士之賤也乆矣規模於蹇淺之文去取於有司之手其於造道不亦逺哉遂不復進取肄業之士多従之事毋至謹承顔侍膳温凊寢處未始離左右兄弟數人皆仰載貲給或勉之就仕則曰天下分裂終合爲一一繫仕版死生以之寧適意乎及金陵平祿食之家多俘于京師而載乃安處丘園人皆以爲先知㑹毋䘚廬于墓側哀毁過禮服闋出逰湘潭州將辟致庠序講說之際未甞敷演注䟽肆口成言曽不滯泥性頗嗜酒函丈之間常置􅎆缶興来輙飲而義理不亂受業者以百數苟獲貲鏹飲歠之外一無所蓄或有假貸則欣然予之不計其多少待人均一無所愛惡雖遇横逆亦巽謝焉復喜廛逰市肆當壚者靡不相善豪民富啇間遺緡帛則轉施貧民毎出入城郭丱童㓜稚隨而悅之甞詣郡署見一媪䇿羸荷校執於公徒載問其故媪泣曰夫負官緡而死于獄亡家鬻子猶有餘責當盡命而巳載愴然乃罄槖償官而免之一夕自城醉歸聞嬰兒哭于莾中載驚呼左右寂無一人自脫衣褁歸獲一女以賄購乳於隣婦迨數歳教以書計女功長擇所配竟不知其誰氏因冒姓黄載甞釋禮經獲百千一旦爲人竊取載笑曰彼無貲者也将藉此以成家亦我之徳了不介意諸生醵㑹市羊以備饌載夢一羊前跪請命晨出見羊跪伏如所夢載以巳緡償諸生而畜其羊又畜一犬亦頗馴載毎出入則羊犬聮隨潭倅夏中正爲作犬羊僊序以記其事天禧末載因醉䘚于宗人黄茂舘年七十載妻與其子先䘚嗚呼視日月而知衆星之蔑拂清風而知羣隂之晦然則覩真人之作者偏據之國不足與有明矣余作歸明傳士之得其所歸可謂詳矣如湯悅張洎徐鉉特不著其本末者以其顯名皇朝而行事具于國史也此弗敢述姑志其故國之聞爾湯恱其先陳州西華人父殷文圭唐末有才名悅本名崇義仕南唐爲宰相建隆初避宣祖廟諱改姓湯悅甞撰楊州孝先寺碑世宗親征淮南駐驛于寺讀其文賞歎之及畫江請平元宗使悅入貢世宗待之加禮自淮上用兵凡書檄教誥皆出於悅特爲典贍切於事情世宗毎覽江左章奏形於嗟重後仕皇朝奉太宗皇帝敕撰江南錄十卷自言有陳夀史體張洎南譙人王師圍金陵洎在城中作蠟丸帛書使間道走契丹求援爲邉候所得及金陵平太祖皇帝召洎詰責以書示之洎神色自若徐曰此臣在國所作上曰汝國稱藩事大何乃反覆如此汝實爲之咎將誰執洎曰當危急之際望延歲月之命亦何計不爲臣所作帛書甚多此特其一爾上善曰無欺也南唐之士歸于皇朝洎最顯焉徐鉉字鼎臣開寳末王師圍金陵後主命朱令贇盡括江西土客義師一十五萬作巨筏㳂江而下以援金陵未至而圍益急後主選近臣入朝且求緩師鉉請行後主曰卿之行也當止上江救兵勿令東下鉉曰今社稷所頼惟此救兵何可輙止後主曰既以和解爲名而復徵兵入援自成矛盾於汝豈不危乎鉉曰臣此行未必䏻紓國難但置之度外爾後主泣下授鉉左僕射叅知左右内史事鉉固辭乃以隱士周惟簡假給事中爲鉉副鉉等至京師對於便殿鉉懇述江南事大之禮甚恭且無王祭不共之罪徒以𬒳病未任朝謁非敢拒詔乞緩兵以全一邦之命其言甚切太祖皇帝與語反覆數四鉉辭氣愈壮曰李煜無罪陛下出師無名太祖大怒請畢其說鉉曰煜効貢賦二十餘年以小事大如子事父未有過失柰何見伐太祖曰爾謂父子者爲两家可乎鉉等無以對而退後仕皇朝與湯悅同奉敕撰江南錄至於李氏亡國之際不言其君之過但以歷數存亡論之君子有取焉南唐書卷之二十三
