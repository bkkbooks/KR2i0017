body:
  text: 南唐書卷之二十三歸明傳下第十九朱弼字君佐建安人也精䆒五傳旁貫數經開寶中詣金陵一舉以關頭中第授國子助教知廬山國學生徒數百苦無賴輩如盧絳諸葛濤蒯鼇之徒事飲博多橫逆學官曠職循緣而巳及弼至性本嚴重動持禮法每升堂講釋生徒環立各執疑難問辨鋒起弼應聲解說莫不造理雖題非巳出而事實聮綴宛若宿構以故諸生誠服皆循規範絳等稍稍引去四方肄業者多造焉弼短一足時謂之跛子先生及建康平例入京師授衡山簿居官廉潔事上無諂每俸給不充則虗腹度日妻子服御寒暄不繼時皆歎服出見衡嶽崇峻遂有終老之志秩滿致仕守嶽廟令食本官俸數年卒四壁蕭然衣衾棺斂皆資于故人君子以為清嗚呼學校者國家之矩範人倫之大本也唐末大亂干戈相尋而橋門璧水鞠為茂草馴至五代儒風不競其來久矣南唐跨有江淮鳩集典墳特置學官濱秦淮開國子監復有廬山國學其徒各不下數百所統州縣往往有學方是時廢君如吳越弒主如南漢叛親如閩楚亂臣賊子無國無之唯南唐兄弟輯睦君臣奠位監於他國最為無事此亦好儒之效也皇朝初離五代之後詔學官訓校九經而祭酒孔維檢討杜鎬苦於訛舛及得金陵藏書十餘萬卷分布三館及學士舍人院其書多讐校精審編秩完具與諸國本不類昔韓宣子適魯而知周禮之所在且周之典禮固非魯可存而魯果能存其禮亦為近於道矣南唐之藏書何以異此孟賓于湖湘連上人少孤力學事毋以孝聞天祐末工部侍郎李若虛廉察沅湘賓于以詩數百篇自命為金鼇集獻之若虗稱善採警冊數聮譽諸朝廷由是詩名益振明年春擢進士第未幾以離亂還鄉㑹馬殷開府辟為零陵從事亦不顯用及馬氏敗賓于自歸南唐授豐城簿遷塗陽令黷貨當死時李昉事皇朝為翰林學士乃賓于同年進士也聞賓于縲紲以詩遺之曰幼携書劒别湘潭金榜標名第十三昔日聲塵喧洛下近年詩價滿江南後主見詩貸之復其官俄致仕隱于玉笥山自號羣玉峯叟踰年後主以水部貟外郎起之金陵平歸老連上祕閣馬致恭以詩送之其落句云今日還家莫惆悵不同初上渡頭船卒年八十三賓于好賄每為佐令輒有贓汚故雖負詩名人不多之初歸江南生子名歸唐亦䏻詩肄業廬山國學嘗得瀑布詩云練色有窮處寒聲無斷時鄰房生亦得此聮遂交爭之助教不䏻辨訟于江州各以全篇意格定之而歸唐為勝開寶中授祕書省正字出為吉州民掾歸于京師纍遷大理丞時江州郡吏有仕于皇朝者指歸唐曰此乃訟詩生也以罪貶袁州司戶卒潘賁字子文宜陽人也七歲能詩性謇特自負才器以藐勢位既而動多屯躓五舉猶為白丁及屬皇朝左僕射沈義倫竒其才致門下賁凡三過省帷每廷試輒以目疾止故賁嘗與故人書云八叨殿試三對天顔㑹沈公薨遺表薦之表上而賁疾作謂人曰挾冊為儒聖僞兩朝白首場屋不登一第豈非命耶吾受沈公知遇過厚生不䏻報死得事公於泉下足矣誥下而賁巳卒年六十沈氏諸子買棺葬之蒯鼇宣城人也善屬文有才思嘗曰夫文章者所以逹道德之本發才智之藴使㫖勝於辭理過於文為得之矣其餘摘裂章句鉤校屬耦綺麗悅目清新泪耳則吾不知也聞者善之鼇少亦無賴常與盧絳為友後頗改過以廉直自勵苟寒燠略備則一介不干於人嘗有歙州龍尾硯友人欲之而口不言鼇心與之而未及遺一日友人不告而去鼇乃悔恨躡至數舍與之時有不給而躬謁於人苟愆其期後雖固豫亦弗之受其抱信義如此歸于皇朝擢進士第以殿中丞致仕隱于廬山數年卒羅頴南昌人也經傳涉獵與里人彭㑹友善皆以詞賦稱開寶中詣金陵舉進士第例以黃衣守選及王師問罪後主銜璧頴再應鄉舉下第道經漢髙祖廟頴題詩其落句云嫚侮羣豪誇大度可憐容得辟陽侯少頃輒自免冠鞠伏廟廷口陳自咎之言掖而去數日卒頴初就舉金陵試銷刑鼎賦儒術之本論有司以鄧及為第一頴為末綴榜既上後主遷頴第二手筆圈其名頴是夕夢黑氣環身有長人自上挽而出之盧郢金陵人也好學有才藝而膂力過人善吹鐡笛乾德中後主以韓德霸為在城烽火使常督無賴輩旦暮巡警諸科士人微犯禁往往罹鞭朴㑹德霸出郢調笛不輟使數卒捕郢郢奮肱搏之卒不䏻逼郢遂去後與黃夢錫等自國子監出行遇德霸不避其呵導德霸駐騎詬曰汝等乞索輩殊不知憲制敢無禮耶因叱左右收郢等郢等爭投瓦石擊走其導從毆德霸傷目德霸詣後主訴之後主讓曰國子監先帝教育賢材之地孤亦賴此輩與之共治汝鬪監前是必越分陵辱士人既為戎帥不䏻自扞宜其見毆遂罷德霸職郢由是橫肆益甚明年春試王度如金玉賦郢唱第為第一徐鉉娶郢妹鉉嘗受後主㫖撰文數日不䏻就因語郢郢曰願試為之因弄百鈞石毬以較力少頃引酒一巵復弄如初若是者數四鉉視之曰非吾徒也其何䏻為且試詰之郢曰既就矣命筆吏口授而書之鉉大驚遂以郢文進後主謂鉉曰語勢酋健似非卿作鉉以實對郢由是知名歸皇朝纍遷南全守頗著治蹟病卒丘旭字孟陽宣城農家子也少以畜産為事弱冠始讀書學為辭章因隨計金陵凡九舉而曳白者六七然自勵彌篤不以為耻既而困窘無進取意秋試將邇寡嫂劉敬問行期旭以匱乏告劉曰苟濟榮望雖孤兒可鬻况資用乎於是罄槖遣之旭不得巳再就鄉舉明年春試德厚載物賦旭為第一釋褐歸鄉而家人猶疑其未調暨鄉老酋長謁賀郡吏改署里名乃知上第及金陵平例歸于京師𥙷鎮將數年詣南曹叙理㑹吕公蒙正判銓聞旭名問曰汝非䏻為賦者乎對曰江南獻賦適為第一吕公曰久聞爾名謂為古人乃並世耶因令取所集旭初著文多為人取去無留巾笥者輒於書肆訪之獲舊本獻焉吕公憐之薦授令録遷京秩卒于衡州旭嘗纂自古賢俊遺言為賓朋宴語行于世其為詞賦得有唐程度體後人以為法黃載字元吉其先江夏人世為農載弱冠釋耒耜就學于廬山事􅐚人劉元亨篤志自勵精䆒經史䏻為文章一舉不中第嘆曰士之賤也久矣規模於蹇淺之文去取於有司之手其於造道不亦逺哉遂不復進取肄業之士多從之事毋至謹承顔侍膳溫凊寢處未始離左右兄弟數人皆仰載資給或勉之就仕則曰天下分裂終合為一一繫仕版死生以之寧適意乎及金陵平祿食之家多俘于京師而載乃安處丘園人皆以為先知㑹毋卒廬于墓側哀毁過禮服闋出逰湘潭州將辟致庠序講說之際未嘗敷演注疏肆口成言曽不滯泥性頗嗜酒函丈之間常置􅎆缶興來輒飲而義理不亂受業者以百數苟獲資鏹飲啜之外一無所蓄或有假貸則欣然豫之不計其多少待人均一無所愛惡雖遇橫逆亦巽謝焉復喜廛逰市肆當壚者靡不相善豪民富啇間遺緡帛則轉施貧民每出入城郭丱童幼稚隨而悅之嘗詣郡署見一媪䇿羸荷校執於公徒載問其故媪泣曰夫負官緡而死于獄亡家鬻子猶有餘責當盡命而巳載愴然乃罄槖償官而免之一夕自城醉歸聞嬰兒哭于莾中載驚呼左右寂無一人自脫衣褁歸獲一女以賄購乳於鄰婦逮數歲教以書計女功長擇所配竟不知其誰氏因冒姓黃載嘗釋禮經獲百千一旦為人竊取載笑曰彼無資者也將藉此以成家亦我之德了不介意諸生醵㑹市羊以備饌載夢一羊前跪請命晨出見羊跪伏如所夢載以巳緡償諸生而畜其羊又畜一犬亦頗馴載每出入則羊犬聮隨潭倅夏中正為作犬羊仙序以記其事天禧末載因醉卒于宗人黃茂館年七十載妻與其子先卒嗚呼視日月而知衆星之蔑拂清風而知羣隂之晦然則覩真人之作者偏據之國不足與有明矣余作歸明傳士之得其所歸可謂詳矣如湯悅張洎徐鉉特不著其本末者以其顯名皇朝而行事具于國史也此弗敢述姑志其故國之聞爾湯恱其先陳州西華人父殷文圭唐末有才名悅本名崇義仕南唐為宰相建隆初避宣祖廟諱改姓湯悅嘗撰楊州孝先寺碑世宗親征淮南駐驛于寺讀其文賞歎之及畫江請平元宗使悅入貢世宗待之加禮自淮上用兵凡書檄教誥皆出於悅特為典贍切於事情世宗每覽江左章奏形於嗟重後仕皇朝奉太宗皇帝敕撰江南録十卷自言有陳夀史體張洎南譙人王師圍金陵洎在城中作蠟丸帛書使間道走契丹求援為邉候所得及金陵平太祖皇帝召洎詰責以書示之洎神色自若徐曰此臣在國所作上曰汝國稱藩事大何乃反覆如此汝實為之咎將誰執洎曰當危急之際望延歲月之命亦何計不為臣所作帛書甚多此特其一爾上善曰無欺也南唐之士歸于皇朝洎最顯焉徐鉉字鼎臣開寶末王師圍金陵後主命朱令贇盡括江西土客義師一十五萬作巨筏㳂江而下以援金陵未至而圍益急後主選近臣入朝且求緩師鉉請行後主曰卿之行也當止上江救兵勿令東下鉉曰今社稷所賴惟此救兵何可輒止後主曰既以和解為名而復徵兵入援自成矛盾於汝豈不危乎鉉曰臣此行未必䏻紓國難但置之度外爾後主泣下授鉉左僕射參知左右內史事鉉固辭乃以隱士周惟簡假給事中為鉉副鉉等至京師對於便殿鉉懇述江南事大之禮甚恭且無王祭不共之罪徒以𬒳病未任朝謁非敢拒詔乞緩兵以全一邦之命其言甚切太祖皇帝與語反覆數四鉉辭氣愈壯曰李煜無罪陛下出師無名太祖大怒請畢其說鉉曰煜效貢賦二十餘年以小事大如子事父未有過失奈何見伐太祖曰爾謂父子者為兩家可乎鉉等無以對而退後仕皇朝與湯悅同奉敕撰江南録至於李氏亡國之際不言其君之過但以歷數存亡論之君子有取焉南唐書卷之二十三
