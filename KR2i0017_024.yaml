body:
  text: 南唐書卷之二十四方術傳第二十嗚呼天下之治方術者多矣寡䏻備神明之德而徒駭天下之觀聽兹為怪誕譸張而巳聖人中其身以為天下之標準則制行於外者莫非可行之常也人之所不可行者聖人䏻之而弗為故六合之外存而不論六合之內論而弗議斯道甚夷而後世猶有詭辭抗說高出於天地之外者是豈聖人之罪歟嗚呼甚哉民之好怪也久矣其徒紛紛其說譊譊縱橫蔓衍未始不自以聖人為宗也彼既自誣於聖人而不以聖人之道攻之孰知其非聖人之道哉是故由堯舜禹湯文王周公孔子孟軻者吾知其為正道反是者吾知其為他道君子正而不他作方術傳吳廷紹為太醫令不甚知名烈祖喉中癢澀進藥無驗廷紹進楮實湯服之頓愈宰相馮延巳嘗病腦痛醫工旁午纍日不痊及廷紹至先詰其家人曰相公酷嗜何物對曰每食山雞鷓鴣廷紹進薑豆湯一服立差群醫默志其方他日以楮實治喉癢以薑豆治腦痛皆無效或問其故廷紹曰烈祖常服餌金石吾故以木之陽實勝之木王則金絶矣馮公嗜山雞鷓鴣二鳥皆食烏頭半夏薑豆乃解其毒爾群醫大服木平和尚保大中至金陵知人禍福死生所言輒驗傾都瞻禮闐塞街巷金帛之遺日積萬數元宗召見于百尺樓百尺樓元宗新建以備登覽制度宏壯木平指曰此宜望火初不喻其意後數載淮甸兵起龍安山置烽候以應江北常登此樓以觀動靜又慶王尚幼元宗問夀命幾何木平曰郎君聰明智哲預知九十年事遂書九十一字豫之保大九年慶王卒年十九其書九十而繼之以乙字者乃乙其九十而為十九也李冠善吹中管嘗預宋齊丘夕宴當坐吹噓聲韻悠揚清入霄漢元宗聞其名屬閩楚多故戎務日繁不獲召見大司徒李建勳以詩送之曰勻如春澗長流水怨似秋枝欲斷蟬可惜人間容易聽清聲不到御樓前見禮於士大夫類如此周世宗時多逰梁宋每乘醉長嘯於市人罕知者道士談紫霄泉州人也與陳守元相善事王昶封正一先生閩亡寓廬山棲隱洞其徒百餘人有道術醮星宿事黑煞神君禹步魁罡禁沮鬼魅禳祈災福頗知人之夀夭武昌軍節度使何敬洙寵婢獲怒置井中死人無知者建隆初敬洙遘疾召紫霄中夜被髮燃燈靜室見女厲自訴為祟之由紫霄詰旦具言之敬洙曰信然乃丹書符送之敬洙即愈有僧於溪滸創亭苦大石橫直纍工不䏻平紫霄往見曰斯固易也因以指捻訣含水噀之命鎚其石應手如粉後主聞之召至建康賜之道號階以紫金比蜀之杜光庭皆讓而不受凡所獲醮祭之施轉以給四方賓旅舍陵既下紫霄無疾卒人謂之尸解莫知其夀算歸葬之日有祥雲白鶴盤繞送之潘扆常逰江淮間自稱野客落托有大志鄭匡國為海州刺史扆往謁之匡國不甚禮遇館於外廄一日從匡國獵匡國之妻因詣廄中覘扆栖泊之所弊榻莞席竹籠而巳籠中有錫彈丸二顆餘無所有扆還發籠視之大驚曰定為婦人所觸幸吾攝其光鋩不爾斷婦人頸矣圉人異之聞于匡國匡國密召扆問曰先生其有劒術乎扆曰素所習也匡國曰可一觀乎扆曰可當齊戒三日趨近郊平曠之地請試之匡國如期召扆俱至東城扆自懷中出二錫丸置掌中俄有氣二條如白虹微出指端須臾旋轉繞匡國頸其勢奔掣其聲錚鏦匡國據鞍危坐神魄俱喪謝曰先生神術固已知之幸收其威靈扆笑舉一手二白氣復貫掌中少頃復為二錫丸匡國自此禮遇逾厚表薦于烈祖扆居紫極宫逮數年遂失其術不復䏻劒矣臨死上言乞桐棺葬近地後當尸解烈祖命中貴人護葬于金波園保大中發塜視之骸骨尚在迄無異焉女冠耿先生鳥爪玉貌宛然神仙保大中逰金陵以道術修錬為事元宗召見恱之常止於卧內先是大食國進龍腦油二器其味辛烈服之蠲疾元宗祕惜先生見之曰此非嘉者當為陛下致之乃以絹囊懸龍腦於屋棟頃刻瀝液如注香味逾所進者嘗搦雪為鋌爇之成金指痕隱然猶在又因宫人掃除取箕中糞壤燒為白銀開寶中金陵內庫猶有耿先生糞壤銀元宗嘗購真珠數升欲得圎者先生曰易致也就取小麥淘洗以銀釜炒之勻圎皆成蚌胎未幾有孕將誕謂左右曰我子非常産夕當有異倐忽雷電繞室大雨傾澍詰旦儼然空腹人莫見其所生元宗殂先生不復入宫往來江淮竟不知其所之嗚呼耿先生之事著矣鄭文寶自謂親授於徐率更而徐率更目覩其事雖然鄭氏之編載之而徐氏不録是可疑也豈鄭氏欲重其言而引徐以為辭歟抑徐氏恐惑後世而弗著於書歟是未可知也南唐書卷之二十四
