body:
  text: 南唐書卷之二十五談諧傳第二十一嗚呼談諧之説其來尚矣秦漢之滑稽後世因為談諧而為之者多出乎樂工優人其廓人主之𥚹心譏當時之弊政必先順其所好以攻其所蔽雖非君子之事而有足書者作談諧傳申漸髙不知何許人也在吳為樂工吳多內難伶人不得志漸高常吹三孔笛賣藥於廣陵市升元初案籍編括漸髙以善音律為部長時關司斂率尤繁啇人苦之屬近甸亢旱一日宴于北苑烈祖謂侍臣曰畿甸雨都城不雨何也得非獄市之間違天意歟漸髙乘談諧進曰雨懼抽稅不敢入京烈祖大笑即下令除一切額外稅信宿之間膏澤告足當時以謂優旃􅃮城優孟葬馬無以過也烈祖受禪吳朝老將唯周本為元勳烈祖患其難制因其勸進至金陵曲宴便殿引鴆賜本本疑之旁取一巵均酒之半跪進曰臣與陛下千載一遇陛下不飲此酒殆非君臣同德也烈祖變色左右莫知所從漸髙舞袖升殿併飲之內金盞於懷趨出烈祖密使親信詣漸髙第賜藥解之不及是夕漸髙腦潰而卒李家明廬州西昌人談諧敏給善為諷辭元宗好逰家明常從初景遂景逹景逖皆以皇弟加爵而恩未及臣下因置酒殿中家明俳戲為翁媪列坐諸婦進飲食拜禮頗繁翁媪怒曰自家官自家家何用多拜耶江浙謂舅為官謂姑為家元宗笑曰吾為國主恩不外覃於是百官進秩有差家明毋死未葬會元宗乘間書草字於便殿家明紿曰臣竊署字與之不疑元宗以麻𥿄大押字命試學焉家明輒於草字上署曰宣州上供庫支錢二百緡付李家明葬毋元宗大笑因以賜焉建州王延政僣號元宗遣將平之俘延政于建康封鄱陽王命公卿宴其第延政吝于賜豫家明謔之曰賤工無伎優賜叵富然告大王乞取一物延政曰汝何求家明曰大殷平天冠今巳無用家明敢取為優服延政默然慙恨而罷自是怏怏病卒元宗賞花後苑率近臣臨池垂釣臣下皆登魚唯元宗獨無所獲家明因進詩曰玉甃垂鈎興正濃碧池春暖水溶溶凡鱗不敢吞香餌知是君王合釣龍元宗大喜賜宴極歡嘗見牛晚卧美蔭元宗曰牛且熱矣家明乘談諧曰曽遭寧戚鞭𫾣角又𬒳田單火燎身間向斜陽嚼枯草近來問喘為無人相輔皆慙宋齊丘無子晚年一子輒死逾月猶哭齊王景逹勉之不止家明曰臣能止之矣乃作大𥿄鳶署其上云欲興唐祚革強吳盡是先生起廟謨一箇孩兒拚不得讓皇百口合何如尹延範族吳氏齊丘為謀因以誚焉乘風放之故墜齊丘中庭齊丘見之哭亦止從元宗遷南都時巳失江北十四郡舟楫多行南岸至趙屯因輟樂停觴北望皖公山謂家明曰好青峭數峯不知何名也家明應聲對曰龍舟輕颭錦帆風正值宸逰望逺空廽首皖公山色翠影斜不到夀杯中元宗慙之俯首而過後主即位家明老而無寵楊名髙本名復名髙其優名也寓黃幡綽著笑林頗行于時辭鄙不載王感化善謳歌聲韻悠揚清振林木繫樂部為歌板色元宗嗣位宴樂擊鞠不輟嘗乘醉命感化奏水調詞感化唯歌南朝天子愛風流一句如是者數四元宗輒悟覆杯歎曰使孫陳二主得此一句不當有銜璧之辱也感化由是有寵元宗嘗作浣溪沙二闋手寫賜感化曰菡蓞香銷翠葉殘西風愁起碧波間還與容光共憔悴不堪看細雨夢廽清漏永小樓吹徹玉笙寒漱漱淚珠多少恨倚欄干手捲珠簾上玉釣依前春恨鎖重樓風裏落花誰是主思悠悠青鳥不傳雲外信丁香空結雨中愁廽首緑波春色暮接天流後主即位感化以其詞札上之後主感動賞賜感化甚優彭利用廣陵人也顯德中周師下淮南遂奔建康僑廬陵利用性朴鄙頗拘古禮雖燕居常拱手正坐對家人稚子下逮奴隸言必據書史斷章破句以代常談俗謂之掉書袋因自為彭書袋每出逺塗雖冒雨雪不徹冠幘或喻之曰跋涉勞頓當從簡易利用對曰有禮則安無禮則危焉可悖之以為先聖之罪人哉或問其髙姓對曰隴西之遺苗昌邑之餘胄又問其居處對曰生自廣陵長僑螺渚其僕嘗有過利用責之曰始豫以為紀綱之僕人百其身賴爾同心同德左之右之今乃中道而廢侮慢自賢故勞心勞力日不暇給若而今而後過而勿改豫當循公滅私撻諸市朝任汝自西自東以遨以逰而巳時江南士人每於宴語必道此以為戲笑利用喪父客弔之曰賢尊窀穸不勝哀悼利用對曰家君不幸短命諸子糊口四方歸見相如之壁空餘仲堪之棺實可痛心疾首不寒而栗苟泣血三年不可再見遂大慟客復勉之曰自寬哀戚兾闋喪制利用又曰自古毀不滅性杖而後起卜其宅兆而安措之雖則君子有終然而孝子不匱三年不改何日忘之又大㱆欷弔者於是失笑會鄰家火災利用往救徐望之曰煌煌然赫赫然不可嚮邇自鑽燧而降未有若斯之盛其可撲滅乎又嘗與同志逺逰逮至一舍俄不告而返詰旦復至或問之故利用曰忽思朱亥之椎猶倚陳平之戶切恐數鈞之重轉傷六尺之孤其言可哂者類如此利用雖舉進士之才調鄙俚多類俳優故凡六上不第一夕宴寢而卒年六十嗚呼古今一道也學古而不知其變祗為腐儒而巳彭利用摘裂章句不曉理道原其用心蓋亦苦學而陋者也徒以其言類俳優可為戲笑故附談諧傳云南唐書卷之二十五
