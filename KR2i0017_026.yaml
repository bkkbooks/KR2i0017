body:
  text: 南唐書卷之二十六浮屠傳第二十二嗚呼浮屠之道我知之矣合萬法於一心而虗不失照起一心為萬法而照不失虗豈為淺見道哉昧者曽不知此而毀形骸糜金帛説因果以為法飾土偶以為佛將以蘄福利耶而妖孰甚焉將以蘄超脫耶而愚孰大焉此梁武齊襄之徒所以得罪於天下後世也作浮屠傳袁宏曰浮屠佛也章懷太子曰浮屠則佛陀也聲之轉耳傳曰齋戒修而梁國亡非釋迦之罪也然則浮屠之法豈固為後世患哉衰亂之君迷惑而不反則壞法易紀常由於此南唐有國蘭若精舍漸盛於烈祖元宗之世而後主即位好之彌篤輒於禁中崇建寺宇延集僧尼後主與周后頂僧伽帽披袈裟課誦佛經跪拜頓顙至為瘤贅親削僧徒厠簡試之以頰少有芒刺則再加修治其手不抄常作佛印而行百官士庶稍稍效之募道士願為僧者豫二金僧人犯姦有司具牘則曰僧尼姦淫本圗婚嫁若論如法是從其欲但勒令禮佛百拜輒釋之由是姦濫公行無所禁止諸郡斷死刑必先奏牘詳覆無疑適幸遇其齋日則於宮中對佛像燃燈以逹旦為驗謂之命燈若火滅則依法不滅則貸死富商大賈犯法者往往厚賂左右內官竊續其燈而獲免者甚衆開寶初有淮北僧號小長老自言慕化而至朝夕入論六根四諦天堂地獄循環果報之説後主大喜謂之一佛出世身被紅羅銷金衣後主誚其太奢答曰陛下不讀華嚴經安知佛富貴因説後主廣施𣑽剎營造塔像自是囷庾漸虗財用耗斁又請於牛頭山大起蘭若千餘間廣聚僧徒日設齋供食有不盡者明日再具謂之折倒識者謂折倒乃敗徴也及王師渡江即其寺為營署又有北僧就采石磯建石塔且云自幼草衣藿食不渾凡俗後主遺之齋供一無所受王師尅池州繫浮橋于石塔金陵受圍後主召小長老問禍福對曰臣當以佛力禦之乃登城大呼周麾數四後主令僧俗軍士念救苦菩薩滿城沸涌未幾四面矢石俱下復召小長老麾之稱疾不起始疑其誕遂殺之淨德尼院凡八十餘衆皆宫中人出家者也諸王公卿處子往往在焉都城將陷亦積薪於院庭後主與之約曰如有不虞宫中舉火為應吾與汝輩當俱焚死是日保儀黃氏焚積書于宫中淨德遙觀其煙焰遂爇積薪皆赴火死無一人肯脫者城中有僧千數表乞被堅執鋭以死國難後主不許僧玄寂姓髙自言髙駢族人升元中受業升元寺性爽悟博通經藏保大中詔講法華經授左街僧録內供奉講經論明教大師賜紫時法禁寬弛僧尼壞戒律者甚衆玄寂屢干憲法有司惜其才輒貰之後主召入問華嚴經玄寂口説𣑽行一品多賜金帛由是益自恣日以狂飲為事大醉則十數小兒隨之玄寂行歌于路曰酒秃酒秃何榮何辱但見衣冠成古丘不見江河變陵谷與羣兒互相應和旁若無人坐是落僧職出居長干寺常與狂生籍地酣飲醉死于石子岡僧應之姓王其先南閩人能文章習柳氏筆法以善書冠江左初舉進士一黜于有司投册罵曰吾不能以區區章句取程於庸人遂學為浮屠保大中授文章應制大德賜紫凡禱祠章疏一筆即就意如宿構元宗喜楞嚴經命左㒒射馮延巳為序其略曰首楞嚴經者自為菩薩密因始破阿難之迷終證菩提之悟然則阿難古佛也豈有迷哉迷者悟之對也迷苟不立悟亦何取是故因迷以設問憑悟而明解皇上聰明文思探賾索隱雲散日朗塵開鏡明以為大賚四方未為盛德普濟一世始曰至仁或啓佛乘必歸法要敕應之書鏤版既成上之元宗歎曰是深得公權之法者也吾聞公權嘗以筆諌穆宗為之改容今效其法尚可想見其風采應之書名由是益振遷右街僧録固辭求居奉先西庵許之應之多著述尤喜音律嘗以讃禮之文寓諸樂譜其聲少下而終歸於𣑽音讃念協律自應之始嗚呼豫聞故老説南唐好釋而吳越亦然南唐每建蘭若必均其土田謂之常住産錢氏則廣造堂宇修飾塑像而已曰桑門取給十方何以産為至今建康寺院跨州隔縣地過豪右浙僧歲出逺近斂率於民雖然田業頗厚而資不加多斂率常勞而用不加乏豈各因其俗歟妖賊傳第二十三嗚呼神怪茫茫若存若亡而仲尼不語吾何考信焉若張遇賢諸祐之事姑存而不削者非好為神怪也將以戒妖妄於後世爾春秋之法雖五石六鷁之微皆不泯其實傳曰五石六鷁之辭不設則王道不亢况遇賢輩動阡陌之兵駭衆人之耳目者其可泯哉作妖賊傳張遇賢循州羅縣小吏也縣之刻杉鎮有神降于民家所言禍福輒驗遇賢往禱之因留奉事甚謹會羣盜大起各擁數百衆相與禱于神求為主者神曰張遇賢是第十六羅漢當為汝主於是共推遇賢為中天八國王改元永樂署置百官皆衣絳衣遇賢庸懦無統御之略賊帥各以便宜攻剽州縣告其進退而巳屢為州兵所窘復告于神神曰可過嶺取􅐚州當成大事遇賢遂襲南康百勝軍節度使賈浩始輕之不設備賊衆連陷諸縣州兵擊之不勝浩戒嚴城守遇賢據白雲洞造宫室營署羣盜四出攻劫未幾通事舍人邊鎬洪州屯營都虞候嚴思禮各帥師數千出援虔州賊衆大敗焚其營署走數十里又敗之遇賢困窘復告于神神不復語遂棄營潛遁賊帥李台知其無神也執遇賢及其副黃伯雄謀主僧景全皆斬于建康市嗚呼許嵩云羅陽有神自稱王表言語飲食與人無異而不見其形豫始觀之以為妄誕及得遇賢之事然後知嵩言無足怪也古者以鬼無靈響物無疵癘為至德之世則舉世大亂神怪畢出固其所也且以孫權之竒英猶不能無惑况遇賢乎諸祐諸音查蘄州獨木人自言不茹葷者數世能使貧者冨富者貧俚民稍稍效之其徒十數男女猱雜互易匹耦謂之忍辱生子不知其父行之數年積數百衆夜行晝息取資於盜競相推唱云祐術能升虗空入水火妄意民藏潛使致之而民弗覺也先陳起僑蘄春惡其妖升元中起第進士授黃梅令到官之日里酋畢賀祐獨不至數日起命籍祐為里長不服祐嫚言曰吾取令頭殺竪子爾起聞大怒會周鄴為巡撫使師次黃梅起藉其兵以執祐等并其婦人幼稚皆縛沃以豕血祐迄不能神因索其家得輿服器用皆埓至貴郡將即斬祐等曰婦人何能為幼稚宜無預意且貰之起曰此皆瀆亂人倫去無遺類遂并斬之起由是知名遷監察御史卒南唐書卷之二十六
