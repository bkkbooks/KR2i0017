body:
  text: 南唐書卷之二十八滅國傳上第二十五嗚呼閩楚之捷不償於殫殘而淮甸之役輒喪其膏腴易曰智小而謀大鮮不及矣戒之哉戒之哉作滅國傳閩國王審知字信通光州固始人也世為農唐末群盜起審知與兄潮俱起草莾衆推潮為主略地至泉州軍行整肅其耆老相率遮道留之潮引兵圍城逾年殺其刺史廖彥若光啓二年福州觀察使陳巖表潮泉州刺史景福元年巖卒其壻范暉自稱留後潮遣審知攻暉殺之唐即以潮為福州觀察使潮以審知為副使審知為人狀貌雄偉常乘白馬軍中號白馬三郎乾寧四年潮卒審知代立唐以福州為威武軍拜審知節度使纍遷同中書門下平章事封琅瑘王唐亡梁太祖加拜審知中書令封閩王升福州為大都督府審知儉約好禮王倓楊沂徐寅之徒皆依焉又建學四門以教閩士之秀者歲遣使泛海入貢于梁後唐同光三年審知卒諡忠懿長子延翰立建國稱王而猶禀唐正朔延翰長大美晢如玉其妻崔氏陋而淫延翰不䏻制審知喪未期徹其几筵又多選良家子為妾崔氏性妬良家子之美者輒幽之别室繫以大械刻木為人手以擊其頰又以鐡錐刺之一歲之中死者八十四人崔氏後病見其祟而卒十有二月延翰弟泉州刺史延鈞審知飬子建州刺史延禀同以兵入執延翰殺之而延鈞立更名鏻鏻審知次子也莊宗即拜鏻節度使纍加檢校太師中書令封閩王鏻既立延禀還建州鏻餞于郊延禀臨訣謂鏻曰善繼先志無煩老兄復來鏻銜之長興二年延禀率兵擊鏻鏻遣王仁逹敗之執延禀誚之曰豫不䏻繼先志果煩老兄復來延禀不䏻對遂殺之三年鏻上書求為尚書令唐不報鏻遂絶朝貢即皇帝位改元龍啓國號閩追諡審知為昭武孝皇帝廟號太祖立五廟置百官龍啓三年改元永和王仁逹為鏻殺延禀而有功典親兵鏻心忌之鏻謂人曰仁逹智略在吾世可用不可遺後世患因誣以罪殺之鏻妻早卒繼室金氏賢而不答審知婢金鳳陳氏鏻嬖之遂立之以為后𥘉鏻有嬖吏歸守明者以色見幸號歸郎鏻後得風疾陳氏與歸郎姦又有百工院使李可殷因歸郎以通陳氏鏻命工作九龍帳國人歌曰誰謂九龍帳惟貯一歸郎鏻婢春燕有色其子繼鵬蒸之鏻巳病繼鵬因陳氏以求春燕鏻怏怏與之其次子繼韜怒謀殺繼鵬繼鵬懼與皇城使李倣圗之乃令壯士先殺李可殷率皇城衛士入鏻聞鼓噪聲走匿九龍帳中衛士刺之不死宫人不忍其苦為絶之繼韜及陳后歸郎皆為倣所殺鏻立十年見殺諡曰惠皇帝廟號太宗繼鵬鏻長子也既立更名昶改元通文晋天福二年昶遣使貢于京師髙祖遣散騎常侍盧損冊昶閩王拜其子繼恭臨海郡王損至閩昶稱疾不見令繼恭主之又遣中書舍人劉乙勞損于館乙衣冠偉然騶童甚盛他日損遇乙于塗布衣芒屩而巳損使人誚之曰鳳閣舍人何逼仄之甚也乙羞愧以手掩面而走昶好巫妖人林興以巫見幸三年夏虹見宫中林興傳神言此宗室將為亂之兆也乃命興帥壯士殺審知子延武延望及其子五人後興事敗亦被殺而昶愈惑亂立父婢春燕為淑妃後立以為皇后昶募勇士為宸衛都以自衛其賜豫給賞獨厚於他軍控鶴都將連重遇拱宸都將朱文進皆以此怒重遇等夜帥衛士縱火焚南宫昶挾愛姬子弟黃門衛士斬關而出宿于野次重遇迎延羲立之延羲令其子繼業率兵襲昶及之射殺數人昶知不免擲弓于地繼業執而殺之及其妻子皆死無遺類延羲立諡昶曰康宗延羲審知少子也既立更名曦遣使朝貢于晋改元永隆鑄大鐡錢以一當十曦自昶世倔彊難制昶相王倓每抑折之曦立而倓已死命發塜戮尸倓面如生血流被體泉州刺史余延英嘗矯命掠取良家子曦怒召下御史劾之延英進買宴錢千萬曦曰皇后土貢何在延英又獻皇后錢千萬乃得不劾曦嘗嫁女朝士有不賀者笞之御史中丞劉贊坐不紏舉將加笞諌議大夫鄭元弼切諌乃止曦弟延政為建州節度使封富沙王自曦立不叶數舉兵相攻曦由此惡其宗室多以事誅之諌議大夫黃峻舁櫬詣朝堂極諌曦怒貶峻漳州司戶參軍校書郎陳光逸上書疏曦過惡五十餘事曦命衛士鞭之百而不死以繩係頸掛于木久而乃絶國計使陳匡範增算啇之法以獻曦曰匡範人中之寶也巳而歲入不登其數乃借於民以足之匡範以憂死其後知其借於民也剖匡範棺斷尸棄之水中曦性淫虐而妻李氏悍而酗酒賢妃尚氏有色而寵諸國皆僣后妃之號李仁遇曦甥也以色嬖之用以為相曦嘗為牛飲羣臣侍酒有詐及私棄酒者輒殺之并殺其替者連重遇既殺昶常懼為國人所討曦心疑之以語誚重遇等重遇等流涕自辨李氏妬尚妃之寵欲圗曦而立其子亞澄乃使人謂重遇等曰上心不平於二公奈何重遇等懼六年三月曦出逰醉歸重遇等遣壯士拉於馬上殺之諡曰景宗延政審知子也曦立為淫虐延政數貽書諌之曦怒遣杜建崇監其軍延政逐之曦乃舉兵攻延政為延政所敗延政乃以建州建國稱殷改元天德明年連重遇巳弒曦集閩羣臣告曰昔太祖武皇帝親冒矢石遂啓有閩及其子孫淫虐不道天厭王氏當求有德以安此土乃掖朱文進升殿率百官北面而臣之文進以重遇判六軍諸衛事王氏子弟在福州者無少長皆殺之以黃紹顔守泉州程贇守漳州許文縝守汀州用晋正朔稱開運元年泉州軍將劉從效詐其州人曰富沙王取福州矣吾屬世為王氏臣安䏻交臂事賊乎州人共殺紹顔迎王繼勳為刺史漳州聞之亦殺贇迎王繼成為刺史皆王氏之諸子也文縝懼以汀州降于延政南唐聞亂命查文徽等帥師伐之遂下建陽延政遣統軍吳承祐往紿福州曰唐兵助我討福州信之故連重遇殺朱文進禆將林仁翰殺連重遇謀迎延政都福州㑹南唐兵方急攻建州延政乃遣其子繼昌守福州而自拒唐兵福州軍將李仁逹謂其徒曰唐攻建州富沙王不䏻自保其能有此土耶乃擒繼昌及吳承祐殺之欲自立懼衆不附以雪峯僧卓儼明示衆曰此非常人也被以衮冕率諸將吏北面而臣之已而又殺儼明乃自立送𣢾于南唐南唐以仁逹為威武軍節度使文徽等下建州俘延政于金陵封延政鄱陽王閩主劉從效自領泉州李仁逹自領福州羈縻而已明年福州附于吳越南唐書卷之二十八
