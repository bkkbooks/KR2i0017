body:
  text: 南唐書卷之二十九滅國傳下第二十六楚國馬殷字覇圖許州鄢陵人也唐中和三年蔡州秦宗權遣孫儒劉建峯将兵萬人屬其弟宗衡畧地淮南殷𥘉爲儒禆將儒殺宗衡自將其兵取髙郵逐楊行宻行宻走宣州儒以兵圍之乆不尅遣殷與建峯掠食旁縣儒戰敗死殷乃推建峯爲帥殷爲先鋒轉攻豫章畧䖍吉有衆數萬趨潭州殺其刺史鄧處約自稱留後唐僖宗授建峯湖南節度使殷爲馬歩軍都指揮使出攻邵州建峯庸人不䏻率其下常與歩曲飲酒讙呼軍䘚陳贍妻有色建峯私之贍怒以鐡檛擊殺建峯軍中推行軍司馬張吉爲帥吉乗馬傷髀卧病語諸將曰吾非汝主也馬公英勇可共立之諸將乃共殺贍磔其尸遣姚彦章迎殷於邵州殷至吉肩輿入府殷拜謁於庭中吉召殷上乃率將吏下北面再拜以位與之時乾寧三年也唐拜殷潭州刺史殷遣其將秦彦暉李瓊攻連邵郴衡道永六州皆下之桂管劉士政懼遣其將陳可璠王建武等率兵守義全嶺殷遣使聘于士政至境上可璠等不納殷怒遣李瓊等以兵七千攻之擒可璠等及其兵二千餘人悉坑之遂圍桂管虜士政盡取其屬州殷表瓊桂管觀察使四年拜殷武安軍節度使梁太祖即位拜殷兼侍中中書令封楚王楊行宻將吕師周來奔師周勇健豪俠頗通緯候兵書殷聞師周至大喜曰吾方南圖嶺表而得此人足矣以爲馬歩軍都指揮使率兵攻嶺南取昭賀梧蒙龔富等州殷表師周昭州刺史於是灃辰溆并溪洞諸蠻皆附于殷殷請陞朗州爲永順軍表張吉節度使殷乃請依唐太宗故事開天册府置官屬太祖拜殷天册上将軍殷以其弟賨爲左相弟存爲右相廖先圗等十八人爲學士末帝時加殷武安武昌靜江寜逺等軍節度使洪鄂四面行營都統唐荘宗滅梁殷遣其子羲範修貢京師上梁所授都統印荘宗問洞庭廣狹羲範曰車駕南廵纔堪飲馬爾荘宗嘉之荘宗平蜀殷大懼表求致仕荘宗下璽書慰勞之殷𥘉兵力尚寡與楊行宻成汭劉龔等爲敵國殷患之問䇿於其將髙郁郁教殷尊王伏順外誇隣敵然後退修兵農又諷殷自京師至㐮唐郢復等州置邸務以賣茶其利十倍又鑄鈆鐡錢以十當銅錢一又令民自造茶以通商旅而收其筭歲入萬計由是地大力完數要封爵天成二年請建行臺明宗封殷楚國王用竹册如三公禮殷以潭州爲長沙府建國承制自置官屬以姚彦章爲左相許徳勲爲右相李鐸爲司徒崔頴爲司空拓㧞常爲僕射馬珙爲尚書子弟皆出爲節度使文武皆進位謚其曽祖筠曰文肅祖正曰荘穆父元豐曰景荘立三廟于長沙長興元年殷䘚年七十九謚武穆子羲聲立羲聲字若訥殷次子也殷建國以羲聲判内外諸軍事荆南髙季昌聞殷将髙郁素教殷以計䇿而楚以彊患之甞使謀者間殷殷不聽羲聲用事諜云季昌聞楚用高郁大喜以爲亡馬氏者必郁也羲聲素愚以爲然遽奪郁兵職矯殷令殺之明日吏以状白殷拊膺大哭曰吾耄荒如此而殺吾勲舊殷語左右曰吾亦不乆於此矣明年殷䘚羲聲立授武安靜江等軍節度使羲聲甞聞梁太祖好食鷄慕之日烹五十鷄以供膳葬殷羲聲不泣頓食鷄肉數器而𧺫其禮部侍郞潘𧺫譏之曰昔阮籍居䘮而食蒸豚世豈乏賢耶長興三年羲聲䘚追封衡陽王弟羲範立羲範字寳規殷第四子也殷子十餘人嫡子羲振長而賢其次羲聲羲範同日而生羲聲母袁夫人有美色羲聲以母寵得立而羲振棄官爲道士居于家故羲聲䘚而羲範以次立襲殷官爵封楚王清㤗二年賜弓矢冠劒天福四年加天册上將軍開府承制如殷故事羲範好學善詩文士廖光圗徐仲雅李臯拓拔常等十八人皆故殷時學士羲範性奢侈光圗等皆薄徒飲博懽呼獨常沉厚長者上書切諌光圗等惡之襄州安従進安州李金全叛晋髙祖詔羲範出兵羲範遣張少敵以舟兵趨漢陽漕米五萬斛以饋軍金全等敗少敵乃旋溪州刺史彭士然率錦奬諸蠻攻澧州羲範遣劉勍等擊之士然大敗勍等攻溪州士然走奬州遣其子師暠率諸蠻酋降于勍溪州西接牂柯南通桂林象郡羲範乃立銅柱以爲表命學士李臯銘之於是南寜等十八州夷播等七州昆明等十二部皆附于羲範羲範作㑹春園嘉宴堂其費鉅萬始加賦於國中拓拔常切諌以爲不可羲範又作九龍殿以八龍繞柱自言身一龍也是時契丹滅晋中國大亂羲範牙將丁思覲廷諌羲範曰先王𧺫䘚伍以攻戰而得此州倚朝廷以制隣敵傳國三世有地數千里飬兵十萬今天子蒙塵中國無主真覇者立功之時誠䏻悉國之兵出荆襄以趨京師倡義於天下此桓文之業也柰何耗國用而窮土木爲兒女之樂乎羲範謝之思覲瞑目視羲範曰孺子終不可教也乃扼喉而死開運四年羲範䘚年四十九謚文昭羲廣立羲廣字徳丕羲範母弟也羲範平生惡拓㧞常諌諍甞謝絶之及卧病始思常言以爲忠召之託以羲廣羲範䘚常數勸羲廣以位奉其兄朗州節度使羲蕚羲廣不従羲蕚来奔䘮羲廣将劉彦瑫曰武陵之来其意不善宜出兵迎之以備非常使其解甲釋兵而後入張少敵周廷誨曰王䏻予之則巳不然宜早除之羲廣泣曰吾兄也焉忍殺之分國而治可也遂以兵迎羲蕚於石止之於碧湘宫厚賂以遣之羲蕚憤然而去乃遣使詣京師求封爵請置邸稱藩漢隱帝不許降璽書慰勞之羲蕚怒遂送𣢾於南唐乞師攻長沙羲廣遣劉彦瑫許可瓊等禦之彦瑫敗羲蕚於僕射洲羲蕚去誘溪洞諸蠻㓂益陽羲廣遣崔洪璉以遏諸蠻劉彦瑫以舟兵趨武陵攻羲蕚彦瑫敗於湄州羲廣大懼遣使請兵京師漢隱帝不䏻出師羲蕚率舟兵㳂江而下自號順天將軍趨長沙攻長樂門長沙䧟羲廣率妻子匿于慈堂明日擒之遂斬羲廣杖其妻死于市左右用事者皆臠割之乾祐三年羲蕚自立明年遂臣於南唐唐册封羲蕚楚王羲蕚悉以軍政任其弟羲崇羲崇與楚舊將徐威陸孟俊魯綰謀作亂羲蕚置酒端陽門羲崇辭以疾威等縦惡馬十餘匹以壮士執檛隨之突入其府劫庫兵縛羲蕚迎羲崇以立之羲崇遣彭師暠廖偃囚羲蕚於衡山師暠奉羲蕚爲衡山王臣於南唐羲崇懼亦遣使詣南唐送𣢾唐遣邉鎬等帥師入楚盡遷馬氏之族于金陵封羲蕚楚王居洪州羲崇領舒州節度使居楊州周世宗下淮南詔撫安馬氏子孫羲崇率其子弟十七人歸京師南唐書卷之二十九
