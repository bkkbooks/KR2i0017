front:
  text: 南唐書卷之三十建國譜第二十七嗚呼唐之盛時制天下為十道統之以都督而遐荒四逹合為一家中世多故始立方鎮大者連城十數小者猶兼三四雖禀爵命而其勢以分僖昭之世則又甚焉盜酋強卒相與為亂而一旦破城殺帥者即以其鎮豫之於是下竊土地上要封冊終以亡唐而大者稱帝小者稱王故自江以南升潤常歙宣鄂池饒信江洪撫袁吉䖍一十五州自江以北楊楚泗和滁光黃舒蘄廬夀海濠一十三州合二十八州楊行密􅌹據以建吳國南唐因之置泰州筠州又取汀建漳泉四州復置劒州共三十五州之地號為大國逮乎顯德世宗出師而遂取淮南一十四州南唐君臣相顧猶懼其不免乃奉表稱貢趨走不暇削國降號何其速哉大抵僣服興亡不在於強梗庸懦而在乎世之治亂世苟治矣偏據之國雖大必亡逮德下衰一夫倡亂遂為敵國為天下者可不戒哉可不戒哉作建國譜
  hash: sha256:7e11733aaaa21932d0f41be5560ad5d3cf51ff7830816535512c341a6756b4f8
