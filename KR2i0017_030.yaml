body:
  text: 州三十有五升州都吳因唐為升州徐溫建節升建康軍南唐建都置江寧府潤州鎮海軍置丹陽宫尋罷常州以江隂縣别置軍歙州宣州寧國軍江州奉化軍洪州鎮南軍顯德五年東都入于周以州建南都撫州昭武軍以東南境别置建武軍袁州吉州䖍州百勝軍筠州保大十年置楊州淮南建東都以六合置雄州俄罷復來肄以天長置天長軍鄂池饒信四州顯德五年入于周楚州順化軍顯德五年入于周泗州靜淮軍顯德五年入于周滁州顯德五年入于周和州顯德五年入于周光州顯德五年入于周黃州顯德五年入于周舒州顯德五年入于周蘄州顯德五年入于周廬州保信軍顯德五年入于周夀州清淮軍顯德五年入于周海州顯德五年入于周泰州升元元年置顯德五年入于周濠州定逺軍顯德五年入于周建州忠義軍保大三年取升永安軍節度俄改志義後降軍事汀州保大三年取劒州保大三年置漳州保大三年取改為南州俄復舊泉州清源軍保大三年取清源軍節度使取之而復失者十有一州福州保大三年取羈縻而已四年入吳越潭州保大九年取十年失衡州保大九年取十年失灃州保大九年取十年失朗州保大九年取十年失嶽州保大九年取十年失道州保大九年取十年失永州保大九年取十年失邵州保大九年取十年失全州保大九年取十年失辰州保大九年取十年失嗚呼乘窘以鬪捷者勝之固易地來而民去者守之極難南唐之克楚始雖因其內䦧而終以任用匪人不能振撫故劉言之徒得以復張嗣主𥘉欲罷桂陽之師解益陽之戍即授言以節鉞與夫曹公之應二袁者可同論乎世裔譜第二十八嗚呼春秋之法疑以傳疑信以傳信可不慎乎先主以幼稚轉徙民間故其所祖難於考究案徐鉉江南録承建王恪後而五代史著南唐世家亦以恪係四親廟是亦傳疑之意歟作世裔譜臯陶為士師期于無刑而洽其好生之德於天下則盛德之流光宜肇祀於百世矣故歷虞夏商世為大理以官命族為理氏至紂之時有理徴者為翼肄中吳伯弗合於紂抱道而死其妻陳國契和氏與子利貞避亂於伊侯之墟食木子得生遂改理為李氏利貞亦娶契和氏女生昌祖為陳大夫家于苦縣生肜德肜德曽孫碩宗周康王時賜采邑於苦縣五世孫乾字元果為周上御史大夫娶益夀氏女嬰敷生耳字伯陽一字𥅆周平王時為太史著書九篇以明道德至唐祖之以為玄元皇帝其後有李宗字尊祖魏封於假為子木大夫守道不屈生同為趙大將軍生兊為趙相生躋趙陽安君二子曰雲曰恪恪生洪秦太子太傳生興族字育神秦將軍生曇字貴逺趙伯人侯入秦為御史大夫葬柏人西生四子崇辨昭璣崇字伯祐隴西守南鄭公生二子長曰平燕次曰瑶字內德南郡守狄道侯生信字有成大將軍隴西侯生超一名伉字仁髙漢大將軍漁陽太守生二子長曰元曠侍中次曰仲翔河東太守征西將軍討叛羌于素昌戰沒贈太尉葬隴西狄道東川因家焉生柏考隴西河都二郡太守生二子曰尚曰向尚成紀令因居成紀生廣前將軍與胸奴大小七十餘戰胸奴畏之二子長曰當戶生陵字少卿慷慨有大志為騎都尉陷胸奴次曰敢字幼卿郎中令關內侯生禹字子通弟忠禹生丞公河南太守先字敬宗蜀郡北平太守生長宗字伯禮漁陽丞生君况字子期博士議郎太中大夫生本字上明郎中侍御史生次公字仲君巴郡太守西夷校尉弟怙次公生䡄字文逸魏臨淮太守司農卿弟潜䡄生隆字彥緒長安令積弩將軍生艾字世績晋驍騎將軍魏郡太守生雍字雋熙濟北東莞二郡太守生二子長曰倫次曰柔字德逺北地太守武衛將軍安西亭侯生昶字仲堅凉太子侍講生皓字玄盛西凉武昭王興聖皇帝十子談欹讓愔恂翻豫宏晀亮愔曽孫系翻孫三人曰丞曰茂曰沖曽孫曰成禮豫玄孫曰剛歆字士業西凉後生八子朂紹重耳弘之崇明崇産崇庸崇祐重耳字景順以國亡奔宋為汝南太守後魏克豫州以地歸之拜恆農太守復為宋將薛安都所陷後魏安南將軍豫州刺史生獻祖諱熙字孟良後魏金門鎮將生懿祖諱天賜字德真三子長曰起頭長安侯生逹摩後魏羽林監太子洗馬長安縣伯其後無聞次曰太祖諱虎次乞豆虎西魏時賜姓大野氏與李弼等八人號八柱國周閔帝受魏禪虎已卒乃追録其功封唐國公虎生世祖諱昞襲封唐公昞生髙祖於長安體有三乳性寬仁襲封唐公隋文帝相周復髙祖姓李氏煬帝南逰天下盜起髙祖兵二萬起自太原敗宋老生于霍邑有衆二十萬遂入京城立代王侑為皇帝遙尊煬帝為太上皇改元義寧髙祖進封唐王五月戊午隋帝遜于位髙祖即位是為大唐憲宗子建王恪先主之始祖也恪元和元年始封時緇青節度使李師古死其弟師道丐符節故詔恪為鄆州大都督平廬軍緇青等節度大使長慶元年薨無子以宗室子為嗣史亡其名其後有李超者或以為建王後懿僖之時宗室世逺遂與異姓之臣雜而仕宦至或流落民間超之子志為徐州判司志生榮號李道者榮生先主先主即位是為南唐嗚呼春秋之時天子失政而諸侯擅之自平王始諸侯失政而大夫擅之自溴梁始蓋陵夷之勢不可復振而覬覦之心無所饜足則亂臣賊子效尤為之者豈特春秋之時乎有唐失御方鎮之帥或浸長於健卒或崛起於羣盜而楊行密以江淮二十八州輒建吳國則是春秋諸侯之罪人也行密既死諸子庸懦而弒渥碁溥祿去楊氏則又溴梁大夫之罪人且楊氏建國未久政在徐溫而知訓知誥景通景遷景遂繼秉國政者三十餘年隆衍與溥位號空存而已故賈崇謂嗣主曰臣事先朝二十餘年韓熙載謂後主曰嚮化踰於四紀胡則曰我等世受主恩由是觀之先主雖以季年得位享國六年而擅命專制其來尚矣南唐書卷之三十終
