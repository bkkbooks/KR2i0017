  - {type: variant, offset: 105, length: 218, content: 尊天子扵中原而僣僞之事則不爲南唐諱者豈無意哉蓋尊天子所以一天下之統書其僣所以著李氏之罪其統旣一其罪旣著則竊土賊民者無遁刑扵天下後世矣昔孔子作春秋非徒載其陳言也竊耴其義以爲人道之大法而巳予之所論有合扵此者弗可不察也王通之作元經第以進退南北而亂其正統輒自比扵孔子曰春秋元經扵王道是輕重之權衡且孔子所書彼善扵此則有之而正統常在扵周通之所書者宋魏之間其統未甞一也使後世擾擾而不知其正者必自通始嗚嘑法春秋而不知春秋之法者豈特王通乎南唐書目録卷第一, WYG: 首為}
