  - {type: variant, offset: 4, length: 0, content: '', WYG: 一宋馬令撰先主土運中圮諸侯跋扈基搆自吳紹于唐祚作先主書先主姓李唐宗室裔也小字彭奴其父榮榮之父志志之父超超蚤卒志為徐州判司因家焉榮性謹厚適丁世亂晦迹民間號李道者彭奴以光啓四年生于彭城未名故書小字流寓濠泗吳武王楊行宻克濠州得之竒其狀貌養以為子而楊氏諸子不能容行宻以乞徐温乃姓徐名知誥温嘗夢水中黄龍十數温獲一龍而寤翌日得知誥知誥奉温以孝聞従温出不如意杖而逐之及歸拜迎門温驚曰爾在此也知誥泣曰為人子捨父母何適父怒而歸母子之常也温由是愛之逮壯身長七尺廣顙隆準精彩鑠人語聲清暢常緩行従者濶歩不能及相工云此龍行虎歩也従温攻伐身先士卒為樓船軍使以舟兵屯金陵柴再用攻宣州用其兵殺李遇以功拜昇州刺史時江淮初定州縣吏多武夫務賦歛為戰守知誥獨好學接禮儒者能自勵為勤儉以寛仁為政逺近嚮風郡政大治徐温鎮潤州以昇宣常池黄為属温聞知誥理昇州有善政往視之見其府庫充實城壁修整乃徙治之而遷知誥潤州刺史知誥初不欲往屢求宣州温不與時温嫡子知訓為淮南節度副使秉國政知誥至京口不樂既而知訓為朱瑾所殺温居金陵未及聞知誥居潤州近廣陵得先聞即日以州兵渡江定亂遂為淮南節度副使温至以次子知詢等皆少用知誥猶愈於他人因留輔政宋齊丘曰潤州之命實天贊也初徐氏諸子不齒知誥而知訓尤悖嘗召知誥飲酒伏劍士欲害之行酒吏刁彦能酒至知誥以手爪搯之知誥悟起走乃免後知誥自潤州入覲知訓與飲於山光寺又欲害之徐知諫以謀告知誥知誥起遁去知訓以劍授刁彦能使追殺之及於中塗而還紿以不及由是得免及知訓死温意潤州預謀就知訓廨有土室繪畫温像身被五木諸弟皆執縳受刑而畫知訓衮冕正座皆署其名温見之唾曰狗死遲矣知誥因得疏其罪惡由是内外全活者甚衆而死者猶數家知訓與僧修睦親狎得偽䜟數紙皆修睦手書温求修睦殺之越人冦毗陵温伐越知誥以王府兵會戰於無錫前軍敗賊乗之甚急温暴得熱疾不能治軍知誥率所領疾戰大破之斬首數千級越人棄輜重夜遁時四境底定惟越人為梗因此請平而兵甲遂戢知訓之用事也常陵弱楊氏而驕侮諸將遂以見殺及知誥秉政乃寛刑法推恩信起延賓亭以待四方之士引宋齊丘駱知詳王令謀為館客士有羇旅於吳者皆齒用之常隂使人察視民間有凶荒匱乏者賙給之盛暑未嘗張葢操扇左右進葢必却之曰士衆尚多暴露我何用此以故温雖遙秉大政而吳人頗歸知誥武義元年拜左僕射知政事漸復朝廷紀綱修典禮舉法律以抑强暴中外謂之政事僕射温行軍司馬徐玠勸温以己子代知誥温遣子知詢入廣陵謀代知誥秉政會温病卒知詢奔還金陵嗣温為節度使諸道都統所為多不法常謀知誥知誥使諭之入朝遂畱為左統軍吳主僭帝號改元乾貞知誥欲自尊大故奉楊􅄎尊號書􅄎僣號則南唐之罪著矣知誥累遷侍中中書令太尉都督中外諸軍事封潯陽公改封豫章公大和三年公出鎮金陵如温之制以長子景通為司徒平章事居中輔政以王令謀宋齊丘為左右僕射同平章事四年封公為東海郡王五年進封齊王始書小字書名既而書公書王以見其漸六年召景通至金陵為鎮海軍節度副使以其次子景遷為太保平章事與令謀等秉國政天祚元年王進位太師天下兵馬大元帥二年景遷病以次子景遂為門下侍郎㕘知政事冬安逺軍盧文進來降三年閩越諸國皆遣使勸進人望己歸於是加殊禮建齊國置宗廟以宋齊丘為左丞相徐玠為右丞相冬十月受吳禪攝太尉楊璘奉上皇帝璽綬國號大齊改元昇元策吳主曰受禪老臣知誥謹上策皇帝為高尚思𤣥𢎞古讓皇帝追尊考温為武皇帝自温以上不追尊則復姓之心見矣子景通吳王景遂夀王景達信王弟知證江王知諤饒王以建康為西都廣陵為東都十有二月己夘朔日有白虹二以楊州海陵縣為泰州割泰興鹽城興化如臯四縣屬焉以海陵制置使褚仁規為刺史廬州周本卒凡書某州某人皆其節度使帝輟視朝一日食不舉樂書帝者以見其僣極惡重也凡書帝書詔書制其罪同甲午皇后宋氏受寳册是嵗閩王昶貢方物于京師天子使散騎常侍盧損如閩册昶閩王不受閩自鏻已僣帝號改元矣既稱帝故不受王爵凡書京師皆中原也書天子尊正統以别諸國僣偽二年春三月壬子日有白虹二壬申大星流于東方夏四月遷讓皇于丹陽以王輿為浙西節度使留後馬思讓為丹陽宫使以嚴兵守之徐氏諸子屢請帝復姓帝謙抑不忍忘徐氏恩下其議百官百官皆請乃復姓李改名昇國號大唐遂考服属當吳王恪後建唐廟祀高祖太宗以下如唐舊典追尊吳王恪為孝靜皇帝廟號定宗超為孝平皇帝廟號成宗志為孝安皇帝廟號惠宗榮為孝徳皇帝廟號慶宗奉徐武皇廟號義祖徐氏二王如初諸孫皆郡公女郡縣主齊臺門下侍郎張居詠中書侍郎李建勲皆平章事吳中書侍郎張延翰為右僕射平章事以䖍州李章鎮廬州神武統軍王安為百勝軍節度使秋七月一時無事則書首月冬十月戊寅天子受徽號于契丹曰英武明義皇帝尤非常故書錢元瓘以嘉興縣為秀州十有一月以歩騎八萬講武于銅橋賜將吏以下金帛有差讓皇殂帝率百官素服哀臨命有司供具如吳舊禮謚曰睿十有二月福州亂連重遇弑其君昶立王子曦王子延政爭立於是僣位于建州國號大殷他國悉書者為保大三年取閩張本吳世子璉先娶帝女是為永興公主璉以公主故為中書令康化軍節度使三年春正月丙申詔曰比者干戈相接人無定主地易而弗蓺桑隕而弗蠶衣食日耗朕甚憫之其嚮風面内者有司計口給食願耕植者授之土田仍復三嵗租役於嘻仁不異逺化無泄邇其務宣流以稱朕意二月池州楊璉卒以統軍王彦儔為康化軍節度使詔公􅀸以下議定郊祀門下侍郎平章事居詠中書侍郎平章事建勲等議曰孔子云郊祀后稷以配天宗祀文王於眀堂以配上帝此萬世不易之法也昔長孫無忌請祀高祖於圓丘以配昊天上帝祀太宗於眀堂以配上帝葢得之矣今國家嗣興唐祚追尊孝徳而以神堯為肇祀之祖宜以神堯配天於圓丘以孝徳配上帝於明堂禮也其服物制度古有常儀一切偽飾願皆罷去奏可司徒齊丘請依春秋郊以四月上辛常夢錫駁曰案禮天子之郊以冬至不卜日魯侯之郊以仲春卜上辛今之四月非郊之時齊丘固爭遂用夏四月夏讀為夏商之夏魯用周之四月郊議者多哂之詔曰禮莫重於享帝孝莫大於隆親事實重大承以輕眇可謂無其徳而用其事祗加畏焉於嘻爾公爾侯各揚厥職不供迺事國有常典夏四月上辛始郊祀於圎丘大赦境内是夜月當以子初沒而升壇之際皎然如晝衆咸異之遍行封賞羣臣請上徽號不許固請之帝曰朕以𦕈躬託于民上夙夜祗畏常恐弗𩔖矧迺徽號用揚虚美是重弗𩔖固不許因此廢徽號之禮州郡言符瑞者十數帝曰譴告在天聰眀自民魯以麟削莽以符亡常謹天戒猶懼或失之符瑞何為哉皆抑而勿揚言五代同居者七家其尤著者江州陳氏元和給事中京之後宗族七百口每日設廣席長幼以次坐而共食有畜犬百餘共一牢食一犬不至諸犬為之不食建書樓於别墅以延四方之士肄業者多依焉鄉里率化獄訟希少逺近歎異之皆蠲復征役旌表門閭秋七月庚子朔日有蝕之八月鄂州張宣卒以潤州留後王輿代金吾衞大將軍馬仁裕出為鎮海軍節度使留後冬十月四年春正月夏四月樞宻使周宗出為奉化軍節度使六月安州節度使李金全來降遣鄂州屯營使李承裕帥師迎之承裕與晉將馬全節安審暉戰于安陸承裕及裨將叚處㳟戰死監軍通事舍人杜光鄴及其兵五百人被執天子厚賜之遣還帝致書于晉復送光鄴等請以敗軍行法天子又遣之帝以甲士臨淮拒之乃止天子晉高祖也書帝致書于晉惡其抗也以金全為宣威統軍洪州李徳誠卒以宣州徐玠代以江州徐知證為寧國軍節度使梁王徐知諤卒秋八月廬州李章卒以潤州馬仁裕代以天威統軍盧文進為鎮海軍節度使冬十月幸東都存省故老宴于舊宅踰月還十有二月左僕射平章事張延翰卒五年春正月虔州王安卒以統軍賈浩為百勝軍節度使三月誅泰州刺史褚仁規夏四月秋九月壬子有星孛于天市錢元瓘卒佐嗣位冬十有二月葬吳越文穆王凡他國廢立卒葬弑殺告問通則書六年春三月廬州馬仁裕卒以滁州刺史周鄴為保信軍節度使留後夏四月南漢劉龑卒玢嗣位葬劉龑僣諡天皇大帝以其僣極惡重故書與吳越異龑音儼劉氏偽撰此字以為名自云取飛龍在天之義遷讓皇子孫於海陵號永寧宫嚴兵守之絶不通人久而男女自為匹偶吳人多哀憐之猶書吳人者以其思舊之民也詔吳王景通為太子景通表曰古之立太子所以崇正嫡息覬覦如臣兄弟禀承聖教實為敦睦願寢此禮三表許之乃以大元帥總百揆改封齊王以駕部郎中馮延已為元帥府掌記壽州高審思卒以侍衞諸軍都虞侯姚景為清淮軍節度使六月乙丑天子崩晉高祖秋七月丞相大司徒宋齊丘為鎮南軍節度使以洪州徐玠為司徒侍中帝曰豫章大司徒維桑也衣錦晝行古人所貴以錦袍賜之齊丘至鎮衣以視事羣臣咸謂江淮之地頻年豐稔兵食既足士樂為用天意人心未厭唐徳宜廣土宇攻自潭越始帝曰吾少長軍旅見干戈之為民患甚矣吾不忍復言兵革使彼民安則吾民亦安矣吳越災宫室府庫甲兵殆盡羣臣復請乘其弊帝曰今大敵在北北方平則諸國可尺書召之何以兵為輕舉者兵之大忌宜畜財養鋭以俟時焉使使唁越于武林厚幣以賙其闕冬十月詔曰前朝失御强梗崛起大者帝小者王不以兵戈利勢弗成不以殺戮威武弗行民受其弊葢有年也或有意於息民者尚以武人用事不能宣流徳化其宿學巨儒察民之故者嵁巗之下往往有之彼無路光亨而進以拊傴為嫌退以清寧為樂則上下之情將何以通簡易之政將何所議乎昔漢世祖數年之間被堅執鋭提戈斬馘一日晏然而兵革之事雖父子之親不以一言及之則兵為民患其來尚矣今唐祚中興與漢頗同而𦕈眇之身坐制元元之上思所以舉而錯之者㷀㷀在疚㒺有所發三事大夫可不務乎自今宜舉用儒者以補不逮於是稍用儒臣漸去苛察又將修復故事為後代法未果行而帝疾作七年春二月詔曰迺公迺侯越百執事欽承嗣命命爾保元子璟祗肅天鑒社稷宗廟永有終我不敢知曰其基永昌我亦不敢知曰墜命㒺後天不爾諶祐于有徳厥位艱哉翌日殂于路寢壽五十六葬永陵諡光文肅武孝高皇帝廟號烈祖徐鉉曰烈祖少長䘮亂知人艱苦故不以富貴自處唯務節儉身為宰相事養父母如禮飲食皆親侍或週疾不觧帶温常責諸子曰汝輩能如是乎及建號即金陵使府為宫唯加鴟尾欄檻而已終不改作接見親族如家人禮尊長者親拜之晚年服金石藥性多躁怒百司奏事必至厲聲訶責羣臣或正色抗辭以對事理明白必歛容慰勉之旬日之後多有恩澤故人思盡力決死刑用三覆三奏之法文武亡殁子孫隨才以叙不限資廕或營其婚嫁幼未堪任與其無嗣者内帑以給之有親老者倍其數死王事者下至卒伍皆三年給其全俸故士無貴賤悉亡身外之憂嗚嘑積厚者流澤逺積薄者流澤狹不其然乎舜之後千餘年而有陳陳亡而田氏専政於齊禹之後千餘年而有杞杞削而勾踐得志於越後世之君建大義於一時而徳不若舜禹者亦隨其澤之逺近而興起焉故晉以天下䘮於狄人而瑯琊繼之唐以天下簒於朱梁而烈祖紹之然則盜名器操生殺制一方之命抗萬乗之勢者豈非天歟烈祖之起雖無雄才大畧而深沈寛裕本於天性幸而適丁中原擾攘之際故數年之間有足觀者南唐書卷一欽定四庫全書南唐書卷二宋馬令撰嗣主書第二民靡有定誰其奠之弃師閩楚命委輿尸作嗣主書嗣主諱璟字伯玉初名景通烈祖元子也美容止器宇高邁性寛仁有文學甫十歳吟新竹詩云棲鳯枝梢猶軟弱化龍形狀已依稀人皆竒之起家為尚書郎吳讓皇見之曰吾諸子皆不及也累遷諸衞大將軍典治軍旅撫納將校烈祖出鎮金陵拜璟司徒平章事知内外諸軍事加諸道副都統烈祖受禪封吳王累遷太尉中書令諸道元帥録尚書事改封齊王既當儲副之地而固讓再三謙虚下士常若弗及烈祖殂授顧命猶讓諸弟辭益堅侍中徐玠以衮冕被之曰大行付殿下以神器之重殿下固守小節非所以遵先旨崇孝道也乃嗣位改元保大太常博士韓熈載上疏曰踰年改元古之制也事不師古弗可以訓時雖可其奏而制書已行遂改元册母宋氏為皇太后妃鍾氏為皇后弟景遂改封燕王弟景達改封鄂王弟景逷改封保寧王長子冀南昌王文武進位有差洪州宋齊丘入為左丞相江州周宗入為右丞相以元帥府掌書記馮延己為諫議大夫翰林學士夏四月戊申朔日有食之中書侍郎平章事李建勲罷為昭武軍節度使南漢劉晟弑其君玢晟自立為帝不書僣者玢之前已僣也五月司徒兼侍中徐玠卒秋七月燕王景遂改封齊王拜諸道兵馬大元帥大尉中書令鄂王景達改封燕王拜副元帥宣告中外以兄弟相傳之意以元子南昌王冀為江都尹東都留守書元子以見景遂之不得襲位也景遂固讓不許蕭儼上疏其畧曰夏商之後父子相傳不易之典惟仰循古道以裕後昆䟽奏不報冬十月庚戌有星孛于東方妖賊張遇賢聚衆十餘萬䧟䖍州諸縣諸縣舊史失名䖍州城守遇賢據白雲洞命洪州營屯都虞候嚴思禮通事舍人邊鎬討賊鎬思禮擒遇賢及賊副黄伯雄謀主僧曹景全斬於建康市以嚴思禮為海州刺史邊鎬為洪州屯營諸軍都虞候貶百勝軍節度使賈浩為監門衞將軍罪貶故書使池州安置以饒州刺史李翺為百勝軍節度使留後十有二月下令中外庶政並委齊王景遂㕘決文武百司唯樞宻副使魏岑查文徽得白事餘非召對不得見蕭儼上書極論曰元帥開府人猶驚駭况委之大政而羣臣不得時見臣恐中外隔絶姦人得志非陛下之利也書奏不報侍衞軍都虞候賈崇詣閤求見曰臣事先朝二十餘年每見延接踈逺未嘗壅隔羣下之情㒺有不達今陛下始即位所委任者何人而頓與羣臣謝絶深居邃處而欲聞民瘼猶惡隂而入乎隧道也臣老矣長不復奉顔色因涕泗嗚咽帝深為感動引與之坐賜食而出始以手札批喻儼等曰旻天不弔降此鞠凶越予小子常恐弗𩔖于厥徳用災于厥躬故退處㳟黙思底于道而壅隔之弊以為􅀸憂惟予小子實生厲階由是所下之令遂寢時宋齊丘周宗為左右丞相齊丘専執而宗純謹自守及上心旣悟齊丘乃言其非便帝曰公何不早誨我遂罷齊丘為浙西節度使齊丘黨與隆熾造作飛語以誣宗宗泣而上訴帝知之弗問此為明年宗出張本宋齊丘上表乞歸九華舊隠許之賜號九華先生封青陽公食青陽一縣二年春正月右丞相周宗罷除江西節度使門下侍郎平章事張居詠罷除浙西節度使二月辛夘日有白虹二三月左衞上將軍盧文進卒夏閩人朱文進連重遇弑其君曦重遇立文進使來告亂囚其使議伐閩以民疫釋閩使遣之夏四月秋七月鄂州王輿卒以神武統軍韋建為武清軍節度使備書官職者新命也書某州某人代者移鎮也壽州姚景卒以濠州劉崇俊代以楚州刺史劉彦貞為濠州觀察使九月庚午朔日有食之冬十有二月馮延己為翰林學士承旨水部貟外郎馮延魯為中書舍人延魯鋭於功名欲興建州之役乃贊中書舍人查文徽為江西安撫使翰林待詔臧循者嘗賈於閩具知山川險易為文徽陳進兵之計文徽因是請伐閩乃命邊鎬率洪州屯兵與文徽俱行遂入建陽王延政遣統軍使吳承祐以遊兵廵福州境紿曰唐助我討賊大軍至矣福州信之連重遇殺朱文進裨將林仁翰殺重遇函其首歸承祐延政以其子繼昌守福州親率衆以拒我師五郡之兵大集五郡福建江漳泉敵勢甚盛文徽等次于葢竹退復屯建陽啓求濟師三年春二月遣祖全恩何敬洙率萬人以應文徽與延政陣隔水全恩使建陽降將孟堅濳師出其後裨將武彦暉馬存貴以輕鋭繼之腹背夾擊延政大敗以餘兵城守閩人李仁達殺其君之子繼昌前年以福州降延政故以延政為君及其統軍吳承祐立雪峰僧卓儼眀為主儼眀無統御之畧仁達又殺之而自稱留後遣使來降即以仁達為威武軍節度使延政益不振建州之險要曰西巖延平津相繼而平夏四月秋七月庚辰星見而風雨八月甲子朔日有食之遂克建州執王延政歸于建康授羽林大將軍安化軍節度使封鄱陽王泉州刺史王繼勲漳州刺史王繼成汀州刺史許文縝皆請降因而鎮撫之諸將下建州兵無節制剽掠甚衆閩人失望帝以出師有功不録其過升建州為永安軍以祖全恩為節度使查文徽為撫州刺史何敬洙為楚州刺史偏將王建封先登功第一為信州刺史全恩未拜而卒以廬州王崇文鎮建州泉州裨將劉従効劫刺史王繼勲使之入朝従効自領州事於是王繼成許文縝皆至建康以繼勲為池州團練使繼成為和州刺史文縝為蘄州刺史即以劉從効為泉州刺史冬十月皇太后宋氏殂以延平津為劍州割建州之劍浦汀州之沙縣屬焉以建州禆將陳誨為劍州刺史以龍衞都虞候劉仁贍為武清軍節度使升泉州為清源軍以泉州刺史劉従効為節度使四年春正月陳覺諷齊王景遂言宋齊丘先朝布衣之舊委諸山林不允中外之望帝使景遂至青陽召之起拜太傅奉朝請而已以撫州李建勲為左僕射門下侍郎平章事中書侍郎馮延己拜平章事吏部尚書徐連為鎮海軍節度使二月壬戌朔日有食之命建州製的乳茶號曰京挺臈茶之貢自此始罷貢陽羡茶夏四月侍衞諸軍都虞候賈崇為奉化軍節度使留後葬元恭皇后于永陵六月壽州劉崇俊卒以濠州觀察使劉彦貞為清淮軍節度使侍衞諸軍都虞候郭全義出為濠州觀察使以劉崇俊子範為滁州刺史建州之役府庫中耗民不堪命故李仁達劉従効皆羈縻而已至是諸將請討之不許宋齊丘薦陳覺為福建路宣諭使説仁達入覲不従覺還至建安矯制發建汀撫信之師及防戍之兵掩其不意徑至城下時魏岑安撫漳泉聞覺起兵亦擅𤼵兵應覺帝大怒馮延己等為言兵業行不可止乃以王崇文為招討使王建封為副使益兵以會之馮延魯為南面監軍使魏岑為東面監軍使陳覺為諸軍監軍使仁達送欵於吳越吳越以兵三萬應之覺等爭功進退不相應延魯及吳越戰延魯敗績諸軍皆潰帝怒遣使者鎻覺延魯至金陵而馮延己為宰相宋齊丘亦預三公稍觧之貟外郎韓熈載諌曰臣觀覺等罪不容誅但齊丘延己内為陳請所以得全且擅興者不罪則疆塲生事䘮師者獲存則行陣觧體請行顯戮以重軍威帝曰齊丘延己有自咎之表無請赦之辭覺等五木被體一家狼藉永不録用與死何殊乃流覺蘄州流延魯舒州齊丘惡之貶熈載和州司馬冬十有二月壬戌契丹及晉師戰于中渡晉師敗績丙寅杜重威李守貞以王師降于契丹癸酉張彦澤引蕃騎䧟京師彦澤剽刼屠害甚衆晉帝奉表納璽於遼主以其失利勢故不書天子是嵗中原無主宻州刺史皇甫暉青州刺史王建及㳂淮諸戍皆來降方且疲兵東南不暇北顧馮延己延魯魏岑陳覺皆以姦囘得用人情不平旣流延魯及覺而延己為相岑亦居近宻於是御史中丞江文蔚䟽其罪曰二凶雖去未稱民情四罪盡除方明國典帝大怒貶文蔚江州司士㕘軍亦罷延己為太子少傅岑為太子洗馬漳州禆將林贊堯殺監軍周承義以叛討平之以泉州禆將董思安為漳州刺史思安辭以父名章命改漳州為南州副使劉從願殺思安自領州事南州復為漳州南唐書卷二欽定四庫全書南唐書卷三宋馬令撰嗣主書第三五年春正月晉帝舉族出封丘門遼主次于京城北不見帝遼不與之見也猶書曰京城者甚遼之惡也文武百官素服紗㡌俯伏俟罪遼主命起之親加慰撫遂入都城據大内改京師為都城晉無君也己丑斬張彦澤於東市以其剽刧之罪庚寅洛京留守景延廣自扼其喉死辛夘遼廢晉帝為光禄大夫檢校太尉封負義侯黄龍府安置此中原之事悉書者以下文使來告故也遼使來告曰晉少主逆命背約自貽廢黜吾主欲與唐繼先世之好將册命唐為中原主帝命近臣對曰唐守江淮社稷已固與梁宋阻隔若爾主不忘先好惠錫行人受賜多矣其他不敢拜命之辱遣兵部侍郎賈潭報聘帝歎曰閩役憊矣其能抗衡中原乎以齊王景遂為太弟燕王景達為元帥改封齊王元子南昌王冀為副元帥封燕王依前東都留守安樂公茂為侍衞諸軍都虞候二月丁巳朔遼改晉都為大遼國肆眚改元㑹同猶謂之晉都者漢未立也不謂之京師者中原無主也不書赦不與遼赦中國也辛未漢帝即位天子即位易代則書改晉開運四年為天福十二年中原改元不書此書㑹同非常也漢稱天福十二年亦非常也三月宣州徐知證卒夏四月丙子太白晝見以皇甫暉為神衞軍都虞候秋八月以太傅宋齊丘為鎮南軍節度使周宗為寧國軍節度使錢佐卒保襲位冬十有一月壬子雨木冰辛酉雨木冰癸酉雨木冰十有二月越人胡進思廢其君倧囚於義和院錢俶入是嵗馬希範卒希廣襲位六年春正月越人立俶遷倧于東府丁丑天子崩漢高祖以太子少傅馮延己為昭武軍節度使夏四月廬州周鄴卒五月葬楚文昭王葬吳越忠獻王越亂故緩六月庚寅朔日有食之秋漢伐河中圍李守貞守貞遣從事朱元李平奉表來乞師以潤州李金全為西面行營招撫使壽州劉彦貞為副諫議大夫查文徽為監軍使兵部侍郎魏岑為㳂淮廵撫使聞河中平遽班師冬十有一月高從誨卒保庸嗣位葬南平文獻王七年春正月淮北諸盜來附以神武都虞候皇甫暉禆將張巒蕭處恭帥師出海泗諸郡以右散騎常侍張義方為監軍使納賊帥咸師朗以歸二月以中書舍人嚴續為奉化軍節度使以江州賈崇為神武統軍侍衞諸軍都指揮使夏四月壬申太白晝見贈故廬山江夢孫國子司業六月癸酉朔日有食之秋七月殺天威統軍都虞候王建封八月以建州王崇文鎮廬州以諫議大夫查文徽為永安軍節度使留後冬十有二月日暈三重八年春正月詔曰春秋日食地震星孛木冰可謂甚矣比者災異仍多豈人君不徳以召之耶抑亦天心之仁愛而譴告之也朕甚惕焉曩者兵連閩粤武夫悍將不喻朕意而務為窮黷以至父征子餉上違天意下奪農時咎將誰執在予一人其大赦境内窮民無告者大賜粟帛二月以東都留守燕王冀為潤宣二州大都督鎮京口宣州周宗為東都留守福州許言吳越戍兵亂殺李仁逹而遁遣人告急于境建州節度使查文徽以興兵故書使劍州刺史陳誨以舟師應之文徽留誨屯江口進至西門伏兵發文徽被執誨與越人戰大敗之獲其將馬先進葉仁安等歸于建康帝送先進等還越越亦歸文徽夏四月以劍州刺史陳誨為永安軍節度使秋七月冬十有一月甲子朔日有食之乙酉天子崩漢隠帝楚朗州節度使馬希蕚遣使來乞師遂以楚州屯兵攻潭州殺希廣杖其妻死於市左右用事者皆臠割之希蕚自稱楚王邊鎬統信州屯兵以覘楚十有二月漢將郭威領大軍北征壬子次澶州何福進率壯士擁威為天子書此以見中原治亂九年春正月周帝即位劉旻稱帝於太原以其曲在周故不曰僣初契丹犯河南晉帝北遷韓熈載上書曰陛下有經營天下之志當在今時若遼主遁歸中原有土安輯稍定則未可圖也時以連兵南閩至此方議北師熈載又上書曰郭氏姦雄雖有國日淺而為理已固兵若輕舉非獨無成亦且有害乃命李金全耀兵於淮上而止夏四月秋七月樂安公茂卒冬十月楚人徐威陳遷魯公綰陸孟俊執其君馬希蕚囚于衡山立王子希崇十有一月楚人廖偃等招合蠻獠復立希蕚為楚王楚國大亂邊鎬以信州屯兵出宜春討長沙破其軍於龍回關徐威等以希崇降希蕚亦送欵于鎬鎬盡遷馬氏之族于金陵以希蕚為洪州大都督封楚王希崇為舒州節度使以邊鎬為湖南節度使鄂州劉仁贍以舟師趨岳州岳州降以將軍宋徳權為岳州刺史以客省引進使任鎬為監軍使以馬光恵為朗州節度使留後宋齊丘拜太師固辭復為太傅十年春正月分洪州高安縣置筠州割清江萬載上臯屬焉以湖南行營糧料使王紹顔為刺史三月以撫州馮延己為左僕射平章事右僕射孫晟守本官平章事潤州徐連中書侍郎平章事夏四月丙戌日有食之五月司徒致仕李建勲卒秋劉晟取桂管將軍張巒爭之不克朗州裨將劉言執留後馬光惠送建康言自領州事遣李建期屯益陽將討劉言而楚地新定府庫空虚宰相馮延己以克楚為功不欲取費於國乃重斂其民以給軍邊鎬不能鎮撫楚人皆怨帝亦惡之謂馮延己孫晟曰湖湘之役楚民厭亂求息肩於我今欲罷桂陽之師解益陽之戍即授劉言以節鉞使自安輯其民吾亦得惠養湘衡之地如是則逺邇完實二蕃在吾度内爾公等亟行之無為後悔孫晟即欲奉行延己曰吾以偏師克全楚天下驚動今三分喪二何以為功遂稽其命未幾劉言遣王進逵破益陽殺建期等乗勝攻長沙邊鎬遁歸所在屯戍相繼散走獨張巒全師而還且戰且行取資於道岳州刺史宋徳權監軍使任鎬皆弃城走帝大怒削邊鎬官流饒州戮宋徳權任鎬于大社斬禆將申洪泰尹建于都門外以張巒為信州刺史延己等自劾起之孫晟請罪不已乃罷為右僕射冬十有二月洪州大都督馬希蕚入覲留建康弗遣十有一年春二月周行馮據潭州三月建康大火踰月廬舍營署殆盡夏五月以太傅宋齊丘為鎮南軍節度使秋七月以鄂州劉仁贍為神武統軍侍衞都指揮使以濠州觀察使何敬洙為武清軍節度使大蝗八月不雨冬十月築楚州白水塘以漑田命州縣陂塘堙廢者修復之十有二月木氷十有二年春正月大星墜于東北聲如雷兖州節度使慕容彦超遣使來乞師以拒周出兵數千至淮北不書將校舊史失之為周師所敗俘其將校于京師天子平彦超釋唐俘諭之曰歸語爾主朕誅逆命何苦來援帝亦悔之漢末遣使潭州市茶會邊鎬平馬氏例俘于金陵由是引對慰勞以上茗萬斤遣之壬辰天子崩周太祖自前年八月不雨至于三月民大饑疫死者大半下令郡縣煑粥以食之劉旻乞師于契丹以寇潞州天子親行大敗之休兵潞州大饗將士斬敗將樊受能等七十餘人軍威大振進圍太原遣符彦卿史彦超等北控圻口以斷契丹援路彦卿等敗績彦超戰沒天子遽班師書以見世宗威畧為明年伐我張本夏五月丁亥月重輪秋七月契丹使其舅來聘昇元中宋齊丘選宫嬪雜以珠貝羅綺泛海北通契丹欲賴之以復中原而遼使至則厚幣遣還迨至淮北輒使人刺之復遣使㳂海齎琛寳以報聘遼意晉人殺其使數犯中原至是館遼使于清風驛夜醼更衣盜斬其首契丹自此不至葢中原間之也冬十月十有三年春二月以門下侍郎嚴續守夲官平章事夏四月以壽州劉彦貞為神武統軍侍衞諸軍都指揮使以劉仁贍為清淮軍節度使三月周伐蜀秋七月蜀使來聘冬十月東都留守周宗乞罷鎮詔曰崧嶽降靈誕生良弼佐我先朝施及朕躬尚賴保釐底于成績而遽爾請罷豈朕不徳不能優禮勲舊而致然也昔蕭何守巴蜀而髙祖無西顧之患冦恂守河内而光武無分民之嫌今任公以何恂之事宜强飯扶力以副朕意於嘻國之安危惟茲淮甸慎始成終非公而誰所請宜不允宗以老病三表乃許守司徒致仕以中書舍人馮延魯為工部侍郎東都留守以侍衞諸軍都虞候賈崇為東都屯營使十有一月周師來伐李穀為都部署攻壽州帝召洪州宋齊丘還都齊丘請徴諸郡兵屯於淮泗以禆將有才畧者主之聲言偏師敵人不測其實必難輕進春水時至糧道阻隔懸軍日久自當遁去然後遣使請平彼必樂從議者不同遂止劉彦貞督兵以抗周師江州皇甫暉帥師為援李榖退屯正陽天子命李重進為竒兵以要彦貞彦貞追榖至正陽重進與榖腹背擊之彦貞大敗死于陣諸軍皆潰張全約以其衆奔壽春自楊氏王吳淮甸之人不識干戈者二十餘年及彦貞敗民皆恟懼帝欲親拒周師中書舍人喬匡舜極諫貶匡舜臨川親行之議亦寢天子先詔錢俶攻常宣二州以撓我師於是吳越伺間攻常州刺史趙仁澤被執將軍柴克宏救常州大敗越人斬首千餘級獲其將吏數十人皆斬於京口拜克宏奉化軍節度使天子營於淝水之陽徙正陽橋於蔡下林仁肇皇甫暉爭之不勝暉走滁州天兵追殺之以周師為天兵太祖主兵故也遂下滁州帝惡之遣泗州牙將王知朗至滁州稱唐皇帝奉書願効貢賦陳兄弟之禮天子不答東都留守馮延魯光州刺史張紹舒州刺史周祚泰州刺史方納皆弃城走延魯削髪偽為僧遁歸周人執之蘄州禆將李福殺其刺史王承雋降周帝益惡之始改名景以避周廟諱遣翰林學士鍾謨文理院學士李徳明奉表稱臣獻犒軍牛五百頭酒二千石金銀羅綺數千請割壽濠泗楚光海六州以求罷兵天子不報謨等皆留行在分兵襲下楊泰帝遣人懐蠟丸書走契丹求救為邊將所執光州刺史張承翰降周天子至淮南下詔安撫楊氏之後帝聞之命園苑使尹延範自泰州徙讓皇一族于京口延範殺其子弟六十餘人以其婦女渡江周先鋒使劉重進得其玉硯瑪瑙碗翡翠瓶以獻周楊氏遂絶帝罵曰小人以不義之名累我腰斬延範歸之以專殺之罪南唐書卷三欽定四庫全書南唐書卷四宋馬令撰嗣主書第四十有四年春正月遣司空孫晟禮部侍郎王崇質奉表于周辭益卑服削去帝號天子猶不答留晟等弗遣鍾謨請歸取表盡獻江北之地天子許之遣崇質徳明還始賜江南書曰自有唐失御天歩多艱六紀于茲𤓰分鼎峙自為聲教各擅蒸黎交結四夷憑陵上國華風不競否運所鍾凡百有心孰不興憤朕擅一百州之富庶握三十萬之甲兵農戰交修士卒樂用茍不能恢復内地申畫邊疆便議班旋直同戲劇至於削去尊稱願輸臣節孫權事魏蕭詧奉周古也雖然今則不取但存帝號何爽嵗寒儻堅事大之心必不迫人于險徳明等歸盛稱周天子英武帝尤惡之宋齊丘陳覺等皆以割地無益而徳明賣國以圗利帝怒斬徳明二月遣元帥景達帥師應壽春陳覺為監軍使拜邊鎬為大將許文縝副之中書舍人韓熈載上疏請罷監軍使不報司徒致仕周宗卒三月江州柴克宏卒諸郡屯田相率起義以農器為兵襞帋為鎧處處保聚號曰甲軍周師苦之景達等趨壽州其將朱元李平唐進克復舒蘄泰三州夏大雨周師在楊滁和者皆却諸將請要其險隘擊之宋齊丘曰擊之怨深不若縱之以為徳誡諸將閉壁不得要戰周師皆集於壽州故諸州雖復而壽春之圍益固天子駐於渦口猶欲再幸楊州宰相范質以師老泣諫乃班師以李重進攻廬州向訓守楊州訓請棄楊州併力以攻壽春乃封府庫付主者遣淮南舊將按巡城中秋毫不犯而去淮人大悦皆負糗糧以送周師秋七月楊光滁和復歸于我冬十有一月周殺我行人孫晟十有五年春元帥景達命其將朱元等屯紫金山築甬道以餉壽州二月天子復來伐徙下蔡橋于渦口為鎮淮軍築二城以夾淮周師連破紫金山諸寨監軍陳覺乞罷朱元帝遣大將楊守忠代元且召之元憤怒叛降周諸軍皆潰許文縝邊鎬被擒景達以州兵奔還金陵三月丁未劉仁贍病且死其副孫羽等以壽州降仁贍病卒夏四月己巳天子班師亂兵焚楊州民皆徙江南秋七月冬十月天子復來伐圍濠州刺史郭廷謂降周泗州守将范再遇叛降周廷謂不書叛者力不支也泰州亦潰周師歩騎數萬水陸齊進軍士作檀來之歌聲聞數十里檀來者但來也北人語音十月二月天子駐于楚州城北十有六年春正月大赦改元交泰周師攻楚州守将張彦能鄭昭業城守益堅城壊彦能昭業戰死周人屠其城而戍之丁未海州潰壬辰靜海軍潰周人盡得海泰楊楚之地丁卯周人次楊州癸酉次𤓰州三月壬午朔次泰州丁亥復次楊州辛夘遂幸迎鑾以臨大江周自屠楚州貶書人其後駐幸皆書次至迎鑾復書幸不泯其實也時楊泰滁和壽濠泗光海等州已為周得迺遣陳覺奉表獻廬舒蘄黄畫江以為界天子許之賜書曰皇帝㳟問江南國主勞其良苦而已四年而後克亦已憊矣夏五月下令去帝號稱國主奉周正朔以交泰元年為顯徳五年鍾謨遇延魯至自京師國主復遣謨等奉表拜成且請𫝊位始降號稱國主𫝊位不曰𫝊乎某人者景遷為太弟時未定也天子優詔勞安之𫝊位之意遂止以謨為禮部侍郎延魯户部侍郎以行營應援使林仁肇為浙西節度使前廬州孫漢威為奉化軍節度使贈劉仁贍太師追封衞玉孫晟太傅追封魯國公劉彦貞中書令張彦能侍中其餘將士死國難者追贈有差秋泉州劉従効奉表貢于京師天子不納冬十月禮部侍郎常夢錫卒十有二月流陳覺于饒州流李徴古于洪州皆殺之放宋齊丘于青陽太弟景遷固請歸藩于是以長子冀為太子以景遷為洪州大都督封晉王齊王景達為撫州大都督信王景逷為百勝軍節度使昇元初括定民賦每正苗一斛别輸三斗於官廪授鹽二斤謂之鹽米至是淮甸鹽場皆入於周遂不支鹽而輸米如初以為定式顯徳六年春正月宋齊丘縊死于青陽夏晉王景遂卒秋七月鍾謨請鑄大錢以一當十文曰永通泉貨以信州刺史張巒為天徳軍使九月太子冀卒初丹陽古銘曰天子冀州人以冀應之未幾卒識者謂冀州趙地也明年皇朝受命之符爾次子従嘉封吳王居東宫鍾謨曰従嘉輕肆請立紀國公従善國主怒貶謨為國子司業立從嘉為太子天子使人謂國主曰吾與汝大義已定終慮後世不汝容可及吾世修城隍治要害為子孫計國主因營緝諸城謀遷都于洪州曰建康與敵境隔江而已又在下流敵兵若至閉門自守借使外諸侯能救國難即為劉裕陳霸先爾今吾徙豫章據上流而制根本上策也羣臣多不欲惟樞宻使唐鎬贊成之夏六月熒惑守心光芒相射癸巳天子崩周世宗秋七月升洪州為南昌建南都冬十月流鍾謨于饒州賜死貶張巒為宣州副使殺之十有二月罷鑄大錢明年周亡編年之法絶筆於周亡者清風發而羣隂伏理固然也雖然無所述而遂泯其實則何以著李氏之罪故名器服物慶賞刑威直書其僭將以正其罪爾建隆元年臣属于皇朝夏四月太子太傅馮延己卒是歳李重進使來乞師拒之遣馮延魯入貢以聞二年春以世子従嘉監國國主如南都所過慰勞守宰存問高年疾苦㑹齊王景達于廬山歴覽勝境與従臣譚宴浹日而去三月至南都以何洙為奉化軍節度使敬洙去敬字避皇朝諱豫章迫隘宫府營署皆不能容羣臣日夕思歸國主悔怒唐鎬慙懼發瘍卒六月國主殂于南都年四十有六在位十有九年秋七月國主之喪至自豫章羣臣請殯别宫世子手札不許辭甚哀切書世子手札未即位也見後主書乃殯于萬壽殿遣使入朝乞追復帝號太祖皇帝許之諡眀道崇徳文宣孝皇帝葬順陵廟號元宗先謚而後書葬者因其請號順文勢也徐鉉曰嗣主工筆札善騎射賓禮大臣敦睦九族毎聞臣民不獲其所者輒諮嗟傷憫形於顔色隨加救療居處御服節儉得中初立有經營四方之志邪臣阿諂職為厲階晚歳悔之已不及矣少有至性仍懐高世之量始出閤即命於廬山瀑布前構書齋為他日終焉之計及迫於紹襲遂捨為開先精舍常患民間侈靡第宅衣服咸為節制驅惰遊之人率歸農業及大漸之際羣鶴翔於空雙龍據殿屋遂奄然而化嗚呼甚哉守成之難也非特守之難而授之者尤難非授之難而知其可受者為難商有天下成湯作之太甲守之而中有不𩔖之憂嚮非阿衡之佐則求其思庸之復也難矣周有天下武王作之成王守之而中有流言之變嚮非周公征之則求其鳧鷖之雅也亦難矣以唐太宗之豐功大業一正天下建不拔之基而晉王之立殺父之臣失父之政卒至於大亂矧不及於太宗者乎元宗即位一十九年有經營四方之志約已慎刑勤政如一嚮非任用羣小屏棄忠良國用不殫於閩楚師旅不棄於淮甸則庶幾完成之君也志有之曰楊者易生之木也一人植之十人拔之無生楊矣以新造之唐而守之非道不幾乎朝蒔而夕揠其亡也不旋踵故周世宗以衰世之鋒一鼓而十四州之地掇如也悲夫南唐書卷四欽定四庫全書南唐書卷五宋馬令撰後主書第五嗚呼春秋之時君薨明年正月公即位自桓公始宣成而下未嘗革也昭公薨于乾侯定公于明年夏六月戊辰即位者其故何哉蓋非常之變起于不可測非常之禮行于不得已古之人觀㑹通以應世則處非常之變用非常之禮者皆禮經之所不得而考也義起於情而已矣且諸侯薨于路寢而昭公客死于乾侯者非常之變起于不測也嗣君釋冕反喪而定公即位于明年六月者非常之禮行于不得已也元宗殂于豫章後主留守建康必待喪還旣殯而後即位其偶合于定昭之事乎且聖人制禮立天下之大經為天下之大防也情偽之變無窮而禮之所載有常以有常之禮御無窮之變則亦隨其宜而已矣故禮不盡而義有餘則禮以義起義不足而禮有餘則義以禮達君子遭變亂而無曠於禮者在審其義爾大喪禮之大典禮經載之詳矣而曾子之所問者禮經有所不及也變禮之不測曾子問載之詳矣而國君薨于外世子立于内者曾子問有所不及也非趨時而合義其孰能與于此哉徳雖不競孰匪天亡日月俱照爝火銷光作後主書後主名煜字重光初名従嘉元宗第六子也少而聦慧善屬文工書畫初封安定郡公淮上兵起為神武軍都虞候㳂淮巡撫使累遷諸衞大將軍諸道副元帥封鄭王太子冀卒四兄皆早亡以次為嗣改王吳拜尚書令知政事建隆二年元宗南遷立煜為太子監國六月元宗殂於豫章七月喪還建康太子即位尊母鍾氏為太后太后父名太章故改號聖尊后妃周氏為國后封弟従善為韓王南都留守従益鄧王従謙宜春王従度昭平郡公従信文陽郡公以右僕射嚴續為司空依前平章事大赦境内文武進位有差罷諸路屯田使委所屬令佐與常賦俱征初南唐屯田置使專掌至此罷其使而屯田佃民絶公吏之撓八月鄂州王崇文卒以南郊巡檢使黄延謙為武清軍節度使留後冬十月以南都留守韓王従善為司徒兼侍中諸道兵馬副元帥以鄧王從益為司空南都留守下令諸司無職事官四品以下至九品日二貟待制於内殿泉州劉従効遣其子紹基來貢三年劉従効卒州人立其次子紹鎡為留後紹基未還統軍使陳洪進執紹鎡并其族送于金陵推立其副張漢思漢思老不任事洪進逐之自稱留後國主即以洪進為清源軍節度使以紹基為殿直軍都虞候紹鎡為監門衞中郎將句容尉張秘上言為理之要詞甚激切國主手批慰喻召為監察御史以神武統軍秋七月建州陳誨卒禮部尚書潘承祐卒以江州何洙為左武衞上將軍封芮國公以宣州朱業鎮江州以神武統軍林仁肇為寧國軍節度使乾徳元年夏左武衞上將軍何洙卒秋七月以兵部尚書游簡言知尚書省遷右僕射是歳南平髙繼沖歸于京師國除初金陵臺閣殿庭皆用鴟吻自乾徳後朝廷使至則去之使還復用二年春正月始用鐵錢以鐵錢使户部侍郎韓熈載為兵部侍郎勤政殿學士初烈祖將殂謂元宗曰徳昌宫泉布億萬緡以給軍用吾死善修鄰好北方有事不可失也及元宗即位兵屢起徳昌泉布既竭遂鑄唐國錢其文曰唐國通寳又鑄大唐通寳與唐國錢通用數年漸弊百姓盗鑄極為輕小保大末兵窘財乏鍾謨改鑄大錢以一當十文曰永通泉貨徑寸七分重十八銖字八分書背面匀好皆有周郭謨誅遂廢至是有鐵錢之議每十錢以鐵錢六雜銅錢四既而不用銅錢民間但以鐵錢貿易物價增涌民復盜鑄頗多芒刺不及官場圎淨雖重其法犯者益衆至末年銅錢一當鐵錢十禮部侍郎湯悦上言泉布屢變亂之招也且豪民富商不保其貲則日益思亂累數百言不報夏鄂州黄延謙卒以宣州林仁肇代九月封長子仲寓清源公次子仲宣宣城公冬十月仲宣卒追封岐王十有一月國后周氏殂三年春葬昭惠后于懿陵蜀孟昶俘于京師國除以江州朱業為神武統軍侍衞都軍使以虔州留後柴克貞為奉化軍節度使夏以司空平章事嚴續鎮潤州秋九月聖尊后鍾氏殂召南都留守鄧王従益還都以鄂州林仁肇為南都留守南昌尹葬光穆皇后于順陵朝廷許元宗追復帝號故鍾氏稱皇后四年夏五月以吉州刺史楊守忠為武清軍節度使留後秋一月神武統軍朱業卒十有二月潤州嚴續卒五年春命兩省侍郎諫議大夫給事中中書舍人集賢勤政殿學士分夕於光政殿宿直國主引與譚論或至夜分開寳元年夏江王景逷卒冬十有一月納后周氏昭惠之母弟也二年春以左僕射游簡言兼門下侍郎平章事夏簡言卒以禮部侍郎湯悦為門下侍郎平章事知制誥張洎上疏曰悦非經綸之才不宜處鈞衡之地國主以悦文學舊臣特加奨用乃罷洎職冬較獵于青龍山還憇大理寺親録囚徒原貸甚衆韓熈載奏獄訟有司之事囹圄之中非車駕所至請捐内帑錢三百萬充軍資庫用國主従之曰繩愆糾謬其熈載之謂乎天子詔國主諭南漢稱臣劉鋹怒執我行人龔慎儀三年中書侍郎韓熈載卒贈平章事命境内崇修佛寺又於禁中廣署僧尼精舍多聚徒衆國主與后頂僧伽帽衣袈裟誦佛經拜跪頓顙至為瘤贅由是建康城中僧徒迨至數千給廪米緡帛以供之四年春劉鋹俘于京師國除夏四月齊王景達卒遣弟韓王従善入朝留于京師授泰寧軍節度使國主表求従善還國不許自従善不還四時宴㑹皆罷登高賦文以見意曰原有鴒兮相従飛嗟嗟季兮不來歸常怏怏以國蹙為憂冬有商人上宻事請往江陵竊燒皇朝戰艦國主懼事泄不聽商人遁去五年春皇朝屯師漢陽鄂州楊守忠以聞人心大恟乃貶損制度下書稱教改中書門下省為左右内侍府尚書省為司㑹府御史臺為司憲府翰林為文館樞宻院為光政院降封韓王従善為南楚國公鄧王従益為江國公吉王従謙為鄂國公其餘官號多有改易殿庭始去鴟吻每遇皇朝使至國主衣紫袍備藩臣禮使退服御如初六年春皇朝使中書舍人盧多遜來聘國主願受封拜不許洪州林仁肇卒冬中書舍人潘佑薦衞尉卿李平判司農寺又薦平知司㑹府羣情紛紛以為朋黨佑上書極言時政凡七章不止有家國隂隂如日將暮之辭國主惡之乃収平下大理自縊妻子徙饒州次収佑佑自剄母及妻子徙虔州七年皇朝使閤門使梁逈來聘従容謂國主曰今歳國家有柴燎之禮當入助祭國主唯唯不答秋中書舍人李穆賫詔曰朕以仲冬有事于圓丘思與卿同閲犧牲國主辭以疾穆反命遂決進取九月王師自荆湖直趨池州池州主將戈彦棄城走遂克池州進軍當塗將軍張溫鄭彦華杜真相繼敗績下教去開寳年號公私牘籍稱甲戌歳江南自周世宗後不復用兵僅二十年老將已死主兵者皆新進少年以功名自負輒抗王師聞兵興踊躍言利害者日有十數及遇輟敗北中外奪氣戒嚴城守國主遣徐鉉周惟簡奉表乞緩師不答王師進屯建業城南十里時雖下池州及姑熟餘郡皆未奉命糧道阻隔樊若水請於采石繫浮橋以利轉輓每歳大江春夏暴漲謂之黄花水及王師至水皆退小故識者知其有天命焉吳越圍常州軍使余成禮刧刺史禹萬誠以降吳越進圍京口議者以京口要害之地當得良將守之乃拜親吏劉澄鎮海軍節度使留後以凌波軍都虞候盧絳為援澄已懐嚮背因說絳還金陵而自率將吏降越袁州萍鄉制置使劉茂忠破潭師於境内拜茂忠袁州刺史八年春閲民為師徒昇元初均量民田以定科賦自二緡以上出一卒號義師中有别籍分居又出一卒號新擬生軍民有新置物産者亦出一卒號新擬軍又於客户内有三丁者抽一卒謂之圍軍後改為拔山軍使物力户為帥以統之保大中許郡縣村社競渡每歳端午官給綵段俾兩兩較其遲速勝者加以銀椀謂之打標舟子皆籍其名至是盡蒐為卒謂之凌波軍又率民間傭奴贅婿謂之義勇軍又募豪民能自備緡帛兵器招集無賴亾命謂之自在軍又括百姓自老弱外能被堅執鋭者謂之排門軍并屯田白甲之𩔖凡一十三等皆使扞敵守把夏誅神衞統軍諸軍都虞候皇甫繼勲秋洪州節度使朱令贇將兵一十五萬屯潯陽湖口與諸將議曰令若前進而王師反據我後則上江阻隔退乏糧道亟為虜矣乃以書招南郡留守劉克貞代鎮湖口克貞以病留令贇亦未進國主累促之令贇以長筏大艦帥水陸諸軍至虎蹲洲與王師遇舟筏俱焚令贇死餘衆皆潰金陵受圍經歳城中斗米者相救藉自潤州降後不聞外信或云令贇已敗國主猶意其不實冬百姓疫死士卒乏食訹云大軍決以十有一月乙未破城國主議遣其子清源公仲㝢出通降欵左右以謂堅壘如此天象無變豈可計日取降是日城果陷宫中圗籍萬卷尤多鍾王墨跡國主嘗謂所幸寳儀黄氏曰此皆累世保惜城若不守爾可焚之無使散逸及城䧟文籍盡煬光政使陳喬曰吾當大政使國家致此非死無以謝乃自縊死諸將戰沒者猶數十人昇元寺閣崇構因山為基高可十丈平旦閣影半江梁時為瓦棺閣至南唐民俗猶因其名士大夫暨豪民富商之家美女少婦避難於其上迨數百人越兵舉火焚之哭聲動天一旦而燼大將曹彬整軍成列至其宫門門開國主跪拜納降彬答拜為之盡禮先是宫中預積薪煜誓言社稷失守當携血屬赴火既降無國主之號故書名旣見彬彬諭以歸朝俸禄有限費用日廣當厚自齎装一歸有司之籍即無及矣遣煜入治装禆將梁逈田欽祚力爭以謂茍有不虞咎將誰執彬笑而不答逈等固諫彬曰彼能出降安能死乎翌日治舟彬遣健卒五百人為津致輜重登舟一卒負籠下道旋彬立斬之負擔者㒺敢蹉跌煜以藏中黄金分遺近臣辦装張佖得金二百兩詣彬自陳不受請奏其事彬以金輸官而不以聞煜舉族冐雨乗舟百司官屬僅千艘煜渡中江望石城泣下自賦詩云江南江北舊家郷三十年來夢一場吳苑宫闈今冷落廣陵臺殿已荒凉雲籠逺岫愁千片雨打歸舟淚萬行兄弟四人三百口不堪閑坐細思量至汴口登普光寺擎拳讚念久之散施緡帛甚衆九年春俘至京師封遺命侯授左千牛衞上將軍太宗皇帝登極改封隴西公太平興國三年公病書公者皇朝所封也命翰林醫官視疾中使慰諭者數四翌日薨在偽位十有五年年四十二追封吳王以王禮葬洛京之北邙山江南人聞之巷哭設齋王著雜説百篇時人以為可繼典論又妙於音律舊曲有念家山王親演為念家山破其聲焦殺而其名不祥乃敗徴也復書王者皇朝追封也徐鉉曰嗣主諸子皆孝而後主特甚敦睦親族亦無不至唯以好生富民為務常欲羣臣和於朝不欲聞人過章疏有糾謫稍訐者皆寢不報酷好古道而國削勢弱羣臣多守常充位不克如意歎曰天卞無周公仲尼吾道不可行也已刑法太寛亦無過此及大兵之際上下感恩故人無異志威令不素著故莫盡死力葢亦天授大宋非人謀所及也嗚呼隋文帝初輔政于周内有五王之難外罹尉遲迴司馬消難王謙之亂方是時指鹿逐兎未知適従武夫悍將誰無覬覦蕭巋承武皇享國之長有席卷山南之勢而區區敬慎不敢連衡迴䇿者信其臣栁荘之言預知隋公之必興故也矧迺蕞爾江南獲覩真人之作而不為之退聽其罪當如何哉李氏有國肇於天福盛於開運削於顯德亡於開寳豈非有幸於亂世而不容於治世歟以周世宗之時削國降號稽首稱藩其勢固已蹙矣及屬皇朝普天之下莫不翹首太平而猶竊土賊民十有六年外示柔服内懐僭偽豈非所謂逆命者哉及其計窮勢迫身為亡虜猶有故國之思何大愚之不靈也若此後主樂府詞云故國夢初歸覺來雙淚垂又云小園昨夜又西風故國不堪翹首月明中皆思故國者也南唐書卷五欽定四庫全書南唐書卷六宋馬令撰女憲𫝊第一嗚呼古之欲明明徳於天下者先治其國欲治其國者先齊其家齊家之法在於女憲而女之所以為憲者毋傾城之哲也毋索家之言也究徳性之厚原道化之本不過於以順為事以貞為節而已順貞以化天下何往不格哉是故觀刑二女虞舜惟帝徽𫝊太姒西伯惟王帝王之徳配天地而推其本始以言之必自於閨閫之近者凡以天下之本在國國之本在家故也易曰夫夫婦婦而家道正正家而天下定作女憲𫝊先主元㳟皇后宋氏不知其世裔也幼為亂兵畧取義祖得之常置帳下㑹先主喪其正室義祖指宋氏謂先主曰是必有福今以乞女先主御之不書蒸之者義祖首惡也生嗣主及景遷景遂景達遂立為繼室治内有法不茍言笑常以端嚴自持雖妾媵之間儼如賓客義祖死于建業知詢等督先主奔赴先主欲往宋氏従容諫曰移孝為忠臣子之常况權重身危而輙罷所執何異太阿倒持柄不在我矣先主大悟因寢其行而命周宗赴金陵天祚二年封齊王妃先主受禪冊命為皇后昇元末先主服餌金石性多暴怒左右賴后以芘者甚衆嗣主即位上冊為皇太后每元宗朝太后言惟勞其良苦而已至於治理無一言及之常曰婦人預外事非國之福也保大三年殂葬永陵諡元恭先主种氏不知其品秩也江西良家女性警悟通書計常靚糚去飾而態度閑雅宛若神仙初進入宫年甫十六久不得幸宋后數數薦引旣承恩寵服御輒亞於后而諸宫罕得進御及生江王景逷僭侈尤甚一日先主幸元子齊王宫遇其親理樂器先主大怒切責數日种氏乗間言景逷才過齊王先主作色曰子之過父戒之常理也國家大計女子何預遂叱内臣捽庭下去簪珥幽于别宫數月命削髪為尼先主殂种氏泣曰人彘骨醉復見於此矣其後歸景逷宫宋太后屢欲甘心賴元宗保全之竟以壽終每於后不書妖艶而於嬪御詳言之嗣主光穆皇后鍾氏虔州刺史太章之女太章初為禆將義祖用之以殺張顥旣而自大先主欲繩之義祖曰昔無太章吾族赤矣汝曹安所託乎今日富貴太章力也背之不可乃命以太章女配嗣主義主初見歎曰非此兒不敵此女嗣主起家自尚書郎至于將相鍾氏始封縣君累加國夫人昇元中封齊王妃嗣主即位冊為皇后少長富貴不事玩好副笄大練淡如也旣居大位歳時賜予必先諸姒然後及中宫以故嗣主樂推諸弟而終無間言者后勉之為多淮上兵起國歩多艱后亦損常膳不舉樂者數月後主即位冊為太后以父為太章故號聖尊后乾徳三年聖尊后殂葬順陵諡光穆嗚呼南唐建國始僭皇后之號及其衰削猶有國后之稱至於六宫品秩雖無所考而内夫人之品保儀之秩各因事見其餘名號僭擬天子亦可知矣後主昭惠后周氏小字娥皇大司徒宗之女甫十九歳歸于王宫通書史善音律尤工琵琶元宗賞其藝取所御琵琶時謂之燒槽者賜焉燒槽之説即蔡邕焦桐之義或謂熖材而斵之或謂因􅅡而存之元宗南幸豫章詔音存問以令婦稱後主即位冊為國后后雖在妙齡婦順母儀宛如老成唐之盛時霓裳羽衣最為大曲罹亂瞽師曠職其音遂絶後主獨得其譜樂工曹生亦善琵琶按譜粗得其聲而未盡善也后輒變易訛謬頗去洼淫繁手新音清越可聽後主嘗演念家山舊曲后復作邀醉舞恨來遲新破皆行于時中書舍人徐鉉聞霓裳羽衣曰法曲終慢而此聲太急何耶曹生曰其本實慢而宮中有人易之然非吉徴也嵗餘周后子母繼死後主國歩浸微音之所起實由人心而嘽緩噍殺治亂應之豈虚言乎后生三子皆秀嶷其季仲宣僄寧清峻后尤鍾愛自鞠視之后既病仲宣甫四歳保育於别院忽遘暴疾數日卒后聞之哀號顛仆遂致大漸後主朝夕視食藥非親嘗不進衣不解帶者累夕后雖病亟爽邁如常謂後主曰婢子多幸託質君門冐寵乗華凡十載矣女子之榮莫過於此所不足者子殤身歿無以報徳遂以元宗所賜琵琶及常臂玉環親遺後主又自為書請薄葬越三日沐浴正衣糚自内含玉殂于瑤光殿之西室時乾徳二年十一月甲戌也享年二十九眀年正月壬午遷靈柩于園寢後主哀苦骨立杖而後起譏之也何譏爾鍾太后在故也自為誄曰天長地久嗟嗟蒸民嗜欲既勝悲歎糾紛縁情攸宅觸事來津貲盈世逸樂尠愁殷沉烏逞兎茂夏凋春年彌念曠得故亡新闕景頽岸世閲川奔外物交感猶傷昔人詭夢高唐誕誇洛浦搆屈平虚亦憫終古况我心摧興哀有地蒼蒼何辜殱予伉儷􅆼窕難追不禄于世玉潤珠融殞然破碎柔儀俊徳孤映鮮雙纎穠挺秀婉孌開揚艶不至冶慧或無傷盤紳奚誡慎肅惟常環珮爰節造次有章含顰發笑擢秀騰芳鬢雲留鑒眼彩飛光情瀾春媚愛語風香􅅛姿禀異金冶昭祥婉容無犯均教多方茫茫獨逝捨我何鄉昔我新婚燕爾情好媒無勞辭筮無違報歸妹邀終咸爻協兆俛仰同心綢繆是道執子之手與子偕老今也如何不終往告嗚呼哀哉志心既達孝愛克全殷勤柔握力沂危言遺情眄眄哀淚漣漣何為忍心覽此哀編絶艶易凋連城易脆實曰能容壮心是醉信美堪餐朝饑是慰如何一旦同心曠世嗚呼哀哉豐才富藝女也克肖采戲𫝊能奕碁逞妙媚動占相歌縈柔調茲鼗爰質竒器𫝊華翠虬一舉紅袖飛花情馳天降思棲雲涯𤼵揚掩抑纎緊洪奢窮幽極致莫得徴瑕審音者仰止達樂者興嗟曲演來遲破𫝊邀舞利撥迅手吟商逞羽制革常調法移往度剪遏繁態藹成新矩霓裳舊曲韜音淪世失味齊音猶傷孔氏故國遺聲忍乎湮墜我稽其美爾揚其祕程度餘律重新雅製非子而誰誠吾有𩔖今也則亡永従遐逝嗚呼哀哉該茲碩美鬱此芳風事傳遐禩人難與同式瞻虚館空尋所蹤追悼良時心存目憶景旭雕甍風和繡額燕燕交音洋洋接色蝶亂落花雨晴寒食接輦窮歡是宴是息含桃薦實畏日流空林彫晩籜蓮舞疎紅煙輕麗服雪瑩修容纎眉範月高髻凌風輯柔爾顔何樂靡従蟬響吟愁槐凋落怨四氣窮哀萃此秋晏我心無憂物莫能亂絃爾清商艶爾醉盼情如何其式歌且宴寒生蕙幄雪舞蘭堂珠籠暮捲金爐夕香麗爾渥丹婉爾清揚猒猒夜飲予何爾忘年去年來殊歡逸賞不足光隂先懐悵怏如何倐然已為疇曩嗚呼哀哉孰謂逝者荏苒彌踈我思妹子永念猶初愛而不見我心燬如寒暑斯疚吾寧御諸嗚呼哀哉萬物無心風煙若故唯日唯月以隂以雨事則依然人乎何所悄悄房櫳孰堪其處嗚呼哀哉佳名鎮在望月傷娥雙眸永隔見鏡無波皇皇望絶心如之何草樹蒼蒼哀摧無際歷歴前歡多多遺致絲竹聲悄綺羅香杳想渙乎忉怛恍越乎憔悴嗚呼哀哉歳云莫兮無相見期情瞀亂兮誰將因依維昔之時兮亦如此維今之心兮不如斯嗚呼哀哉神之不仁兮斂怨為徳既取我子兮又毁我室鏡重輪兮何年蘭襲香兮何日嗚呼哀哉天漫漫兮愁雲空曖曖兮愁煙起娥眉寂寞兮閉佳城哀寢悲氛兮竟徒爾嗚呼哀哉日月有時兮龜蓍旣許簫笳凄咽兮旂常是舉龍輀一駕兮無來轅金屋千秋兮永無主嗚呼哀哉木交枸兮風索索鳥相鳴兮飛翼翼弔孤影兮孰我哀私自怜兮痛無極嗚呼哀哉應寤皆感兮何響不哀窮求弗獲兮此心隳摧號無聲兮何續神永逝兮長乖嗚呼哀哉杳杳香魂茫茫天歩抆血撫櫬邀子何所茍雲路之可窮冀傳情於方士嗚呼哀哉每於花朝月夕無不傷懐如又見桐花發舊枝一樓煙雨暮凄凄凭欄惆悵人誰㑹不覺澘然淚眼低層城無復見嬌姿佳節纒哀不自持空有當年舊煙月芙蓉池上哭娥眉皆因后作又嘗與后移植梅花于瑤光殿之西及花時而后已殂因成詩見意曰殷勤移植地曲檻小欄邊共約重芳日還憂不盛妍阻風開歩障乗月溉寒泉誰科花前後娥眉却不全此不特叙其幽思且以興内助之艱難而不得與之同樂又云失却煙花主東君自不知清香更何用猶發去年枝此足以見光景於人無情而人於景物不可認而有之也悲夫至於書靈筵手巾云浮生苦憔悴壮歳失嬋娟汗手遺香漬㾗眉染黛煙書琵琶背云侁自肩如削難勝數縷絛天香留鳯尾餘煖在檀槽觸物寓意𩔖如此初烈祖為刺史時后父宗給使左右及贊禪代尤為親信元宗以宗為社稷元老故聘其女為吳王妃克相其夫顯於諸子而身居國母可謂賢也陵曰懿陵諡昭惠方是時南唐雖去帝號而其餘制度尚未減損如元宗之葬猶稱皇帝故昭惠雖謂之國后而羣臣國人皆稱曰皇后焉後主繼室周后昭惠之母弟也警敏有才思神彩端靜二后之貌見周宗𫝊昭惠感疾后常出入卧内而昭惠未之知也一日因立帳前昭惠驚曰妹在此耶后幼未識嫌疑即以實告曰既數日矣昭惠惡之返卧不復顧昭惠殂后未勝禮服待年宫中明年鍾太后殂後主服䘮故中宫位號久而未正至開寳元年始議立后為國后南唐享國日淺而三世皆娶于藩邸故國主婚禮議者不一詔中書舍人徐鉉知制誥潘佑與禮官㕘議鉉曰婚禮吉不用樂佑以為今古不相沿襲固請用樂鉉曰案古房樂無鐘鼓佑曲引詩􅆼窕淑女鐘鼔樂之則房樂宜有鐘鼓后初見君後魏書有后先拜後起帝後拜先起之文鉉因此以為夫婦之禮人倫之本承祖宗主祭祀請答拜佑以為王者婚禮不可與庶人同請不答拜又車服之制互有矛盾議久不决後主令文安郡公徐遊評其是非時佑方寵用遊希旨奏佑為是旣而遊病疽鉉戲謂人曰周孔亦有􅑂乎將納采後主先令校鵝代白鴈被以文綉使㘅書侈靡不經𩔖如此及親迎民庶觀者或登屋極至有墜瓦而斃者后自昭惠殂常在禁中後主樂府詞有􅙳幭歩香堦手提金縷鞋之𩔖多𫝊于外至納后乃成禮而已翌日大醼羣臣韓熈載以下皆為詩以諷焉而後主不之譴歸于京師去號位従夫之爵太平興國三年隴西公薨周氏亦薨後主保儀黄氏世為江夏人父守忠遇亂流徙湘湖事馬氏為禆將馬希蕚之難守忠死之邊鎬下湖南得黄氏甫數歳竒其貌内後宫後主即位選為保儀容態華麗冠絶當世顧眄顰笑無不妍姣其書學伎能皆出於天性後主雖属意㑹小周專房由是進御稀而品秩不加第以掌墨寳而已墨寶書籍之𩔖黄氏服勤降體以事小周故同時美女率多遇害而黄氏獨不遭譴以其事之盡也初元宗後主皆妙于筆札博収古書有獻者厚賞之宫中圗籍萬卷尤多鍾王墨跡皆繫保儀所掌都城將䧟後主謂黄氏曰此皆吾所寳惜城若不守即焚之無使散逸及城䧟圗籍俱煬靡有遺者黄氏隨後主俘至京師卒嗚呼魯文公成禮于齊春秋譏之謂其非婚姻之正也矧周氏御於宫中者數年然後以迎禮歸之吁可怪哉周官九嬪世婦女御有徳則充否則闕焉故無常數而又掌于冡宰則知先王之所以治内至正而盡禮也後世徳不勝色肆情敗度怨女以千數淫費以萬計况亂世乎以烈祖之英傑尚困於种氏牝雊之徴幾致家索元宗適丁兵革擾攘女謁之盛舊史不載觀其樂府艶麗則天機亦淺矣後主二周抑又甚焉故予悉書之皆不免為春秋之罪人也徐主義祖長女也性婣睦動循禮法嘗偃蹇擇配初義祖疑李徳誠有貳志徳誠不自安因使其子建勲入謁義祖義祖見之大驚曰有子如此非惡人也以主妻之烈祖受禪徐為郡公主建勲為宰相上章改時政許之建勲宻表曰制置大事若可以臣下請是以善歸已以過歸君也請宣中旨行之表未報而建勲命中書舍人草制給事中常夢錫奏建勲専造制書烈祖大怒欲罷建勲徐主入謂烈祖曰吾父在日兄不嘗求兒與李郎耶何弃之速烈祖曰此國事也吾與李郎親舊如故召入禁中慰喻久之建勲致政賜號鍾山公徐主四時拜賜自稱鍾山老媪而不稱所封郡國葢將有所激也元宗優容之先建勲卒永興公主烈祖女也烈祖為吳相秉政以女為吳世子璉妃及禪代宋齊丘請離其婚烈祖不許封永興公主人每稱為公主則流涕憤惋或問其故曰吾為冢婦而廟不血食可不悲乎諸兄惡之烈祖曰内夫家而外父家婦人之徳也何罪之有乃以呉世子為中書令池州節度使璉卒主亦繼卒吳人哀之嗚呼三代而下彤史詳矣南唐載籍疏脫婦順女憲不可得而書也老媪之稱流涕之感其旨微哉余洪妻鄭氏洪事王延政為大將㑹南唐平建州鄭氏有殊色為亂兵畧取禆將王建封逼之鄭氏志不可奪刧以利刃亦不為屈建封嗜人肉而畧婦人百許人日殺一人以食引鄭示之曰汝懼乎鄭曰願早充庖為幸多矣建封終不忍殺以獻查文徽文徽見之曰國色也將以薦牀席鄭大罵曰王師弔伐凡義夫節婦宜加旌賞以勵風俗王司徒出於卒伍不識禮義且無足怪君侯知書為國大將當有表率羣下風化逺方乃欲加非禮於一婦人以逞其欲妾有死而已速殺為恵徽大慙下令城中召其夫付之吳媛其先汴州浚儀人唐史臣兢之後也父志野義不食粱粟僑廬陵務徳不曜媛生數歳口無戲言順奉姆教宛如夙授豪民段生五十而無子因以禮聘之歸段氏為繼室生子朞月段生卒父母以其少而美俾移所天媛􅋇面自誓志不可奪抱孤嬰以奉舅姑􅓢爨温凊皆躬為之教其子為成人而生業益厚韓熈載使江西録其清節云南唐書卷六欽定四庫全書南唐書卷七宋馬令撰宗室𫝊第二嗚呼性有善惡法有賞刑弗可概論也漢鑒秦之弊而宗戚子弟茅土過制魏規漢之失而黄初之後宗戚虚封襲漢則善惡兼容沿魏則賢否并棄賞刑惡得而辨哉唐有天下子弟得預外任格則庸否則威故入為尚書九卿出為都督刺史間有人焉南唐宗室委任尤重豈沿唐之舊歟抑亦董之得其道歟葢天下分裂君無世臣臣無定主委任宗室猶愈於他人故也作宗室𫝊楚王景遷烈祖第二子元宗母弟也幼警悟讀書一覽輒不忘及長美姿儀風度和雅尚吳公主為駙馬都尉而服用素儉不事華侈烈祖愛其純謹大和三年烈祖出鎮金陵以元宗為司徒平章事居中輔政宋齊丘每忌元宗欲自結於景遷乃薦陳覺為景遷教授以賈其聲聞齊丘㕘決時政多為不法輒歸過於元宗而盛稱景遷之美烈祖於是召元宗至金陵授鎮海軍節度副使即以景遷為太保平章事代秉國政有奪嫡之漸此齊丘謀也所以然者以景遷幼懦他日得國授之已為元老易於窺竊烈祖覺之遂罷齊丘以為已副景遷猶摠大政天祚二年景遷病請以兄弟自代乃拜其弟景遂為門下侍郎㕘政事景遷卒葬飲馬池之陽禪代之後諸子例封王爵保大初元宗改封諸弟追贈景遷楚王命江文蔚為碑以表其墓以其蚤死無子故後主亡國詩云兄弟四人三百口謂元宗景遂景達景逷也景遷不與焉晉王景遂烈祖第三子元宗母弟也制行雅循有君子之風天祚二年景遷病不能輔政即以景遂為門下侍郎㕘政事父子四人迭輔吳政政在李氏也烈祖受禪封壽王讓皇殂於丹陽景遂往督喪事望柩哀慟觀者悦之元宗即位改王燕俄以景遂代儲副固讓不許遂立為太弟景遂因易字曰退身以示不處之志㕘摠政事時有獻替間與朝士官屬飲宴賦詩嘗以玉杯行酒座客𫝊翫以為寳贊善張易乘醉擲之曰貴寳輕士殿下得無累乎座皆失色而景遂歛容謝之由是待易愈謹易遷工部侍郎泛海使契丹景遂手疏曰朝臣如張易者宜置諸左右不宜使之泛不測之淵投足逺夷元宗答以此行非易不可遂行顯徳五年累表讓儲副乞守舊封授江西道兵馬大元帥封晉王適當危疑啓求大臣以自副命兵部侍郎李徴古副之以徴古傲很專恣陵忽過甚景遂欲斬徴古而自拘於有司寮吏諌止一日暴疾嚮空顧揖退謂左右曰上帝命我代許旌陽遂䘚年三十七復贈太弟諡文成齊王景達字子通烈祖第四子元宗之母弟也順義四年旱七月既望雩祀得雨景達以是日生因小字雨師成童爽悟與羣兒異烈祖器之初封信王元宗即位改封鄂王景遷侍中進封燕王及景遂為太弟以景達為元帥中書令徙王齊為理嚴察人多憚之好神仙修鍊之事記室徐鍇獻述仙賦以諷遂絶所好嘗從元宗遊苑中乘小舟而覆左右惶駭景達入水負元宗出性非善水而能蹈之者忠誠之至也元宗多與宗戚近臣曲宴如馮延己陳覺魏岑之徒喧笑無度景達每呵之嘗與延己會飲延己欲以詭佞賣恩佯醉撫景達背曰爾不得忘我景達大怒入白元宗請致之死元宗慰諭而已出謂所親曰吾悔不先斬以聞太子讚善張易從容謂景達曰羣小構扇其禍不細大王力未能去自宜隠忍景達由是罕預曲宴每被召輒辭以疾景達雖剛毅而不歷軍容及為元帥帥師淮上軍政皆出於陳覺署紙尾而已朱元叛諸軍大敗景達與覺遁還金陵上印綬尋拜浙西節度使景達復以用兵之地固辭改撫州元帥自淮南敗績日以酣飲為務及至鎮委任寮属怠於視事後主即位就加太師尚書令奉以叔父之禮開寳四年䘚於鎮年四十七追贈太弟葬廬山諡孝昭江王景逷字宣逺烈祖第五子也烈祖初受禪以十二月二日為仁壽節南唐誕節唯此一見因事而書以示其僣景逷以是日生故小字仁壽烈祖嬖其母种氏而景逷為季由是愛遇之意過於諸子及种氏得罪景逷尚幼元恭皇后鞠之如己出烈祖以其母嘗有改立之請故封爵不加以逺嫌也至元宗即位始封保寧王改封信王出為䖍州節度使簡易節儉䖍人安之時諸王大臣皆喜浮屠而獨景逷非毁佛書專以六經名教為事贑縣令䘚成喪之日其尉郡繼良張樂飲酒景逷立秦黜之書記孫峴每能諫其過失景逷為之加禮及峴䘚厚給其家時人以此美之後主即位徙王江就拜侍中開寳元年䘚年三十二贈中書令諡昭順太子冀元宗元子初封東平郡公元宗即位徙王南昌避儲副之位留守東都保大三年立景遂為太弟以冀為燕王依前東都留守八年移鎮潤州周師至廣陵越人寇常州元宗以冀尚少不習軍事召還都冀會將吏問之禆將趙鐸曰大王為元帥之重衆心所恃一郤足則部下搖矣冀乃奏多壘之秋義無就逸乞効用以死報國元宗許之乃命柴克宏將兵為援以救常州克宏未至樞宻副使李徴古遣使追而代之冀奏克宏可用果敗越師擒獲甚衆先是有吳以來戰獲將士皆不殺至是冀盡殺之越人不敢西嚮者二十年顯徳五年始還儲副之地㕘決國事涖下有法未幾䘚有司以其靖難之功諡宣武句容尉張洎兾所薦進士也上書論之以太子之徳承順孝愛而已不當摽顯武功以垂後世非防微杜漸之旨也其言甚切元宗善之下其議有司改諡文獻洎由是知名改上元尉遷監察御史兾之門人若是亦可想見其為人也慶王茂字子松元宗第二子甫數歳容貌秀澈有成人風封安樂公拜侍衞諸軍都虞侯時有木平和尚者言人禍福壽夭輒驗元宗以茂見之曰其餘不足問所欲知者壽數爾木平為書九十乙字後至十九嵗卒追贈慶王葬建業城南五里命韓熈載碑以表之韓王從善元宗第七子後主之母弟也初封紀國公後主即位進王韓器識沉邃尤喜武畧開寳中江南迫蹙後主憂之從善自請朝京師以紓國難乃奉表朝貢太祖悦之留授泰寧軍節度使錫賚頗優因命從善貽書後主督之入覲從善曰臣兄以庸菲之才嗣守宗廟陛下垂覆載之恩許其入朝實千載一遇敢不奉詔從善遂為書喻以上意而後主不從王師之討兆於此也金陵平從善病卒初從善與鍾謨親狎嘗有改立之請謨亦由此得罪元宗殂於豫章獨從善扈從因懐非望就徐遊求遺詔遊正色不與至建業具其事以聞後主不問待之愈厚從善奉使不返其妻泣詣後主後主無以為辭每聞其至輒避之妻憂思䘚國人哀之鄧王從益元宗第八子也警敏有文初封舒公進王鄧開寳初出鎮宣州後主率近臣餞綺霞閣自為詩序以送之其畧云秋山滴翠暮壑澄空愛公此行暢乎遐覽其詩有咫尺煙江幾多地不須懐抱重凄凄之句君臣􅆳賦可為盛事徐鉉詩云禁裏花光似水清林煙池影共離情暫移黄閤只三載却望紫垣都數程滿坐清風天子送隨車甘雨郡人迎綺霞閣上詩題在從此還應有頌聲最為警策五年南唐貶損制度従益去王爵封江國公後事亡吉王從謙元宗第九子後主母弟也風采峭整喜為律詩動有規誨後主燕閒嘗與侍臣弈従謙甫數歳侍側後主命賦觀碁詩曰竹林二君子盡日竟沉吟相對終無語爭先各有心恃强斯有失守分固無侵若筭機籌處滄滄海未深後主賞歎久之始封鄂公俄王宜春徙封吉開寳五年損制度降封鄂國公後事亡從慶𫝊亡從信傳亡宣城公仲宣後主子也小字瑞保三歳讀孝經若成誦然聞奏樂輒審音調宫中燕侍頗合禮度出見士大夫改容顧揖如成人禮乾徳二年卒年四歳始封宣城公追贈岐王諡懐獻母昭惠先病聞仲宣死哀苦增劇遂至於殂故後主挽辭曰珠碎眼前珍花凋世外春未銷心裏恨又失掌中身玉笥猶殘藥香奩已染塵前哀將後感無淚可沾巾又艶質同芳樹浮危道畧同正悲春落實又苦雨傷叢穠麗今何在飄零事已空沉沉無問處千載謝東風皆并其母子悼之初仲宣卒後主哀甚然恐重傷昭惠常黙坐飲泣而已因為詩以冩志云永念難消釋孤懐痛自嗟雨深秋寂寞愁引病增加咽絶風前思昏矇眼上花空王應念我窮子正迷家吟詠數四左右為之泣下嗚呼春秋魯君未踰年而卒者書子卒以其不全乎君也先君未葬而嗣君䘚者書子某䘚猶云父前子名也皆不作諡太子兾有諡固非春秋之法至於仲宣幼殤則又甚矣東晉瑯琊世子卒而賀循以為不可作諡君子謂其知禮南唐書卷七欽定四庫全書南唐書卷八宋馬令撰義養𫝊第三嗚呼大亂之世三綱五常掃地盡矣故動干戈於骨肉假父子於異𩔖皆滅天性之厚而反人倫之正也烈祖之奉徐温彌篤於諸子者豈得已哉抑為之而已𫝊曰蹍市人之足則辭以放驁兄則以嘔大親則已矣由是觀之親疎恩義不亦逺乎作義養𫝊徐温字端美海州昫山人烈祖之養父也剛毅寡言罕與人交衆中凜然可畏目為徐瞋會唐末大亂販鹽為盜従吳武王楊行宻起合淝勁兵數萬號其軍為黒雲長劍所與舉事者劉威陶雅之徒號三十六英雄獨温未嘗有戰功行宻用其謀殺朱延壽以功遷右衙指揮使始預謀議行宻病出長子渥為宣州觀察使温私謂渥曰今王有疾而出嫡嗣必有姦人為謀若它日召子非温使者慎無應命渥涕泣謝温而去行宻病甚命判官周隠作符召渥隠慮渥幼弱不任事勸行宻用舊將有威望者代主軍政乃薦大將劉威行宻未許温與嚴可求入問疾行宻以隠議告之温等大驚遽詣隠所計事隠未出而温見隠作召符猶在案上急取遣之渥見温使者乃行行宻䘚渥嗣立召隠罵曰汝欲賣吾國者復何面目見楊氏乎遂殺之渥之入廣陵也留帳下兵三千於宣州以其腹心陳璠范遇將之既入立惡温與張顥典衙兵召璠等為東院馬軍以自備而温顥共惡璠等侵權因擁衙兵入拽璠等斬之渥由是失政而心憤未能發温顥益不自安共遣羣盜入寢中弑渥渥説羣盗能反殺温等者皆為刺史羣盗皆諾唯紀詳不従執渥縊殺之初温顥之謀弑渥約分其地以臣於梁及渥死顥欲背約自立温患之問其客嚴可求可求曰顥雖剛愎而闇於成事此易為也明日顥列劍㦸府中召諸將議事自大將朱瑾而下皆去衞從然後入顥問諸將誰當立者諸將莫敢對顥三問可求前宻啓曰方今四境多虞非公主之不可然恐為之太速且今外有劉威陶雅李簡李遇皆先王一等人也公雖自立未知此輩能降心以事公否不若輔立幼主漸以歳時待其歸心然後可也顥不能對可求因趨出書一教内袖中率諸將入賀諸將莫知所為及出教宣之乃渥母史氏教言楊氏創業艱難而嗣主不幸隆演以次當立告諸將以無負楊氏而善事之辭旨激切聞者感動顥氣色皆沮䘚無能為隆演乃得立顥由此與温有隙諷隆演出温潤州可求謂温曰今捨衙兵而出外郡禍行至矣温亦憂之可求因説顥曰公與徐温同受顧托議者謂公奪其衙兵是將殺之信乎顥曰事已行已安可止可求曰甚易也明日従顥與諸將造温可求陽責温曰古人不忘一飯之恩况公楊氏二世将今幼嗣新立多事之時乃求居外以茍安乎温亦陽謝曰公等見留不願去也由是不行顥覺可求有附温意将殺之可求詣温謀先殺顥隂使鍾大章選壮士三十人就衙堂斬顥大章諾之而温猶疑其不果夜半往約曰吾有老母懼事不成且止大章曰言已出口寧可已乎明日遂殺顥及紀祥等歸以弑渥之罪入白渥母史氏史氏泣曰吾兒年幼禍亂若此得保百口以歸合淝公之惠也温遂專政隆演備位而已宣州節度使李遇心尤不平温乃遣徐玠使越而道過宣州因説遇入覲遇初許之玠乘酒呼曰君言入謁是良圖也不爾則為反矣遇怒曰君言遇反且殺景王者誰也温乃使柴再用族遇於宣州行宻舊人人自疑温因偽下之恭謹如見行宻諸將乃安八年温遷行軍司馬潤州刺史鎮海軍節度使同平章事十年遣招討使季濤攻越戰于臨安禆將曹筠奔于越濤敗被執温聞遣人語筠曰吾用汝為将汝軍有求吾不能給是吾過也赦筠妻子不誅厚遇之秋越人攻毗陵温戰于無錫筠感温前言臨陣奔歸遂敗越兵十二年封温齊國公兼浙西招討使始就鎮潤州以昇常宣池黄六州為齊國城昇州建大都督府十四年温徙治之以其子知訓輔隆演於廣陵而大政温遙決之知訓為朱瑾所殺烈祖自潤州先入遂得政温雖姦詐多疑而善用将吏江西劉信圍虔州久不克信使人説譚全播出降遣使報温温怒曰信以十倍之衆攻一城不下而反用説客降之何以威敵笞其使者而遣之曰吾以笞信也因命濟師遂破全播或誣信逗留將反信聞之因自獻㨗至金陵見温温與信博信歛骰子厲聲祝曰劉信欲背吳願為惡采茍無二心當成渾化温遽止之擲六子皆赤温慙自以巵酒飲信然終疑之及唐師伐蜀温急召信至廣陵以為右統軍託以内備遂奪其地温客尤見信者唯駱知祥嚴可求可求善籌畫知祥長於財利温常以軍旅問可求國用問知祥吳人謂之嚴駱温亦自喜為智詐尤得吳人之心初隨行宻破趙鍠諸将皆爭取金帛温獨據餘米作粥以食餓者十六年温請隆演即皇帝位不許又請以吳王稱制乃許遂建國改元拜温大丞相都督中外諸軍事封東海郡王隆演卒温越次立其弟溥順義七年温又請􅄎即皇帝位未許而温病卒年六十六追贈齊王諡曰武烈祖受禪諡武皇帝廟號義祖知訓温長子也少學兵法不能竟尤喜劍士角觝之戲怙温權勢多為不法温出鎮潤州留知訓輔政常陵侮諸将而對吳主隆演無君臣禮隆演幼懦嘗飲酒樓上命優人高貴卿侍酒知訓為㕘軍隆演鶉衣髽䯻為蒼鶻知訓因使酒罵座語侵隆演隆演愧恥泣涕而知訓愈陵辱之左右扶隆演起去知訓殺一吏乃止李徳誠有女樂知訓求之徳誠曰此輩皆有所生且復年長不足以接貴人俟求少妙者進之知訓對徳誠使者罵曰吾殺徳誠并取其妻亦易爾初學兵於朱瑾瑾力教之後因求馬於瑾瑾不與遂有隙夜遣壮士殺瑾瑾手刃數人瘞舍人知訓知曲在已隠而不聞俄出瑾為靜淮節度使瑾詣知訓别且願獻前馬知訓喜往謁瑾家瑾妻出拜知訓答拜瑾以笏擊踣遂斬知訓提其首入告吳主曰為國去賊為民除害在今日矣吳主驚曰彼有父在吾不敢預聞瑾怒曰竪子不足與語遂自殺坐誅者數家初宿衞將李球馬謙挾隆演登樓取庫兵以誅知訓陣于門橋知訓與戰頻却朱瑾適自外來以一騎前視其陣曰不足為也因反顧一麾外兵爭進遂斬球謙亂兵皆潰瑾嘗有徳於知訓者也及其凶終吳人皆謂曲在知訓知訓凶悖多見烈祖書與刁彦能傳此不復書知詢温第二子也烈祖秉吳政威權寖盛金陵行軍司馬徐玠諷温曰居中輔政之重不宜假於他人宜以親子代之温即遣知詢入覲謀代烈祖輔政而温暴䘚知詢奔還金陵爵位如温而知詢暗懦待諸弟不厚徐玠知其終敗乃輸誠於烈祖知詢内為諸弟所構外為徐玠所賣而不知也意以已控强兵居重地烈祖雖管大政而無兵去之甚易温喪未終屢請烈祖至金陵烈祖反使人諭之入朝因疏其罪状責授左統軍知詢面數烈祖曰先王之喪爾為人子而不親臨反罪我耶烈祖曰聞爾懸劍待我我亦不憚獨迫於君命不得往爾為人臣而畜乘輿非反而何周廷望者知詢之親吏嘗偽貢欵於烈祖時得烈祖之隂謀以告知詢知詢將入朝廷望諫止不従既行廷望曰公之此行有往日而無還日泣送之至是知詢以廷望之言質烈祖烈祖曰以爾所為告我者亦廷望也遂斬廷望知詢被譴金陵為之一空後數歳知詢復起為潤州節度使往時幕府皆去獨李建勲隨之知詢至鎮常㑹寮佐譚宴終日遂絶顧望移鎮江西卒於任知誨温第三子也温卒知詢守金陵所為多不法知誨每得其隂謀以告烈祖知詢之敗知誨構之為多烈祖徳之以為江西節度使知誨先娶吳功臣吕師道女非嫡出知誨常切齒因醉刺殺之後吕氏數為厲知誨惡之請僧誦經為陳因果僧亦見吕氏曰吾不解此志在報寃爾及鎮江西嵗餘吕氏不復見知誨喜甚有家人自淮南迴於江心遇綵舟有婦人漸邇視之乃吕氏也招家人曰為我謝相公善自愛我今它適矣因遺繡履曰相公謂爾不信以此示之家人至江西首語其事以履示知誨知誨熟視未畢輒見吕氏在側曰爾謂我真不來耶頃刻知誨暴卒以知詢代鎮江西遇其喪於中塗知詢撫棺哭曰弟用心如此吾亦不怨但何面目見先王於地下聞者傷之烈祖受禪追尊温為義祖徐氏諸子封拜與李氏同而知誨之後特優子景遼景遊出入宫禁預聞機務專掌浮屠修造之事當時言蠧政者以二人為首景逰後避元宗諱改名遊及事後主封文安郡公尤信任焉知諫温第四子也爽悟喜文徐氏諸子知諫最為雅循初知訓輔政無所醖藉温留知諫隂助之諸將常惡知訓陵已而以知諫為長者烈祖自潤州入覲知訓㑹飲山光寺是日知訓大沉􅒬決欲害烈祖知諫以謀告烈祖烈祖獲免後事亡其不書封爵者皆卒于吳也魏王徐知證温第五子也在吳歴刺史節度使烈祖受禪封江王改王魏徐氏諸子知證最為長年及元宗之世尤見優禮每入宫元宗輒以家人遇之親捧觴為壽自起舞以祝之知證亦以叔父自處卒年四十三梁王徐知諤温第六子也起家為太子中舍累遷刺史節度使知詢敗以知諤為金陵尹烈祖受禪封饒王進王梁知諤博采竒物寳貨充牣其家有蜀客持鳯頭至自言得於南蠻賈者知諤以錢五十萬易之其頭正𩔖雄鷄廣可五寸冠上正平可以為枕朱冠紺毛金喙星眼飛禽之枯首也來自萬里而毛羽不脱文彩如生人咸異之嘗遊秫山除地為廣場編虎皮為大幄率寮屬㑹于下號曰虎帳忽遇暴風飄虎帳碎如飛蝶知諤驚遽棄歸數日病卒嗚呼惟厲與祟君子難言存而勿論可也吕氏之事載于别録陳公彭年作也其辭典雅頗有史法而公歸皇朝㕘大政為名臣顧其言可不諒耶南唐書卷八欽定四庫全書南唐書卷九宋馬令撰列傳第四周本舒州宿松人漢南郡太守瑜之後祠廟隴畝皆在子孫守故土者猶數十户本少孤貧嘗在田里獨格猛虎唐末大亂投楊行宻軍中以勇敢聞常先登深入䝉犯矢石身無完肌及歸營自燒鐵烙其創飲㗖言笑自若軍猛将皆服之累遷淮南馬歩軍使天祐五年楊氏始得江西撫州刺史危全諷率諸郡兵十萬來爭其地屯于象牙潭楚人取高安為之援江南守將劉威告急判官嚴可求薦本可用時本従軍圍蘇州不克恥之稱疾不出可求即卧内强起之本曰蘇州之役非彼强我弱也葢上將權輕下皆専命故爾今必見用願無任偏禆可求為言楊氏許之得選兵七千使救髙安本曰楚人非欲取高安也為全諷聲援爾若先敗全諷楚人必走乃疾趨象牙潭劉威要之宴犒不留或曰賊勢甚盛宜審觀形勝計定而後進何其遽也本曰賊有十倍之衆使吾軍知之必將奪氣須乘其鋭而用之既至指授諸將戮力急攻大破其軍擒全諷諸郡之兵皆潰楚人果遁吉州刺史彭玕信州刺史危仔昌棄城走於是江西之地始定以本為信州刺史越将陳璋據衢州歸欵越圍之本受命以兵迎璋既至越人解圍陣於城下璋以其衆來奔禆将吕師道曰敵去我咫尺而陣不動是輕我也必擊之本曰吾受命迎陳使君陳君今在此吾事訖矣何為復戰且彼近而不動必有以待我也擊可勝乎待其先動擊未晚也璋亦以為然乃還越人躡之至中道宿半夜佯驚棄輜重走先設伏於道左越人急追至伏所前後夾擊盡殱其衆越人累至皆敗之唐莊宗入洛陽吳遣司農卿盧蘋使于洛陽荘宗問吳之名將存否而本預焉由是召入為雄武統軍出為壽州節度使移鎮廬州拜太尉中書令封西平王本不知書而愛重儒士賓禮寮屬不撓其權吏民愛之性純樸伎藝無能者唯軍旅之事則如夙習烈祖將受禪徐玠周宗等以本及李徳誠皆位望隆重故諷之以為推戴之首本以昬耄仍不知時變皆少子祚左右其事時吳宗室臨川王濛廢處瀝陽聞將授終乃殺監守者與親信二騎趨詣本本将見之祚固執不可本怒曰我家郎君也何不使我一見祚閉中門拒之濛被殺吳室遂移本隨衆至建康勸進由是愧恨數月而卒子鄴有戰功亦至廬州節度使李徳誠廣陵人也少事宣州趙鍠為給使吳攻宣州鍠敗徳誠及韓球猶隨左右城中推立禆將周進思為主鍠使徳誠往諭進思以城降徳誠暴得熱疾委頓不能受命乃使球往進思斬球擲其首於外徳誠是夕即愈鍠死事吳武王常従征討累遷淮南馬歩軍使擒安仁義於潤州以功拜潤州留後歴撫虔洪三鎮加中書令封南平王烈祖建齊國徳誠率諸將勸進乃其子建勲之謀也昇元中徳誠自洪州入朝烈祖以徳誠前代功臣父子皆㕘佐命優禮之聞其來覲遣内夫人迎於道六官之職因事以書其僣百寮候於門朝堂設幄為具每有大議遣執政就第諮問信王景達先娶徳誠女烈祖復姓有司以同姓非禮制曰南平王國之元老婚不可離信王妃可氏南平楊氏將帥徳誠最無大功特以姻婭顯達而名位壽考諸将莫及有子二十人建勲為相而建封為將相無阿黨將死國事君子善之其餘皆任右職建勲别𫝊王輿少與兄綰俱事吳武王輿始為小校従周本伐危全諷將戰本親臨賊水柵分命諸將指山頭一小營謂輿曰往攻彼以撓賊輿唯唯不行本曰爾憚往耶輿曰公必若以輿為可使願得此柵攻之往彼何為本大喜曰亦知此為賊要害耶乃命之輿乘輕舟先進破其前鋒因排柵而入諸軍乘之遂擒全諷累遷諸軍都虞候讓皇之世禄去公室掌禁兵者尤難其人烈祖以輿為控鶴都虞候持重有法出為光州刺史先是輿兄子拯為海州副史判入北方以為刺史聞輿在光州間遣親信通書幣輿執之以聞因求罷郡復為控鶴都虞候遷左金吾大將軍除浙西節度使従讓皇至潤州移鎮鄂州監軍甄庭堅與輿不協或告庭堅交通境外烈祖使中使繫庭堅下大理輿先知之宻見庭堅曰可乘輕舟自歸闕庭無與中使遇庭堅懼従其計遂獲免由是寮屬稱其長者輿少時從軍圍潤州為大弩射中右耳自左耳出旁一人中之猶死輿卧病百許日及愈耳亦不聾又嘗攻頴州夜夢道士告之曰旦有流星下墜能避當富貴及旦輿仗劍倚柵木驅士攻城城中飛大石正中其柵及輿鎧甲之半皆糜碎而輿無傷輿曰所夢流星是也由此自負終為使相卒年七十四兄綰為虔州節度使先卒李章廬江人従吳武王為騎將與朱瑾相悦瑾殺徐知訓自剄義祖入誅瑾黨章與同事六人當斬五人已斬次至章厲聲曰四郊多壘而斬壯士耶馬仁裕監斬壮其言聞於烈祖釋之𨽻洪州為軍校累遷雄武軍都虞候左街使章雖老而心尚壮善撫士卒勤於職務出為虔州節度使為理嚴重禁戢左右賓禮寮屬㑹周本卒移鎮廬州加中書令卒年九十王安廬江人也少投吳武王為親兵武王嘗升高塜望敵安捧匜器侍側左右皆注目前視陣旁有執槊者疾走徑趨王所左右驚惕失措安置匜器於地取弓射之一發而殪徐内弓弢中復捧器如初顔色不變武王竒之曰汝有器度當至富貴因加奬拔累遷袁州刺史歴典數郡皆以沉黙寛厚為理事烈祖為神武統軍代李章為䖍州節度使卒年七十三韋建少居吳武王軍中嘗従征討以膂力聞後𨽻虔州王綰為禆將郡境曠逺旁接谿洞羣盜充斥建率勵勇士所至克獲百姓賴之累遷諸軍都虞候為左衞使出為袁州刺史建不知書而性淳厚清靜自處無所侵撓郡中大治數年入為統軍以劉仁贍代之仁贍敏悟親綜簿書時有釐革郡政益治而百姓猶思建焉歷任皆如是至老不衰出為鄂州節度使䘚年八十髙審思少事楊行宻以驍勇聞於軍中劉信平䖍州審思為禆將屢立戰功審思為人重厚寡言烈祖竒之常使綜領親兵拜壽州節度使增修城隍守備甚嚴或謂之曰以公威畧守此堅城何懼而過為畏懦也審思曰兵機多變不可不懼過為之防上䇿也顯徳之役壽州城隍最堅亦審思之遺績爾後事舊史亡南唐書卷九欽定四庫全書南唐書卷十宋馬令撰列傳第五嗚呼論其時則南唐號為文獻之地繩以法則可嘉之士無幾幸而獲全始終者菰蘆之才信有之矣李建勲字致堯南平王徳誠之子初徳誠守潤州秉燭夜出候者以聞而徐温疑其有變徙鎮江州徳誠猶不自安乃遣建勲入謁温温見之歎曰有子如是非惡人也即以女妻建勲起家為金陵巡官徐温卒知詢代鎮而建勲仍佐幕府及知詢被徴寮屬皆受譴獨建勲自全烈祖出鎮金陵以為副使預禪代之計拜中書侍郎平章事元宗即位東宫官屬稍稍侵權罷建勲為撫州節度使召拜司空乃營亭榭於鍾山適意泉石累表乞骸骨以司徒致仕賜號鍾山公先是宋齊丘退居青陽號九華先生未幾一徴而起時論薄之建勲年齒未衰時望方重或謂曰公未及老無大疾苦遽有是命欲復為九華先生耶建勲曰平生常笑宋公輕出處吾豈敢違素心自知非壽考者欲求數年閑適爾因為詩以見志曰桃花流水須相信不學劉郎去又來建勲博覽經史民情政體無不詳練惜乎怯而無斷未嘗忤旨故雖有藴藉而卒不得行其為詩少時猶浮靡晚年頗清淡平易見稱於時保大十年卒臨卒顧謂門人曰吾死歛以布素曠野深瘞任民耕避不須封樹暨甲戌之役公卿塋域越人發握殆盡而獨建勲以不知葬所獲免常夢錫字孟圗少警悟通書記事岐王李茂貞為秦隴判官茂貞卒従儼襲位補寳雞令従儼左右有惡之者夢錫渡淮詣廣陵烈祖辟致門下薦為大理司直從至金陵為觀察推官烈祖受禪拜殿中侍御史禮部貟外郎每従容奏事烈祖以為有識量命直中書省㕘掌詔命夢錫重厚詞氣方直多知故事除給事中時以樞宻院𨽻門下機務多委焉夢錫數言時政繁碎宜修復舊典為後代法又言宋齊丘陳覺姦邪馮延已魏岑並小人不宜左右春宫元宗即位許以翰林學士待之而以齊丘故黜為池州節度判官及齊丘罷召為户部郎中遷諫議大夫翰林學士時特置宣政院於内庭命夢錫專掌逾年罷宣政院為學士如初既而姦黨愈熾夢錫終不能勝遂稱病縱酒希復朝謁㑹鍾謨李徳明分掌吏兵二部以夢錫人望求為長吏以自重乃除户部尚書知省事固辭不獲署紙尾而已夢錫無子以其婿王繼沂掌家務或言繼沂亂内夢錫盡出妻妾室為之一空奏黜繼沂于䖍州時馮延己為相劾夢錫貶饒州團練副使病留廣陵東都留守周宗常敦喻之眀年牽復尋改吏部侍郎轉禮部尚書割地之後公卿在座有言及大朝者夢錫笑曰羣公常欲致君為堯舜何故今日自為小朝耶座皆失色毎公集往往喑嗚大咤以故不為士大夫景慕然其循公忘私固亦古之遺直也顯徳五年卒年六十一踰月宋齊丘敗元宗歎曰夢錫生平欲殺齊丘恨不使見之贈左僕射嚴續字興宗父可求善籌畫為吳相續以父廕補千牛備身遷秘書郎烈祖以女妻之少長貴勢性恭恪恂恂如也烈祖受禪為兵部侍郎尚書左丞元宗即位改禮部尚書中書侍郎方宋齊丘用事續常守正不為黨附常夢錫屢言齊丘姦黨元宗謂夢錫曰吾觀大臣中唯嚴續能中立雖然無與援者卿可助之夢錫因喻旨於續續亦善遇之不盡用其言也及夢錫罷宣政院續亦出為池州刺史頃之復為中書侍郎兼三司使出守江西久而不召數歳入為中書侍郎知尚書省尋拜門下侍郎平章事割地之後罷為少傅元宗南遷拜左僕射使輔太子居守後主即位改司空平章事其後機務歸樞宻院續亦與羣輩不協遂出鎮浙西逾年稱疾罷歸卒於私第晩歳尤屈身下士旌别善惡壽春人劉奐有學識性方言直動多忤物續薦之為監察御史起居舍人時論善之續自以少貴倦學命羣従子弟皆礪以儒業諸子及孫舉進士者十餘人續疾病不亂與賓客談論如平常後主使内夫人問之續遺託國事言不及私又極陳羣臣所宜用捨者辭氣忼慨翌日卒潘承祐晉安人仕吳為光州司法㕘軍郡有大獄羣吏不直承祐固爭之不得因棄官歸閩嶺及王氏據閩仕至大理少卿王延政鎮建州辟為度支判官延政與福州搆隙承祐極諌不納㑹晉安使至延政大閲以誇示之辭氣益悖承祐長跪固諫其言甚切延政大怒謂軍士曰汝可為我食判官肉承祐曰與其不義而生孰若抱義而死事勢如此蚤死為幸久之乃解及延政僭號以為吏部尚書而用其倖臣楊思恭為僕射承祐復爭遂逐承祐歸私第查文徽下建州以禮致之元宗以為衞尉少卿遷鴻臚卿委以南方之事升降人物制置郡縣多用其言薦陳誨林仁肇皆著功効老病乞骸骨以禮部尚書致仕卒於洪州西山其子慎修官至貟外郎嗚嘑續薦劉奐以其直承祐薦陳誨林仁肇以其忠忠直之効獨立於亂世難矣哉然非忠直之難而知其忠直者為尤難予於續承祐有取焉游簡言字敏中其先建安人父恭登進士第有名於時仕吳為駕部貟外郎知制誥簡言少孤力學起家為秘書省正字烈祖鎮金陵辟為户曹㕘軍掌元帥府文翰遷觀察巡官及禪代歴虞部貟外郎知制誥中書舍人保大中為翰林學士禮部侍郎守職恭恪國家之務非其任者未嘗肯言貞介獨立不為阿附元宗重之俄判中書省兼兵部選事及淮上兵起越人背盟冦毘陵乃除簡言中書侍郎奉使讓越先見其子愻為千牛備身而後行至境召還元宗南遷以簡言輔太子居守辭以不能事少貴乃令従行後主即位初未之知後頗重之自吏部尚書遷左僕射委以南省之事簡言躬親簿領督責稽緩勵以威嚴寮吏畏之於是六職辦集以執方不為羣輩所附人有請托者必固違戾不復顧其理道數年以疾辭不許及拜相而疾亟卒年五十七張延翰字徳華宋州碭山人少遊長安後避亂江淮事吳為鹽城令有治績遷楚州行軍司馬烈祖輔政以潯陽為封邑乃以延翰為工部郎中判江州入為知雜侍御史張宣以功臣為左街使率意驕暴延翰劾之由是豪猾屏跡遷禮部侍郎時貢院未備士有獻書可采者隨即考試公平詳審士論美之兼知選事吏不容姦畏之如神明進擢孤寒不附貴勢元宗輔政大臣中唯重延翰謂左右曰張君凡所議論必盡公正咸有條理至於簿領無不明白吾得傾心信之由是六司總領殆遍及禪代拜中書侍郎平章事延翰有時望當其作相人以為晩既而多病機務廢闕烈祖素以國器推重不許免相醫藥勞問不絶于道卒年五十七士大夫歎惜之贈太傅徐玠字藴珪彭城人也敏幹有辭辯事郡帥崔洪為軍吏與洪同歸于吳吳武王署玠為糧料使拜吉州刺史貪猥不治罷之徐義祖出鎮潤昇辟玠行軍司馬性詭佞善揣人意㑹烈祖輔政人望頗歸玠諷義祖曰居中輔政之重不可假於異姓宜以嫡子代之温即遣其子知詢入廣陵將代烈祖輔政㑹温暴卒知詢還金陵拜昇州節度使如温之制所為多不法玠知其必敗反自結於烈祖烈祖出鎮金陵仍以玠為行軍司馬與周宗李建勲孫晟首贊禪代遂拜右丞相出鎮宣州玠妻楊吳武王女也先適宣州節度使李遇之子義祖攻宣州族誅遇楊以王女免更適玠至是玠得宣州楊感憤卒玠連鎮宣洪二郡皆以貪濁為理營求百端人多鄙之罷鎮復相位拜司徒兼侍中特以舊人崇其虚名實不與政好修養服餌常以賤價市丹砂之最下者其鄙嗇如此保大元年卒李夷鄴不知何許人也昇元中為翰林學士烈祖殂大臣欲以宋后監國命中書侍郎孫晟草遺詔夷鄴曰此非先旨必姦人詐為大行嘗云婦人預政亂之本也安􅈕自作禍階且嗣君明徳聞於天下汝曹何遽為亡國之事乎若遂宣行吾對百寮裂之必矣於是監國之議遂寢元宗即位語夷鄴曰疾風勁草於卿見之夷鄴性率易好飲酒不拘小節常遺親友書曰今宵好月能相過乎赴召者甚衆夷鄴已醉指酒壺曰本用相待酒興輒來自倒之矣其疎豁多𩔖此嗚呼士之可貴者信義而已履信抱義而不奪於勢利則終始一節尚何渝哉徐玠始甚搆先主既而附之以䦧知詢與夫崔湜反覆於彦範三思之間者何異初徐温忌李遇功使玠伺隙旋覆遇宗楊氏遂以讐人為所天及觀舊治迺感憤卒嚮也不能即死以全其節既又貳於新人而懷其舊與夫從一而終者異矣南唐書卷十欽定四庫全書南唐書卷十一宋馬令撰列傳第六刁彦能上蔡人也父禮遇亂徙居宣城彦能少孤貧事母以孝聞初𨽻節度使王茂章為親兵茂章叛入越彦能當從使家人扶其母俟於路彦能至抱母泣告茂章曰老母在此不能従公茂章許之乃馳入宣州城中已亂彦能登城以劍招之紿曰我従王府來爾輩無動大軍且至矣衆信之稍定義祖聞而嘉之以為軍事校使属徐知訓知訓恣横彦能每以書切諌雖不見納亦常寵遇牙將馬謙帥衆刧吳主登門欲誅知訓朱瑾麾兵却之彦能手劍斬謙知訓忌烈祖每欲加害嘗召烈祖飲伏劍士於室中彦能行酒以手搯烈祖而推之烈祖悟起去又嘗従知訓㑹烈祖于山光寺是日知訓大沉酗決欲害烈祖徐知諫以謀告烈祖烈祖乃奔知訓授彦能劍使追殺之及於中塗彦能舉劍揚袖以示烈祖還紿以弗及既而朱瑾殺知訓義祖稍知其罪惡將吏多被譴責見彦能諫書善之復使事知諫於潤州烈祖受禪召入禁衞叙其舊恩遷天威軍都虞候左衞使元宗即位出為饒信二州刺史建州留後撫州節度使彦能喜讀書委任文吏郡政修理亦好篇詠嘗與李建勲贈答建勲奏之元宗笑曰吾不知彦能乃西班學士也性修嚴所居雖𫝊舍一日必葺周宗何敬洙皆故人也毎飲酒常蓬首裸袒彦能在座則皆儼然卒年六十有八周宗字君太秣陵人也常給使烈祖左右署為牙吏多使喻旨四方敏於事任恩寵日洽義祖卒于金陵知詢謂宗曰僕射望高履危無西渡宗堅請知詢手札示信遽得故茗帖書曰不必奔赴既而徐氏諸子果以不奔赴讓烈祖烈祖因出所書茗紙示之知詢靦顔而已及烈祖鎮金陵宗為都押衙烈祖位望已重常履嫌疑因理白􅧋歎曰國家安而吾老矣宗竊窺其意請如廣陵告宋齊丘以禪代之事齊丘手䟽天時人事未可請斬宗以滅口烈祖懼欲斬宗而行軍司馬徐玠固爭得免黜于池州數歳復召如初既贊禪代累遷樞宻使宗亦淳謹自守而已初俞文正為烈祖幕賓而宗及馬仁裕皆従給使至是宗出鎮江州文正猶為九江巡官輒問宗曰馬押衙何在宗知其涼德笑曰馬相公出鎮浙西久矣文正嘗預公宴俛首咋曰下官飲量棊局令公素知之座皆愕然而宗不之罪其寛厚𩔖如此連歴將相奉法循理然貲産巨億儉嗇愈甚論者鄙之留守東都以老病乞骸骨乃以司徒致仕周兵初起而宗䘚宋齊丘撫棺哭曰君太能黠來亦得時去亦得時元宗聞之不平宗娶繼室生二女皆國色繼為國后侈靡之盛冠于當時馬仁裕字徳寛北平王燧之後遇亂徙居彭城世為將仁裕母方娠夢人謂曰北平來歸及生有紫氣滿庭數嵗學兵書若成誦然初同周宗給使烈祖左右小心敏幹署為右職烈祖移鎮潤州仁裕監蒜山渡首聞朱瑾之亂馳白烈祖即日以州兵渡江定亂烈祖得政基於此也以功拜左領軍將軍烈祖以女妻之是為興國公主出為楚州刺史入為左金吾大將軍烈祖受禪遷潤州節度使明年移鎮廬州為理寛簡吏民便之烈祖左右小臣貴達者唯仁裕與周宗為親信周宗後富而仁裕常貧宗力贊禪代之事仁裕多就外任無所闗預時人稱其長者卒年三十九子文義别𫝊嗚呼貴賤時也上下分也君子知時之無止知分之無常則貴賤上下吾何預焉况生亂世事偏國易牛衣以晝錦起徒歩為朱輪達者觀之特戲事爾文正之抗周宗豈足以識此哉何敬洙幼為吳將李簡厮養簡性殘忍左右過􅄽鮮獲全活敬洙暮與羣兒戲庭下有蒼頭取簡所愛端硯戲諸僮曰誰敢破此羣僮聳肩吐舌相視敬洙厲色曰死生有命乃一擲破之翌日簡責破硯之由敬洙自陳因壮其果敢捨之勿殺簡鎮鄂州令相術董紹顔徧閲諸子紹顔曰諸郎皆善然禄壽無及公者時敬洙侍側指敬洙曰此竒相也可與公齊簡由是益竒之視如己子及長用為軍校敬洙軀貌短陋而趫捷有力簡卒烈祖以為金陵禆將累遷天威軍都虞候建州之役為應援使初至以為僻陋山郡不當勞師辭氣甚憤查文徽開喻之勢不可止乃與邊鎬恊心戮力破西巖延平軍威大振遂下建州敬洙應受上賞王建封爭之以為已功敬洙於是推建封功第一除敬洙楚州刺史嘗従數人親出里巷察人疾苦吏之苛刻無不知之每坐􅆹事與賔客譚宴民有白事者隨其所言親加剖析無不厭服㑹連歳出師楚州當供億之地民不知勞亦敬洙為之節制也及移鎮鄂州稍自矜驕周師伐淮南元宗使敬洙移郭外居人入城為備敬沬不從乃背城除地為戰場曰職當効死於此安能閉門自困也元宗善之未幾召還都年老有足疾後主以其勲舊優禮之拜上將軍奉以上公之秩列門㦸卒年七十七柴克宏吳功臣再用之子疏爽任義不拘小行以父廕為郎將累遷龍武軍都虞候常與賔客博奕以聲酒為務雖職當偏將而未嘗言兵時皆以為非才故久不遷亦不屑意淮甸兵起越人冦常州以克宏為撫州刺史克宏上書乞従軍効用元宗善之使帥師救常州時精兵皆在江北克宏將老弱數千介胄朽蠧入白樞宻副使李徴古曰今以羸兵赴難器甲當得堅利者此色何用徴古素輕其為人因慢罵遣之衆皆憤怒而克宏怡然進及京口徴古使召還以朱業代將克宏不従至常州徴古又使召之克宏曰吾刻日破敵爾來召我必姦人也命斬之使者告以李樞宻之命克宏曰李樞宻親來軍容在我况其使乎遂斬以狥常州有隋末陳果仁祠果仁見夢於克宏曰吾與隂兵助爾及戰有黑牛二頭衝突越兵克宏繼之大敗越人俘馘甚衆克宏奏封果仁為武烈大帝賊走朱業方至克宏善遇之以功拜江州節度使復請北出命未下而發瘍卒克宏常為宣州巡檢使宣州城隍不修戰守無備問其故吏云自頃年田頵李遇繼叛後為宣州者無復為兵備克宏大笑曰時移事異安有此理即繕修守禦之備不日完緝明年越寇至郡人安之劉崇俊字徳修楚州山陽人祖金事吳有功為濠州刺史振威名於境上世典濠梁崇俊弱冠嗣父仁規位為濠州刺史仁規苛酷崇俊初立頗務仁惠數年之後亦漸専恣不拘文法多蓄無賴輩使之過淮剽掠鄉邑獲美婦良馬以自奉雖然郡中畏憚政亦甚理嘗招集騎士得數百人則被以精甲貢于金陵以幸恩寵俄升濠州為定逺軍遂拜節度使其子節尚元宗女太寧公主㑹壽州姚景死崇俊重賂權要求兼領壽州元宗佯不認其意乃移鎮壽州而使楚州刺史劉彦貞馳入濠州代之崇俊自悼失計卒年四十王崇文字光福吳功臣綰之子性重厚儒雅博綜經史少為軍校小心敏幹尚烈祖妹廣徳公主出為歙吉二州刺史吉州民多爭訟古稱難治崇文奉法循理無所侵撓吏民便之遷䖍州節度使初平建州崇文鎮之即日安輯人忘其亂三十年間出領藩鎮入掌禁兵官至使相常褒衣博帶與士大夫譚宴風度夷曠時人親重之福州之役迫于君命雖為大將上則陳覺輩專恣下則王建封劉従効跋扈崇文不能制及師潰元宗歸罪於陳覺馮延魯而崇文及諸將皆弗問頃之移鎮廬州入為神武侍御統軍復出夏口其治皆如初後主即位崇文手疏時宜政體備陳箴誨加中書令未拜而卒邊鎬不知何許人也事烈祖累遷通事舍人保大初年張遇賢為營屯諸軍都虞候查文徽出師建州鎬率洪州屯兵與之俱行遂下建陽尅建泉汀漳等州諸將皆爭功而鎬獨不言人以此多之拜鎬信州刺史八年馬希蕚入潭州楚國大亂命鎬以州兵如界上覘楚九年鎬率所領出宜春遂討長沙破其軍於龍囘關希蕚希崇相繼送欵鎬盡遷馬氏之族歸于金陵以功拜湖南節度使鎬性柔懦御下無法初平建州民所尅獲唯以全活為務閩人徳之號邊羅漢及尅湘潭市不改肆楚人益喜號邊菩薩既而政出多門荏苒無斷人皆失望遂號為邊和尚由是用事者以尅楚為功不欲取費於國乃重歛於楚鎬不能鎮撫楚人多怨及劉言破益陽乘勝攻長沙鎬不能守挺身宵遁將吏皆奔潰元宗削鎬官流饒州未幾復用世宗伐淮南遣鎬帥師出拒周兵及朱元叛鎬與許文縝皆被擒南唐書卷十一欽定四庫全書南唐書卷十二宋馬令撰列傳第七盧文進字大用范陽人也為劉守光騎將唐莊宗攻范陽文進先降拜蔚州刺史荘宗以屬其弟存矩存矩為新州團練使統山後八軍荘宗與劉鄩相拒於莘召存矩㑹兵擊鄩存矩募山後勁兵數千人課民出馬民以十牛易一馬山後之人皆怨而兵又不樂南行至祁溝闗聚而謀為亂文進有女少而美存矩求為側室文進以其大將不敢拒雖與心常歉之也因與亂軍殺存矩反攻新州不尅攻武州又不尅遂奔于契丹契丹使守平州明宗即位文進自平州率衆數萬歸唐明宗得之喜甚以為義成軍節度使居嵗餘徙鎮威勝加同平章事入為上將軍出鎮昭義徙安逺晉高祖立與契丹約為父子文進懼不自安天福元年冬殺其行軍司馬姚知兆副使杜重貴送款於烈祖烈祖遣祖全恩以兵二千陣於安陸俟文進出殿之而至文進居數鎮頗有善政兵民愛之其將行也從數騎至營中别其禆將李藏機等告以避契丹之意將士皆拜為訣烈祖以文進為天雄統軍宣潤節度使文進身長七尺状貌偉然自其奔契丹也數引契丹攻掠幽薊虜其人民教契丹以中國織絍工作無不備契丹由此益强同光中契丹數以輕騎出入塞上攻掠幽趙人無寧嵗唐兵屯涿州嵗時饋運自瓦橋關至幽州嚴斥堠常苦鈔奪為唐患者十餘年皆文進為之也及其來奔始晦迹務恭謹禮接文士謙謙若不足其所談論近代朝廷儀制臺閣故事而已未嘗言兵入為武衞上將軍以病卒初文進攻新州不克夜走墜塹一躍而出明日視之乃郡之黑龍潭也絶岸數丈深不可測又嘗有大虵徑至座間引首及膝文進取食飼之而去由是自負反復南北終無挫衂焉李金全其先出于土谷渾金全少為唐明宗厮養以驍勇善騎射常従戰伐以功為刺史天成中為龍武節度使務為貪暴罷歸獻馬百匹居數日又獻明宗謂曰卿患馬多耶何進獻之數也且卿在涇州治狀如何無乃以馬為事乎金全慙不能對徙鎮横海久之罷為右衞上將軍晉高祖時安州屯防使王暉殺節度使周瓌高祖遣金全將騎兵千人以往下詔招暉許為刺史又以信箭諭安州不戮一人且戒金全曰無失吾信金全未至襄州安從進意暉必走江南以精兵遮其要路暉聞金全來果西走為従進兵所殺金全後至得暉餘黨數百人皆送京師暉之亂也大掠城中三日金全利其所掠貲因擒其將武克和等十餘人殺之克和呼曰王暉首亂猶賜之信誓以為刺史我等何罪反見殺耶若朝廷之命何以示信茍將軍持詔而殺降亦將不免也晉高祖不能詰即以金全為安逺軍節度使金全左都押衙胡漢榮用事所為多不法晉高祖患之不欲因漢榮以累功臣為選廉吏賈仁沼代之且召漢榮漢榮教金全留已而不遣金全客龎令圖諌曰仁沼昔事王晏球有大功晏球欲厚賞之仁沼退而不言此天下之忠臣也及頒賜所俘物仁沼悉以分故人親戚之貧者此天下之廉士也宜納仁沼而遣漢榮漢榮聞之夜使人殺令圖而鴆仁沼天福五年夏晉高祖以馬全節代金全而仁沼二子欲詣京師訴其父寃漢榮大懼紿金全曰前日天子召漢榮公違詔而不遣仁沼之死其二子將訴于朝今以全節代公是召公對獄也金全信之遂送款于烈祖晉高祖發兵三萬授馬全節討之烈祖遣鄂州屯營使李承裕帥師迎之金全來奔行至泌川引領北望涕泣而訣承裕入安州大掠而還為晉兵所躡大敗我師於馬黄谷承裕戰死烈祖以金全為天威統軍遷潤州節度使漢隠帝時李守貞以河中反乞兵於金陵金全與查文徽等出師沭陽諸將鋭於進取金全獨以為逺不相及乃止保大九年以金全為大將耀兵淮上方與諸將㑹食候言澗有羸兵數百欲掩之金全不許曰過澗者斬及暮伏兵四起旌旗蔽日金鼔聞數十里金全曰適可與戰乎及歸語人曰吾得全軍而還為功大矣其後不復用䘚於鎮王彦儔上蔡人也少為本郡軍校同光末諸郡皆亂同輩六人告彦儔曰天下紛紛能者先立我輩空自困可相與起事彦儔紿曰吾當宿直爾以兵入吾為内應是夜六人果至彦儔伏劍盡斬之呼刺史曰彦儔巡警無狀姦盜竊發幸伏其罪矣請公親出以安衆刺史出彦儔又斬之自領州事衆不附遂來奔于吳烈祖以為都押衙累遷和州刺史入為天威統軍彦儔自以發迹凶亂於是小心勤恪烈祖善之親至其家拜其父及烈祖受禪拜池和節度使時給事中常夢錫左遷池州幕府彦儔待之盡禮人稱其有識量焉林仁肇建陽人也剛毅有膂力姿質偉岸文身為虎兒因謂之林虎兒事閩為禆将閩亡潘承祐薦之署為軍校周世宗征淮甸仁肇將偏師出援壽州攻城南大寨斬獲甚衆遂破濠州水柵以功授淮南屯營應援使周人據正陽浮橋以為糧道仁肇率敢死士載芻藁舉火焚橋遡流逆風火弗及熾合戰不克仁肇殿而退周駙馬都尉張永徳猿臂善射發無不斃追仁肇射之矢至仁肇輙格去永徳驚曰彼有人焉未可逼也及割地拜潤州節度使移鎮武昌㑹李重進以楊州叛朝廷討平之而淮南諸郡所守各不過千人仁肇宻説後主曰中原承衰亂之後前年征蜀今取交廣還往數千里兵必罷弊請假臣兵數萬北渡直抵壽春分據正陽因其思舊之民累年之粟復取淮甸勢如轉丸仍乞臣起兵之日聞于北朝言臣據兵竊叛事成歸國否則請族臣家以明陛下之無貳後主驚曰爾無妄言宗社危矣乾徳三年以仁肇為洪州節度使留守南都仁肇素出於偏伍雖在將帥之位常與士卒均食同服以故多得士心又與皇甫繼勲朱令贇輩不恊因搆仁肇求援皇朝欲自王江西後主潛使人鴆之仁肇少有風疾口氣頗臭醫工云肺掩不正及遇鴆而家人訝其不臭翌日卒初仁肇見知於陳喬喬曰令仁肇將外吾掌機務國雖迫蹙未易圗也及仁肇死喬歎曰事勢如此而殺忠臣吾不知其死所矣此為喬死張本陳誨建安人也始生數月足勁能履其父異之因小字阿鐵及長趫捷有勇又呼為陳鐵事王氏有戰功建州被圍誨數出挑戰唐兵多苦之及城䧟為王建封所獲将殺之誨走自歸查文徽文徽禮之復以為將使領兵招懐散亡文徽數表其能閩人潘承祐亦薦之授劍州刺史破馬先進以功拜建州節度使委以南方之事誨繕修守備郡政無斁周師伐淮甸誨遣其子徳誠率師赴難壽春之役諸將多逗撓唯德誠力戰未嘗挫衂師還拜徳誠和州刺史誨由是恩寵日加改其軍名忠義以旌之諸子皆至顯職在鎮十年以疾求罷乃以其弟劍州刺史謙為留後召誨還都疾甚後主親往視之未幾卒申屠令堅山東人也無賴好博膂力絶人晉漢之間為盜犯法械送京師未至謂守吏曰吾不死則為健卒因市酒為訣守者皆醉令堅破械逃去保大七年附賊帥咸師明來歸起卒伍累遷偏將淮甸兵起出援壽春與林仁肇同破城南大寨左右奮擊前無勁敵遂復濠州以功授神衞軍都虞候後主即位常掌親兵開寳五年除吉州刺史委以邊務頗有節制後主歸于京師委諭順命令堅私約袁州刺史劉茂忠不降未發而令堅卒南唐書卷十二欽定四庫全書南唐書卷十三宋馬令撰儒者傳上第八嗚呼西晉之亡也左衽比肩雕題接武而衣冠典禮會于南史五代之亂也禮樂崩壞文獻俱亡而儒衣書服盛于南唐豈斯文之未喪而天將有所寓歟不然則聖王之大典掃地盡矣南唐累世好儒而儒者之盛見於載籍燦然可觀如韓熈載之不羈江文蔚之髙才徐鍇之典贍髙越之華藻潘佑之清逸皆能擅價於一時而徐鉉湯悅張洎之徒又足以爭名於天下其餘落落不可勝數故曰江左三十年間文物有元和之風豈虚言乎作儒者傳韓熈載字叔言北海人也弱冠擢進士第同光末北海軍亂推熈載父光嗣爲留後明宗即位平北海光嗣見殺熈載來奔於呉放蕩嬉戲不拘名節里民趙氏女有美色熈載娶爲正室連補和常滁三州從事亦晏然不介意烈祖受禪除秘書郎輔元宗於東宫熙載譚笑而已不預世務及元宗即位拜虞部員外郎史舘修撰於是始言朝廷之事所當條理者前後數上又吉凶禮儀不如式者隨事舉正由是宋齊邱之黨大忌之烈祖山陵元宗以熙載知禮遂兼太常博士時江文蔚判寺所議雖同而諡法廟號皆成於熙載之手旣葬遷知制誥熙載性懶朝直多闕爲馮延已劾奏罷其職陳覺等喪師南閩特赦不誅熙載上疏請置於法元宗手札敦諭而宋齊邱大怒乃誣以醉酒披猖黜爲和州司馬其實熙載生平不能飲久之徴爲虞部郎中史舘修撰拜中書舎人制誥典雅有元和之風建鐡錢之議遷兵部尚書既而錢貨漸弊頗亦自悔奉使中原爲感懷詩三章署於舘壁云未到故鄉時將爲故鄉好及至親得歸爭如身不到日前相識無一人出入空傷我懷抱風雨蕭蕭旅舘秋歸來牕下和衣倒夢中忽到江南路尋得花中舊居處桃臉蛾眉笑出門爭向前頭擁將去又僕本江北人今作江南客再去江北遊舉目無相識金風吹我寒秋月為誰白不如歸去來江南有人憶或問江南何不食剥皮羊熙載對曰江南地産羅紈故爾時皆不喻迨熙載去乃悟使追之不及中原使至熙載接伴紿曰老夫竊觀吾子音容氣貎一若先徳况忝世舊故不可跪使者因拜之熙載才名逺布四方建碑表者皆載金帛求爲之文而常俸賜賚月不下數千緡廣納儒生茍有才藝必延致門下以舒雅之徒爲門生高第凢數十軰由是所用之資月入不供及奉使臨川借官錢三十萬所司以月俸預納熙載上書訴之云家無盈日之厨野乏百金之産累數百言後主批其奏云言僞而辯古人惡之熙載俸有常秩錫賚尚優而謂厨無盈日無乃過歟命有司放免逐月所刻料錢仍賜内庫絹百疋綿千兩以充時服熙載上謝御批其略曰水火相濟日月無私既示其瑕疵又憐其憔悴免逋欠使資於昏旦賜綿絹令禦其風霜神造雖洪粉身未報熙載畜女樂四十餘人不加檢束恣其出入與賔客聚雜後主累欲相之而惡其如此乃左授右庶子分司於外入朝辭復上表乞住闕下其略曰朽作無生之骨猶思仰慕於聖賢生為萬物之靈寧使困窮於終老魂凝象闕心滯金門程限至終炎蒸漸盛重念臣向化將踰於四紀抒誠已歴於三朝無熯草之功可資於國有滔天之罪見絶於時陛下以無為之心示好生之徳雖一命已寛於時宥叨感深仁而再遷欲赴於遐征轉資隂徳今則羸形愈憊壮志全消老妻對靣而呻吟稚子環牀而號哭勁風振樹豈得長寧逝水朝宗不堪永訣表上未報於是盡出羣婢使之即散後主乃喜遂為秘書監羣婢俄集如初後主笑曰吾於今乃知卿之心矣復上書極陳時政論古今之得失書曰皇極要覽贈中書侍郎開寳三年病卒年六十三後主深痛惜之以為不得熙載為相欲追贈之前代有此否潘佑以謂晉劉稷之贈開府儀同三司即其事也乃贈熙載平章事諡文靖葬梅頤崗謝安墓側命集賢殿學士徐鍇集其遺文藏之書殿熙載才高氣逸無所卑屈舉朝未嘗拜一人初嚴續請熙載撰其父可求神道碑欲茍稱譽遺􅈿貨巨萬仍輟未勝衣歌妓姿色纎妙者歸焉熙載受之文既成但敘其譜裔品秩而已續慊之封還熙載熙載亦郤其贈上寫一闋於泥金帶云風桞揺揺無定枝陽臺雲雨夢中歸他年蓬島音塵斷留取樽前舊舞衣宋齊邱自署碑碣每求熙載寫之熙載以紙塞鼻或問之對曰文臭而穢喜提奬後進每見一文可採者輒自繕寫仍為播之聲名善譚論聽者忘倦審音能舞分書及畫名重當時見者以為神仙中人江文蔚字君章許人也長興中舉進士為河南府廵官避權勢有髙才與韓熙載名相上下而熙載不持檢操文蔚既擅價一時又勵行義自為郎時南唐禮儀草創文蔚撰述朝覲㑹同祭祀宴饗禮儀上之遂正朝廷紀綱烈祖殂元宗以文蔚知禮宜董治山陵事除文蔚工部貟外郎判太常寺以議葬禮於是烈祖山陵制度皆文蔚等裁定既葬以文蔚遷居諌職以熙載遷居制誥論者美之以為各當其任文蔚之居諌職秉心貞亮不容阿順毎將言事必多左遷時宋齊邱陳覺馮延已魏岑皆以容悅得用人情不平及宋齊邱拜為諌議大夫而延已為相魏岑亦居近宻文蔚上表其言曰二公移去未稱民情四罪盡除方明國典表既上而元宗惡其大言黜為江州司士延已亦罷相出鎮臨川岑猶在職未幾延已自臨川再入相宣内制畢拜恩闕下百寮皆言曰白麻甚嘉猶不稱文蔚表爾其直言見重於時者如此後事亡髙越燕人也少舉進士清警有才思文價藹於北土時威武軍節度使盧文進有女美而慧善屬文時稱女學士越聞而慕焉往謁文進文進以妻之晉髙祖即位文進南奔越與之俱來初投鄂帥張宣乆不見知越以鷹詩誚之曰晴空不礙摩天翮未肯平原淺草飛遂至廣陵烈祖愛其詞學時齊國立制凢禱祠燕餞之文越多為撰之烈祖受襌累遷禮部貟外中書舎人保大中諸將取潭衡舉朝稱慶越謂潭衡一時之凶亂取之甚易觀諸將之才善守為難既而進兵於衡遂殺王建期進攻潭州邊鎬遯歸諸郡皆降舉無遺䇿是時越與江文蔚俱以辭賦知名故江淮士者品論人物皆以越為首稱舊史多亡孫魴字伯魚性聰敏好學唐末都官貟外郎鄭谷避亂歸江淮魴從之遊故其所吟詩頗有鄭體及呉武王據有江淮文雅之士駢集遂與沈彬李建勲為詩社彬好評詩建勲嘗與彬議時魴不在席以魴詩詰之彬曰此非有風雅製度但得人間煙火氣多爾魴遽出讓彬曰非有風雅固然而謂得人間煙火氣何耶彬笑曰子夜坐句云劃多灰雜蒼虬跡坐久煙消寳鴨香非罏上作而何闔座大笑金山寺題詠衆因稱道唐張祐有僧歸夜船月龍出曉堂雲之句欲和衆皆閣筆魴復吟云山載江心寺魚龍是四隣樓臺懸倒影鐘磬隔囂塵過櫓妨僧定驚濤濺佛身誰言題詠處流響更無人時人號為絶唱有詩百篇行於世烈祖召見授宗正郎卒嗚呼居田里中而妄意天下者士之志也昔賈誼欲係單于之頸逺羈南越未必踐言而志之所尚豈易量耶韓熙載初與李榖相善及熙載南奔榖送至正陽酒酣臨訣熙載謂榖曰江淮用吾為相當長驅以定中原榖曰江淮用吾為相取江淮如探嚢中物爾周師南征命榖為將以取淮南而熙載落魂終不得大用及其既死假之名噐與夫生不能用死而誄之者何異哉南唐書卷十三欽定四庫全書南唐書卷十四宋馬令撰儒者傳下第九劉洞廬陵人也少遊廬山學詩於陳貺精思不懈至浹日不盥貺卒猶居二十年詩長於五言自號五言金城後主即位詣金陵獻詩百篇後主覽其首篇石城懷古云石城古岸頭一望思悠悠幾許六朝事不禁江水流後主掩卷為之改容不復讀其餘者洞羇旅二年俟召不報遂還廬陵與同門夏寳松相善陳貺嘗謂已詩埒賈島洞亦自言有浪仙之體恨不得與之同時言詩也䖍州陳徳誠尤重其詞學及金陵受圍洞為詩署於路旁云千里長江皆渡馬十年養士得何人又云翻憶潘郎章奏内隂隂日暮好沾巾初潘佑表云家國隂隂如日將暮洞以譏之開寳八年卒其遺集行於世賈島字浪仙江為其先宋州人避亂建陽遂為建陽人遊廬山白鹿洞師事處士陳貺居二十年有風人之體時金陵初復唐制以進士取人為有題白鹿寺詩云吟登蕭寺旃檀閣醉倚王家玳瑁筵元宗南遷駐於寺見其詩稱善久之為由是傲肆自謂俯拾青紫乃詣金陵求舉屢黜於有司為怏怏不能自已欲束書亡越而㑹同謀者上變按得其状伏罪為嘗吟隋堤栁詩云錦纜龍舟萬里來醉鄉繁盛忽塵埃空餘兩岸千株栁雨葉風花作恨媒盛傳於時汪台符歙州人也能文章通古今有王佐才聞烈祖移鎮金陵台符上書陳民間利害十餘條大率以富國阜民為務烈祖善之而宋齊邱疾其才髙屢為詆訾台符由是不平齊邱始字超回台符貽書誚之曰聞足下齊大聖以為名超亞聖以稱字齊邱夫慚改字子嵩因使親信誘台符乗舟痛飲推沉石城蚵蚾磯下昇元中限民田物畜髙下為三等科其均輸以為定制又使民入米請鹽貨鬻有征稅舟行有力勝皆用台符之言史虚白山東人世儒學與韓熙載友善唐晉之間中原多事遂因熙載渡淮聞宋齊邱總相府事虚白放言曰彼可代而相矣齊邱欲窮其伎因宴寮属而致虚白酒數行出詩百詠俾􅆳焉恣女奴玩肆多方撓之虚白談笑獻酬筆不停綴衆昉大驚及見烈祖說之曰今據江淮摘煮山海人民豐阜咸洛之地陛下之先業世亂久矣人思舊徳反斾長驅易若屈指烈祖雖善其説然以初基方輯睦隣境未暇北顧乃署郡從事虚白耻其初言之失意頗不平遂南遊廬山以詩酒自娯元宗即位韓熙載薦之召見問為治之理虚白曰臣草野之人漁釣而已邦國大計不敢預知因醉溺於殿陛元宗曰真處士也賜田五頃遣還及畫江為界虚白為割江賦以誚云舟車有限㳂汀島以俱閑魚鱉無知尚浮游而不止元宗南遷至星子渚復召至聞處士隠居有所得乎對曰臣得漁父一聨云風雨掇却屋全家醉不知元宗變色乆之復賜粟帛遣歸卒於家年六十七郭昭慶其先為廬陵禾川人父鵬保大初進士官至大理司直或告故南平王鍾鏄夫人與僧通姦大理卿蕭儼案法議徒鵬曰法之行自貴者始遂曲法誅之人皆以為寃㑹宋齊邱得罪鵬坐黨免官卒昭慶博通經史擬元經作唐春秋三十卷著治書五十篇皆引古以勵今獻之為左右所沮俾就舉進士昭慶不平復上書曰臣所述皆先聖之遺㫖以懲勸褒貶為任其餘􅎥裂章句補綴雕䖝臣自少而不為因得召對補楊子尉不受復歸禾川邑宰覽之修謁徃候昭慶不與之見宰銜之㑹閱編户乃籍昭慶為新擬軍昭慶復走金陵再獻經國治民論各十餘篇大抵皆指述池州采石堤要害備禦之處及東海隅可以拓之之略後主覽而悅之遂署為著作郎常以才名自居然朝無援引久之不遷開寳嵗貢方物牋表及使命廷勞燕餞之辭一出於昭慶皇朝諸公亦推其辭藻徐鉉徐鍇尤嫉之鍇前通謁而不署名銜昭慶怒乃詬而擲之由是有隙昭慶之居與客將李師義為隣而師義與鍇為姻婭鍇因令師義召昭慶飲潛置鴆於酒昭慶飲之不疑詰旦入朝及階而仆扶出遂絶諸竅皆出血昭慶前所獻治書内有禁絶三篇多天文孫呉之術及經國論等皆行於世唯唐春秋為鉉鍇所匿康仁傑泉州人也少祝髪為僧喜儒學頗自勵因遊江淮㑹陳徳誠出次池陽仁傑以詩投之有紅斾渡江霞蘸水青虵出箧雪侵衣之句德誠勉令就仕乃薦仁傑於執政者仁傑易儒服至金陵㑹群公旬沭宴昇元閣仁傑造席和登閣詩有雲散便凝千里望日斜長占半城隂之句座皆大驚後主聞之問左右曰仁傑如何人或對曰亦詩中苦吟者也然其逺人慕化而至宜姑息而已時陳洪進據漳泉遂召問其風土民俗仁傑對答無滯仍獻所業授鄂州文學補溧陽簿考滿出吉州括量屯田仁傑視肥磽稽田疇無不允當性循素儉門無私謁其所進待乃儒生名士吟噱終日曽不少怠晩年彌苦其志嘗以詩召嘉禾峰僧云只在此山寧有意向來求佛本無心時皆稱善入授汾陽令及金陵敗仁傑亦卒伍喬廬江人也性嗜學以淮人無出已右者遂渡江入廬山國學苦節自勵一夕見人掌自牖隙入中有讀易二字倐爾而却喬黙審其祥取易讀之探索精微迨數年山下有僧夜夢人指大星曰此伍喬星也僧與喬初不相知逹旦入國學訪問得喬喜甚勉之進取喬以匱乏告僧輙罄槖予之喬出與郡計明年春試畫八卦賦霽後望鍾山詩是歲同試數百人初中有司之選者必延之陞堂而加慰飲焉先是宋貞觀登坐張洎續至主司覽程文遂揖貞觀南坐而引洎西首酒數行喬始上卷主司讀之驚歎乃以貞觀處席北辟洎居南登喬為賔首覆考牓出喬果第一洎第二貞觀第三時稱主司精於衡鑒元宗命勒喬程文於石以為永式署宣州幕府考滿遷考功郎卒於官周彬和川人也杜門讀書不治産業其妻譲曰君家兄弟皆力田畝以致豐羡而獨不調玩故紙以自困寧有益耶彬笑曰耕田不如耕道非兒女子所知也聞烈祖鎮金陵招辟儒生彬因獻所習烈祖善之禪代之後制度草創無取士之科㑹有事於南郊彬著郊望論數千言廣陳前古得失上之署諸衛廵官元宗與夀王景遂貽書交辟置之門下賜予頗優告歸省母以所得金玊繒幣陳列於庭彬顧其妻曰伯叔田畝孰愈妻曰此男子事非婦人所能知彬素鄙於鄉里至是猶有嫚言者親友以告彬笑曰昔魯人俚孔子謂之東家邱况庸人乎授大理司直以母憂歸葬謁禾川令直造其㕔署令詰之曰君雖朝省直寮其如桑梓何彬怒因自誓曰吾不歸令於兹有如白日服闋詣建康以前官出宰禾川前令靦顔而去為政廉平鄉里率化有爭訟者以理和觧秩滿邑人詣郡乞留連任七考累遷尚書郎卒於官夏寳松廬陵吉陽人也少學詩於建陽江為為羇旅卧病寳松躬嘗藥餌夜不解帶為徳之與處數年終就其業與詩人劉洞俱顯名於當世百勝軍節度使陳徳誠以詩羙之曰建水舊傳劉夜坐螺川新有夏江城盖劉洞嘗有夜坐詩最為警䇿而寳松有宿江城詩云鴈飛南浦砧初斷月滿西樓酒半醒又曉來羸驥依前去目斷遥山數㸃青故徳誠紀之其為當時延譽𩔖如此晩進儒生求為師事者多齎金帛不逺數百里輻輳其門寳松黷貨毎授弟子未嘗㑹講唯貲帛稍厚者背衆與議而紿曰詩之㫖訣我有一葫蘆兒授之將待價由是多私賂焉徐鍇字楚金與兄鉉同有大名於江左鍇第進士累遷屯田郎中知制誥集賢殿學士鉉鍇兄弟俱叅近侍而其文相軋議者方晉之二陸云鍇著質論十餘篇後主札批其首後主文集復命鍇為序君臣上下互為賁飾儒者榮之鍇以開寳八年卒於金陵圍城中卒之踰月南唐亡鉉畧附歸明傳南唐書卷十四欽定四庫全書南唐書卷十五宋馬令撰隠者傳第十嗚呼古之所謂隠士者道徳足乎已而時命大謬則泊然自適於性命之真而非違物離人以為髙也物與人莫為之累而已矣此伯夷叔齊朱張栁下惠之徒所以有徳於天下後世也自秦漢而下士之隠者雖不足以語此而前史載之詳矣南唐之士僅可觀者敘次於左作隠者傳江夢孫字聿修潯陽人也博綜經史儒行髙潔烈祖輔政辟置門下薦為秘書郎久之夢孫自陳迃儒無所禆益且平生讀書意在施恵於民而後已因求一縣以自効烈祖曰縣邑非所以優賢者不許固求之乃補天長令烈祖召之從容示以誥指庭下地曰今日受此明日即趨走於彼矣如何夢孫曰茍遂素志無恤其他乃授之至縣吏告曰正􅆹甚凶前令居之鬼怪畢見請陳設便㕔夢孫固不可曰長吏不居正㕔非禮也禮上之夕若數十人傾倒几案呌嘯甚喧夢孫從容整衣冠呪曰夢孫為縣令合居此㕔爾為鬼神應有柌宇邱墓安得爭此即命復陳設如初自此寂然無患後人安之其治以簡易仁恕為事邑人大悅踰年稱疾求歸田里躬勤耒耜事繼母甚謹毎晨夜具潔服問安侍膳訖乃集諸生講禮朝廷累召不起保大中卒年八十五贈國子司業沈彬筠陽髙安人讀書能詩属唐末亂離南遊湘湖隠於雲陽山十餘年與僧虚中齊已為詩侣迄不遇世乃歴名山治方術烈祖鎮金陵命所属郡縣辟致之彬知其欲取呉國因獻畫山水詩云尺素隠清輝一毫分險阻授校書郎入輔呉世子璉於東宫未幾乞罷以尚書郎致仕禪代之後絶不求進髙安士人多為給其粟帛元宗南遷彬年逾八十詣南昌求見曰臣自處山野世事不預臣妻謂臣曰汝主人郎君今為貴子兾接清光死且不朽元宗優禮待之賜粟帛遣還署其子元為秘書省正字彬尤工詩而未嘗喜名如再過金陵詩云玉樹歌終王氣收鴈行髙送石城秋江山不管興亡事一任斜陽伴客愁又都門送客詩云岸柳蕭疎野荻秋都門行客莫回頭一條㶚水清如劒不為離人割斷愁皆盛稱於士大夫惜乎簡編散失不得見其全集彬學方外之術迄無所異唯手植一樹命諸子曰吾死塟此及彬卒發之得石椁一上有篆刻八字云開成二年夀椁一所因就塟焉陳貺南閩人性沉澹志操古朴而不茍於仕進一卧廬山三十年學者多師事焉元宗以幣致之布裘鹿鞹進止閑肆因獻景陽臺懐古詩云景陽六朝地運極自依依一㑹皆同是到頭誰論非酒濃沉逺慮花好失前機見此尤宜戒正當家國肥元宗稱善欲授以官貺固不受賜粟帛遣還舊隠卒年七十陳陶世居嶺表以儒業名家陶挾冊長安聲詩厯象無不精究常以台鉉之器自負恨世亂不得逞昇元中至南昌将詣建康聞宋齊邱秉政凡所進擢不愜士論自料與齊邱不合乃築室於西山日以詩酒為事㑹宋齊邱出鎮南昌陶志不屈而齊邱亦不為之薦辟陶作詩自詠曰一顧成周力有餘白雲閑釣五溪魚中原莫道無麟鳯自是皇家結網踈陶少與水部貟外郎任晼相善嘗以詩遺之云好向明朝薦遺逸莫教千古弔靈均元宗雖聞其詩名而未及召之㑹有星孛陶歎曰國家其幾亡乎既而果失淮甸陶所居幽邃性尤嗜鮓元宗南遷至落星灣欲有所問而恐陶不盡言因偽使人賣鮓至陶門陶果出㗖鮓喜甚賣者曰官舟抵落星矣翁知之乎陶笑曰星落不還元宗至南都未幾殂不還之說果驗陶後以修養煉丹為事有詩云乾坤見了文章懶龍虎成來印綬疎又云長愛真人王子喬五松山月伴吹簫任他浮世悲生死獨駕蒼龍入九霄又題徐穉亭詩云伏龍山横洲渚地人如白蘋自生死洪崖成道二千年唯有徐君播青史陶所遁西山先産藥物數十種陶採而餌之開寳中常見一叟角髪被褐與老媪貨藥於市獲錢則市鮓對飲旁若無人既醉行舞而歌曰藍採禾藍採禾塵世紛紛事更多爭如賣藥沽酒飲歸去深崖拍手歌或疑為陶之夫婦云許堅不知其家世或曰晋長史穆之裔形陋而恠或寓廬阜白鹿洞桑門道舘行吟自若幘巾芒屩短襴至骭亦無齎装唯自負布嚢常括不解毎沭浴不脫衣就谿澗出而暵之或問其故則言天象昭布雖白晝亦常參列人自昧之爾其可祼䄇乎堅癖嗜魚或得大魚則全體而烹不加醯鹽熟即㗖之遊溧陽下山寺吟詩曰地枕呉溪與越峯前朝恩賜雲泉額南唐以大唐為前朝竹林層建鴈塔髙石室幽棲幾禪伯荒榛蕪没蒼苔深古池香泛荷花白客有經年説二林落日猿啼情脉脉後或居茅山或入九華適意往返人不能測舊與樊若水相善若水北渡後因轉輓於江南遇堅於簡寂觀勉之以仕則顰蹙不答堅嘗至陽羡人不之識一日渉西津淩波濶歩若平地然衆昉神之不知其所在云毛炳豐城人也好學不能自給因隨里人入廬山毎與諸生曲講茍獲貲鏹即市酒盡醉時彭㑹好茶而炳好酒或嘲之曰彭生說賦茶三斤毛氏傳經酒半升炳聞之小哂而已自後或遊螺川諸邑遇酒即飲不醉不止嘗宿於酒家大醉悞坐爐炭主人出之翌日尻痛炳疑因酒乖忤遭其笞撻訊之乃知又嘗醉於道旁有里首張谷掖之而起炳瞑目曰起予者為誰對曰張谷也炳呵之曰毛炳不干於張谷張谷不學於毛炳醉者自醉醒者自醒醒醉之道兩者固殊安用掖為復呵之曰汝可速去無撓予卧由是人頗重之是真全於酒者也後聚生徒數十講誦於南臺山迨數年自署於齋壁云先生不在此千載只空山因大醉一夕卒有詩集傳於世顔詡魯郡公真卿之後唐末徙居木川詡少孤兄弟數人事繼母以孝聞雅辭翰謹禮法多循先業迨末年一門百口家法嚴肅男女異序少長敦睦子姪二十餘人皆服儒業毎延賓侣寓門下者常十數詡晨暮延揖飲饌燕笑未嘗不躬自接對雖遇姻戚冲孺亦為之􅃣帶盡禮就所居第依泉石築亭榭開軒四敞則碧鮮叢遶翠㣲環列蕭爽之趣杜絶塵囂水部貟外郎孟賓于嘗以詩羙之云園林蕭爽聞來久欲訪因循二十秋此日開襟吟不盡碧山重疊水長流又司農卿何蒙殿中丞蒯鼇史舘孫伯純各為詩序以述其幽隠詡聞子弟有與賔客戲者未嘗靣責手寫韋昭博奕論署於屋壁使之自愧家人未嘗見其喜愠初季父非理據鄉人桑詣邑求治令尹下詡評之詡償以已緡其訟遂止卒年七十餘鄭元素京兆華原人也少習詩禮避亂南遊隠居於廬山青牛谷髙卧四十餘年採薇食蕨絃歌自若搆椽剪茅於舎後㑹集古書殆至千餘卷元素温韜之甥也自言韜發昭陵從埏道下見宫室制度閎麗不異人間中為正寢東西廂列石牀牀上石函中有鐡匣悉藏前世圖書鍾王墨跡紙墨如新韜悉取之韜死元素得之為多嗚呼業不素修自羣鹿豕斯謂之隠者樵夫牧子之事爾非吾所謂隠也故隠士儒術出處雖異易地則皆然或曰江夢孫沈彬嘗仕矣而列於隠士劉洞史虚白嘗隠矣而列于儒術何哉曰彬與夢孫志於隠而仕不得已焉洞與虚白志於仕而隠不得已焉予何容心乎亦各成其志而已至如陳陶翻然有改而所得多矣志不足言之也南唐書卷十五欽定四庫全書南唐書卷十六宋馬令撰義死傳上第十一嗚呼大哉君乎猶天之覆焉猶地之載焉天地以為籠而東西南北鬼方殊域無出於天地之度内則君臣之義孰可逃哉此事君者無適而非君也且人情莫不喜安存而惡危亡也及以身事人而與君同戚則由是而循義由是而死節將以終吾身而已又豈偷生忍耻以獲罪於天下後世歟禮曰大夫死衆士死制子思曰如伋去君誰與守此君臣之義盡矣雖然仕以行道而致君為堯舜躋時為太平者君子之所欲也所欲者不可必得則不擇地而安之不臨難而免之者亦所以行吾道也故唐虞之際君臣都俞於廟堂之上則所謂守節循義者存之而弗試不幸罹於亂世而人君戚戚於憂勞之地則上焉學士大夫下焉武夫悍卒披肝􅄋膽夷險一節忠義皎然貫諸白日之上是亦衰世之意也魏鄭公所以願為良臣而不願為忠臣者可謂有意於致君矣嗚呼三代而下縉紳先生多能言之五代之際覇據角立君無世臣臣無定主而視神噐為蘧廬則士之全節者無幾劉仁贍之守孤城孫晟之不負永陵一坏土與夫張彦能皇甫暉孟堅陳喬劉彦貞朱令贇胡則之徒雖非蹈道有足稱者作義死傳劉仁贍字守惠彭城人也父金事呉武王為濠滁二州刺史以驍勇知名仁贍為将輕財重士法令嚴肅頗通兵法事烈祖為左監門衛将軍黄袁二州刺史拜武昌軍節度使平楚之役仁贍以舟師克巴陵撫納降附人皆恱集入掌親軍出鎮夀州先是毎歲淮水淺涸分兵屯守謂之把淺監軍呉廷紹以為境上無事虚費糧用悉罷之仁贍以為不可未及報而周師猥至郡人皆恐仁贍神氣閑暇部分守禦有若平常群情乃安五代史周師先至而後以仁贍守夀州比先除仁贍而後周師至據江南錄野錄遺事别錄皆與此同當以此書為是彦貞軰不用其言以至喪敗故仁贍軍令益信用周饒計破城南大寨剋獲甚衆仁贍按兵城守世宗圍之數重以方舟載礮自淝河中流擊其城又束巨竹數十竿上施版屋號為竹龍載甲士以攻之又决其水砦入淝河攻之百端自正月至於四月不能下而歲大暑􅍂雨彌旬周兵營寨水深數尺淮淝暴漲礮舟竹龍皆飄南岸為唐兵所焚周兵多死世宗東趨濠梁以李重進為廬夀都招討使元宗遣元帥齊王景逹等列砦紫金山下為夾道以屬城中而重進與張永徳兩軍相疑不協仁贍屢請出戰景逹不許由是憤惋成疾明年正月世宗復至淮上盡破紫金山砦壊其夾道淮兵大敗諸將多見擒而廣陵馮延魯光州張經舒州周祚㤗州方訥泗州范再遇等或走或降皆不能守江南君臣亦皆震懾奉表稱臣願割土地輸貢賦以効誠欵而仁贍獨堅守不可下世宗使江南使者孫晟等至城喻仁贍降晟望城中改其辭呼曰無隳臣節援兵即至矣仁贍於是城守益堅仁贍子崇諌幸其父病謀與諸将出降仁贍立命斬之監軍使周廷搆哭於中門救之不得於是士卒皆感泣願以死守三月仁贍病甚喘喘垂死其副使孫羽詐為仁贍書以城降世宗命舁仁贍至帳前歎嗟久之賜以玊帶御馬復使入城養疾是日卒世宗制曰劉仁贍盡忠所事抗節無虧前代名臣幾人可比予之南伐得爾為多乃拜仁贍檢校太尉兼中書令天平軍節度使仁贍不能受而卒年五十八世宗遣使弔祭䘮事官給追封彭城郡王以其子崇讃為懐州刺史賜莊宅各一區元宗聞仁贍卒哭之慟及贈太師焚其誥曰魂兮有知鑒周惠耶歆吾命耶夜夢仁贍拜墀下若受命然夀州故治夀春世宗以其難剋遂徙城下蔡而復其軍曰忠正曰吾以旌仁贍之節也孫晟初名鳯又名忌宻州人也好學有文辭尤工於詩少為道士居廬山簡寂宫嘗畫唐詩人賈島像置於屋壁晨夕事之簡寂宫道士惡晟為妖以杖驅出之昜儒服北之趙魏謁唐荘宗於鎮州荘宗以晟為著作佐郎天成中朱守殷鎮汴州辟為判官守殷反伏誅晟乃棄其妻子亡命陳宋之間安重誨惡晟以謂教守殷反者晟也􅀞其像購之不可得遂族其家晟來奔於呉時烈祖輔政多招四方之士得晟喜甚晟為人口吃遇人不能道寒暄已而坐定談辯風生聽者忘倦烈祖尤愛之引與計議多合意以為右僕射與馮延已並相元宗晟輕延已為人嘗曰金碗玉盃而盛狗屎可乎晟事烈祖元宗二十餘年官至司空家益富驕毎食不設几案使衆妓各執一噐環立而侍號肉臺盤時人多效之周世宗征淮元宗懼始遣泗州牙将王知郎至滁州奉書以求和世宗不答又遣翰林學士鍾謨文理院學士李徳明奉表稱臣不答乃遣禮部尚書王崇質副晟奉表謨與晟等皆言唐願割夀濠楚泗光海六州之地歲貢百萬以佐軍而世宗已取滁楊濠泗諸州欲盡取淮南乃止因留使者不遣而攻夀州益急謨等曰願陛下寛臣五日之誅容臣還取江南表盡獻江北諸州世宗許之遣供奉官安宏道押徳明崇質南還而謨與晟皆見留徳明等既還元宗悔不肯割地世宗亦以暑雨班師留李重進張永徳等分攻廬夀州兵所得楊㤗諸州皆不能守唐兵復振重進與永徳兩軍相疑有隙永徳上書言重進反世宗不聽初晟之奉使也語崇質曰吾行必不免然吾終不忍負永陵一坏土及崇質還而晟留與鍾謨俱至京師舘於都亭驛待之甚厚毎朝㑹入閣使班東省官後召見必飲以醇酒已而周兵數敗盡失所得諸州世宗憂之召晟問江南事晟不對世宗怒亟召侍衛軍虞侯韓通收晟下獄及其從者二百餘人皆殺之晟臨刑世宗猶遣近臣問之晟終不對神色怡然正甚衣冠南望而拜曰臣以死報國乃就刑其後世宗頗憐晟忠悔殺之元宗聞晟死贈魯國公張彦能為楚州守将周師伐淮南諸郡皆降獨楚州不可下周人圍之數月城中兵食殆盡而彦能與其副鄭昭業城守益堅世宗親督兵洞屋穿宂而焚之彦能昭業戰死餘衆皆死誓無降者世宗屠其城嚴兵以戍之元宗嘉彦能忠贈侍中南唐書卷十六欽定四庫全書南唐書卷十七宋馬令撰義死傳下第十二皇甫暉山東人也事石晉為宻州刺史虜䧟中原暉與秦州刺史王建來歸授神衞軍都虞侯俄拜江州節度使周師伐淮南暉率江州屯兵㑹劉彦貞等以拒周師彦貞舉止躁撓失大將體而暉獨持重軍陣整肅士樂用命雖中原名將往往憚之及彦貞敗死天子徙正陽橋於下蔡暉與林仁肇爭之不勝周有神将操鉞一麾睴衆大敗收兵返走且戰且行欲退保滁州時滁州守将王紹顔先遁去城中已亂暉力戰創重死於天兵子繼勲别有傳寳訓曰太祖擒皇甫暉於滁州是受命之端也國光閑話曰太祖挺身力戰劒血服衲既而擒暉孟堅初事王昶為建州禆將延政與曦有隙堅知其必敗㑹邊鎬伐建陽堅以其衆先降鎬等資其策以取南閩及陳覺矯命攻晋安堅𨽻馮延魯軍中李仁逹先求救於越越以兵數千人入城助守而江淮諸軍大集四面合勢晋安窘甚越人㳂海濟師旁岸阻濘藉簀乃可登南面諸軍聚而射之簀不得施久之延魯曰城所以不下者恃此為援也却吾軍以誘之登岸殱其援城必降矣堅曰敵至此已久進退不可求一戰而死無路爾今與之戰必致死力可盡殺乎不若堅壁以拒之援兵逺渉大海不戰而困城可圖也延魯不聽揮兵少却越人登岸未定堅曰可撃矣延魯又不聽既而合戰延魯敗走堅死之諸軍皆潰陳喬字子喬世為廬陵玊笥人祖岳仕大唐為南昌觀察判官著唐書自髙祖訖於穆宗為統紀一百卷行於世父濬仕呉為中書舎人翰林學士撰呉錄二十卷喬㓜敏悟耽翫文史以廕授太常寺奉禮郎烈祖即位頗器重之遷尚書郎拜中書舎人元宗既失淮甸耻其降號欲授機務於太弟而陳覺之徒因有窺竊之計輒謂元宗曰宋齊邱嘗賛烈祖變家為國終成大業是社稷之臣也今若委以國事庶寧邊鄙而陛下優游邃處以養喬松之夀遵鼎湖之躅亦千載一遇也元宗由是欲傳位而以齊邱輔政喬聞之排閤而入諌曰臣聞社稷之重焉可假之他人今且授之則百官朝請皆歸齊邱一民尺土非陛下所有尚能制齊邱而再有之乎臣見淖齒李兊復作而讓皇幽囚於丹陽亦陛下之所親見一日垂涕泣求為田舎翁不可得矣元宗愕然曰微卿幾落賊人彀中於是引喬入見后及諸子指喬曰此忠臣也他日國家急難汝母子可託之我死無恨矣傳位之意遂止而齊邱黨與亦由此以敗及元宗南遷留喬輔太子監國後主即位遷吏部侍郎翰林學士承㫖門下侍郎兼樞宻使遂總軍國事政由已出李平潘佑之死亦因喬間焉開寳中太祖皇帝遣使召後主入朝後主欲徃以喬為介喬曰陛下與臣俱受先帝顧命委以社稷大計今徃而見留則國非已有悔将何及臣雖死實靦靣於先帝後主曰茍不得已而入其如稽緩之譲何喬曰臣請坐之後主由是連年拒命皆喬為之謀也及王師問罪喬誓以死守時降樞宻院為光政院喬為光政使而張洎為副同掌機宻嘗語後主勢雖廹蹙二臣之節不隳也及城将䧟後主自為降款俾喬與世子仲㝢開城門納之喬遽歸府以款投於承霤後主促之愈急喬入見曰自古豈有不亡之國乎降無益也喬意欲與後主俱死而不忍言臣請城下一戰而死後主執其手泣曰盍與我北歸喬曰臣當大政而致國家如此非死無以報臣死而歸之以逆命之罪則陛下保無恙也掣其手去入視事堂召二親吏解所服金帶遺之曰吾死掩屍無泄遂自縊二吏徹榻瘞之後主求喬不得張洎曰已死北軍矣語未畢而王師遽入後主俘於京師太祖皇帝責其拒命勞師果以陳喬固執為對喬為人孝悌惇睦宗族之貧者分禄以給之雖居權要家無餘貲先喪其妻後主為娶國戚喬曰臣家素貧窶不能成禮後主貸之俾就婚焉惜乎不知時變死非其所然亦忠於所事者也金陵既平改塟喬初求喬屍不得或見丈人衣黄半臂舉一手障面及發其瘞以右手加額如所見焉劉彦貞呉功臣信之子也授大理評事累遷屯田貟外郎父喪免起為将軍遂歴武職連刺海楚二州長於吏事聲績日洽拜濠州節度使承劉崇俊虎政之後裁以法度吏民頗服及移鎮夀春漸自矜大務為聚歛以奪民利夀春有安豐塘溉田萬頃彦貞託以浚城隍大興工役决水城下而田畝皆涸因急其徴賦民皆鬻田而去彦貞取上腴者賤價買之於是復漲塘水歲積巨億賂遺權要以沽聲名魏岑受賄尤劇羣議雜然推唱以謂彦貞用兵如韓彭理民如龔黄倚之若長城及周世宗征淮甸命大将李榖攻自夀州元宗使彦貞督諸路兵出拒周師以江州皇甫暉為援李榖曰吾無水戰之具而使唐兵斷正陽浮橋則我背腹受敵乃焚其芻糧退屯正陽是時世宗親征行至圉鎮聞榖軍却意唐兵必追之遣李重進急趨正陽曰唐兵且至宜急擊之彦貞等聞榖退軍皆以為怯禆将咸師朗曰追之可大獲劉仁贍使人喻之曰君來赴援未交戰而敵人退不可測也慎勿追逐君為大将安危以之脫有不利大事去矣前軍張全約亦曰不可追彦貞曰軍容在我汝軰何知沮吾事者斬其舉止躁撓貪功自任𩔖如此比至正陽而重進先至未及食而戰彦貞施利刃於拒馬維以鐡索又刻木為獸號捷馬牌以皮囊布鐡蒺藜於地周兵見而知其怯一鼓敗之彦貞死於陣初彦貞鼔行劉仁贍曰未戰而奔必有伏兵我師遇之無遺𩔖也乃號令軍中為城守之備既而彦貞果敗諸軍皆潰惟張全約帥所領奔夀州以其覆軍䘮地自彦貞始故恩不及其子孫交㤗元年贈彦貞中書令而已朱令贇大将軍業從子也常從業軍初為小校趫捷善射椎首鷹目軍中號朱深眼累遷神衞都虞侯㑹林仁肇卒以令贇為鎮南軍節度使王師問罪後主召令贇赴難令贇至湖口與諸将議曰今若前進而王師據我後則上江阻隔退乏糧道亟為虜矣乃以書招南郡留守劉克貞代鎮湖口克貞病不能舉令贇遲之後主命益急使者旁午令贇不得已自潯陽湖縳大筏載軍糧器用戰艦數百艘欲斷采石浮橋直趨金陵或説令贇曰江水淺澁不利舟筏可俟盛夏大江汎溢順流而下勢不可禦令贇曰業已進俟盛夏乎遂帥水陸一十五萬至虎蹲洲與王師遇令贇不識兵機自乗大航危簷重構建大将旗幟中流指麾王師聚攻之令贇先創巨舟實葭葦灌膏油欲順風縱火謂之火油機至此勢蹙乃以火油機前拒而反風廽煽自焚大筏水陸諸軍不戰而潰令贇投火死糧器俱焚煙熖不絶者浹日自是金陵絶無外援以至於亡胡則為江州副使金陵既下後主歸於京師諸郡皆送款則謂所部曰吾等世受主恩忍負之遂殺謀降者嬰城固守朝廷遣使諭㫖猶不奉命将軍曹翰帥師圍城三年則誓以死守城将䧟太宗皇帝嘉其盡節於所事遣使諭翰城下日拒命之人盡赦之使人至獨木渡大風數日不可濟及風定而濟則翰已屠江州無遺𩔖適一日矣嗚呼甚哉死之難也非死之難而處死者為難也非處死之難而擇其所處為尤難是故或輕鴻毛或重太山其死雖一而輕重之異者在得其所與不得其所爾劉仁贍軰於死生之際亦庶幾焉南唐書卷十七欽定四庫全書南唐書卷十八宋馬令撰亷隅傳第十三嗚呼崇髙富有人之所欲也其崇髙乎天地之間者若鷦鷯巢於一枝一枝之外無所居也其富有於萬物之上者若偃䑕飲於長河滿腹之外無所容也天地亦大矣萬物亦衆矣一身之所為曽未得其萬萬之一而固已厭足則一身之外我何與焉古之人其志有在於是者許由聞其風而悅之其無待於外而傲睨於萬物之上則在我者皆道之真而在彼者皆物之粗道者吾之所固有而物者時之所儻來故榱題數尺後車數十乗不足以望吾㤗山堪巗之安也食前方丈侍妾數百人不足以易吾飲水曲肱之樂也古之人其志有在於是者王子搜聞其風而悅之大而天下重而一國有所不受則脩吾身以標凖於天下不亦貴乎馴致後世喪已於物忘真於利則清風不競而亷隅遂喪如姚景之取予有節魯崇範之一介不受馬文義之不入府庫許規之不顧遺金皆後世之難能者作廉隅傳姚景始事劉金為廐卒金暇日至廐中見景晝瞑有二赤虵悠揚景靣少頃入鼻竅而寤金由是竒之引為親信俄遷禆将金以女妻之烈祖亦重其為人使典親兵歴制置刺史拜清淮軍節度使夀春望鎮供億滋厚而主将歛率浮於他郡民尤苦之景至一切供億悉罷去常俸不給刓衣弊􅃣漠然古風初吏請家諱景大署於紙尾曰諱􅂍吏於是属吏拱手稍知廉隅諸子為牙将景登城見其長子導從甚盛過市市人皆廢業辟路景召其子杖之魯崇範廬陵人也竈薪不属而讀書自若烈祖初建學校丁亂世典籍多闕旁求諸郡崇範雖窶九經子史世藏于家刺史賈皓就取進之薦其名不報皓以已緡償其直崇範笑曰墳典天下公器世亂藏於家世治藏於國其實一也吾非書肆何估直以償耶郤之皓謝曰俗吏凂濁以遺先生羞不然何以見髙義㑹皓赴闕與崇範俱至金陵表薦之召試東宫授太子洗馬復守廉儉唯食月俸其餘四時錫賚非次優與拜而弗取悉班諸親舊之貧者元宗即位尤重之除東宫使卒于仕馬文義彭城人也父仁裕事烈祖為使相文義以廕授千牛備身補浙西支使建州之役𨽻祖全恩為判官既下建州将吏皆入府庫爭取金貝文義獨收民籍歸幕故建州雖經亂而民皆安堵文義與有力焉遷讚善大夫卒子禹昌甫二歲妻朱氏大将軍業女也􅐠贈一無所受盖其廉如此故能率其妻如此許規髙陽人祖儒義不食梁粟自雍州襁負東走隠江南山谷中終身不出儒生稠稠生規規好道家言故不事事嘗羇旅宣歙間聞旁舍呻呼就訊之曰我某郡人也察君長者且死願以骸骨屬因指槖中黄金十斤曰以是交長者規許諾敬負其骨千里并黄金置死者家父驚愧之因獻金如亡兒言以為許君夀規不顧竟去聞者以規為長者云子逖事後主為監察御史亦有清節後仕皇朝苛政傳第十四嗚呼立天之道曰隂與陽立地之道曰剛與柔立人之道曰仁與義盖隂陽和同剛柔相濟然後交通成和而物生焉人位其中戴仁抱義所以贊天地之化育也茍忿戾殘忍而不全乎仁義則猶天之獨陽而無隂地之獨剛而無柔其於生成也殆矣古之聖人所以徳刑並用而洽於民心者凢以知此而已循致後世依勢作威倚法以削則㓕天地之徳刻生民之性苛細􅃤烈無所不為可不痛哉昔孔子適楚有婦人哭於路而哀使子貢問之曰爾之哭重有憂乎曰然子貢問其故曰吾舅死於虎吾夫又死焉今吾子又死焉是以哀之子貢曰何不去也曰無苛政孔子聞之曰小子志之苛政猛於虎作苛政傳張宣字致用少事呉為軍校𨽻大将柴棐棐愛人戢下諸将化之唯宣頗肆暴戾部曲苦之從劉信圍虔州虔人乞師於楚信遣宣及髙審思分兵禦之大敗楚師累遷諸軍都虞侯徙為左街使皆以嚴酷為理及鎮鄂州置地室以鞠罪人罪無問小大入之則無全活未幾境内大治道不拾遺㑹雪中炭肆有闘者録問之言市炭一秤而輕不及數宣使秤之信然乃斬賣炭者梟首懸炭於市自是賣炭者率以十五斤為秤無敢輕重李徳柔字子懐鄱陽人也始為小吏善伺人之私捕獲亡命所至必得時目為李猫兒累遷大理卿持法苛峻獄有未成則以蘆蓆卷囚而倒置之死者甚衆徳柔本無學術妄稱博學毎呼馬為韓盧染工為伶倫雖然不附姦佞善守職分故終其天年初亢宗欲置北寺獄徳柔諌曰世豈乏士而俾閹豎得以弄其文墨耶其議遂寢論者韙之嗚呼唐末大亂方鎮僣擬悉以宦官給事考諸前史呉越最多唯南唐載籍脫略閹人内倖用否輕重不可悉考案浮屠傳後主對佛像燃命燈以决大辟自夕至旦火㓕則誅之不㓕則貰之由是富商大賈遺賂内官俾續燈獲免者甚衆而此又有置獄北寺之説則閹豎之職雖無考據而伺隙抵巇竊弄威徳亦已甚矣幸而國君儒雅未嘗嬖倖故不見斥於當時南唐書卷十八欽定四庫全書南唐書卷十九宋馬令撰誅死傳第十五嗚呼三代之際刑不上大夫而霸者之命亦曰無專殺大夫則古之所以任大夫者未嘗不以賢而所以待大夫者未嘗不以禮及其世亂刑濫故殺之之甚有見於春秋者書人以殺殺以其罪也稱國以殺殺不以其罪也是以為人君而不通春秋之義者必蒙首惡之名為人臣而不通春秋之義者必䧟誅死之罪後世君子恥於自明而為小人之所誣則賢不肖駢死於市朝而䧟其君於首惡之名者無世無之良史所以直筆書之使後世為臣者知法之不可犯為君者知刑之不可濫如陳蕃李固之死君子觀之未嘗不扼腕而歎之董卓王甫之死君子觀之未嘗不憮然而快之是其刑之當否雖千載之後猶足以感發人之喜怒也南唐享國日淺可名之士無幾而誅死太半如宋齊邱陳覺李徴古李徳明鍾謨張巒禇仁規王建封范冲敏皇甫繼勲林仁肇潘佑李平皆死於非命就其未死之行以考之則知其所死者不能無當否矣然則南唐之亡非人亡之亦自亡也為國而自去其股肱譬諸排空之鳥而自折其羽翮孰有不困者哉昔孔子適晋至河而還者聞晋殺竇鳴犢舜華也故曰刳胎而麟不至覆巢而鳯不翔君子惡傷其𩔖也作誅死傳禇仁規字可則廣陵人也始為軍中小吏勤幹敏給可被繁使累除右職出為海陵鹽監使海陵民好爭訟吏多不能直乃以仁規兼縣事所部魚鹽竹葦之地財用所出國家毎有大役常賦不能給仁規使行視民家所有舉籍取之事訖則以次償備罔有逋遺以故民不甚怨而供億公費不知限極烈祖喜之及以海陵為㤗州遷仁規為刺史不移治所政亦如故晩年國家少事仁規掊克不已多入私門刑罰滋暴加以奢縦宣徽使陳覺有宿嫌宻啟其状侍御史王仲連亦劾之烈祖陽不問而隂欲罷其郡㑹将東廵乃召以為靜江軍都虞侯督舟師以從及還都遂留不遣仁規方承恩遇猥被摧折不勝忿恚乃上書自陳無過而為讒佞所間辭甚訐斥烈祖下其事命陳覺充㤗州按鞠使仁規聞覺往按歎曰吾嘗孤立所知者主上而已陳覺首搆吾事而今以属之何以自明遂自劾即日收付大理賜死妻子徙和州王建封少為軍校驍勇任俠平建州功冠諸将拜信州刺史為人剛鷙無所忌憚及陳覺等矯命討陳仁逹建封帥師圍福州與諸将爭功城垂尅而先退諸軍由此潰散遂失晉安元宗大怒陳覺馮延魯皆被流竄而建封不自安元宗召還慰撫之使掌禁兵建封怙罪愈多僭侈時魏岑鍾謨李徳明皆當清要而岑詭佞尤甚謨及徳明亦輕脫俱不恊衆望户部貟外即范沖敏頗耿介負氣深疾岑等而與建封相善以建封方被寵任可去羣黨因勸建封上書歴詆用事者請盡去羣小進用正人元宗大怒以其武臣握禁兵不當干預國政流建封池州賜死於路沖敏棄市李徳明不知何許人也落魄負大節累遷兵部貟外郎文理院學士周世宗伐淮甸下滁州元宗懼先遣牙将王知朗奉書於世宗不答未幾楊光舒㤗蘄相次潰元宗益懼乃遣徳明與鍾謨奉表稱臣請獻夀濠泗楚光海六州以求罷兵世宗亦不答徳明與鍾謨皆留行在明年元宗復使孫晟王崇質削去帝號願効貢賦世宗猶不答於是鍾謨等見世宗英武而師甚盛乃曰願陛下寛臣五日之誅還取江南表盡獻江北諸州世宗許之遣供奉官安宏道押徳明崇質還江南而謨晟皆見留徳明等歸盛稱世宗英武元宗惡之宋齊邱陳覺等皆以割地無益徳明賣國以圖利元宗大怒命斬徳明於市而益兵以拒周初徳明與鍾謨皆以尚書郎待制恃恩用事百官側目號為鍾李及謨還因覆案齊邱黨與追贈徳明袁州刺史皇甫繼勲江州節度使暉之子少以父廕為軍校常從暉軍中滁州之役暉力戰甚急繼勲欲遁暉操戈擊之弗及遂逸以暉死事故繼勲恩澤優渥累遷将軍池饒二州刺史性謹厚勤於為理吏民安輯入為諸軍都虞侯數年南唐老将亡殁殆盡繼勲雖少遂拜大将軍貲産優贍而錫賚頗優於是營第宅侈車服畜妓樂備珍羙擇近郊之地植花構亭珠翠環列擬於王室及王師來伐繼勲保惜貲富無効死之志欲後主速降而口不敢發毎於衆中但言國數窮促而已或聞敗績則怡愉竊喜或有敢死之士請出効命則杖而拘之由是軍情忿恚百姓切齒近臣屢以為言後主優容之後託以軍旅稀復朝見召之亦不至後主於是不能容乃親廵城勞軍還誘繼勲入宫責其流言不用命之状收付大理始出門而衆軍之士雲集臠割繼勲頃刻而盡嗚呼天屬之厚不可薄也於其所厚而薄之則其它無不薄矣皇甫繼勲叛父於垂死之際及其事君又可知也忠孝人之大倫而不忠不孝者無容於天地之度内然則繼勲之死豈特人怨哉鍾謨字仲益㑹稽人也僑建康少爽悟博學屬文頴脫時軰元宗寵用之㧞自下位累遷吏部郎中顯徳中周師下楊光等州元宗遣謨與李徳明奉表於世宗未報而孫晟王崇質繼至謨等謂世宗曰唐畏陛下神武保無二心願歸取表盡獻淮甸之地世宗許之遣徳明崇質還江南而晟與謨皆留行在既而江南拒命世宗大怒案誅晟及舘中二百餘人同死獨赦謨以為耀州司馬謨在耀州以詩貽其州将其略云翩翩歸盡塞垣鴻殷殷驚開蟄户䖝渭北離愁春色裏江南家事戰塵中江南暨周平世宗召謨授衞尉卿放還國謨作詩以獻其略云三年耀武羣侯服一日廻鑾萬國春南北通歡永無事謝恩歸去老陪臣世宗覽而悦之賜黄金五百兩意将以間其君臣也元宗果銜之謨歸為禮部侍郎判尚書省國政悉秉於中臺相府但紏轄而已謨既秉權鑄大錢改制度恃其才能挾中朝之勢尤横恣不法世宗毎遣使至必賜詔存問時太子兾叅惣庶政謨薦其所知閻式為太子司議郎百司關啟多由之初李徳明與謨善徳明之死給事中唐鎬與宋齊邱同議至是鎬不自安又頗納賄謨知之面詰其状鎬大懼及謨復使周以世宗之言覆按齊邱黨與陳覺李徴古以下皆伏誅鎬益懼㑹信州刺史張巒入為天威軍都虞侯常詣謨第相歡或至夜分鎬時掌樞要因搆謨與巒謀為不軌元宗疑之太子兾卒從嘉以次當立而謨曰從嘉輕肆請立紀國公從善元宗大怒尚以世宗之故未即加誅乃罷其職為國子司業及世宗崩遂貶謨著作佐郎饒州安置遣中使領侍衛軍十人即日監督上道馳驛發遣家屬自後而去謨時病風眩作絶句十餘章其辭皆悽愴至郡月餘遣人就縊殺之謨尤好古碑奉使中原毎道旁碑碣必駐馬歴覽嘗見龜趺大碣半没水中謨欣然解衣以手捫揣黙記其文他日水涸以所録本就證之無差其爽邁如此初使者至謨望拜曰臣無負國使者曰詔問孫晟獨死状謨復拜曰臣聞命矣遂就縊巒亦賜死於宣州潘佑散騎常侍處常之子氣宇孤峻閉門讀書不營貲産文章贍逸尤敏於論議時譽藹然中書舎人陳喬户部侍郎韓熙載薦之以秘書省正字釋褐俄直崇文舘輔後主於東宫後主即位遷虞部貟外郎史舘修撰後主納后歴代久無其禮開元禮亦多闕博士陳致雍習知㳂革隨事補正後主使徐鉉與佑叅議佑立論以沮之文彩可觀後主竒其議頗見施用由是恩寵日洽改知制誥明年居中用事極論時政無所廽避後主手札敦喻佑七表不止因請休官逺去乃徙佑專知國史悉罷其職時江南衰削國歩多艱佑所上諌疏有家國隂隂如日將暮之辭後主惡之又其所薦黜與時軰不協因誣以他事劾佑佑自剄母及妻子徙饒州佑自言其母方娠夢古衣冠人告曰我顔延之也與夫人為子及生七歲始能語曰兒悞傷白龍為上帝所罰也因吟詩曰只因騎折玉龍腰謫在人間三十六至是果以三十六歲卒李平初為河中李守貞從事漢隠帝立守貞據城叛隠帝命周太祖討之守貞遣平與朱元奉表來乞師未返而河中平遂留江南越人寇毘陵平自言有武略因以為将固辭乃遷衛尉少卿使領偏師廵江北進逼蘄州周師先遁平入保其城即以為蘄州刺史㑹朱元叛元宗恐其不自安召之還都使者失㫖鎻平送建康元宗慰勉之拜建州節度副使徴為衛尉卿平本好神􅋖修養之事而動多怪妄自言􅋖人神鬼常與通接潘佑亦好仙平因與親善之言佑父處常今已為􅋖官而已與佑亦􅋖官也家置靜室人莫能窺佑既獲用請復井田法深抑豪民有買貧户田者使即還之又依周禮造民籍復造牛籍曠土盡令種桑薦平判司農寺以督之命行於下急如星火州縣吏胥因以為姦百姓大擾聚而為亂後主知立法之病即罷之佑復薦平知尚書省由是羣議紛紛以為壊法殃民皆由平始乃先收平下大理使收佑佑自剄平縊於獄妻子徙䖍州明年宥其家廩給之南唐書卷十九欽定四庫全書南唐書卷二十宋馬令撰黨與傳上第十六嗚呼漢以黨錮衰唐以朋黨㓕漢唐之亂雖愚者與知焉迨乎利害相攻則為之而不知其非盖亦蔽於好惡之情而已南唐之士亦各有黨智者觀之君子小人見矣或曰宋齊邱陳覺李徴古馮延己延魯魏岑查文徽為一黨孫晟常夢錫蕭儼韓熙載江文蔚鍾謨李徳明為一黨而或列為黨與或各敘於傳者何哉盖世衰道䘮小人阿附以消君子而君子小人反𩔖不合故自小人觀之因謂之黨與而君子未嘗有黨也予之所論一入於黨與則宜無君子而各著於篇者未必皆小人嗚呼弗可不察也作黨與傳宋齊邱豫章人也其父誠為江西鍾傳副使卒於任時天下已亂經籍道熄齊邱獨好學有大志及鍾傳敗齊邱益窮隨衆東下糊口於倡優魏氏烈祖時為昇州刺史延四方之士齊邱依焉因以鳯皇臺詩見志曰嵯峨壓洪泉岝峉撑碧落宜哉秦始皇不驅亦不鑿上有布政臺八顧背城郭山蹙龍虎健水黒螭蜃作白虹欲吞人赤􅂹相􅘤爍畫棟泥金碧石路盤磽确倒掛哭月猿危立思天鶴鑿池養蛟龍栽松棲鸑鷟梁間燕教鶵石罅虵懸殻養花如養賢去草如去惡日晩嚴城鼓風來蕭寺鐸掃地驅塵埃剪蒿除鳥雀金桃帶葉摘綠李和衣嚼貞竹無盛衰媚桞先揺落塵飛景陽井草合臨春閣芙蓉如佳人廽首似調謔當軒有直道無人肯駐脚夜半鼠窸窣天隂鬼㪣啄松孤不易立石醜難安著自怜啄木鳥去蠧終不錯曉風吹梧桐樹頭鳴嚗嚗峩峩江令石青苔何淡薄不話興亡事舉首思𦕈邈吁哉未到此褊劣同尺蠖籠鶴羨鳬毛猛虎愛蝸角一日賢太守與我觀槖籥徃徃獨自語天帝相唯諾風雲偶不來寰宇銷一略我欲烹長鯨四海為鼎鑊我欲取大鵬天地為矰􅗤安得生羽翰雄飛上寥廓烈祖竒其才以國士待之歙人汪台符投書於烈祖齊邱忌其名頗排斥之齊邱本字超回台符因是貽書侮之曰聞足下齊大聖以為名超亞聖以為字齊邱慙即改字子蒿隨烈祖鎮京口入定朱瑾之難雖叅謀議而怯於鼓鐸故不預戰功烈祖輔政勵精為理脩舉禮法以遏强衆親附卿士寛徭薄賦人用安輯齊邱頗有力焉烈祖欲進用之而為徐義祖所惡乃以為殿直軍判官凢十年義祖卒始拜右司貟外郎累遷左諌議兵部侍郎居中用事期以相之齊邱自以名望甚淺欲為退譲以自重乃告如豫章改塟其父因入九華山啟求退居呉主連徴不至元宗時爲大将軍烈祖使元宗親徃敦廹乃起除中書侍郎遷右僕射平章事烈祖出鎮金陵以元宗入輔政委齊邱左右之齊邱於是益樹朋黨潜自封殖時烈祖權位日隆中外皆知有禪代之勢而烈祖恭謹守道懼羣下不協欲待嗣君齊邱亦盛贊其說與烈祖意合烈祖次子景遷呉主之壻也美姿儀風度和雅烈祖鍾愛特甚齊邱使陳覺為景遷教授以賈其聲價齊邱叅决時政多為不法輒歸過於元宗而盛稱景遷之羙幾有奪嫡之計所以然者以呉主少而烈祖老必不能待他日得國授於景遷景遷昜制已為元老威權無上矣此其日夕之謀也烈祖覺之乃召齊邱如金陵以為已副遥兼節度使無所闗預從容而已行軍司馬徐玠副使李建勲判官孫晟賈潭呉相王令謀都校周宗之徒相為推挽决行大事既建齊國以齊邱為左丞相遷司空徐玠為右丞相明年烈祖即位徐玠為使相張居詠張延翰李建勲皆平章事周宗為樞宻使齊邱但遷司徒而已自悼失計復恥無功不勝其忿受宣之日聞制辭云布衣時陛下乃一刺史爾今日為天子可不用老臣矣拂衣而出闔門請罪烈祖但遜辭以喻之不為改官齊邱久之計無所出乃更上書請議遷譲皇他郡以絶人望呉世子璉烈祖子壻也又請絶其婚而斥逺之其詞云非獨婦人有七出夫有罪亦可出之聞者莫不大笑居數年復自陳以輔相之重不可不與政烈祖許其入中書視事又以兩省事多委給事舎人而中外繁劇之務皆在尚書省乃求知尚書省事亦許之於是悉取朝廷附已者分掌六司下及胥史皆用所親吏視事數月有親吏夏昌圖者盗官錢三百萬齊邱特判貸其死烈祖大怒切責所司刑部官吏自劾請罪久之乃解昌圗坐斬齊邱臥疾不出烈祖遣夀王景遂徃問之許其出鎮本州旬日遂起拜洪州節度使委任羣小政事不治所居舊里愛親坊改為衣錦坊大啓第宅窮極宏壯居坊中人皆使修飾牆屋門巷極備華潔民不堪命相率逃去坊中為之空前後四任本州其行事多𩔖此在富貴權要之地三十年唯欲人之順已其一言不同者必被排擯酷好術數凢天文地理占相卜祝之徒在門下者數十人厚禄以給之相傳言齊邱少時曽夢乗龍上天凢文武百司皆布朋黨毎國家有善政其黨輒但言宋公之為也事有不合羣望者則曰不用宋公之言也毎舉一事必知物議不可則羣黨競以巧詞先為之地及有論議者皆以墮其計中羣臣敢言者常夢錫蕭儼江文蔚韓熙載等十數人而常蕭尤甚夢錫性褊而簡言儼無文而辭繁碎故皆不能勝然雖正人切齒而流俗疏逺之人猶瞻仰以為元老故趨附者益多及國家多難因欲遂其窺竊之計卒以此敗元宗謂近臣曰齊邱之才安能當此大難不過率國中以降自為功爾窺竊之計與當大難之事皆具陳喬陳覺傳及放歸青陽即舊第之外别院處之重門外鎻穴牆以給食明年自縊死年七十三諡醜謬齊邱初舘於倡妓魏氏藉其貲給遂以為正室亦封國夫人無子以從子摩詰為嗣及後主即位召其妻子還建康舘給之連坐者皆宥齊邱為文有天才而寡學不經師友議論詞尚詭誕多違戾先王之㫖自以古今獨歩書札不工亦自矜衒而嗤鄙歐虞之徒馮延己亦工書逺勝齊邱而佯為師授以求媚齊邱謂之曰子書非不善然不能精意徃徃似虞世南其何堪也其狂瞽如此承二君不世之恩而自䧟刑辟識者知有天道焉嗚呼俗説江南堅甲精兵雖數十萬而長江天塹險過湯池可當十萬國老宋齊邱機變如神可當十萬周世宗欲取江表故齊邱以反間死斯言殆非君子之說閭巷小人之語也龍衮因是著於野錄以欺惑後世而後世之人亦頗信之且民之至愚欺之則昜信况齊邱益樹朋黨以賈譽於當時自非特立獨行之士安能知其妄偽哉孔子嘗以鄉人皆好之為未可盖鄉人之情未必公也不如鄉人之善者好之則信善矣嗚呼善人吾不得見則齊邱之事安所考信哉蓋亦考其所言與其所行而已觀其著書云􅀞者不敢昜圖像苟易之必有咎刻者不敢侮木偶茍侮之必貽禍始制作於我又要敬於我又寘禍於我此意以社稷之功自任而無復君臣之禮也又云見食象者食牛不足見戴冕者戴冠不足則窺竊之計於是乎萌矣予以是知齊邱之所言也伐南閩攻仁逹以空其國用逐常夢錫韓熙載江文蔚以間其忠言予以是知齊邱之所行也然則齊邱之死自速辜爾謂之反間者妄也南唐書卷二十欽定四庫全書南唐書卷二十一宋馬令撰黨與傳下第十七陳覺宋齊邱之客也齊邱薦為楚王景遷教授累遷兵部侍郎宣徽使覺在外姦佞苛酷及居家不能制義於一妻其妻李氏妬悍親執庖爨不置妾媵宋齊邱嘗選三婢予之頗有容質李氏亦無戁色奉使三婢禮如舅姑晨夕承侍未嘗輒離左右人問其故則曰此令公寵倖之人見之若靣令公敢倨慢耶三婢不自安求還宋第覺唯唯聽從而已李仁逹據福州齊邱因薦覺有智略可使喻㫖於仁逹必不勞寸刃坐致闕下元宗許之乃以覺為福州宣喻使既至說仁逹入覲仁逹曰安撫未定請俟它年入覲覺還至建安恥說之不行乃矯制發建汀撫信之兵徃討之既而諸軍皆潰士之戰死者無幾國用遂為一空於是鎻覺送建康中外皆謂其必誅而齊邱上表為請乃赦之流覺於蘄州未幾復用如初及救壽春又與朱元有私隙而窘之太甚卒致元叛淮甸既䧟舉國震恐齊邱等因之以圖變覺與李徴古俱為樞宻副使徴古毎於言議無復臣禮覺請元宗深居後宫委國事於宋公臣時得入奉從容譚釋老而已元宗以羣情方撓不欲暴其事及使中原回乃罷近職覺以世宗之命告元宗曰江南連年拒命知是宰相嚴續所為可殺以謝過元宗知其與續有宿嫌也不信鍾謨請覆實其事乃遣謨告謝責已言非續之罪世宗大驚曰續果能如是乃忠於所事也何罪之有朕為天下主肯教人殺忠臣乎謨還報元宗乃下令數覺前後罪惡貶饒州安置使殺於路李徴古宜春人也昇元末第進士時宋齊邱廣樹黨與以張聲勢徴古常出入門下保大中與陳覺同掌機宻淮甸兵起劉彦貞敗死人心恼懼元宗歎曰吾家國一至於此因泣下徴古曰陛下當以兵力拒敵泣有何益盃酒過量耶乳保不至耶元宗變色左右皆戰慄徴古亦自若又與陳覺乗間言社稷禍在朝夕請陛下燕居深宫國事盡付宋齊邱以紓䘮亂元宗以戎事未戢隠忍不發及畫江罷兵鍾謨至自京師判尚書兼三省之政權勢特甚尤切齒齊邱黨與常曰人臣窺國理不可容及陳覺奉使中原欲矯世宗之命殺嚴續謨乞復使周覆實其事齊邱黨與遂敗貶徴古洪州殺之馮延已字正中廣陵人也父令頵事本郡為軍吏烈祖署為歙州鹽鐡院判官禆将樊思藴作亂燒營而火及令頵第叛卒皆釋兵救火其得人心如此時刺史骨言病甚中外不知存否人心恼恼延已年十四徒歩入見言復傳言教出謝将吏人情乃安及長有辭學多伎藝烈祖以為秘書郎使與元宗遊處累遷駕部郎中元帥府掌書記與陳覺友善自結於宋齊邱以固恩寵同府在已上者稍以計遷出之元宗愛其多能而嫌其輕脫貪求特以舊人不能離也孫晟靣數之曰君常鄙晟晟知之矣晟文筆不如君也技藝不如君也談諧不如君也諛佞不如君也然上置君於親賢門下者期以道藝相輔不可悞邦國大計也聞者韙其言烈祖季年亦惡之復為常夢錫彈劾必欲斥去未果而烈祖殂元宗即位延己喜形於色未聽政屡入白事一日數見元宗不悦曰書記自有常職此各有所司何其繁也由是少止遂與宋齊邱更相推唱拜諌議大夫翰林學士復與其弟延魯交結魏岑陳覺查文徽侵損時政時人謂之五鬼保大四年自中書侍郎拜平章事時論不平出鎮撫州亦無善政延己無才而好大言及再入相乃言已之智略足以經營天下而人主躬親庶務宰相備位何以致理於是元宗悉以庻政委之奏可而已延己遲疑顧望責成胥吏之手又常笑烈祖戢兵以為齷齪無大畧安陸之役䘮兵數千而輟食咨嗟者旬日此田舍翁安能成大事如今上暴師數萬於外而宴樂擊鞠不輟此則真英雄主也故蠧國殃民實此之由為相之後動多狥私而故人親戚殆於謝絶與弟延魯如仇讐延魯所生乃延己之繼母也亦至疎隔既失湖湘人皆歸咎延己自劾元宗復使親政割地之後始乞罷相乃罷為宫𫝊逾年卒年七十五著樂章百餘闋其鶴冲天詞云曉月墜宿雲披銀燭錦屏幃建章鐘動玉䋲低宫漏出花遲又歸國謡詞云江水碧江上何人吹玉笛扁舟逺送瀟湘客蘆花千里霜月白傷行色明朝便是闗山隔見稱於世元宗樂府辭云小樓吹徹玉笙寒延己有風乍起吹皺一池春水之句皆為警冊元宗嘗戲延己曰吹皺一池春水干卿何事延己曰未如陛下小樓吹徹玉笙寒元宗悅初蕭儼深惡延己常廷斥之及儼為大理卿斷獄失入舉朝皆欲誅儼獨延己力爭以為赦前失入罪不當死儼終獲免人皆韙之以謂裴冕損怨無以加此延魯延己異母弟也初為江都判官累遷水部貟外郎中書舎人延魯鋭於進趨常欲用事四方以要功名延已詰曰士以文行餙身勤恪居職則寵光至矣何用行險以圖禄利延魯曰兄自能如此弟不能愔愔待循資為宰相也建州之役雖查文徽尸其事而延魯實賛之閩人先苦王氏亂政聞唐師至皆伐木開道壺漿奉迎既尅建州軍無節制大掠數日民不堪命故雖下其地而人皆解體劉從効李仁逹之徒得以鳴集其民專據郡縣者因其隙也及陳覺矯命討晋安表言朝夕可克元宗不得已發諸路兵應之延魯亦請行拜南面監軍使李仁逹求救於越越人遣兵助守既而延魯魏岑王崇文等各領兵萬數四面俱至圍城數匝聲動天地有國以來出師之盛未之有也延魯等各務為已功掎角不相應諸将皆怠莫肯用命故兵勢雖盛而城久不下越之救兵無所施力欲出不可越人復以舟師浮海而至旁岸阻濘不可登延魯軍中集射之舟人戢矢如蝟延魯曰城所以不下者恃此救也今不與之戰則褁糧坐甲何為哉不如却軍俟其登岸盡殺之城必降矣禆将孟堅諌曰城勢已窮堅壁困之功在漏刻延魯不聽越人登岸果致死力延魯遇敵先走其下皆潰孟堅死之諸軍相次亦潰士之戰死者無幾而軍資器械委棄畧盡元宗大怒命鎻延魯陳覺至建康韓熙載劾奏請置之死宋齊邱固爭乃流延魯於舒州未幾復用為東都留守延魯初至自晉安身被五木鎻鑰甚固延己歎曰弟不肯為循資宰相一至於此兄弟由是有隙淮甸兵起延魯棄楊州削髪為沙門逃歸周人執之歸於京師時誚之曰執節分符始作大軍之帥披緇削髪僣為行脚之僧割地之後世宗以為刑部侍郎遣歸報聘遂留金陵拜户部侍郎建隆初李重進來乞師元宗命延魯出告其使曰吾不相救非乏兵也大丈夫不得志而反固有之矣但不得其時爾昔周世宗初崩人心未一上黨作亂大兵北征君不以此時反今天下晏然乃以一城之地抗萬乗之師此自速死爾吾安能救速死之人乎太祖皇帝親征延魯入貢太祖曰爾國連吾叛臣乎延魯徐曰陛下徒問之而未知之乃以實對太祖頷之因曰朕以大軍渡江爾國能拒朕乎延魯曰重進天下之姦雄陛下一鼔平之蕞爾江南安足以抗天威但士大夫感其主恩有必死之志陛下能棄數萬之卒與之血戰則可矣且大江設險風波不常儻進未尅城退乏糧道亦官守之責也太祖笑曰聊戲卿爾吾與江南大義已明何至於此乃頒師以上皆見陳彭年别錄魏岑字景山鄆州人也篤學强識而拙於屬文常遊覽四方凡天下山川勝勢風土羙惡無所不知避亂淮南署郡從事久不得志數以計䇿干宋齊邱薦授校書郎尤好諛佞善揣人意元宗即位鋭意天下有尅復中原之志岑請親祀南郊元宗曰俟天下為一然後告謝天地及下南閩意以為諸國可指麾而定岑因侍宴自言臣少遊元城好其風物陛下平中原日臣獨乞任魏州元宗許之岑趨墀下拜謝人皆以為佞保大六年李守貞乞師以岑兼㳂淮廵撫使聞守貞敗罷為屯田使入為兵部侍郎拜樞宻副使後事亡查文徽不知何許人也用宋齊邱薦授元帥府掌書記遷秘書郎元宗即位拜中書舎人保大中閩人連重遇朱文進弑其君曦遣使告亂馮延己請執其使以伐閩俄以民疫寢其議文徽獨以為可討王延政首亂宜攻自建州議者多不從唯馮延魯贊之翰林待詔􅆇循者與文徽同閈嘗賈於閩具知山川險昜為陳進兵之計文徽因是决行邊鎬帥洪州屯兵與文徽㑹建安之民苦王氏亂政皆伐木開道以迎我師遂下建陽方且傳檄喻福州而王延政先遣統軍使呉承祐以遊兵廵福州境紿曰唐為我討賊大軍至矣福州信之禆将林仁翰殺連重遇函其首歸承祐延政以其子繼昌守福州親帥衆以拒文徽文徽始以福州之亂伐閩至此延政已平福州五郡之兵大集敵勢甚盛文徽等次於盖竹退復屯建陽啟求濟師􅆇循監偏師屯邵武縣縣民擒之斬於建州市元宗復遣祖全恩何敬洙率萬人至建陽與延政隔谿水而陣全恩使建陽降将孟堅潜師出其後禆将武彦思馬存貴以輕鋭繼之腹背夾擊延政大敗退而城守福州復亂李仁逹殺繼昌及呉承祐以卓儼明為主儼明老僧也徒衆數千目有重瞳垂手過膝故推立之既而無統御之略仁逹復殺之而自稱留後延政益不振建州之險要曰西巖延平津相繼下俄克建州執王延政歸於建康漳泉汀皆平而唯福州覊縻而已遂以文徽為撫州刺史入為諌議大夫拜建州節度使及陳覺矯命敗績福州遂屬呉越後二年福州詐言呉越戍兵亂殺李仁逹而遁文徽與劒州刺史陳誨帥舟師應福州以兵出迎誨曰越人謨信謨信無信也閩人語音未可速進文徽曰久則生變乗其未定亟取之留誨屯江口進至西門伏兵發文徽被擒誨與越人戰大敗之獲其将馬先進等元宗送先進等還越越亦歸文徽後事亡南唐書卷二十一欽定四庫全書南唐書卷二十二宋馬令撰歸明𫝊上第十八嗚呼生草昧之世事偏據之國君臣上下􅁳行而已矣及其一覩聖人之化而得其所歸則何異于離蔀屋之幽即天日之鑒哉故南唐之士事皇朝者皆謂之歸明而歸明之士未必皆善也作歸明𫝊蕭儼廬陵人也甫十嵗詣廣陵以童子擢第及長志量穏正交不茍合授秘書省正字烈祖受禪遷大理司直拜刑部郎中明清平恕號稱職烈祖季年性辯急羣臣多貽訶責陳覺居近職不自安請告數月烈祖殂覺以宣遺詔日出叅儼劾曰陳覺側聆私室以俟升遐請案其罪不許元宗即位委政齊王景遂馮延己魏岑之徒因以隔絶中外儼上書極論遂出聴政昇元之法禁以良人為賤賣奴婢者通官作劵至是馮延魯等欲廣置妓妾因矯遺制許民私賣已子儼駁曰此非大行之命延魯矯為之爾昔延魯為東都判官上疏貧民不自給者聴鬻已子大行問臣臣曰往者陛下出府金以贖民子故得天下歸心大寳自至今乃許民賣子以資豪民非防微之道也由是延魯之請不行今復行之故知其矯先㫖也議者以遺詔已出不可改遂行烈祖山陵儼與韓熈載江文蔚同定禮儀諡法遷大理卿兼給事中因㫁獄失入用事者欲誅之賴宰相馮延己固争以謂赦前失入罪不當死遂貶南昌令因歸葬廬陵幞巾素裾詣郡􅈦設拜敬守桑梓言談服御不改鄉俗㑹醼故老姻舊語笑雍穆俄復舊官後主初嗣位屢與嬖倖對奕儼入白事舉奩投于地後主大怒曰汝與魏徴孰愈儼従容曰臣若非魏徵陛下亦非太宗矣後主黙然罷奕儼秉身方直彈奏不阿百官貴戚歛祍避之歸皇朝以老病居鄉里因訟至郡言辭舛錯郡倅不知其疾以為愚謬乃詰之曰江南用汝輩為正卿不亡何待卒年七十至無一金劉承勲不知何許人也美風度善數計事烈祖為郡従事改糧料判官出納無弊號為稱職遷徳昌宫使南唐自呉建國保有江淮籠山澤之利帑藏頗盈徳昌宫其外府也金帛泉貨多在焉禪代之後邦國新造而簿籍淆亂鉤校不明承勲由是多入私家盜用無算家畜妓樂迨百數人每置一妓費數百緡而珠金服飾亦各稱此承勲善為詭佞常以寳貨遺賂權要故雖朱門甲第窮極富侈而人弗之譴太祖皇帝既平荆湖詔江南具舟運湘中米承勲請行乃督巨艘數百柁自長沙抵迎鑾本以奸心預自結于皇朝為異時計及金陵平承勲歸于京師首陳運米事以為已績太祖曰此李煜勤王之職豈汝功耶特弗叙用既而窮困祼􅃝丐食于路不勝其苦凍餒而卒邵拙宣城人也孤峭不撓博通經史飲酒常至百盞偶沈酗遂絶飲雖筵宴終日唯茶漿而已著書埒韓栁有詩三百篇尚書郎孫邁為之序命曰廬嶽集曹郎趙慶以詩貽之云邁古文章金鸑鷟出羣行止玉麒麟歸皇朝就應制科有司以聞未詔而卒郡將哀之籍其裝得拙手書史𫝊文集三百卷藏于官府時悼其苦學能文而不得達于名位或議其詩有萬國未得雨孤雲猶在山之句斯為應矣門人袁氏買地葬之舒雅世為宣城人姿容秀發以才思自命因隨計金陵以所學獻于吏部侍郎韓熈載一見如疇昔館給之雅性巧黠應答如流熈載待之為忘年之交出入卧内曽無間然熈載性懶不拘禮法常與雅易服燕戲猱雜侍婢入末念酸以為笑樂或云熈載所著格言半雅之辭迨數年㑹熈載知貢舉以雅為第一朝野無間者以雅之才為當也歸皇朝守舒州出見山秀竒田疇沃壤遂有終焉之志考滿以本官掌靈仙觀卒盧絳字晉卿南昌人也讀書畧通大義不事事常以博奕角觝為務鄉里鄙之絳慙憤入廬山國學與諸葛濤蒯鼇相善諸生篋笥稍豐輒强取之山下桑門亦苦其無賴號為廬山三害㑹朱弼為國子助教規其過遂亡去往還澗壁遇大雪乏薪絳恃膂力踊折簷桶燒之病痁且死夜夢白衣婦人頗有姿色歌菩薩蠻勸絳罇酒其辭云玉京人去秋蕭索畫簷鵲起梧桐落欹枕悄無言月和殘夢圓背燈惟暗泣甚處碪聲急眉黛小山攅芭蕉生暮寒歌數闋因謂絳曰子之疾食蔗即愈詰朝求蔗食之疾果差迨數夕又夢前白衣麗人曰妾乃玉真也他日富貴相見于固子坡絳寤襟懐豁然唯不測固子坡之說後入金陵詣後主上書陳京口至澗壁要衝之地宜立柵屯戍其餘利害數十事書上未報復為書詣光政陳喬喬與語數日大竒之因表署為本院承㫖經營制置頗見榦績俄轉㳂江諸營兵馬監押絳于是召募無賴少年便習舟楫水道者得馬雄王川軍等數千人立為偏禆使督卒伍日習水戰節以金鼓麾以旗幟迴舟轉戈皆如節制時有一舟應節稍遲即斬其舟長復試之可使泝逆流蹈巨浪常于海門遮獲越人船舫鹽貨獻于金陵後主賞其功拜上柱國及王師克池州授陵波軍都虞候㳂江都部署王師屢攻秦淮口水柵絳數拒之皇甫繼勲鄭彦華等忌絳功名出已說後主遣絳出援丹陽絳率所部百艘為八字陣突圍出至京口麾兵三戰越人三北就拜絳太師自絳出建康水陸之攻愈急絳還赴難㑹宣州叛乃授絳宣州節度使討平之金陵既平諸郡皆下絳獨不順殺歙州刺史龔慎儀謀奔嶺表朝廷數遣使喻㫖絳遂降授冀州團練使㑹龔慎儀姪頴為右讃善大夫上言求復季父之讐乃命斬絳絳臨刑有白衣婦人同斬姿貌宛如所夢問其受刑之地即固子坡也婦人姓耿名玉真其夫死與前婦之子通當極法與絳同斬焉劉茂忠廬陵安城人也貌魁雄善用大矟剽畧旁縣頗為民患縣吏捕獲之械送本郡㑹赦減死論時上江羣盜趙晟蕭榮等聚徒數百郡縣捕之彌年不獲茂忠于是自陳擒晟等以贖餘罪郡將釋之示以恩信茂忠感憤因亡入賊中與捕吏為内應討平之署茂忠諸色捕捉軍頭又廬陵有呉先等招集亡命居鷓鴣洞四出攻剽茂忠掩擊殆盡遂斬先持其首詣郡奏授吉州兵馬監押繕理城隍戎事整肅遷袁州萍鄉制置以捍潭衡之境因縦獵出界潭人拒之茂忠怒乗勢大畧至灃陵而還潭衡巡撫使祖洎惡其犯境欲襲取之㑹冬至日意茂忠醼飲乃帥步騎數千亟趣萍鄉屯寨皆遁候騎告急座皆恼懼茂忠飲㗖自若酒數行報騎又至將士請行茂忠笑曰日旰矣此時出師主將不利潜出竒兵躡潭人後焚橋梁伏道左然後躬擐甲胄去寨十里與潭師遇合戰迨晡勝負未決茂忠下馬持大矟深入敵陣所向無前潭人奔還而橋路已絶旁遇伏兵腹背擊之殺傷殆盡遂執其副使以軍禮見之後主嘉其功拜袁州刺史未㡬金陵平後主入朝吉州刺史申屠令堅約茂忠為亂事未發而令堅卒茂忠遂降舟次淮口修謁稱袁州刺史闗津吏擲刺于地大罵曰亡國之俘何刺史也遂以牓帖賛見將階其􅈦署朱復叱之令執杖庭叅至京師授登州刺史數月朱抵罪羈管適𨽻登州茂忠令日兩衙立于庭下朱慙憤死南唐季世每除節度刺史皆質其家于都城茂忠守袁州金陵城破而亡其妻女茂忠意為軍士所畧及歸京師潜使女奴賣衣于諸營得其狀以聞遂取還之後因據枵夜坐庭下忽一人自外躍劒刺茂忠茂忠以枵自悍連舉數四而枵迨絶刄不能中㑹左右執送軍廵按斬之乃畧女兵也茂忠微時所持大矟後將有鬭戰則夜響嘗與潭人挑戰親持奮擊前無堅敵左右中者皆洞胷脅茂忠因敗其膞至是疾作臂不能舉數日卒李元清濠州人也周世宗征淮南其父聚鄉里義士襞紙為鎧號白甲軍與官軍同守濠州水寨周人驅駱駞為前鋒濠人驚駭不戰而潰元清渡江居建業趫捷有勇走及奔馬常入梁宋伺周人情狀開寳中以吉州永新與潭衡接境因改永新為制置以元清充使每數月一託病不衙潜入潭部人不之知先是夏賦準貢見緡民苦之元清奏請納帛一疋折錢一千以為定制常以便宜科率民無怨望摠諸科物十餘萬數漕運入金陵平例歸京師元清偽為目疾召驗之揮刃而目不瞬遂放歸濠上卒陸昭符金陵秣陵人開寳末朝廷問罪江南恼懼後主遣潘慎修入貢且求緩師昭符時為進奏使以其物數難辦請市于富民石守信家得絹十萬疋後主以昭符善計度累加任使金陵平盧絳入歙州胡則據江州昭符集逃民欲應絳則朝廷遣使宣喻示以恩信昭符送款朝廷禄之昭符嘗為常州刺史常州當呉越之衝城邑荒虛户不滿千數昭符為理寛簡招納散亡未㡬户口蕃庶如初一日坐郡􅈦忽遇雷電遶庭官吏震懾昭符撫案叱之雷霆頓止及舉案幃得大鐵索重數百斤人尤駭之而昭符神色自若命收鐵索付官庫以示後人南唐書卷二十二欽定四庫全書南唐書卷二十三宋馬令撰歸明𫝊下第十九朱弼字君佐建安人也精究五𫝊旁貫數經開寳中詣金陵一舉以闗頭中第授國子助教知廬山國學生徒數百苦無賴軰如盧絳諸葛濤蒯鼇之徒事飲博多横逆學官曠職循縁而已及弼至性本嚴重動持禮法每升堂講釋生徒環立各執疑難問辯絳起弼應聲解說莫不造理雖題非已出而事實聨綴宛若宿構以故諸生誠服皆循規範絳等稍稍引去四方肄業者多造焉弼短一足時謂之跛子先生及建康平例入京師授衡山簿居官廉潔事上無謟每俸給不充則虚腹度日妻子服御寒暄不繼時皆歎服出見衡嶽崇峻遂有終老之志秩滿致仕守嶽廟令食本官俸數年卒四壁蕭然衣衾棺歛皆資于故人君子以為清嗚呼學校者國家之矩範人倫之大本也唐末大亂干戈相尋而橋門璧水鞠為茂草馴至五代儒風不競其久矣南唐跨有江淮鳩集典墳特置學官濱秦淮開國學其徒各不下數百所統州縣往往有學方是時廢君如呉越弑主如南漢叛親如閩楚亂臣賊子無國無之唯南唐兄弟輯睦君臣奠位監于他國最為無事此亦好儒之効也皇朝初離五代之後詔學官訓校九經而祭酒孔維檢討杜鎬苦于訛舛及得金陵藏書十餘萬卷分布三館及學士舍人院其書多讐校精審編秩完具與諸國本不𩔖昔韓宣子適魯而知周禮之所在且周之典禮固非魯可存而魯果能存其禮亦為近于道矣南唐之藏書何以異此孟賓于湖湘連上人少孤力學事母以孝聞天祐末工部侍郎李若虚廉察沅湘賓于以詩數百篇自命為金鼇集獻之若虛稱善採警冊數聨譽諸朝廷由是詩名益振明年春擢進士第未㡬以離亂還鄉㑹馬殷開府辟為零陵従事亦不顯用及馬氏敗賓于自歸南唐授豐城簿遷塗陽令黷貨當死時李昉事皇朝為翰林學士乃賓于同年進士也聞賓于縲紲以詩遺之曰幼攜書劒别湘潭金榜標名第十三昔日聲塵喧洛下近年詩價滿江南後主見詩貸之復其官俄致仕隠于玉笥山自號羣玉峯叟踰年後主以水部員外郎起之金陵平歸老連上秘閣馬致恭以詩送之其落句云今日還家莫惆悵不同初上渡頭船卒年八十三賓于好賄每為佐令輒有贓汚故雖負詩名人不多之初歸江南生子名歸唐亦能詩肄業廬山國學嘗得瀑布詩云練色有窮處寒聲無㫁時隣房生亦得此聨遂交争之助教不能辨訟于江州各以全篇意格定之而歸唐為勝開寳中授秘書省正字出為吉州民掾歸于京師累遷大理丞時江州郡吏有仕于皇朝者指歸唐曰此乃訟詩生也以罪貶袁州司户卒潘賁字子文宜陽人也七嵗能詩性謇特自負才器以藐勢位既而動多屯躓五舉猶為白丁及屬皇朝左僕射沈義倫竒其才致門下賁凡三過省帷每廷試輒以目疾止故賁嘗與故人書云八叨殿試三對天顔㑹沈公薨遺表薦之表上而賁疾作謂人曰挾冊為儒聖偽兩朝白首塲屋不登一第豈非命耶吾受沈公知遇過厚生不能報死得事公于泉下足矣誥下而賁已卒年六十沈氏諸子買棺葬之蒯鼇宣城人也善屬文有才思嘗曰夫文章者所以逹道徳之本發才智之藴使㫖勝于辭理過于文為得之矣其餘摘裂章句鉤校屬耦綺麗恱目清新泪耳則吾不知也聞者善之鼇少亦無賴嘗與盧絳為友後頗改過以廉直自勵茍寒燠畧備則一介不干于人嘗有歙州龍尾硯友人欲之而口不言鼇心與之而未及遺一日友人不告而去鼇乃悔恨躡至數舍與之時有不給而躬謁于人苟愆其期後雖固予亦弗之受其抱信義如此歸于皇朝擢進士第以殿中丞致仕隠于廬山數年卒羅頴南昌人也經𫝊涉獵與里人彭㑹友善皆以詞賦稱開寳中詣金陵舉進士第例以黄衣守選及王師問罪後主銜璧穎再應鄉舉下第道經漢髙祖廟穎題詩其落句云嫚侮羣豪誇大度可怜容得辟陽侯少頃輒自免冠鞠伏廟廷口陳自咎之言掖而去數日卒穎初就舉金陵試銷刑鼎賦儒術之本論有司以鄧及為第一穎為末綴牓既上後主遷穎第二手筆圈其名穎是夕夢黒氣環身有長人自上挽而出之盧郢金陵人也好學有才藝而膂力過人善吹鐵笛乾徳中後主以韓徳霸為在城烽火使常督無賴輩旦暮巡警諸科士人微犯禁往往罹鞭朴㑹徳霸出郢調笛不輒使數卒捕郢郢奮肱搏之卒不能逼郢遂去後與黄夢錫等自國子監出行遇徳霸不避其呵𨗳徳霸駐騎詬曰汝等乞索輩殊不知憲制敢無禮耶因叱左右收郢等郢等争投瓦石擊走其𨗳従毆徳霸傷目徳霸詣後主訴之後主讓曰國子監先帝教育賢材之地孤亦頼此輩與之共治汝鬭監前是必越分陵辱士人既為戎帥不能自扞宜其見毆遂罷徳霸職郢由是横肆益甚明年春試王度如金玉賦郢唱第為第一徐鉉娶郢妺鉉嘗受後主㫖撰文數日不能就因語郢郢曰願試為之因弄百鈞石毬以較力少頃引酒一巵復弄如初若是者數四鉉視之曰非吾徒也其何能為且試詰之郢曰既就矣命等吏口授而書之鉉大驚遂以郢文進後主謂鉉曰語勢酋健似非卿作鉉以實對郢由是知名歸皇朝累遷南全守頗著治蹟病卒邱旭字孟陽宣城農家子也少以畜産為事弱冠始讀書學為辭章因隨計金陵凡九舉而曳白者六七然自勵彌篤不以為恥既而困窘無進取意秋試將邇寡嫂劉敬問行期旭以匱乏告劉曰茍濟榮望雖孤兒可鬻況資用乎于是罄槖遣之旭不得已再就鄉舉明年春試徳厚載物賦旭為第一釋褐歸鄉而家人猶疑其未調暨鄉老酋長謁賀郡吏改署里名乃知上第及金陵平例歸于京師補鎮將數年詣南曹叙理㑹吕公蒙正判銓聞旭名問曰汝非能為賦者乎對曰江南獻賦適為第一吕公曰久聞爾名謂為古人乃並世耶因令取所集旭初著文多為人取去無留巾笥者輒于書肆訪之獲舊本獻焉吕公憐之薦授令録遷京秩卒于衡州旭嘗纂自古賢俊遺言為賓朋宴語行于世其為詞賦得有唐程度體後人以為法黄載字元吉其先江夏人世為農載弱冠釋耒耜就學于廬山事虔人劉元亨篤志自勵精究經史能為文章一舉不中第嘆曰士之賤也久矣規模于蹇淺之文去取于有司之手其于造道不亦逺哉遂不復取進肄業之士多従之事母至謹承顔侍膳温凊寢處未始離左右兄弟數人皆仰載資給或勉之就仕則曰天下分裂終合為一一繫仕版死生以之寧適意乎及金陵平禄食之家多俘于京師而載乃安處邱園人皆以為先知㑹母卒廬于墓側哀毁過禮服闋出遊湘潭州將辟致庠序講說之際未嘗敷演注疏肆口成言曽不滯泥性頗嗜酒函丈之間常置􅎆缶興来輒飲而義理不亂受業者以百數苟獲資鏹飲歠之外一無所蓄或有假貸則欣然予之不計其多少待人均一無所愛惡雖遇横逆亦巽謝焉復喜􅆵遊市肆當壚者靡不相善豪民富啇間遺緡帛則轉施貧民每出入城郭兒童幼稚隨而恱之嘗詣郡署見一媪䇿羸荷校執于公徒載問其故媪泣曰夫負官緡而死于獄亡家鬻子猶有餘責當盡命而已載愴然乃罄槖償官而免之一夕自城醉歸聞嬰兒哭于莽中載驚呼左右寂無一人自脫衣裹歸獲一女以賄購乳于隣婦迨數嵗教以書計女功長擇所配竟不知其誰氏因冒姓黄載嘗釋禮經獲百千一旦為人竊取載笑曰彼無資者也將藉此以成家亦我之徳了不介意諸生醵㑹市羊以備饌載夢一羊前跪請命晨出見羊跪伏如所夢載以已緡償諸而畜其羊又畜一犬亦頗馴載每出入則羊犬聨隨潭倅夏中正為作犬羊仙序以記其事天禧末載因醉卒于宗人黄茂館年七十載妻與其子先卒嗚呼視日月而知衆星之蔑拂清風而知羣隂之晦然則覩真人之作者偏據之國不足與有明矣余作歸明𫝊士之得其所歸可謂詳矣如湯恱張洎徐鉉特不著其本末者以其顯名皇朝而行事具于國史也此弗敢述姑志其故國之聞爾湯恱其先陳州西華人父殷文圭唐末有才名恱本名崇義仕南唐為宰相建隆初避宣祖廟諱改姓湯恱嘗撰揚州孝先寺碑世宗親征淮南駐驛于寺讀其文賞嘆之及畫江請平元宗使恱入貢世宗待之加禮自淮上用兵凡書檄教誥皆出于恱特為典贍切于事情世宗每覽江左章奏形于嗟重後仕皇朝奉太宗皇帝𠡠江南録十卷自言有陳夀史體張洎南譙人王師圍金陵洎在城中作蠟丸帛書使間道走契丹求援為邉候所得及金陵平太祖皇帝召洎詰責以書示之洎神色自若徐曰此臣在國所作上曰汝國稱藩事大何乃反覆如此汝實為之咎將誰執洎曰當危急之際望延嵗月之命亦何計不為臣所作帛書甚多此特其一爾上善曰無欺也南唐之士歸于皇朝洎最顯焉徐鉉字鼎臣開寳末王師圍金陵後主命朱令贇盡括江西土客義師一十五萬作巨筏㳂江而下以援金陵未至而圍益急後主選近臣入朝且求緩師鉉請行後主曰卿之行也當止上江救兵勿令東下鉉曰今社稷所賴惟此救兵何可輒止後主曰既以和解為名而復徵兵入援自成矛盾于汝豈不危乎鉉曰臣此行未必能紓國難但置之度外爾後主泣下授鉉左僕射叅知左右内史事鉉固辭乃以隠士周惟簡假給事中為鉉副鉉等至京師對于便殿鉉懇述江南事大之禮甚恭且無王祭不共之罪徒以被病未任朝謁非敢拒詔乞緩兵以全一邦之命其言甚切太祖皇帝與語反覆數四鉉辭色愈壯曰李煜無罪陛下出師無名太祖大怒請畢其說鉉曰煜効貢賦二十餘年以小事大如子事父未有過失柰何見伐太祖曰爾謂父子者為兩家可乎鉉等無以對而退後仕皇朝與湯恱同奉𠡠撰江南録至于李氏亡國之際不言其君之過但以厯數存亡論之君子有取焉南唐書卷二十三欽定四庫全書南唐書卷二十四宋馬令撰方術傳第二十嗚呼天下之治方術者多矣寡能備神明之徳而徒駭天下之觀聴兹為恠誕譸張而已聖人中其身以為天下之標凖則制行于外者莫非可行之常也人之所不可行者聖人能之而弗為故六合之外存而不論六合之内論而弗議斯道甚夷而後世猶有詭辭抗說髙出于天地之外者是豈聖人之罪歟嗚呼甚哉民之好恠也久矣其徒紛紛其說譊譊縦横蔓衍未始不自以聖人為宗也彼既自誣于聖人而不以聖人之道攻之孰知其非聖人之道哉是故由堯舜禹湯文王周公孔子孟軻者吾知其為正道反是者吾知其為他道君子正而不他作方術𫝊呉廷紹為太醫令不甚知名烈祖喉中痒澁進藥無驗廷紹進楮實湯服之頓愈宰相馮延己嘗病腦痛醫工旁午累日不痊及廷紹至先詰其家人曰相公酷食何物對曰每食山雞鷓鴣廷紹進薑豆湯一服立差羣醫黙志其方他日以楮實治喉癢以薑豆治腦痛皆無効或問其故廷紹曰烈祖常服餌金石吾故以木之陽實勝之木王則金絶矣馮公嗜山雞鷓鴣二鳥皆食烏頭半夏薑豆乃解其毒羣醫大服木平和尚保大中至金陵知人禍福死生所言輒驗傾都瞻禮闐塞街巷金帛之遺日積萬數元宗召見于百尺樓百尺樓元宗所建以備登覽制度宏壯木平指曰此宜望火初不喻其意後數載淮甸兵起龍安山置烽候以應江北常登此樓以觀動静又慶王尚幼元宗問夀命㡬何木平曰郎君聰明智哲預知九十年事遂書九十一字予之保大九年慶王卒年十九其書九十而繼之以乙字者乃乙其九十而為十九也李冠善吹中管嘗預宋齊邱夕宴當坐吹嘘聲韻悠揚清入霄漢元宗聞其名屬閩楚多故戎務日繁不獲召見大司徒李建勲以詩送之曰匀如春澗長流水怨似秋枝欲㫁蟬可惜人間容易聴清聲不到御樓前見禮于士大夫𩔖如此周世宗時多遊梁宋每乗醉長嘯于市人罕知者道士譚紫霄泉州人也與陳守元相善事王昶封正一先生閩亡寓廬山棲隠洞其徒百餘人有道術醮星宿事黒煞神君禹步魁罡禁沮鬼魅禳祈災福頗知人之夀夭武昌軍節度使何敬洙寵婢獲怒置井中死人無知者建隆初敬洙遘疾召紫霄中夜被髮燃燈静室見女厲自訴為祟之由紫霄詰旦具言之敬洙曰信然乃丹書符送之敬洙即愈有僧于溪滸剏亭苦大石横直累工不能平紫霄往見曰斯固易也因以指捻訣含水噀之命鎚其石應手如粉後主聞之召至建康賜之道號階以紫金比蜀之杜光庭皆讓而不受凡所獲醮祭之施轉以給四方賓旅金陵既下紫霄無疾卒人謂之尸解莫知其夀算歸葬之日有祥雲白鶴盤繞送之潘扆常遊江淮間自稱野客落托有大志鄭匡國為海州刺史扆往謁之匡國不甚禮遇館于外廐一日従匡國獵匡國之妻因詣廐中覘扆栖泊之所弊榻莞蓆竹籠而已籠中有錫彈丸二顆餘無所有扆還發籠視之大驚曰定為婦人所觸幸吾攝其光鋩不爾㫁婦人頸矣圉人異之聞于匡國匡國密召扆問曰先生其有劒術乎扆曰素所習也匡國曰可一觀乎扆曰可當齋戒三日趨近郊平曠之地請試之匡國如期召扆俱至東城扆自懐中出二錫丸置掌中俄有氣二條如白虹微出指端須臾旋轉遶匡國頸其勢奔掣其聲錚鏦匡國據鞍危坐神魄俱喪謝曰先生神術固已知之幸收其威靈扆笑舉一手二白氣復貫掌中少頃復為二錫丸匡國自此禮遇逾厚表薦于烈祖扆居紫極宫迨數年遂失術不復能劒矣臨死上言乞桐棺葬近地後當尸解烈祖命中貴人䕶葬于金波園保大中發塜視之骸骨尚在迄無異焉女冠耿先生鳥爪玉貌宛然神仙保大中遊金陵以道術修錬為事元宗召見恱之常止于卧内先是大食國進龍腦油二器其味辛烈服之蠲疾元宗秘惜先生見之曰此非嘉者當為陛下致之乃以絹囊懸龍腦于屋棟頃刻􅅹液如注香味逾所進者嘗搦雪為鋌爇之成金指痕隠然猶在又因宫人掃除取箕中糞壤燒為白銀開寳中金陵内庫猶有耿先生糞壤銀元宗嘗購真珠數升欲得圓者先生曰易致也就取小麥淘洗以銀釜炒之匀圓皆成蚌胎未㡬有孕將誕謂左右曰我子非常産夕當有異條忽雷電繞室大雨傾澍詰旦儼然空腹人莫見其所生元宗殂先生不復入宫往來江淮竟不知其所之嗚呼耿先生之事著矣鄭文寳自謂親授于徐率更而徐率更目覩其事雖然鄭氏之編載之而徐氏不録是可疑也豈鄭氏欲重其言而引徐以為辭歟抑徐氏恐惑後世而弗著于書歟是未可知也南唐書卷二十四欽定四庫全書南唐書卷二十五宋馬令撰談諧𫝊第二十一嗚呼談諧之說其来尚矣秦漢之滑稽後世因為談諧而為之者多出乎樂工優人其廓人主之􅄶心譏當時之弊政必先順其所好以攻其所蔽雖非君子之事而有足書者作談諧𫝊申漸髙不知何許人也在呉為樂工呉多内難伶人不得志漸髙常吹三孔笛賣藥于廣陵市昇元初案籍編括漸髙以善音律為部長時闗司歛率尤繁啇人苦之屬近甸亢旱一日宴于北苑烈祖謂侍臣曰畿甸雨都城不雨何也得非獄市之間違天意歟漸髙乗談諧進曰雨懼抽稅不敢入京烈祖大笑即下令除一切額外稅信宿之間膏澤告足當時以謂優旃漆城優孟葬馬無以過也烈祖受禪呉朝老將唯周本為元勲烈祖患其難制因其勸進至金陵曲宴便殿引鴆賜本本疑之旁取一巵均酒之半跪進曰臣與陛下千載一遇陛下不飲此酒殆非君臣同徳也烈祖變色左右莫知所従漸髙舞袖升殿併飲之内金盞于懐趨出烈祖察使親信詣漸髙第賜藥解之不及是夕漸髙腦潰而卒李家明廬州西昌人談諧敏給善為諷辭元宗好遊家明常従初景遂景達景逷皆以皇弟加爵而恩未及臣下因置酒殿中家明俳戲為翁媪列坐諸婦進飲食拜禮頗繁翁媪怒曰自家官自家家何用多拜耶江浙謂舅為官謂姑為家元宗笑曰吾為國主恩不外覃于是百官進秩有差家明母死未葬㑹元宗乗間書草字于便殿家明紿曰臣竊署字與之不疑元宗以麻紙大押字命試學焉家明輒于草字上署曰宣州上供庫支錢二百緡付李家明葬母元宗大笑因以賜焉建州王延政僣號元宗遣將平之俘延政于建康封鄱陽王命公卿宴其第延政吝于賜予家明謔之曰賤工無伎優賜叵富然告大王乞取一物延政曰汝何求家明曰大殷平天冠今已無用家明敢取為優服延政黙然慙恨而罷自是怏怏病卒元宗賞花後苑率近臣臨池垂釣臣下皆登魚唯元宗獨無所獲家明因進詩曰玉甃垂鈎興正濃碧池春暖水溶溶凡鱗不敢吞香餌知是君王合釣龍元宗大喜賜宴極歡嘗見牛晩卧美䕃元宗曰牛且熱矣家明乗談諧曰曽遭甯戚鞭敲角又被田單火燎身閑向斜陽嚼枯草近来問喘為無人相輔皆慙宋齊邱無子晩年一子輒死逾月猶哭齊王景達勉之不止家明曰臣能止之矣乃作大紙鳶署其上云欲興唐祚革强呉盡是先生起廟謨一箇孩兒􅂸不得讓皇百口合何如尹延範族呉氏齊邱為謀因以誚焉乗風放之故墜齊邱中庭齊邱見之哭亦止従元宗遷南都時已失江北十四郡舟楫多行南岸至趙屯因輒樂停觴北望皖公山謂家明曰好青峭數峯不知何名也家明應聲對曰龍舟䡖錦㠶風正值宸遊望逺空迴首皖公山色翠影斜不到夀盃中元宗慙之俛首而過後主即位家明老而無寵楊名髙本名復名髙其優名也寓黄幡綽著笑林頗行于時辭鄙不載王感化善謳歌聲韻悠揚清振林木繫樂部為歌板色元宗嗣位宴樂擊鞠不輒嘗乗醉命感化奏水調詞感化唯歌南朝天子愛風流一句如是者數四元宗輒悟覆盃歎曰使孫陳二主得此一句不當有銜璧之辱也感化由是有寵元宗嘗作浣溪沙二闋手冩賜感化曰菡蓞香銷翠葉殘西風愁起碧波間還與容光共憔悴不堪㸔細雨夢迴清漏永小樓吹徹玉笙寒漱漱淚珠多少恨倚欄干手捲珠簾上玉釣依前春恨鎖重樓風裏落花誰是主思悠悠青鳥不𫝊雲外信丁香空結雨中愁迴首緑波春色暮接天流後主即位感化以其詞札上之後主感動賞賜感化甚優彭利用廣陵人也顯徳中周師下淮南遂奔建康僑廬陵利用性樸鄙頗拘古禮雖燕居常拱手正坐對家人稚子下逮奴𨽻言必據書史㫁章破句以代常談俗謂之掉書袋因自為彭書袋每出逺塗雖冒雨雪不徹冠幘或喻之曰跋涉勞頓當従簡易利用對曰有禮則安無禮則危焉可悖之以為先聖之罪人哉或問其髙姓對曰隴西之遺苗昌邑之餘胄又問其居處對曰生自廣陵長僑螺渚其僕嘗有過利用責之曰始予以紀綱之僕人百其身賴爾同心同徳左之右之今乃中道而廢侮慢自賢故勞心勞力日不暇給若而今而後過而勿改予當循公滅私撻諸市朝任汝自西自東以遨以遊而已時江南士人每于宴語必道此以為戲笑利用喪父客弔之曰賢尊窀穸不勝哀悼利用對曰家君不幸短命諸子糊口四方歸見相如之壁空餘仲堪之棺實可痛心疾首不寒而栗茍泣血三年不可再見遂大慟客復勉之曰自寛哀慼冀闋喪制利用又曰自古毁不滅性杖而後起卜其宅兆而安措之雖則君子有終然而孝子不匱三年不改何日忘之又大㱆欷弔者于是失笑㑹隣家火災利用往救徐望之曰煌煌然赫赫然不可嚮邇自鑚燧而降未有若斯之盛其可撲滅乎又嘗與同志逺遊迨至一舍俄不告而返詰旦復至或問之故利用曰忽思朱亥之椎猶倚陳平之户切恐數鈞之重轉傷六尺之孤其言可哂者𩔖如此利用雖舉進士而才調鄙俚多𩔖俳優故凡六上不第一夕宴寢而卒年六十嗚呼古今一道也學古而不知其變祇為腐儒而已彭利用摘裂章句不曉理道原其用心盖亦苦學而陋者也徒以其言𩔖俳優可為戲笑故附談諧𫝊云南唐書卷二十五欽定四庫全書南唐書卷二十六宋馬令撰浮屠𫝊第二十二嗚呼浮屠之道我知之矣合萬法于一心而虚不失照起一心為萬法而照不失虚豈為淺見道哉昧者曽不知此而毁形骸糜金帛說因果以為法飾土偶以為佛將以蘄福利耶而妖孰甚焉將以蘄超脫耶而愚孰大焉此梁武齊襄之徒所以得罪于天下後世也作浮屠𫝊袁宏曰浮屠佛也章懐太子曰浮屠則佛陁也聲之轉耳𫝊曰齋戒修而梁國亡非釋迦之罪也然則浮屠之法豈固為後世患哉哀亂之君迷惑而不反則壊法易紀常由于此南唐有國蘭若精舍漸盛于烈祖元宗之世而後主即位好之彌篤輒于禁中崇建寺宇延集僧尼後主與周后頂僧伽帽披袈裟課誦佛經跪拜頓顙至為瘤贅親削僧徒厠簡試之以頰少有芒刺則再加俢治其手不抄常作佛印而行百官士庶稍稍効之募道士願為僧者予二金僧人犯姦有司具牘則曰僧尼姦淫本圖婚嫁若論如法是従其欲但勒令禮佛百拜輒釋之由是姦濫公行無所禁止諸郡㫁死刑必先奏牘詳覆無疑適幸遇其齋日則于宫中對佛像燃燈以達旦為驗謂之命燈若火滅則依法不滅則貸死富商大賈犯法者往往厚賂左右内官竊續其燈而獲免者甚衆開寳初有淮北僧號小長老自言慕化而至朝夕入論六根四諦天堂地獄循環果報之說後主大喜謂之一佛出世身被紅羅銷金衣後主誚其太奢荅曰陛下不讀華嚴經安知佛富貴因說後主廣施􅆊刹營造塔像自是囷庾漸虚財用耗斁又請于牛頭山大起蘭若千餘間廣聚僧徒日設齋供食有不盡者明日再具謂之折倒識者謂折倒乃敗徵也及王師渡江即其寺為營署又有北僧就采石磯建石塔且云自幼草衣藿食不渾凡俗後主遺之齋供一無所受王師尅池州繫浮橋于石塔金陵受圍後主召小長老問禍福對曰臣當以佛力禦之乃登城大呼周麾數四後主令僧俗軍士念救苦菩薩滿城沸涌未㡬四面矢石俱下復召小長老麾之稱疾不起始疑其誕遂殺之净徳尼院凡八十餘衆皆宫中人出家者也諸王公卿處子往往在焉都城將䧟亦積薪于院庭後主與之約曰如有不虞宫中舉火為應吾與汝輩當俱焚死是日保儀黄氏焚積書于宫中浄徳遙觀其烟燄遂􅅡積薪皆赴火死無一人肯脫者城中有僧千數表乞被堅執銳以死國難後主不許僧元寂姓髙自言髙駢族人昇元中受業昇元寺性爽悟博通經藏保大中詔講法華經授左街僧録内供奉講經論明教大師賜紫時法禁寛㢮僧尼壊戒律者甚衆元寂屢干憲法有司惜其才輒貰之後主召入問華嚴經元寂口說􅆊行一品多賜金帛由是益自恣日以狂飲為事大醉則十數小兒隨之元寂行歌于路曰酒秃酒秃何榮何辱但見衣冠成古邱不見江河變陵谷與羣兒互相應和旁若無人坐是落僧職出居長干寺常與狂生籍地酣飲醉死于石子崗僧應之姓王其先南閩人能文章習栁氏筆法以善書冠江左初舉進士一黜于有司投冊罵曰吾不能以區區章句取程于庸人遂學為浮屠保大中授文章應制大徳賜紫凡禱祠章疏一筆即就意如宿構元宗喜楞嚴經命左僕射馮延己為序其略曰首楞嚴經者自為菩薩密因始破阿難之迷終證菩提之悟然則阿難古佛也豈有迷哉迷者悟之對也迷茍不立悟亦何取是故因迷以設問憑悟而明解皇上聰明文思探􅄨索隠雲散日朗塵開鏡明以為大賚四方未為盛徳普濟一世始曰至仁或啓佛乗必歸法要𠡠應之書鏤版既成上之元宗歎曰是深得公權之法者也吾聞公權嘗以筆諫穆宗為之改容今效其法尚可想見其風采應之書名由是益振遷右街僧録固辭求居奉先西庵許之應之多著述尤喜音律嘗以讃禮之文寓諸樂譜其聲少下而終歸于􅆊音讃念協律自應之始嗚呼予聞故老説南唐好釋而呉越亦然南唐每建蘭若必均其土田謂之常住産錢氏則廣造堂宇俢飾塑像而已曰桑門取給十方何以産為至今建康寺院跨州隔縣地過豪右浙僧嵗出逺近歛率于民雖然田業頗厚而資不加多歛率常勞而用不加乏豈各因其俗歟妖賊傳第二十三嗚呼神恠茫茫若存若亡而仲尼不語吾何考信焉若張遇賢諸祐之事姑存而不削者非好為神恠也將以戒妖妄于後世爾春秋之法雖五石六鷁之㣲皆不泯其實𫝊曰五石六鷁之辭不設則王道不亢況遇賢輩動阡陌之兵駭衆人之耳目者其可泯哉其可不戒哉作妖賊傳張遇賢循州羅縣小吏也縣之刻杉鎮有神降于民家所言禍福輒驗遇賢往禱之因留奉事甚謹㑹羣盜大起各擁數百衆相與禱于神求為主者神曰張遇賢是第十六羅漢當為汝主于是共推遇賢為中天八國王改元永樂署置百官皆衣絳衣遇賢庸懦無統御之畧賊帥各以便宜攻剽州縣告其進退而已屢為州兵所窘復告于神神曰可過嶺取虔州當成大事遇賢遂襲南康百勝軍節度使賈浩始輕之不設備賊衆連䧟諸縣州兵擊之不勝浩戒嚴城守遇賢據白雲洞造宫室營署羣盜四出攻刼未㡬通事舍人邉鎬洪州屯營都虞候嚴思禮各帥師數千出援䖍州賊衆大敗焚其營署走數十里又敗之遇賢困窘復告于神神不復語遂棄營潜遁賊帥李台知其無神也執遇賢及其副黄伯雄謀主僧景全皆斬于建康市嗚呼許嵩云羅陽有神自稱王表言語飲食與人無異而不見其形予始觀之以為妄誕及得遇賢之事然後知嵩言無足恠也古者以鬼無靈響物無疵癘為至徳之世則舉世大亂神恠畢出固其所也且以孫權之竒英猶不能無惑況遇賢乎諸祐諸音查蘄州獨木人自言不茹葷者數世能使貧者富富者貧俚民稍稍效之其徒十數男女猱雜互易匹耦謂之忍辱生子不知其父行之數年積數百衆夜行晝息取資于盜競相推唱云祐術能升虚空入水火妄意民藏潜使致之而民弗覺也先陳起僑蘄春惡其妖昇元中起第進士授黄梅令到官之日里酋畢賀祐獨不至數日起命籍祐為里長不服祐嫚言曰吾取令頭殺竪子爾起聞大怒㑹周鄴為巡撫使師次黄梅起藉其兵以執祐等並其婦人幼稚皆縳沃以豕血祐迄不能神因索其家得輿服器用皆埒至貴郡將即斬祐等曰婦人何能為幼稚宜無預意且貰之起曰此皆瀆亂人倫去無遺𩔖遂並斬之起由是知名遷監察御史卒南唐書卷二十六欽定四庫全書南唐書卷二十七宋馬令撰叛臣𫝊第二十四嗚呼諸侯死社稷大夫死衆士死制又豈違道以亡其國乎五代之際憂起蕭牆禍生天屬而大夫不能死邱墓者無國無之且為人臣者身非我有死君之難而已職非我有任君之事而已富貴非我有享君之禄爵而已又況土地人民我何有焉而専以予人其獲罪于天下後世當如何哉春秋之法竊君之土而致于人則曰以某地来奔若邾庶其莒夷牟之𩔖是也據君之地以専于已則曰入某地以叛若晉荀寅衛孫林父是也其文雖異而其叛一矣作叛臣𫝊劉澄宣城人也保大中後主掌禁兵澄趣使左右元宗南遷後主為太子監國署澄為軍校累遷侍衛廂都虞侯及王師圍金陵越人乗間䧟常州進攻潤州議者以京口要害當得良將守之後主以澄舊事藩邸尤為親信乃拜澄潤州節度使留後臨行後主謂澄曰卿本不合離孤孤亦難與卿别但此行非卿不可澄涕泗奉命歸家盡輦金玉以往謂人曰此皆國家前後所賜今國家有難當散此以圖勲業後主聞之益喜及越兵初至營柵未成左右請出兵掩之時澄已懐向背乃曰出兵不勝則立為虜矣當俟應援然後圖戰未㡬盧絳率師為援絳至越兵屢却絳昉入城圍復合矣澄與絳固守累月自相猜忌絳怒一禆將殺之未決澄私謂曰盧公怒爾爾不生矣禆將泣涕請命澄曰吾有一言告爾非徒免死且得富貴因諭以降事令先出道意禆將曰柰家口在都城何澄曰事急當為身謀我家百口亦不暇顧矣是夜禆將踰城出絳猶未知明日澄與絳同食典軍者來告澄偽作色曰吾謂公已斬之何得令走徐謂絳曰間言都城受圍日急若都城不守守此何為絳亦知金陵終䧟乃曰君為守將不可棄城宜赴難者唯絳爾澄偽為戁色久之曰君言是也絳潰圍出澄遍召將卒告曰澄守城數旬志不負國事勢如此須求生計諸君以為何如將卒皆發聲大哭澄懼變亦泣曰澄受恩深于諸君且有父母在都城寧不知忠孝乎但力不能抗爾諸軍不聞楚州耶初世宗圍楚州久不下既尅遂屠之故澄以此脅焉于是率將吏開門請降後主聞澄已降猶欲赦其家屬光政使陳喬令收澄父母妻子皆斬于市澄女許嫁未適美而艶喬欲活之女曰叛逆之餘義不求生遂斬之朱元蒲津人也事本郡節度使李守貞為従事漢髙祖崩守貞謂漢室新造人心未一天下易以圖乃以河中反漢命周太祖討之元與李平奉守貞表来乞師未復而守貞敗元遂留金陵累遷尚書郎或言元有反相不可委以外任及淮甸兵與諸郡相繼䧟劉仁贍堅守夀州元宗命齊王景達帥師應之元𨽻景達軍中善撫士卒甘苦共之遂率所領克舒州蘄泰楊光滁亦相繼而復元自紫金山築甬道以餉夀春兵勢甚盛㑹景達監軍使陳覺先與元有私隙召元至濠州計事且欲害之元不往覺因奏元不受節制元宗遣楊守忠代元且召還都元憤怒以其衆降周諸軍皆潰元宗怒命斬元妻子元妻乃宣徽使查文徽女年少有國色文徽累表救之誠欵懇切元宗署其表曰只斬朱元妻不斬查家女文徽辭窮遂斬元妻尸于市文徽以珠籠覆尸哭之大慟市人為之泣下世宗以降虜别作一營授元蔡州刺史亦不顯用劉従効泉州人也仕本郡為統軍使閩亡従効說其刺史王建勲入朝而自領州事元宗即以従効為泉州刺史従効出自寒微知人疾苦及得郡以勤儉為務衆所不便者皆除去之常衣布素置公服于中門出視事則服之入則復衣弊布自言我素貧賤不可忘本也由是大得民情據有漳泉之地閩主王氏遺二女在郡従効事之如故資給甚厚陞泉州為清源軍拜従効節度使加中書令封鄂國公及淮甸失守従効因越人奉表貢于世宗世宗以割地之故不納建隆初元宗遷都南昌従効大懼以為見討乃遣其子紹基来貢㑹元宗殂因至建康後主善待之紹基未還従効病卒州人立其次子紹鎡未㡬統軍陳洪進執紹鎡歸于建康言其將召越人為叛推立副使張漢思為留後洪進為副使漢思老而惷事無巨細皆決于洪進漢思諸子為牙將伏劒士殺洪進不克洪進遂逐漢思自稱留後後主即以洪進為泉州節度使紹鎡至建康釋之以為監門衛中郎將紹基為殿直軍都虞侯嗚呼附劉従効于叛臣之後者豈無意哉盖亂臣賊子皆春秋之所誅也臣于人而反覆不常是亦春秋之罪人爾従効始事閩而閩亡幸國家之亂遂劫其使君而自領州事元宗因而予之亦已厚矣及淮甸失地國步多艱従効伺多壘之秋而附越人以貢于上國其意之所圖者固可知也故洪進之徒相繼作亂蓋従効所圖不軌則不軌之事應之曽子曰出乎爾者反乎爾為人臣者可不戒哉南唐書卷二十七欽定四庫全書南唐書卷二十八宋馬令撰滅國𫝊上第二十五嗚呼閩楚之捷不償于殫殘而淮甸之役輒喪其膏腴易曰智小而謀大鮮不及矣戒之哉戒之哉作滅國𫝊閩國王審知字信通光州固始人也世為農唐末羣盜起審知與兄潮俱起草莽衆推潮為主畧地至泉州軍行整肅其耆老相率遮道留之潮引兵圍城逾年殺其刺史廖彦若光啓二年福州觀察使陳巖表潮泉州刺史景福元年巖卒其壻范暉自稱留後潮遣審知攻暉殺之唐即以潮為福州觀察使潮以審知為副使審知為人狀貌雄偉常乗白馬軍中號白馬三郎乾寧四年潮卒審知代立唐以福州為威武軍拜審知節度使累遷同中書門下平章事封瑯瑘王唐亡梁太祖加拜審知中書令封閩王陞福州為大都督府審知儉約好禮王倓楊沂徐寅之徒皆依焉又建學四門以教閩士之秀者嵗遣使泛海入貢于梁後唐同光三年審知卒諡忠懿長子延翰立建國稱王而猶禀唐正朔延翰長大美晢如玉其妻崔氏陋而淫延翰不能制審知喪未期徹其几筵又多選良家子為妾崔氏性妬良家子之美者輒幽之别室繫以大械刻木為人手以擊其頰又以鐵錐刺之一嵗之中死者八十四人崔氏後病見其祟而卒十有二月延翰弟泉州刺史延鈞審知養子建州刺史延禀同以兵入執延翰殺之而延鈞立更名鏻鏻審知次子也莊宗即拜鏻節度使累加檢校太師中書令封閩王鏻既立延稟還建州鏻錢于郊延稟臨訣謂鏻曰善繼先志無煩老兄復來鏻銜之長興二年延稟率兵擊鏻鏻遣王仁達敗之執延稟誚之曰予不能繼先志果煩老兄復來延稟不能對遂殺}
