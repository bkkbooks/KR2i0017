  - {type: variant, offset: 7, length: 0, content: '', WYG: 年見殺諡曰惠皇帝廟號太宗繼鵬鏻長子也既立更名昶改元通文晉天福二年昶遣使貢于京師髙祖遣散騎常侍盧損冊昶閩王拜其子繼恭臨海郡王損至閩昶稱疾不見令繼恭主之又遣中書舍人劉乙勞損于館乙衣冠偉然騶童甚盛他日損遇乙于塗布衣芒屩而已損使人誚之曰鳯閣舍人何逼仄之甚也乙羞媿以手掩面而走昶好巫妖人林興以巫見倖三年夏虹見宫中林興𫝊神言此宗室將為亂之兆也乃命興帥壯士殺審知子延武延望及其子五人後興事敗亦被殺而昶愈惑亂立父婢春鷰為淑妃後立以為皇后昶募勇士為宸衛都以自衛其賜予給賞獨厚于他軍控鶴都連重遇拱宸都將朱文進皆以此怒重遇等夜帥衛士縦火焚南宫昶挾愛姬子弟黄門衛士斬闗而出宿于野次重遇迎延羲立之延羲令其子繼業率兵襲昶及之射殺數人昶知不免擲弓于地繼業執而殺之及其妻子皆死無遺𩔖延羲立諡昶曰康宗延羲審知少子也既立更名曦遣使朝貢于晉改元永隆鑄大鐵錢以一當十曦自昶世倔彊難制昶相王倓每抑折之曦立而倓已死命發塜戮尸倓面如生血流被體泉州刺史余延英嘗矯命掠取良家子曦怒召下御史劾之延英進買宴錢千萬曦曰皇后土貢何在延英又獻皇后錢千萬乃得不劾曦嘗嫁女朝士有不賀者笞之御史中丞劉賛坐不糾舉將加笞諌議大夫鄭元弼切諫乃止曦弟延政為建州節度使封富沙王自曦立不叶輒舉兵相攻曦由此惡其宗室多以事誅之諫議大夫黄峻舁櫬詣朝堂極諫曦怒貶峻漳州司户叅軍校書郎陳光逸上書疏曦過惡五十餘事曦命衛士鞭之百而不死以繩係頸掛于木久而乃絶國計使陳匡範増算商之法以獻曦曰匡範人中之寶也已而嵗入不登其數乃借于民以足之匡範以憂死其後知其借于民也剖匡範棺㫁尸棄之水中曦性淫虐而妻李氏悍而酗酒賢妃尚氏有色而寵諸國皆僣后妃之號李仁遇曦甥也以色嬖之用以為相曦嘗為牛飲羣臣侍酒有詐及私棄酒者輒殺之並殺其替者連重遇既殺昶嘗懼為國人所討曦心疑之以語誚重遇等重遇等流涕自辯李氏妬尚妃之寵欲圖曦而立其子亞澄乃使人謂重遇等曰上心不平于二公柰何重遇等懼六年三月曦出遊醉歸重遇等遣壯士拉于馬上殺之諡曰景宗延政審知子也曦立為淫虐延政數貽書諫之曦怒遣杜建崇監其軍延政逐之曦乃舉兵攻之延政為延政所敗延政乃以建州建國稱殷改元天徳明年連重遇已弑曦集閩羣臣告曰昔太祖武皇帝親冒矢石遂啓有閩及其子孫淫虐不道天厭王氏當求有徳以安此土乃掖朱文進陞殿率百官北面而臣之文進以重遇判六軍諸衛事王氏子弟在福州者無少長皆殺之以黄紹顔守泉州程贇守漳州許文縝守汀州用晉正朔稱開運元年泉州軍將劉従効詐其州人曰富沙王取福州矣吾屬世為王氏臣安能交臂事賊乎州人共殺紹顔迎王繼勲為刺史漳州聞之亦殺贇迎王繼成為刺史皆王氏之諸子也文縝懼以汀州降于延政南唐聞亂命查文徽等帥師伐之遂下建陽延政遣統軍呉承祐往給福州曰唐兵助我討福州信之故連重遇殺朱文進禆將林仁翰殺連重遇謀迎延政都福州㑹南唐兵方急攻建州延政乃遣其子繼昌守福州而自拒唐兵福州軍將李仁達謂其徒曰唐攻建州富沙王不能自保其能有此土耶乃擒繼昌及呉承祐殺之欲自立懼衆不附以雪峯僧卓儼明示衆曰此非常人也被以衮冕率諸將吏北面而臣之已而又殺儼明乃自立送款于南唐南唐以仁達為威武軍節度使文徽等下建州俘延政于金陵封延政鄱陽王閩將劉従効自領泉州李仁達自領福州羈縻而已明年福州附于呉越南唐書卷二十八欽定四庫全書南唐書卷二十九宋馬令撰滅國𫝊下第二十六楚國馬殷字霸圖許州鄢陵人也唐中和三年蔡州秦宗權遣孫儒劉建峯將兵萬人屬其弟宗衡畧地淮南殷初為儒禆將儒殺宗衡自將其兵取髙郵逐楊行密行密走宣州儒以兵圍之久不尅遣殷與建峯掠食旁縣儒戰敗死殷乃推建峯為帥殷為先鋒轉攻豫章畧䖍吉有衆數萬趨潭州殺其刺史鄧處約自稱留後唐僖宗授建峯湖南節度使殷為馬步軍都指揮使出攻邵州建峯庸人不能率其下常與步曲飲酒讙呼軍卒陳贍妻有色建峯私之贍怒以鐵檛擊殺建峯軍中推行軍司馬張吉為帥吉乗馬傷髀卧病語諸將曰吾非汝主也馬公英勇可共立之諸將乃共殺贍磔其尸遣姚彦章迎殷于邵州殷至吉肩輿入府殷拜謁于庭中吉召殷上乃率將吏下北面再拜以位與之時乾寧三年也唐拜殷潭州刺史殷遣其將秦彦暉李瓊攻連邵郴衡道永六州皆下之桂管劉士政懼遣其將陳可璠王建武等率兵守義全嶺殷遣使聘于士政至境上可璠等不納殷怒遣李瓊等以兵七千攻之擒可璠等及其兵二千餘人悉坑之遂圍桂管虜士政盡取其屬州殷表瓊桂管觀察使四年拜殷武安軍節度使梁太祖即位拜殷兼侍中中書令封楚王楊行密將吕師周来奔師周勇健豪俠頗通緯候兵書殷聞師周至大喜曰吾方南圖嶺表而得此人足矣以為馬步軍都指揮使率兵攻嶺南取昭賀梧䝉龔富等州殷表師周昭州刺史于是澧辰溆並溪洞諸蠻皆附于殷殷請陞朗州為永順軍表張吉節度使殷乃請依唐太宗故事開天冊府置官屬太祖拜殷天冊上將軍殷以其弟賨為左相弟存為右相廖先圖等十八人為學士末帝時加殷武安武昌静江寧逺等軍節度使洪鄂四面行營都統唐莊宗滅梁殷遣其子羲範俢貢京師上梁所授都統印莊宗問洞庭廣狹羲範曰車駕南巡纔堪飲馬爾莊宗嘉之莊宗平蜀殷大懼表求致仕莊宗下璽書慰勞之殷初兵力尚寡與楊行密成汭劉龔等為敵國殷患之問策于其將髙郁郁教殷尊王仗順外誇隣敵然後退俢兵農又諷殷自京師至襄唐郢復等州置務以賣茶其利十倍又鑄鈆鐵錢以十當銅錢一又令民自造茶以通商旅而收其算嵗入萬計由是地大力完數要封爵天成二年請建行臺明宗封殷楚國王用竹冊如三公禮殷以潭州為長沙府建國承制自置官屬以姚彦章為左相許徳勲為右相李鐸為司徒崔穎為司空拓拔常為僕射馬珙為尚書子弟皆出為節度使文武皆進位諡其曽祖筠曰文肅祖正曰莊穆父元豐曰景莊立三廟于長沙長興元年殷卒年七十九諡武穆子羲聲立羲聲字若訥殷次子也殷建國以羲聲判内外諸軍事荆南髙季昌聞殷將髙郁素教殷以計䇿而楚以彊患之嘗使謀者間殷殷不聴羲聲用事諜云季昌聞楚用髙郁大喜以為亡馬氏者必郁也羲聲素愚以為然遽奪郁兵職矯殷令殺之明日吏以狀白殷拊膺大哭曰吾耄荒如此而殺吾勲舊殷語左右曰吾亦不久于此矣明年殷卒羲聲立授武安静江等軍節度使羲聲嘗聞梁太祖好食雞慕之日烹五十雞以供膳葬殷羲聲不泣頓食雞肉數器而起其禮部侍郎潘起譏之曰昔阮籍居喪而食蒸豚世豈乏賢耶長興三年羲聲卒追封衡陽王弟羲範立羲範字寶規殷第四子也殷子十餘人嫡子羲振長而賢其次羲聲羲範同日而生羲聲母袁夫人有美色羲聲以母寵得立而羲振棄官為道士居于家故羲聲卒而羲範以次立襲殷官爵封楚王清泰二年賜弓矢冠劒天福四年加天冊上將軍開府承制如殷故事羲範好學善詩文士廖光圖徐仲雅李皋拓拔常等十八人皆故殷時學士羲範性奢侈光圖等皆薄徒飲博懽呼獨常沈厚長者上書切諫光圖等惡之襄州安従進安州李金全叛晉髙祖詔羲範出兵羲範遣張少敵以舟兵趨漢陽漕米五萬斛以饋軍金全等敗少敵乃旋溪州刺史彭士然率錦奬諸蠻攻澧州羲範遣劉勍等擊之士然大敗勍等攻溪州士然走奬州遣其子師暠率諸蠻酋降于勍溪州西接牂柯南通桂林象郡羲範乃立銅柱以為表命學士李皋銘之于是南寧等十八州夷播等七州昆明等十二部皆附于羲範羲範作㑹春園嘉宴堂其費鉅萬始加賦于國中拓拔常切諫以為不可羲範又作九龍殿以八龍繞柱自言身一龍也是時契丹滅晉中國大亂羲範牙將丁思覲廷諫羲範曰先王起卒伍以攻戰而得此州倚朝廷以制隣敵𫝊國三世有地數千里養兵十萬今天子蒙塵中國無主真霸者立功之時誠能悉國之兵出荆襄以趨京師倡義于天下此桓文之業也柰何耗國用而窮土木為兒女之樂乎羲範謝之思覲瞑目視羲範曰孺子終不可教也乃扼喉而死開運四年羲範卒年四十九諡文昭羲廣立羲廣字徳丕羲範母弟也羲範平生惡拓拔常諫諍嘗謝絶之及卧病始思常言以為忠召之託以羲廣羲範卒常數勸羲廣以位奉其兄朗州節度使羲蕚羲廣不従羲蕚来奔喪羲廣將劉彦瑫曰武陵之来其意不善宜出兵迎之以備非常使其解甲釋兵而後入張少敵周廷誨曰王能予之則已不然宜早除之羲廣泣曰吾兄也焉忍殺之分國而治可也遂以兵迎羲蕚于石止之于碧湘宫厚賂以遣之羲蕚憤然而去乃遣使詣京師求封爵請置邸稱藩漢隠帝不許降璽書慰勞之羲蕚怒遂送款于南唐乞師攻長沙羲廣遣劉彦瑫許可瓊等禦之彦瑫敗羲蕚于僕射洲羲蕚去誘溪洞諸蠻冦益陽羲廣遣崔洪璉以遏諸蠻劉彦瑫以舟兵趨武陵攻羲蕚彦瑫敗于湄州羲廣大懼遣使請兵京師漢隠帝不能出師羲蕚率舟兵㳂江而下自號順天將軍趨長沙攻長樂門長沙䧟羲廣率妻子匿于慈堂明日擒之遂斬羲廣杖其妻死于市左右用事者皆臠割之乾祐三年羲蕚自立明年遂臣于南唐唐冊封羲蕚楚王羲蕚悉以軍政任其弟羲崇羲崇與楚舊將徐威陸孟俊魯綰謀作亂羲蕚置酒端陽門羲崇辭以疾威等縱惡馬十餘匹以壯士執檛隨之突入其府劫庫兵縛羲蕚迎羲崇以立之羲崇遣彭師暠廖偃囚羲蕚于衡山師暠奉羲蕚為衡山王臣于南唐羲崇懼亦遣使詣南唐送款唐遣邉鎬等帥師入楚盡遷馬氏之族于金陵封羲蕚楚王居洪州羲崇領舒州節度使居揚州周世宗下淮南詔撫安馬氏子孫羲崇率其子弟十七人歸京師南唐書卷二十九欽定四庫全書南唐書卷三十宋馬令撰}
