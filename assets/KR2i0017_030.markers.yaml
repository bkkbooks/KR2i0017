  - {type: variant, offset: 6, length: 0, content: '', WYG: 年鏻上書求為尚書令唐不報鏻遂絶朝貢即皇帝位改元龍啓國號閩追諡審知為昭武孝皇帝廟號太祖立五廟置百官龍啓三年改元永和王仁達為鏻殺延稟而有功典親兵鏻心忌之鏻謂人曰仁達智畧在吾世可用不可遺後世患因誣以罪殺之鏻妻早卒繼室金氏賢而不荅審知婢金鳯陳氏鏻嬖之遂立之以為后初鏻有嬖吏歸守明者以色見倖號歸郎鏻後得風疾陳氏與歸郎姦又有百工院使李可殷因歸郎以通陳氏鏻命工作九龍帳國人歌曰誰謂九龍帳惟貯一歸郎鏻婢春鷰有色其子繼鵬蒸之鏻已病繼鵬因陳氏以求春鷰鏻怏怏與之其次子繼韜怒謀殺繼鵬繼鵬懼與皇城使李倣圖之乃令壯士先殺李可殷率皇城衛士入鏻聞鼓噪聲走匿九龍帳中衛士刺之不死宫人不忍其苦為絶之繼韜及陳后歸郎皆為倣所殺鏻立}
