body:
  text: 南唐書卷之二嗣主書第二民靡有定誰其奠之弃師閩楚命委輿尸作嗣主書嗣主諱璟字伯玉􅀄名景通烈祖元子也美容止器字髙邁性寛仁有文學甫十􅀊吟新竹詩云棲鳯枝梢猶軟弱化龍形狀巳依稀人皆竒之􅁸家爲尚書郎吳譲皇見之曰吾諸子皆不及也累遷諸衛大將軍典治軍旅撫納將校烈祖出鎭金陵拜璟司徒平章事知内外諸軍事加諸道副都統烈祖受禪封吳王累遷太尉中書令諸道元帥録尚書事改封齊王旣當儲副之地而固譲再三謙虚下士常若弗及烈祖殂授顧命猶譲諸弟辭益堅侍中徐玠以衮冕􅀍之曰大行付殿下以神􅄊之重殿下固守小節非所以遵先㫖崇孝道也乃嗣位改元保大太常博士韓熈載上䟽曰踰年改元古之制也事不師古弗可以訓時雖可其奏而制書巳行遂改元冊母宋氏爲皇太后妃鍾氏爲皇后弟景遂改封燕王弟景逹改封鄂王弟景逷改封保寜王長子兾南昌王文武進位有差洪州宋齊丘入爲左丞相江州周宗入爲右丞相以元帥府掌書記馮延已爲諌議大夫翰林學士夏四月戊申朔日有食之中書侍郎平章事李建勲罷爲昭武軍節度使南漢劉晟弑其君玢晟自立爲帝不書僣者玢之前巳僣也五月司徒兼侍中徐玠䘚秋七月燕王景遂改封齊王拜諸道兵馬大元帥太尉中書令鄂王景逹改封燕王拜副元帥宣告中外以兄弟相傳之意以元子南昌王兾爲江都尹東都􅅏守書元子以見景遂之不得襲位也景遂固譲不許蕭儼上疏其畧曰夏商之後父子相傳不易之典惟仰循古道以􅁉後昆䟽奏不報冬十月庚戌有星孛于東方妖賊張遇賢聚衆十餘萬䧟䖍州諸縣諸縣舊史失名䖍州城守遇賢據白雲洞命洪州營屯都虞候嚴思禮通事􅃕人邊鎬討賊鎬思禮擒遇賢及賊副黄伯雄謀主僧曺景全斬於建康市以嚴思禮爲海州刺史邊鎬爲洪州屯營諸軍都虞候貶百勝軍節度使賈浩爲監門衛將軍罪貶故書使池州安置以饒州刺史李翺爲百勝軍節度使留後十有二月下令中外庶政並委齊王景遂叅決文武百司唯樞宻副使魏岑查文徽得白事餘非召對不得見蕭儼上書極論曰元帥開府人猶驚駭况委之大政而羣臣不得時見臣恐中外隔絶姦人得志非陛下之利也書奏不報侍衛軍都虞候賈崇詣閤求見曰臣事先朝二十餘年每見延接踈逺未嘗壅隔羣下之情罔有不逹今陛下始即位所委任者何人而頓與羣臣謝絶深居䆳處而欲聞民瘼猶惡隂而入乎隧道也臣老矣長不復奉顔色因涕泗嗚咽帝深爲感動引與之坐賜食而出始以手札批喻儼等曰旻天不弔降此鞠凶越予小子常恐弗􅀋于厥徳用災于厥躬故退處恭黙思底于道而壅隔之弊以爲卿憂惟予小子實生厲階由是所下之令遂寢時宋齊丘周宗爲左右丞相齊丘專執而宗純謹自守及上心旣悟齊丘乃言其非便帝曰公何不早誨我遂罷齊丘爲浙西節度使齊丘黨與􅂭熾造作飛語以誣宗宗泣而上訴帝知之弗問此爲明年宗出張本宋齊丘上表乞歸九􅂠舊􅀮許之賜號九􅂠先生封青陽公食青陽一縣二年春正月右丞相周宗罷除江西節度使門下侍郎平章事張居詠罷除浙西節度使二月辛卯日有白虹二三月左衛上將軍盧文進䘚夏閩人朱文進連重遇弑其君曦重遇立文進使来告亂囚其使議伐閩以民疫釋閩使遣之夏四月秋七月鄂州王輿䘚以神武統軍韋建爲武清軍節度使備書官職者新命也書某州某人代者移鎭也夀州姚景䘚以濠州劉崇俊代以楚州刺史劉彦貞爲濠州觀察使九月庚午朔日有食之冬十有二月馮延巳爲翰林學士承㫖水部貟外郎馮延魯爲中書􅃕人延魯銳於功名欲興建州之役乃賛中書􅃕人查文徽爲江西安撫使翰林待詔􅆇循者嘗賈於閩具知山川險易爲文徽陳進兵之計文徽因是請伐閩乃命邊鎬率洪州屯兵與文徽俱行遂入建陽王延政遣統軍使吳承祐以逰兵廵福州境紿曰唐助我討賊大軍至矣福州信之連重遇殺朱文進禆將林仁翰殺重遇函其首歸承祐延政以其子􅁇昌守福州親率衆以拒我師五郡之兵大集五郡福建江漳泉敵勢甚盛文徽等次于蓋竹退復屯建陽啓求濟師三年春二月遣祖全恩何敬洙率萬人以應文徽與延政陣隔水全恩使建陽降將孟堅潜師出其後禆將武彦暉馬存貴以輕銳􅁇之腹背夾擊延政大敗以餘兵城守閩人李仁逹殺其君之子􅁇昌前年以福州降延政故以延政爲君及其統軍吳承祐立雪峯僧卓儼眀爲主儼眀無統御之畧仁逹又殺之而自稱留後遣使来降即以仁逹爲威武軍節度使延政益不振建州之險要曰西巖延平津相􅁇而平夏四月秋七月庚辰星見而風雨八月甲子朔日有食之遂克建州執王延政歸于建康授羽林大將軍安化軍節度使封鄱陽王泉州刺史王􅁇勲漳州刺史王􅁇成汀州刺史許文縝皆請降因而鎭撫之諸將下建州兵無節制剽掠甚衆閩人失望帝以出師有功不錄其過升建州爲永安軍以祖全恩爲節度使查文徽爲撫州刺史何敬洙爲楚州刺史偏將王建封先登功第一爲信州刺史全恩未拜而䘚以廬州王崇文鎭建州泉州禆將従効劫刺史王􅁇勲使之入朝従効自領州事於是王􅁇成許文縝皆至建康以􅁇勲爲池州團練使􅁇成爲和州刺史文縝爲蘄州刺史即以劉從効爲泉州刺史冬十月皇太后宋氏殂以延平津爲劒州割建州之劒浦汀州之沙縣屬焉以建州禆將陳誨爲劒州刺史以龍衛都虞候劉仁贍爲武清軍節度使升泉州爲清源軍以泉州刺史劉從効爲節度使四年春正月陳􅁴諷齊王景遂言宋齊丘先朝布衣之舊委諸山林不􅁢中外之望帝使景遂至青陽召之􅁸拜太傅奉朝請而已以撫州李建勲爲左僕射門下侍郎平章事中書侍郎馮延已拜平章事吏部尚書徐連爲鎭海軍節度使二月壬戌朔日有食之命建州製的乳茶號曰京挺臈茶之貢自此始罷貢陽羡茶夏四月侍衛諸軍都虞候賈崇爲奉化軍節度使留後葬元恭皇后于永􅁜六月夀州劉崇俊䘚以濠州觀察使劉彦貞爲清淮軍節度使侍衛諸軍都虞候郭全義出爲濠州觀察使以劉崇俊子範爲滁州刺史建州之役府庫中耗民不堪命故李仁逹劉從効皆羈縻而已至是諸將請討之不許宋齊丘薦陳􅁴爲福建路宣諭使􅀃仁逹入覲不從􅁴還至建安矯制發建汀撫信之師及防戍之兵掩其不意徑至城下時魏岑安撫漳泉聞􅁴起兵亦擅發兵應􅁴帝大怒馮延巳等爲言兵集行不可止乃以王崇文爲招討使王建封爲副使益兵以㑹之馮延魯爲南面監軍使魏岑爲東面監軍使陳􅁴爲諸軍監軍使仁逹送欵於吳越吳越以兵三萬應之􅁴等爭功進退不相應延魯及吳越戰延魯敗績諸軍皆潰帝怒遣使者鎻􅁴延魯至金􅁜而馮延巳爲宰相宋齊丘亦預三公稍解之貟外郎韓熈載諌曰臣觀􅁴等罪不容誅但齊丘延已内爲陳請所以得全且擅興者不罪則疆􅂣生事䘮師者􅀗存則行陣解體請行顯戮以重軍威帝曰齊丘延巳有自咎之表無請赦之辭􅁴等五木􅀍體一家狼藉永不錄用與死何殊乃流􅁴蘄州流延魯舒州齊丘惡之貶熈載和州司馬冬十有二月壬戌契丹及晉師戰于中渡晉師敗績丙寅杜重威李守貞以王師降于契丹癸酉張彦澤引蕃􅀐䧟京師彦澤剽刼屠害甚衆晉帝奉表納璽於戎主以其失利勢故不書天子是􅀊中原無主宻州刺史皇甫暉青州刺史王建及㳂淮諸戍皆來降方且疲兵東南不暇北顧馮延巳延魯魏岑陳􅁴皆以姦囘得用人情不平旣流延魯及􅁴而延巳爲相岑亦居近宻於是御史中丞江文蔚䟽其罪曰二凶雖去未稱民情四罪盡除方眀國典帝大怒貶文蔚江州司士叅軍亦罷延已爲太子少􅀓岑爲太子洗馬漳州禆將林賛堯殺監軍周承義以叛討平之以泉州禆將董思安爲漳州刺史思安辭以父名章命改漳州爲南州副使劉從願殺思安自領州事南州復爲漳州南唐書卷之二
