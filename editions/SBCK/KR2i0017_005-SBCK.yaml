body:
  text: 不許自従善不還四時宴㑹皆罷登髙賦文以見意曰原有鴒兮相従飛嗟嗟季兮不来歸常怏怏以國蹙爲憂冬有商人上宻事請徃江􅁜竊燒皇朝戰艦國主懼事泄不聽商人遁去五年春皇朝屯師漢陽鄂州楊守忠以聞人心大恟乃貶損制度下書稱敎改中書門下省爲左右内侍府尚書省爲司㑹府御史臺爲司憲府翰林爲文舘樞宻院爲光政院降封韓王従善爲南楚國公鄧王従益爲江國公吉王従謙爲鄂國公其餘官號多有改易殿庭始去鴟吻每遇皇朝使至國主衣紫􅂁備藩臣禮使退服御如􅀄六年春皇朝使中書舎人盧多遜来聘國主願受封拜不許洪州林仁肇䘚冬中書舎人潘佑薦衛尉卿李平判司農寺又薦平知司㑹府羣情紛紛以爲朋黨佑上書極言時政凢七章不止有家國隂隂如日将暮之辭國主惡之乃􅀵平下大理自縊妻子徙饒州次收佑佑自剄毋及妻子徙䖍州七年皇朝使閤門使梁逈来聘従容謂國主曰今􅀊國家有柴燎之禮當入助􅀕國主唯唯不荅秋中書舎人李穆賫詔曰朕以仲冬有事于圎丘思與卿同閱犧牲國主辭以疾穆反命遂决進取九月王師自荆湖直趨池州池州主将戈彦棄城走遂克池州進軍當塗将軍張溫鄭彦華杜真相􅁇敗績下敎去開寳年號公私牘籍稱甲戍􅀊江南自周世宗後不復用兵僅二十年老将已死主兵者皆新進少主以功名自􅀒輙抗王師聞兵興踊躍言利害者日有十數及遇等敗北中外奪氣戒嚴城守國主遣徐鉉周惟簡奉表乞緩師不荅王師進屯建業城南十里時雖下池州及姑熟餘郡皆未奉命糧道阻隔樊若水請於采石繫浮橋以利轉輓每􅀊大江春夏􅁀漲謂之黄花水及王師至水皆退小故識者知其有天命焉吳越圍常州軍使余成禮刼刺史禹萬誠以降吳越進圍京口議者以京口要害之地當得良将守之乃拜親吏劉澄鎮海軍節度使留後以凌波軍都虞候盧絳爲援澄已懐嚮背因􅀃絳還金􅁜而自率将吏降越􅀽州萍郷制置使劉茂忠破潭師於境内拜茂忠􅀽州刺史八年春閱民爲師徒昇元􅀄均量民田以定科賦自二緡以上出一䘚號義師中有别籍分居又出一䘚號新擬生軍民有新置物産者亦出一䘚號新擬軍又於客户内有三丁者抽一䘚謂之圍軍後改爲拔山軍使物力户爲帥以統之保大中許郡縣村社競渡每􅀊端午官給綵叚俾两两較其遲速勝者加以銀椀謂之打標舟子皆籍其名至是盡蒐爲䘚謂之凌波軍又率民間傭奴贅壻謂之義勇軍又募豪民能自備緡帛兵􅄊招集無頼亡命謂之自在軍又括百姓自老弱外能􅀍堅執鋭者謂之排門軍并屯田白甲之􅀋凡一十三等皆使扞敵守把夏誅神衛統軍諸軍都虞候皇甫􅁇勲秋洪州節度使朱令贇将兵一十五萬屯潯陽湖口與諸将議曰令若前進而王師反據我後則上江阻隔退乏糧道亟爲虜矣乃以書招南郡留守劉克貞代鎮湖口克貞以病留令贇亦未進國主累促之令贇以長筏大艦帥水陸諸軍至虎蹲洲與王師遇舟筏俱焚令贇死餘衆皆潰金􅁜受圍經􅀊城中斗米者相救藉自􅃳州降後不聞外信或云令贇巳敗國主猶意其不實冬百姓疫死士䘚乏食訹云大軍决以十有一月乙未破城國主議遣其子清源公仲㝢出通降欵左右以謂堅壘如此天象無變豈可計日取降是日城果䧟宫中圖籍萬卷尤多鍾王墨跡國主嘗謂所幸保儀黄氏曰此皆累世保惜城若不守爾可焚之無使散逸及城䧟文籍盡􅌆光政使陳喬曰吾當大政使國家致此非死無以謝乃自縊死諸将戰沒者猶數十人昇元寺閣崇構因山爲基髙可十丈平旦閣影半江梁時爲瓦棺閣至南唐民俗猶因其名士大夫曁豪民富商之家美女少婦避難於其上迨數百人越兵舉火焚之哭聲動天一旦而燼大􅀅曺彬整軍成列至其宫門門開國主跪拜納降彬荅拜爲之盡禮先是宫中預積薪煜誓言社稷失守當携血屬赴火旣降無國主之號故書名旣見彬彬諭以歸朝俸祿有限費用日廣當厚自齎装一歸有司之籍即無及矣遣煜入治装禆将梁逈田欽祚力爭以謂苟有不虞咎将誰執彬􅀏而不荅逈等固諌彬曰彼能出降安能死乎翌日治舟彬遣徤䘚五百人爲津致輜重登舟一䘚􅀒籠下道旋彬立斬之􅀒擔者罔敢蹉跌煜以藏中黄金分遺近臣辦装張佖得金二百两詣彬自陳不受請奏其事彬以金輸官而不以聞煜舉族冐雨乗舟百司官屬僅千艘煜渡中江望石城泣下自賦詩云江南江北舊家鄊三十年来夢一􅂣吳苑宫闈今冷落廣􅁜臺殿巳荒凉雲籠逺岫愁千片雨打歸舟淚萬行兄弟四人三百口不堪閑坐細思量至汴口登普光寺擎拳讃念乆之散施緡帛甚衆九年春俘至京師封遺命侯授左千牛衛上将軍太宗皇帝登極改封隴西公太平興國三年公病書公者皇朝所封也命翰林醫官視疾中使慰諭者數四翌日薨在僞位十有五年年四十二追封吳王以王禮葬洛京之北印山江南人聞之巷哭設齋王著雜說百篇時人以爲可􅁇典論又妙於音律舊曲有念家山王親演爲念家山破其聲焦殺而其名不祥乃敗徴也復書王者皇朝追封也徐鉉日嗣主諸子皆孝而後主特甚敦睦親族亦無不至唯以好生富民爲務常欲群臣和於朝不欲聞人過章䟽有糾謫稍訐者皆寢不報酷好古道而國削勢弱羣臣多守常充位不克如意歎曰天下無周公仲尼吾道不可行也已刑法太寛亦無過此及大兵之際上下感恩故人無異志威令不素著故莫盡死力盖亦天授大宋非人謀所及也嗚呼隋文帝􅀄輔政于周内有五王之難外罹尉遲􅅆司馬消難王謙之亂方是時指鹿逐兎未知適従武夫悍将誰無覬覦蕭巋承武皇享國之長有席卷山南之勢而區區敬慎不敢連衡廽等者信其臣柳荘之言預知隋公之必興故也矧廼蕞爾江南􅀗覩真人之作而不爲之退聴其罪當如何哉李氏有國肇於天福盛於開運削於顯徳亡於開寳豈非有幸於亂世而不容於治世歟以周世宗之時削國降號稽首稱藩其勢固已蹙矣及屬皇朝普天之下莫不翹首太平而猶竊土賊民十有六年外示柔服内懐僣僞豈非所謂逆命者哉及其計窮勢迫身爲亡虜猶有故國之思何大愚之不靈也若此後主樂府詞云故國夢􅀄歸􅁴來􅀟淚垂又云小園昨夜又西風故國不堪翹首月明中皆思故國者也南唐書卷之五
