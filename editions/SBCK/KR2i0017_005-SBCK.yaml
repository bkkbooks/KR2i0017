front:
  text: 南唐書卷之五後主書第五嗚呼春秋之時君薨眀年正月公即位自桓公始宣成而下未嘗革也昭公薨于乾侯定公於眀年夏六月戊辰即位者其故何哉蓋非常之變􅁸於不可測非常之禮行於不得已古之人觀㑹通以應世則處非常之變用非常之禮者皆禮經之所不得而考也義􅁸於情而已矣且諸侯薨于路寢而昭公客死於乾侯者非常之變􅁸於不測也嗣君釋冕反䘮而定公即位於眀年六月者非常之禮行於不得已也元宗殂於豫章後主留守建康必待䘮還旣殯而後即位其偶合於定昭之事乎且聖人制禮立天下之大經爲天下之大防也情僞之變無竆而禮之所載有常以有常之禮御無竆之變則亦隨其宜而已矣故禮不盡而義有餘則禮以義起義不足而禮有餘則義以禮逹君子􅇜變亂而無矌於禮者在審其義爾大䘮禮之大典禮經載之詳矣而曽子之所問者禮經有所不及也變禮之不測曽子問載之詳矣而國君薨于外世子立于内者曽子問有所不及也非趨時而合義其孰能與於此哉徳雖不競孰匪天亡日月俱照爝火銷光作後主書後主名煜字重光􅀄名従嘉元宗第六子也少而聰慧善屬文工書􅀞􅀄封安定郡公淮上兵􅁸爲神武軍都虞候㳂淮巡撫使累遷諸衛大将軍諸道副元帥封鄭王太子兾䘚四兄皆早亡以次爲嗣改王吳拜尚書令知政事建􅂭二年元宗南遷立煜爲太子監國六月元宗殂於豫章七月䘮還建康太子即位尊母鍾氏爲太后太后父名太章故改號聖尊后妃周氏爲國后封弟従善爲韓王南都留守従益鄧王従謙宜春王従度昭平郡公従信文陽郡公以右僕射嚴續爲司空依前平章事大赦境内文武進位有差罷諸路屯田使委所屬令佐與常賦俱征􅀄南唐屯田置使專掌至此罷其使而屯田佃民絶公吏之撓八月鄂州王崇文䘚以南郊巡檢使黄延謙爲武清軍節度使留後冬十月以南都留守韓王従善爲司徒兼侍中諸道兵馬副元師以鄧王従益爲司空南都留守下令諸司無職事官四品以下至九品日二貟待制於内殿泉州劉従効遣其子紹基来貢三年劉従効䘚州人立其次子紹鎡爲留後紹基未還統軍使陳洪進執紹鎡并其族送于金􅁜推立其副張漢思漢思老不任事洪進逐之自稱留後國主即以洪進爲清源軍節度使以紹基爲殿直軍都虞候紹鎡爲監門衛中郎将句容尉張秘上言爲理之要詞甚激切國主手批慰喻召爲監察御史以神武統軍朱業爲寧國軍節度使以潤州林仁肇爲神武統軍秋七月建州陳誨䘚禮部尚書潘承祐䘚以江州何洙爲左武衛上􅀅軍封芮國公以宣州朱業鎮江州以神武統軍林仁肇爲寧國軍節度使乾徳元年夏左武衛上􅀅軍何洙䘚秋七月以兵部尚書㳺簡言知尚書省遷右僕射是􅀊南平髙􅁇沖歸于京師國除􅀄金􅁜臺閣殿庭皆用鴟吻自乾徳後朝廷使至則去之使還復用二年春正月始用鐡錢以鐡錢使户部侍郎韓熈載爲兵部侍郎勤政殿學士􅀄烈祖将殂謂元宗曰徳昌宫泉布億萬緡以給軍用吾死善修鄰好北方有事不可失也及元宗即位兵屢􅁸徳昌泉布既竭遂鑄唐國錢其文曰唐國通寶又鑄大唐通寳與唐國錢通用數年漸弊百姓盗鑄極爲輕小保大末兵窘財乏鍾謨改鑄大錢以一當十文曰永通泉貨徑寸七分重十八銖字八分書背面匀好皆有周郭謨誅遂廢至是有鐡錢之議每十錢以鐡錢六雜銅錢四旣而不用銅錢民間但以鐡錢貿易物價增涌民復盗鑄頗多芒刺不及官􅂣圎淨雖重其法犯者益衆至末年銅錢一當鐡錢十禮部侍郎湯悅上言泉布屢變亂之招也且豪民富商不保其貲則日益思亂累數百言不報夏鄂州黄延謙䘚以宣州林仁肇代九月封長子仲寓清源公次子仲宣宣城公冬十月仲宣䘚追封岐王十有一月國后周氏殂三年春葬昭恵后于懿􅁜蜀孟昶俘于京師國除以江州朱業爲神武統軍侍衛都軍使以䖍州留後柴克貞爲奉化軍節度使夏以司空平章事嚴續鎮潤州秋九月聖尊后鍾氏殂召南都留守鄧王従益還都以鄂州林仁肇爲南都留守南昌尹葬光穆皇后于順􅁜朝廷許元宗追復帝號故鍾氏稱皇后四年夏五月以吉州刺史楊守忠爲武清軍節度使留後秋十月神武統軍朱業䘚十有二月潤州嚴續䘚五年春命两省侍郎諌議大夫給事中中書舎人集賢勤政殿學士分夕於光政殿宿直國主引與譚論或至夜分開寳元年夏江王景逷䘚冬十有一月納后周氏昭恵之母弟也二年春以左僕射㳺簡言兼門下侍郎平章事夏簡言䘚以禮部侍郎湯悅爲門下侍郎平章事知制誥張洎上䟽曰恱非經綸之才不宜處鈞衡之地國主以悅文學舊臣特加奨用乃罷洎職冬較獵于青龍山還憇大理寺親錄囚徒原貸甚衆韓熈載奏獄訟有司之事囹圄之中非車駕所至請􅂢内帑錢三百萬充軍資庫用國主従之曰繩愆糾謬其熈載之謂乎天子詔國主諭南漢稱臣劉鋹怒執我行人龔慎儀三年中書侍郎韓熈載䘚贈平章事命境内崇修佛寺又於禁中廣署僧尼精舎多聚徒衆國主與后頂僧伽㡌衣袈裟誦佛經拜跪頓䫙至爲瘤贅由是建康城中僧徒迨至數千給廩米緡帛以供之四年春劉鋹俘于京師國除夏四月齊王景逹䘚遣弟韓王従善入朝留于京師授㤗寧軍節度使國主表求従善還國
