body:
  text: 南唐書卷之八義飬傳第三嗚呼大亂之世三綱五常掃地盡矣故動干戈於骨肉假父子於異􅀋皆滅天性之厚而反人倫之正也烈祖之奉徐温彌篤於諸子者豈得巳哉抑爲之而巳􅀓曰蹍市人之足則辭以放驁兄則以嘔大親則巳矣由是觀之親踈恩義不亦逺乎作義飬􅀓徐温字端美海州昫山人烈祖之飬父也剛毅寡言罕與人交衆中凛然可畏目爲徐瞋會唐末大亂販鹽爲盗従吳武王楊行宻􅁸合淝勁兵數萬號其軍爲黒雲長劒所與舉事者劉威陶雅之徒號三十六英雄獨温未嘗有戰功行宻用其謀殺朱延夀以功遷右衙指揮使始預謀議行宻病出長子渥爲宣州觀察使温私謂渥曰今王有疾而出嫡嗣必有姦人爲謀若它日召子非温使者慎無應命渥涕泣謝温而去行宻病甚命判官周􅀮作符召渥􅀮慮渥㓜弱不任事勸行宻用舊􅀅有威望者代主軍政乃薦大􅀅劉威行宻未許温與嚴可求入問疾行宻以􅀮議告之温等大驚遽詣􅀮所計事􅀮未出而温見􅀮作召符猶在案上急取遣之渥見温使者乃行行宻䘚渥嗣立召􅀮罵曰汝欲賣吾國者復何面目見楊氏乎遂殺之渥之入廣陵也留帳下兵三千於宣州以其腹心陳璠范遇􅀅之既入立惡温與張顥典衙兵召璠等爲東院馬軍以自備而温顥共惡璠等侵權因擁衙兵入拽璠等斬之渥由是失政而心憤未􅀎發温顥益不自安共遣羣盗入寢中弑渥渥􅀃羣盗􅀎反殺温等者皆爲刺史羣盗皆諾唯紀詳不従執渥縊殺之􅀄温顥之謀弑渥約分其地以臣於梁及渥死顥欲背約自立温患之問其客嚴可求可求曰顥雖剛愎而闇於成事此易爲也明日顥列劒㦸府中召諸􅀅議事自大􅀅朱瑾而下皆去衛従然後入顥問諸􅀅誰當立者諸􅀅莫敢對顥三問可求前宻啓曰方今四境多虞非公主之不可然恐爲之太速且今外有劉威陶雅李簡李遇皆先王一等人也公雖自立未知此軰􅀎降心以事公否不若輔立㓜主漸以􅀊時待其歸心然後可也顥不􅀎對可求因趨出書一教内䄂中率諸􅀅入賀諸􅀅莫知所爲及出教宣之乃渥母史氏教言楊氏創業艱難而嗣主不幸􅂭演以次當立告諸􅀅以無􅀒楊氏而善事之辭㫖激切聞者感動顥氣色皆沮䘚無􅀎爲􅂭演乃得立顥由此與温有􅂩諷􅂭演出温潤州可求謂温曰今捨衙兵而出外郡禍行至矣温亦憂之可求因􅀃顥曰公與徐温同受顧托議者謂公奪其衙兵是􅀅殺之信乎顥曰事巳行巳安可止可求曰甚易也明日従顥與諸􅀅造温可求陽責温曰古人不忘一飯之恩况公楊氏二世􅀅今㓜嗣新立多事之時乃求居外以苟安乎温亦陽謝曰公等見留不願去也由是不行顥覺可求有附温意􅀅殺之可求詣温謀先殺顥隂使鍾大章􅃟壮士三十人就衙堂斬顥大章諾之而温猶疑其不果夜半徃約曰盗有老母懼事不成且止大章曰言已出口寧可已乎明日遂殺顥及紀祥等歸以弑渥之罪入白渥母史氏史氏泣曰吾兒年㓜禍亂若此得保百口以歸合淝公之恵也温遂專政􅂭演備位而已宣州節度使李遇心尤不平温乃遣徐玠使越而道過宣州因􅀃遇入覲遇􅀄許之玠乘酒呼曰君言入謁是良圖也不爾則爲反矣遇怒曰君言遇反且殺景王者誰也温乃使柴再用族遇於宣州行宻舊􅀅人人自疑温因僞下之恭謹如見行宻諸􅀅乃安八年温遷行軍司馬潤州刺史鎮海軍節度使同平章事十年遣招討使季濤攻越戰于臨安禆􅀅曹筠奔于越濤敗􅀍執温聞遣人語筠曰吾用汝爲􅀅汝軍有求吾不能給是吾過也赦筠妻子不誅厚遇之秋越人攻毗陵温戰于無錫筠感温前言臨陣奔歸遂敗越兵十二年封温齊國公兼浙西招討使始就鎮潤州以昇常宣池黃六州爲齊國城昇州建大都督府十四年温徙治之以其子知訓輔􅂭演於廣陵而大政温遥决之知訓爲朱瑾所殺烈祖自潤州先入遂得政温雖姦詐多疑而善用􅀅吏江西劉信圍䖍州乆不克信使人說譚全播出降遣使報温温怒曰信以十倍之衆攻一城不下而反用說客降之何以威敵國笞其使者而遣之曰吾以笞信也因命濟師遂破全播或誣信逗留􅀅反信聞之因自獻捷至金􅁜見温温與信博信歛骰子厲聲祝曰劉信欲背吳願爲惡采苟無二心當成渾化温遽止之擲六子皆赤温慙自以巵酒飲信然終疑之及唐師伐蜀温急召信至廣􅁜以爲右統軍託以内備遂奪其地温客尤見信者唯駱知祥嚴可求可求善籌畫知祥長於財利温常以軍旅問可求國用問知祥吳人謂之嚴駱温亦自喜爲智詐尤得吳人之心􅀄隨行宻破趙鍠諸􅀅皆爭取金帛温獨據餘米作粥以食餓者十六年温請􅂭演即皇帝位不許又請以吳王稱制乃許遂建國改元拜温大丞相都督中外諸軍事封東海郡王􅂭演䘚温越次立其弟溥順義七年温又請溥即皇帝位未許而温病䘚年六十六追贈齊王諡曰武烈祖受禪諡武皇帝廟號義祖知訓温長子也少學兵法不􅀎竟尤喜劒士角觝之戲怙温權勢多爲不法温出鎮􅃳州留知訓輔政常􅁜侮諸􅀅而對吳主􅂭演無君臣禮􅂭演㓜懦嘗飲酒樓上命優人髙貴卿侍酒知訓爲叅軍􅂭演鶉衣髽䯻爲蒼鶻知訓因使酒罵座語侵􅂭演􅂭演愧耻泣涕而知訓愈陵辱之左右扶􅂭演起去知訓殺一吏乃止李徳誠有女樂知訓求之徳誠曰此軰皆有所生且復年長不足以接貴人俟求少妙者進之知訓對徳誠使者罵曰吾殺徳誠并取其妻亦易爾􅀄學兵於朱瑾瑾力教之後因求馬於瑾瑾不與遂有隙夜遣壮士殺瑾瑾手刃數人瘞􅃕後知訓知曲在已􅀮而不聞俄出瑾爲靜淮節度使瑾詣知訓别且願獻前馬知訓喜徃謁瑾家瑾妻出拜知訓答拜瑾以笏擊踣遂斬知訓提其首入告呉主曰爲國去賊爲民除害在今日矣吳主驚曰彼有父在吾不敢預聞瑾怒曰竪子不足與語遂自殺坐誅者數家􅀄宿衛􅀅李球馬謙挾􅂭演登樓取庫兵以誅知訓陣于門橋知訓與戰頻却朱瑾適自外來以一騎前視其陣曰不足爲也因反顧一麾外兵爭進遂斬球謙亂兵皆潰瑾嘗有徳於知訓者也及其凶終吳人皆謂曲在知訓知訓凶悖多見烈祖書與刁彦能傳此不復書知詢温第二子也烈祖秉吳政威權寖盛金陵行軍司馬徐玠諷温曰居中輔政之重不宜假於他人宜以親子代之温即遣知詢入覲謀代烈祖輔政而温􅁀䘚知詢奔還金陵爵位如温而知詢暗懦待諸弟不厚徐玠知其終敗乃輸誠於烈祖知詢内爲諸弟所構外爲徐玠所賣而不知也意以已控强兵居重地烈祖雖管大政而無兵去之甚易温䘮未終屢請烈祖至金陵烈祖反使人諭之入朝因䟽其罪状責授左統軍知詢面數烈祖曰先王之䘮是爲人子而不親臨反罪我耶烈祖曰聞爾懸劒待我我亦不憚獨迫於君命不得徃爾爲人臣而畜乗輿非反而何周廷望者知詢之親吏嘗僞貢欵於烈祖時得烈祖之隂謀以告知詢知詢􅀅入朝廷望諌止不従既行廷望曰公之此行有徃日而無還日泣送之至是知詢以廷望之言質烈祖烈祖曰以爾所爲告我者亦廷望也遂斬廷望知詢􅀍譴金陵爲之一空後數􅀊知詢復􅁸爲潤州節度使徃時幕府皆去獨李建勲随之知詢至鎮常㑹寮佐譚宴終日遂絶顧望移鎮江西䘚於任知誨温第三子也温䘚知詢守金陵所爲多不法知誨每得其隂謀以告烈祖知詢之敗知誨構之爲多烈祖徳之以爲江西節度使知誨先娶吳功臣吕師道女非嫡出知誨常切齒因􅋨刺殺之後呂氏數爲厲知誨惡之請僧誦經爲陳因果僧亦見呂氏曰吾不解此志在報􅁈爾及鎮江西􅀊餘吕氏不復見知誨喜甚有家人自淮南廽於江心遇綵舟有婦人漸邇視之乃吕氏也招家人曰爲我謝相公善自愛我今它適矣因遺繡􅂂曰相公謂爾不信以此示之家人至江西首語其事以􅂂示知誨知誨熟視未畢輙見呂氏在側曰爾謂我真不来耶頃刻知誨􅁀䘚以知詢代鎮江西遇其䘮於中塗知詢撫棺哭曰弟用心如此吾亦不怨但何面目見先王於地下聞者傷之烈祖受禪追尊温爲義祖徐氏諸子封拜與李氏同而知誨之後特優子景遼景逰出入宫禁預聞機務專掌浮屠修造之事當時言蠧政者以二人爲首景㳺後避元宗諱改名逰及事後主封文安郡公尤信任焉知諫温第四子也爽悟喜文徐氏諸子知諫最爲雅循􅀄知訓輔政無所醖藉温留知諫隂助之諸􅀅常惡知訓陵巳而以知諫爲長者烈祖自潤州入覲知訓會飲山光寺是日知訓大沉酗决欲害烈祖知諫以謀告烈祖烈祖􅀗免後事亡其不書封爵者皆䘚于吳也魏王徐知證温第五子也在吳歷刺史節度使烈祖受禪封江王改王魏徐氏諸子知證最爲長年及元宗之世尤見優禮每入宫元宗輙以家人遇之親捧觴爲夀自􅁸舞以祝之知證亦以叔父自處䘚年四十三梁王徐知諤温第六子也􅁸家爲太子中􅃕累遷刺史節度使知詢敗以知諤爲金陵尹烈祖受禪封饒王進王梁知諤􅀶采竒物寳貨充牣其家有蜀客持鳳頭至自言得於南蠻賈者知諤以錢五十萬易之其頭正􅀋雄鷄廣可五寸冠上正平可以爲枕朱冠紺毛金喙星眼飛禽之枯首也来自萬里而毛羽不脫文彩如生人咸異之嘗逰秫山除地爲廣場編虎皮爲大幄率寮屬會于下號曰虎帳忽遇􅁀風飄虎帳碎如飛蝶知諤驚遽棄歸數日病䘚嗚呼惟厲與崇君子難言存而勿論可也呂氏之事載于别錄陳公彭年作也其辭典雅頗有史法而公歸皇朝叅大政爲名臣顧其言可不諒耶南唐書卷之八
