body:
  text: 南唐書卷之十一列􅀓第六刁彦􅀎上蔡人也父禮遇亂徙居宣城彦􅀎少􅀌貧事母以孝聞􅀄􅀠節度使王茂章爲親兵茂章叛入越彦􅀎當従使家人扶其母俟於路彦􅀎至抱母泣告茂章曰老母在此不􅀎従公茂章許之乃馳入宣州城中巳亂彦􅀎登城以劒招之紿曰我従王府来爾軰無動大軍且至矣衆信之稍定義祖聞而嘉之以爲軍事校使属徐知訓知訓恣横彦􅀎每以書切諫雖不見納亦常寵遇牙􅀅馬謙帥衆刼吳主登門欲誅知訓朱瑾麾兵却之彦􅀎手劒斬謙知訓忌烈祖每欲加害嘗召烈祖飲伏劒士於室中彦􅀎行酒以手搯烈祖而推之烈祖悟􅁸去又嘗従知訓會烈祖于山光寺是日知訓大沉􅒬决欲害烈祖徐知諫以謀告烈祖烈祖乃奔知訓授彦􅀎劒使追殺之及於中塗彦􅀎舉劒揚䄂以示烈祖還紿以弗及既而朱瑾殺知訓義祖稍知其罪惡􅀅吏多􅀍譴責見彦􅀎諫書善之復使事知諫於潤州烈祖受禪召入禁衛叙其舊恩遷天威軍都虞候左衛使元宗即位出爲饒信二州刺史建州留後撫州節度使彦􅀎喜讀書委任文吏郡政修理亦好篇詠嘗與李建勲贈荅建勲奏之元宗􅀏曰吾不知彦􅀎乃西班學士也性修嚴所居雖傳舎一日必葺周宗何敬洙皆故人也每飲酒常蓬首祼􅃝彦􅀎在座則皆儼然䘚年六十有八周宗字君太秣陵人也常給使烈祖左右署爲牙吏多使喻㫖四方敏於事任恩寵日洽義祖䘚于金陵知詢謂宗曰㒒射望髙􅂂危無西渡宗堅請知詢手扎示信遽得故茗帖書曰不必奔赴既而徐氏諸子果以不奔赴譲烈祖烈祖因出所書茗􅁓示之知詢靦顔而巳及烈祖鎮金陵宗爲都押衙烈祖位望巳重常􅂂嫌疑因理白􅧋歎曰國家安而吾老矣宗竊窺其意請如廣陵告宋齊丘以禪代之事齊丘手䟽天時人事未可請斬宗以滅口烈祖懼欲斬宗而行軍司馬徐玠固争得免黜于池州􅁆􅀊復召如􅀄既賛禪代累遷樞宻使宗亦淳謹自守而巳􅀄俞文正爲烈祖幕賔而宗及馬仁􅁉皆従給使至是宗出鎮江州文正猶爲九江廵官輙問宗曰馬押衙何在宗知其涼徳􅀏曰馬相公出鎮浙西乆矣文正嘗預公宴俛首詐曰下官飲量棊局令公素知之座皆愕然而宗不之罪其寛厚􅀋如此連歷􅀅相奉法循理然貲産巨億儉嗇愈甚論者鄙之留守東都以老病乞骸骨乃以司徒致仕周兵􅀄􅁸而宗䘚宋齊丘撫棺哭曰君太􅀎􅃛來亦得時去亦得時元宗聞之不平宗娶􅁇室生二女皆國色􅁇爲國后侈靡之盛􅃣于當時馬仁􅁉字徳寛北平王燧之後遇亂徙居彭城世爲􅀅仁􅁉母方娠夢人謂曰北平来歸及生有紫氣滿庭􅁆􅀊學兵書若成誦然􅀄同周宗給使烈祖左右小心敏幹署爲右職烈祖移鎮潤州仁􅁉監蒜山渡首聞朱瑾之亂馳白烈祖即日以州兵渡江定亂烈祖得政基於此也以功拜左領軍􅀅軍烈祖以女妻之是爲興國公主出爲楚州刺史入爲左金吾大􅀅軍烈祖受禪遷潤州節度使眀年移鎮廬州爲理寛簡吏民便之烈祖左右小臣貴逹者唯仁􅁉與周宗爲親信周宗後富而仁􅁉常貧宗力賛禪代之事仁􅁉多就外任無所􅀜預時人稱其長者䘚年三十九子文義别傳嗚呼貴賤時也上下分也君子知時之無止知分之無常則貴賤上下吾何預焉况生亂世事偏國易牛衣以晝錦􅁸徒歩爲朱輪逹者觀之特戲事爾文正之抗周宗豈足以識此哉何敬洙㓜爲吳􅀅李簡厮飬簡性殘忍左右過􅄽鮮􅀗全活敬洙暮與羣兒􅃧庭下有蒼頭取簡所愛端硯􅃧諸僮曰誰敢破此羣僮􅋍肩􅄍舌相視敬洙厲色曰死生有命乃一擲破之翌日簡責破硯之由敬洙自陳因壮其果敢捨之勿殺簡鎮鄂州令相術董紹顔徧閱諸子紹顔曰諸郎皆善然祿夀無及公者時敬洙侍側指敬洙曰此竒相也可與公齊簡由是益竒之視如巳子及長用爲軍校敬洙軀貌短陋而趫捷有力簡䘚烈祖以爲金陵禆􅀅累遷天威軍都虞候建州之役爲應援使􅀄至以爲僻陋山郡不當勞師辭氣甚憤查文徽開喻之勢不可止乃與邊鎬恊心戮力破西巖延平軍威大振遂下建州敬洙應受上賞王建封争之以爲已功敬洙於是推建封功第一除敬洙楚州刺史嘗従數人親出里巷察人疾苦吏之苛刻無不知之每坐㕔事與賔客譚宴民有白事者隨其所言親加剖析無不厭服會連􅀊出師楚州當供億之地民不知勞亦敬洙爲之節制也及移鎮鄂州稍自矜驕周師伐淮南元宗使敬洙移郭外居人入城爲備敬洙不従乃背城除地爲戰埸曰職當効死於此安􅀎閉門自困也元宗善之未㡬召還都年老有足疾後主以其勲舊􅄖禮之拜上􅀅軍奉以上公之秩列門㦸䘚年七十七柴克宏吳功臣再用之子䟽爽任義不拘小行以父􅄻爲郎􅀅累遷龍武軍都虞候常與賔客􅀶奕以聲酒爲務雖職當偏􅀅而未嘗言兵時皆以爲非才故乆不遷亦不屑意淮甸兵􅁸越人宼常州以克宏爲撫州刺史克宏上書乞従軍効用元宗善之使帥師救常州時精兵皆在江北克宏􅀅老弱數千介胄朽蠧入白樞宻副使李徴古曰今以羸兵赴難􅄊甲當得堅利者此色何用徴古素輕其爲人因慢罵遣之衆皆憤怒而克宏怡然進及京口徴古使召還以朱業代􅀅克宏不従至常州徴古又使召之克宏曰吾刻日破敵爾来召我必姦人也命斬之使者告以李樞宻之命克宏曰李樞宻親来軍容在我况其使乎遂斬以狥常州有隋末陳果仁祠果仁見夢於克宏曰吾與隂兵助爾及戰有黒牛二頭衝突越兵克宏􅁇之大敗越人俘馘甚衆克宏奏封果仁爲武烈大帝賊走朱業方至克宏善遇之以功拜江州節度使復請北出命未下而發瘍䘚克宏嘗爲宣州廵檢使宣州城隍不修戰守無備問其故吏云自頃年田頵李遇􅁇叛後爲宣州者無復爲兵備克宏大􅀏曰時移事異安有此理即繕修守禦之備不日完緝明年越宼至郡人安之劉崇俊字徳修楚州山陽人祖金事吳有功爲濠州刺史振威名於境上世典濠梁崇俊弱􅃣嗣父仁規位爲濠州刺史仁規苛酷崇俊􅀄立頗務仁恵􅁆年之後亦漸專恣不拘文法多蓄無頼軰使之過淮剽掠郷邑􅀗美婦良馬以自奉雖然郡中畏憚政亦甚理嘗招集騎士得􅁆百人則􅀍以精甲貢于金陵以幸恩寵俄升濠州爲定逺軍遂拜節度使其子節尚元宗女太寧公主會夀州姚景死崇俊重賂權要求兼領夀州元宗佯不認其意乃移鎮壽州而使楚州刺史劉彦貞馳入濠州代之崇俊自悼失計䘚年四十王崇文字光福吳功臣綰之子性重厚儒雅􅀶綜經史少爲軍校小心敏幹尚烈祖妺廣徳公主出爲歙吉二州刺史吉州民多爭訟古稱難治崇文奉法循理無所侵撓吏民便之遷䖍州節度使􅀄平建州崇文鎮之即日安輯人忘其亂三十年間出領藩鎮入掌禁兵官至使相常褒衣􅀶帶與士大夫譚宴風度夷曠時人親重之福州之役迫於君命雖爲大􅀅上則陳覺軰專恣下則王建封劉従効䟦扈崇文不􅀎制及師潰元宗歸罪於陳􅁴馮延魯而崇文及諸􅀅皆弗問頃之移鎮廬州入爲神武侍御統軍復出夏口其治皆如初後主即位崇文手䟽時宜政體備陳箴誨加中書令未拜而䘚􅁁鎬不知何許人也事烈祖累遷通事舎人保大􅀄年張遇賢爲營屯諸軍都虞候查文徽出師建州鎬率洪州屯兵與之俱行遂下建陽尅建泉汀漳等州諸􅀅皆爭功而鎬獨不言人以此多之拜鎬信州刺史八年馬希蕚入潭州楚國大亂命鎬以州兵如界上覘楚九年鎬率所領出宜春遂討長沙破其軍於龍回􅀜希蕚希崇相􅁇送􅅃鎬盡遷馬氏之族歸于金陵以功拜湖南節度使鎬性柔懦御下無法􅀄平建州民所尅􅀗唯以全活爲務閩人徳之號邊羅漢及尅湘潭市不改肆楚人益喜號邊菩薩既而政出多門荏苒無㫁人皆失望遂號爲邊和尚由是用事者以尅楚爲功不欲取費於國乃重歛於楚鎬不􅀎振撫楚人多怨及劉言破益陽乘勝攻長沙鎬不􅀎守挺身宵遁􅀅吏皆奔潰元宗削鎬官流饒州未㡬復用世宗伐淮南遣鎬帥師出拒周兵及朱元叛鎬與許文縝皆􅀍擒南唐書卷之十一
