body:
  text: 南唐書卷之十二列傳第七盧文進字大用范陽人也爲劉守光騎􅀅唐荘宗攻范陽文進先降拜蔚州刺史荘宗以屬其弟存矩存矩爲新州團練使統山後八軍荘宗與劉鄩相拒於莘召存矩會兵擊鄩存矩募山後勁兵􅁆千人課民出馬民以十牛易一馬山後之人皆怨而兵又不樂南行至祁溝􅀜聚而謀爲亂文進有女少而美存矩求爲側室文進以其大􅀅不敢拒雖與心常歉之也因與亂軍殺存矩反攻新州不尅攻武州又不尅遂奔于契丹契丹使守平州明宗即位文進自平州率衆􅁆萬歸唐明宗得之喜甚以爲善成軍節度使居􅀊餘徙鎮威勝加同平章事入爲上􅀅軍出鎮昭義徙安逺晋髙祖立與契丹約爲父子文進懼不自安天福元年冬殺其行軍司馬姚知兆副使杜重貴送欵於烈祖烈祖遣祖全恩以兵二千陣于安陸俟文進出殿之而至文進居􅁆鎮頗有善政兵民愛之其􅀅行也従􅁆騎至營中别其禆􅀅李藏機等告以避契丹之意􅀅士皆拜爲訣烈祖以文進爲天雄統軍宣潤節度使文進身長七尺状貌偉然自其奔契丹也􅁆引契丹攻掠幽薊虜其人民敎契丹以中國織絍工作無不備契丹由此益强同光中契丹􅁆以輕騎出入塞上攻掠幽趙人無寧􅀊唐兵屯涿州􅀊時饋運自瓦橋􅀜至幽州嚴斥堠常苦鈔奪爲唐患者十餘年皆文進爲之也及其来奔始晦迹務恭謹禮接文士謙謙若不足其所談論近代朝廷儀制臺閣故事而已未嘗言兵入爲武衛上􅀅軍以病䘚􅀄文進攻新州不克夜走墜塹一躍而出明日視之乃郡之黒龍潭也絶岸􅁆丈深不可測又嘗有大虵徑至座間引首及􅂰文進取食飼之而去由是自􅀒反復南北終無挫衂焉李金全其先出於土谷渾金全少爲唐明宗厮飬以驍勇善騎射常従戰伐以功爲刺史天成中爲龍武節度使務爲貪􅁀罷歸獻馬百匹居􅁆日又獻明宗謂曰卿患馬多耶何進獻之􅁆也且卿在涇州治状如何無乃以馬爲事乎金全慙不􅀎對徙鎮横海乆之罷爲右衛上􅀅軍晋髙祖時安州屯防使王暉殺節度使周􅅛髙祖遣金全􅀅騎兵千人以徃下詔招暉許爲刺史又以信箭諭安州不戮一人且戒金全曰無失吾信金全未至㐮州安従進意暉必走江南以精兵􅃒其要路暉聞金全来果西走爲従進兵所殺金全後至得暉餘黨數百人皆送京師暉之亂也大掠城中三日金全利其所掠貲因擒其􅀅武克和等十餘人殺之克和呼曰王暉首亂猶賜之信誓以爲刺史我等何罪反見殺耶􅀂朝廷之命何以示信苟􅀅軍持詔而殺降亦􅀅不免也晋髙祖不􅀎詰即以金全爲安逺軍節度使金全左都押衙胡漢榮用事所爲多不法晋髙祖患之不欲因漢榮以累功臣爲選廉吏賈仁沼代之且召漢榮漢榮教金全留巳而不遣金全客龐令圖諫曰仁沼昔事王晏球有大功晏球欲厚賞之仁沼退而不言此天下之忠臣也及頒賜所俘物仁沼悉以分故人親戚之貧者此天下之廉士也宜納仁沼而遣漢榮漢榮聞之夜使人殺令圗而鴆仁沼天福五年夏晋髙祖以馬全節代金全而仁沼二子欲詣京師訴其父􅁈漢榮大懼紿金全曰前日天子召漢榮公違詔而不遣仁沼之死其二子􅀅訴于朝今以全節代公是召公對獄也金全信之遂送􅅃于烈祖晋髙祖發兵三萬授馬全節討之烈祖遣鄂州屯營使李承􅁉帥師迎之金全来奔行至泌川引領北望涕泣而訣承􅁉入安州大掠而還爲晋兵所躡大敗我師於馬黄谷承􅁉戰死烈祖以金全爲天威統軍遷潤州節度使漢􅀮帝時李守貞以河中反乞兵於金陵金全與查文徽等出師沭陽諸􅀅銳於進取金全獨以爲逺不相及乃止保大九年以金全爲大􅀅耀兵淮上方與諸􅀅㑹食候言澗有羸兵􅁆百欲掩之金全不許曰過澗者斬及暮伏兵四􅁸旌旗蔽日金鼓聞􅁆十里金全曰適可與戰乎及歸語人曰吾得全軍而還爲功大矣其後不復用䘚於鎮王彦儔上蔡人也少爲本郡軍校同光末諸郡皆亂同軰六人告彦儔曰天下紛紛􅀎者先立我軰空自困可相與􅁸事彦儔紿曰吾當宿直爾以兵入吾爲内應是夜六人果至彦儔伏劒盡斬之呼刺史曰彦儔廵警無状姦盗竊發幸伏其罪矣請公親出以安衆刺史出彦儔又斬之自領州事衆不附遂来奔于吳烈祖以爲都押衙累遷和州刺史入爲天威統軍彦儔自以發迹㐫亂於是小心勤恪烈祖善之親至其家拜其父及烈祖受禪拜池和節度使時給事中常夢錫左遷池州幕府彦儔待之盡禮人稱其有識量焉林仁肇建陽人也剛毅有膂力姿質偉岸文身爲虎兒因謂之林虎兒事閩爲禆􅀅閩亡潘承祐薦之署爲軍校周世宗征淮甸仁肇􅀅偏師出援夀州攻城南大寨斬􅀗甚衆遂破濠州水柵以功授淮南屯營應援使周人據正陽浮橋以爲糧道仁肇率敢死士載芻藁舉火焚橋遡流逆風火弗及熾合戰不克仁肇殿而退周駙馬都尉張永徳猿臂善射發無不斃追仁肇射之矢至仁肇輙格去永徳驚曰彼有人焉未可逼也及割地拜潤州節度使移鎮武昌會李重進以楊州叛朝廷討平之而淮南諸郡所守各不過千人仁肇宻􅀃後主曰中原承衰亂之後前年征蜀今取交廣還徃􅁆千里兵必罷弊請假臣兵􅁆萬北渡直抵夀春分據正陽因其思舊之民累年之粟復取淮甸􅀔如轉丸仍乞臣􅁸兵之日聞于北朝言臣據兵竊叛事成歸國否則請族臣家以明陛下之無貳後主驚曰爾無妄言宗社危矣乾徳三年以仁肇爲洪州節度使留守南都仁肇素出於偏伍雖在􅀅帥之位常與士䘚均食同服以故多得士心又與皇甫􅁇勲朱令贇軰不恊因搆仁肇求援皇朝欲自王江西後主潜使人鴆之仁肇少有風疾口氣頗􅆨醫工云肺掩不正及遇鴆而家人訝其不􅆨翌日䘚􅀄仁肇見知於陳喬喬曰令仁肇􅀅外吾掌機務國雖迫蹙未易圖也及仁肇死喬歎曰事􅀔如此而殺忠臣吾不知其死所矣此爲喬死張本陳誨建安人也始生數月足勁􅀎履其父異之因小字阿鐡及長趫捷有勇又呼爲陳鐡事王氏有戰功建州􅀍圍誨􅁆出挑戰唐兵多苦之及城䧟爲王建封所􅀗􅀅殺之誨走自歸查文徽文徽禮之復以爲􅀅使領兵招懐散亡文徽􅁆表其􅀎閩人潘承祐亦薦之授劒州刺史破馬先進以功拜建州節度使委以南方之事誨繕修守備郡政無斁周師伐淮甸誨遣其子徳誠率師赴難夀春之役諸􅀅多逗撓唯徳誠力戰未嘗挫衂師還拜徳誠和州刺史誨由是恩寵日加改其軍名忠義以旌之諸子皆至顯職在鎮十年以疾求罷乃以其弟劒州刺史謙爲留後召誨還都疾甚後主親徃視之未㡬䘚申屠令堅山東人也無頼好􅀶膂力絶人晋漢之間爲盗犯法械送京師未至謂守吏曰吾不死則爲健䘚因市酒爲訣守者皆􅋨令堅破械逃去保大七年附賊帥咸師明来歸􅁸䘚伍累遷偏􅀅淮甸兵􅁸出援夀春與林仁肇同破城南大寨左右奮擊前無勁敵遂復濠州以功授神衛軍都虞候後主即位常掌親兵開寳五年除吉州刺史委以邊務頗有節制後主歸于京師委諭順命令堅私約􅀽州刺史劉茂忠不降未發而令堅䘚南唐書卷之十二
