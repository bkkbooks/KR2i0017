body:
  text: 南唐書卷之十五􅀮者傳第十嗚呼古之所謂􅀮士者道徳足乎巳而時命大謬則泊然自適於性命之真而非違物離人以爲髙也物與人莫爲之累而已矣此伯夷叔齊朱張柳下恵之徒所以有徳於天下後世也自秦漢而下士之􅀮者雖不足以語此而前史載之詳矣南唐之士僅可觀者叙次于左作􅀮者傳江夢孫字聿修潯陽人也博綜經史儒行髙潔烈祖輔政辟置門下薦爲秘書郎乆之夢孫自陳迃儒無所禆益且平生讀書意在施惠於民而後已因求一縣以自効烈祖曰縣邑非所以優賢者不許固求之乃􅀘天長令烈祖召之従容示以誥指庭下地曰今日受此明日即趨走於彼矣如何夢孫曰苟遂素志無恤其他乃授之至縣吏告曰正㕔甚㐫前令居之􅀑怪畢見請陳設便㕔夢孫固不可曰長吏不居正㕔非禮也禮上之夕若數十人傾倒几案呌嘯甚喧夢孫従容整衣􅃣呪曰夢孫爲縣令合居此㕔爾爲􅀑神應有祠宇丘墓安得爭此即命復陳設如􅀄自此寂然無患後人安之其治以簡易仁恕爲事邑人大悅踰年稱疾求歸田里躬勤耒耜事􅁇毋甚謹每晨夜具潔服問安侍膳訖乃集諸生講禮朝廷累召不􅁸保大中䘚年八十五贈國子司業沈彬筠陽髙安人讀書􅀎詩属唐末亂離南㳺湘湖􅀮于雲陽山十餘年與僧虗中齊已爲詩侶迄不遇世乃歷名山治方術烈祖鎮金陵命所属郡縣辟致之彬知其欲取吳國因獻􅀞山水詩云尺素􅀮清輝一毫分險阻授校書郎入輔吳世子璉於東宫未㡬乞罷以尚書郎􅃱仕禪代之後絶不求進髙安士人多爲給其粟帛元宗南遷彬年逾八十詣南昌求見曰臣自處山野世事不預臣妻謂臣曰汝主人郎君今爲天子兾接清光死且不朽元宗優禮待之賜粟帛遣還署其子元爲秘書省正字彬尤工詩而未嘗喜名如再過金陵詩云玉􅀣歌終王氣􅀵鴈行髙送石城秋江山不管興亡事一任斜陽伴客愁又都門送客詩云岸柳蕭踈野荻秋都門行客莫囘頭一條㶚水清如劒不爲離人割㫁愁皆盛稱於士大夫惜乎簡編散失不得見其全集彬學方外之術迄無所異唯手植一􅀣命諸子曰吾死葬此及彬卒發之得石椁一上有􅂐刻八字云開成二年夀椁一所因就葬焉陳貺南閩人性沉澹志操古朴而不苟於仕進一卧廬山三十年學者多師事焉元宗以幣致之布裘鹿鞹進止閑肆因獻景陽臺懐古詩云景陽六朝地運極自依依一㑹皆同是到頭誰論非酒濃沉逺慮花好失前機見此尤宜戒正當家國肥元宗稱善欲授以官貺固不受賜粟帛遣還舊隱䘚年七十陳陶世居嶺表以儒業名家陶挟冊長安聲詩曆象無不精究常以台鉉之􅄊自􅀒恨世亂不得逞昇元中至南昌􅀅詣建康聞宋齊丘秉政凢所進擢不愜士論自料與齊丘不合乃築室於西山日以詩酒爲事㑹宋齊丘出鎮南昌陶志不屈而齊丘亦不爲之薦辟陶作詩自詠曰一顧成周力有餘白雲閑釣五溪魚中原莫道無麟鳳自是皇家結網踈陶少與水部貟外郎任晼相善嘗以詩遺之云好向明朝薦遺逸莫教千古弔靈均元宗雖聞其詩名而未及召之㑹有星孛陶歎曰國家其㡬亡乎既而果失淮甸陶所居幽􅃉性尤􅄝鮓元宗南遷至落星灣欲有所問而恐陶不盡言因僞使人賣鮓至陶門陶果出㗖鮓喜甚賣者曰官舟抵落星矣翁知之乎陶􅀏曰星落不還元宗至南都未幾殂不還之􅀃果驗陶後以脩飬煉丹爲事有詩云乾坤見了文章􅂴龍虎成来印綬踈又云長愛真人王子喬五松山月伴吹簫任他浮世悲生死獨駕蒼龍入九霄又題徐穉亭詩云伏龍山横洲渚地人如白蘋自生死洪崖成道二千年唯有徐君播青史陶所遁西山先産藥物􅁆十種陶採而餌之開寳中常見一叟角髪􅀍􅄄與老媪貨藥於市􅀗錢則市鮓對飲旁若無人既􅋨行舞而歌曰藍採禾藍採禾塵世紛紛事更多爭如賣藥沽酒飲歸去深崖拍手歌或疑爲陶之夫婦云許堅不知其家世或曰晋長史穆之裔形陋而恠或寓廬阜白鹿洞桑門道舘行吟自若幘巾芒屩短襕至骭亦無齎装唯自􅀒布嚢常括不解每沭浴不脫衣就谿澗出而暵之或問其故則言天象昭布雖白晝亦常參列人自昧之爾其可祼䄇乎堅癖嗜魚或得大魚則全體而烹不加醯鹽熟即㗖之逰溧陽下山寺吟詩曰地枕吳溪與越峯前朝恩賜雲泉額南唐以大唐爲前朝竹林層建鴈塔髙石室幽棲㡬禪伯荒榛蕪沒蒼苔深古池香泛荷花白客有經年􅀃二林落日猿啼情脉脉後或居茅山或入九華適意徃返人不􅀎測舊與樊若水相善若水北度後因轉輓于江南遇堅于簡寂觀勉之以仕則顰蹙不荅堅嘗至陽羡人不之識一日渉西津􅇒波濶歩若平地然衆昉神之不知其所在云毛炳豐城人也好學不􅀎自給因隨里人入廬山每與諸生曲講苟􅀗貲鏹即市酒盡􅋨時彭㑹好茶而炳好酒或嘲之曰彭生􅀃賦茶三斤毛氏傳經酒半升炳聞之小哂而巳自後或逰螺川諸邑遇酒即飲不􅋨不止嘗宿于酒家大􅋨悮坐爐炭主人出之翌日尻痛炳疑因酒乖忤遭其笞撻訊之乃知又嘗􅋨于道旁有里首張谷掖之而􅁸炳瞑目曰起予者爲誰對曰張谷也炳呵之曰毛炳不干於張谷張谷不學於毛炳􅋨者自􅋨醒者自醒醒􅋨之道兩者固殊安用掖爲復呵之曰汝可速去無撓予卧由是人頗重之是真全於酒者也後聚生徒􅁆十講誦於南臺山迨數年自署于齋壁云先生不在此千載只空山因大􅋨一夕䘚有詩集􅀓于世顔詡魯郡公真卿之後唐末徙居木川詡少􅀌兄弟􅁆人事􅁇毋以孝聞雅辭翰謹禮法多循先業迨末年一門百口家法嚴肅男女異序少長敦睦子姪二十餘人皆服儒業每延賓侣寓門下者常十􅁆詡晨暮延揖飲饌燕􅀏未嘗不躬自接對雖遇姻戚沖孺亦爲之􅃣帶盡禮就所居第依泉石築亭榭開軒四敞則碧鮮叢遶翠㣲環列蕭爽之􅃐杜絶塵􅅝水部貟外郎孟賓于嘗以詩美之云園林蕭爽聞來乆欲訪因循二十秋此日開􅁭吟不盡碧山重疊水長流又司農卿何蒙殿中丞蒯鼇史舘孫伯純各爲詩序以述其幽􅀮詡聞子弟有與賓客戲者未嘗靣責手寫韋昭博奕論署于屋壁使之自愧家人未嘗見其喜愠􅀄季父非理據鄉人桑詣邑求治令尹下詡評之詡償以巳緡其訟遂止䘚年七十餘鄭元素京兆華原人也少習詩禮避亂南逰􅀮居于廬山青牛谷髙卧四十餘年採􅅔食蕨絃歌自若搆椽剪茅於舎後㑹集古書殆至千餘卷元素温韜之甥也自言韜發昭陵従埏道下見宫室制度閎麗不異人間中爲正寢東西廂列石􅇃􅇃上石函中有鐡匣悉藏前世圖書鍾王墨跡􅁓墨如新韜悉取之韜死元素得之爲多嗚呼業不素修自羣鹿豕斯謂之􅀮者樵夫牧子之事爾非吾所謂􅀮也故􅀮士儒術出處雖異易地則皆然或曰江夢孫沈彬嘗仕矣而列于􅀮士劉洞史虚白嘗􅀮矣而列于儒術何哉曰彬與夢孫志於􅀮而仕不得已焉洞與虚白志於仕而􅀮不得巳焉予何容心乎亦各成其志而已至如陳陶飜然有改而所得多矣志不足言之也南唐書卷之十五
