body:
  text: 神􅀅操􅃏一麾暉衆大敗􅀵兵返走且戰且行欲退保滁州時滁州守􅀅王紹顔先遁去城中巳亂暉力戰創重死于天兵子􅁇勲别有傳寳訓曰太祖擒皇甫暉於滁州是受命之端也國光閑話曰太祖挺身力戰劒血服衲既而擒暉孟堅􅀄事王昶爲建州禆􅀅延政與曦有隙堅知其必敗會邊鎬伐建陽堅以其衆先降鎬等資其䇿以取南閩及陳覺矯命攻晋安堅􅀠馮延魯軍中李仁逹先求救於越越以兵􅁆千人入城助守而江淮諸軍大集四面合勢晋安窘甚越人㳂海濟師旁岸阻濘藉簀乃可登南面諸軍聚而射之簀不得施乆之延魯曰城所以不下者恃此爲援也却吾軍以誘之登岸殱其援城必降矣堅曰敵至此已乆進退不可求一戰而死無路爾今與之戰必致死力可盡殺乎不若堅壁以拒之援兵逺渉大海不戰而困城可圖也延魯不聽揮兵少却越人登岸未定堅曰可擊矣延魯又不聽既而合戰延魯敗走堅死之諸軍皆潰陳喬字子喬世爲廬陵玉笥人祖岳仕大唐爲南昌觀察判官著唐書自髙祖訖于穆宗爲統紀一百卷行于世父濬仕吳爲中書舎人翰林學士撰吳錄二十卷喬㓜敏悟躭翫文史以􅄻授太常寺奉禮郎烈祖即位頗􅄊重之遷尚書郎拜中書舎人元宗既失淮甸耻其降號欲授機務于太弟而陳覺之徒因有窺竊之計輙謂元宗曰宋齊丘嘗賛烈祖變家爲國終成大業是社稷之臣也今若委以國事庻寜邊鄙而陛下優㳺􅃉䖏以飬喬松之夀遵􅂦湖之躅亦千載一遇也元宗由是欲傳位而以齊丘輔政喬聞之排閤而入諌曰臣聞社稷之重焉可假之他人今且授之則百官朝請皆歸齊丘一民尺土非陛下所有尚􅀎制齊丘而再有之乎臣見淖齒李兊復作而讓皇幽囚于丹陽亦陛下之所親見一日垂涕泣求爲田舎翁不可得矣元宗愕然曰微卿幾落賊人彀中於是引喬入見后及諸子指喬曰此忠臣也他日國家急難汝毋子可託之我死無恨矣傳位之意遂止而齊丘黨與亦由此以敗及元宗南遷留喬輔太子監國後主即位遷吏部侍郎翰林學士承㫖門下侍郎兼樞宻使遂總軍國事政由已出李平潘佑之死亦因喬間焉開寳中太祖皇帝遣使召後主入朝後主欲徃以喬爲介喬曰陛下與臣俱受先帝顧命委以社稷大計今徃而見留則國非巳有悔􅀅何及臣雖死實靦面於先帝後主曰苟不得巳而入其如稽緩之譲何喬曰臣請坐之後主由是連年拒命皆喬爲之謀也及王師問罪喬誓以死守時降樞宻院爲光政院喬爲光政使而張洎爲副同掌機宻嘗語後主勢雖迫蹙二臣之節不隳也及城􅀅䧟後主自爲降􅅃俾喬與世子仲㝢開城門納之喬遽歸府以􅅃投于承霤後主促之愈急喬入見曰自古豈有不亡之國乎降無益也喬意欲與後主俱死而不忍言臣請城下一戰而死後主執其手泣曰盍與我北歸喬曰臣當大政而􅃱國家如此非死無以報臣死而歸之以逆命之罪則陛下保無恙也掣其手去入視事堂召二親吏解所服金帶遺之曰吾死掩屍無泄遂自縊二吏徹榻瘞之後主求喬不得張洎曰已死北軍矣語未畢而王師遽入後主俘于京師太祖皇帝責其拒命勞師果以陳喬固執爲對喬爲人孝悌惇睦宗族之貧者分祿以給之雖居權要家無餘貲先䘮其妻後主爲娶國戚喬曰臣家素貧窶不􅀎成禮後主貸之俾就婚焉惜乎不知時變死非其所然亦忠於所事者也金􅁜既平改葬喬􅀄求喬屍不得或見丈夫衣黃半臂舉一手障面及發其瘞以右手加額如所見焉劉彦貞吳功臣信之子也授大理評事累遷屯田貟外郎父䘮免􅁸爲􅀅軍遂歷武職連刺海楚二州長於吏事聲績日洽拜濠州節度使承劉崇俊虎政之後裁以法度吏民頗服及移鎮夀春漸自矜大務爲聚歛以奪民利夀春有安豐塘溉田萬頃彦貞託以浚城隍大興工役决水城下而田畞皆涸因急其徴賦民皆鬻田而去彦貞取上􅃾者賤價買之於是復漲塘水􅀊積巨億賂遺權要以沽聲名魏岑受賄尤劇羣議雜然推唱以謂彦貞用兵如韓彭理民如龔黃􅀝之若長城及周世宗征淮甸命大􅀅李榖攻自夀州元宗使彦貞督諸路兵出拒周師以江州皇甫暉爲援李榖曰吾無水戰之具而使唐兵㫁正陽浮橋則我背腹受敵乃焚其芻糧退屯正陽是時世宗親征行至圉鎮聞榖軍却意唐兵必追之遣李重進急趨正陽曰唐兵且至宜急擊之彦貞等聞榖退軍皆以爲怯禆􅀅咸師朗曰追之可大􅀗劉仁贍使人喻之曰君来赴援未交戰而敵人退不可測也慎勿追逐君爲大􅀅安危以之脫有不利大事去矣前軍張全約亦曰不可追彦貞曰軍容在我汝軰何知沮吾事者斬其舉止躁撓貪功自任􅀋如此比至正陽而重進先至未及食而戰彦貞施利刃於拒馬維以鐡索又刻木爲獸號捷馬牌以皮嚢布鐡蒺䔧于地周兵見而知其怯一鼓敗之彦貞死于陣􅀄彦貞鼓行劉仁贍曰未戰而奔必有伏兵我師遇之無遺􅀋也乃號令軍中爲城守之備既而彦貞果敗諸軍皆潰惟張全約帥所領奔夀州以其覆軍䘮地自彦貞始故恩不及其子孫交㤗元年贈彦貞中書令而已朱令贇大􅀅軍業従子也常従業軍􅀄爲小校趫捷善射椎首鷹目軍中號朱深眼累遷神衛都虞候㑹林仁肇䘚以令贇爲鎮南軍節度使王師問罪後主召令贇赴難令贇至湖口與諸􅀅議曰今若前進而王師據我後則上江阻隔退乏糧道亟爲虜矣乃以書招南郡留守劉克貞代鎮湖口克貞病不􅀎舉令贇遲之後主命益急使者旁午令贇不得巳自潯陽湖􅅞大筏載軍糧􅄊用戰艦數百艘欲㫁采石浮橋直趨金陵或說令贇曰江水淺澁不利舟筏可俟盛夏大江汎溢順流而下􅀔不可禦令贇曰業巳進俟盛夏乎遂帥水陸一十五萬至虎蹲洲與王師遇令贇不識兵機自乗大航危簷重構建大􅀅旗幟中流指麾王師聚攻之令贇先創巨舟實葭葦灌膏油欲順風縦火謂之火油機至此勢蹙乃以火油機前拒而反風廽煽自焚大筏水陸諸軍不戰而潰令贇投火死糧􅄊俱焚煙熖不絶者浹日自是金陵絶無外援以至於亡胡則爲江州副使金陵既下後主歸于京師諸郡皆送􅅃則謂所部曰吾等世受主恩忍􅀒之遂殺謀降者嬰城固守朝廷遣使諭㫖猶不奉命􅀅軍曹翰帥師圍城三年則誓以死守城􅀅䧟太宗皇帝嘉其盡節於所事遣使喻翰城下日拒命之人盡赦之使人至獨木渡大風􅁆日不可濟及風定而濟則翰已屠江州無遺􅀋適一日矣嗚呼甚哉死之難也非死之難而處死者爲難也非處死之難而擇其所處爲尤難是故或輕鴻毛或重太山其死雖一而輕重之異者在得其所與不得其所爾劉仁贍軰於死生之際亦庻㡬焉南唐書卷之十七
