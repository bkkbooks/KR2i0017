front:
  text: 南唐書卷之十七義死傳下第十二皇甫暉山東人也事石晋爲宻州刺史虜䧟中原暉與秦州刺史王建来歸授神衞軍都虞候俄拜江州節度使周師伐淮南暉率江州屯兵㑹劉彦貞等以拒周師彦貞舉止躁撓失大􅀅體而暉獨持重軍陣整肅士樂用命雖中原名􅀅徃徃憚之及彦貞敗死天子徙正陽橋于下蔡暉與林仁肇爭之不勝周有
  hash: sha256:a64c4601fdbbe9911cba6de744fea31b667ce43431261db2387e5f2b43246027
  markers:
