body:
  text: 南唐書卷之十八廉隅傳第十三嗚呼崇髙富有人之所欲也其崇髙乎天地之間者若䳡鷯巢於一枝一枝之外無所居也其富有於萬物之上者若偃䑕飲於長河滿腹之外無所容也天地亦大矣萬物亦衆矣一身之所爲曾未得其萬萬之一而固巳厭足則一身之外我何與焉古之人其志有在於是者許由聞其風而恱之其無待於外而傲睨於萬物之上則在我者皆道之真而在彼者皆物之粗道者吾之所固有而物者時之所儻来故榱題􅁆尺後車數十乗不足以望吾㤗山嵁巗之安也食前方丈侍妾數百人不足以易吾飲水曲肱之樂也古之人其志有在於是者王子搜聞其風而恱之大而天下重而一國有所不受則脩吾身以標凖於天下不亦貴乎馴致後世䘮已於物忘真於利則清風不競而廉隅遂䘮如姚景之取予有節魯崇範之一介不受馬文義之不入府庫許規之不顧遺金皆後世之難􅀎者作廉隅傳姚景始事劉金爲廐䘚金暇日至廐中見景晝瞑有二赤虵悠揚景面少頃入鼻竅而寤金由是竒之引爲親信俄遷禆􅀅金以女妻之烈祖亦重其爲人使典親兵歷制置刺史拜清淮軍節度使夀春望鎮供億滋厚而主􅀅歛率浮於他郡民尤苦之景至一切供億悉罷去常俸不給刓衣弊􅃣漠然古風􅀄吏請家諱景大署于􅁓尾曰諱􅂍吏於是属吏拱手稍知廉隅諸子爲牙􅀅景登城見其長子導従甚盛過市市人皆廢業辟路景召其子杖之魯崇範廬陵人也竈薪不属而讀書自若烈祖􅀄建學校丁亂世典籍多􅆣旁求諸郡崇範雖窶九經子史世藏于家刺史賈皓就取進之薦其名不報皓以巳緡償其直崇範􅀏曰墳典天下公􅄊世亂藏於家世治藏于國其實一也吾非書肆何估直以償耶郤之皓謝曰俗吏凂濁以遺先生羞不然何以見髙義㑹皓赴􅆣與崇範俱至金陵表薦之召試東宫授太子洗馬復守廉儉唯食月俸其餘四時錫賚非次優與拜而弗取悉班諸親舊之貧者元宗即位尤重之除東宫使䘚于仕馬文義彭城人也父仁􅁉事烈祖爲使相文義以􅄻授千牛備身􅀘浙西支建州之役􅀠祖全恩爲判官既下建州􅀅吏皆入府庫爭取金貝文義獨􅀵民籍歸幕故建州雖經亂而民皆安堵文義與有力焉遷讃善大夫䘚子禹昌甫二􅀊妻朱氏大􅀅軍業女也􅉠贈一無所受盖其廉如此故􅀎率其妻如此許規髙陽人祖儒義不食梁粟自雍州襁􅀒東走􅀮江南山谷中終身不出儒生稠稠生規規好道家言故不事事嘗覉旅宣歙間聞旁􅃕呻呼就訊之曰我某郡人也察君長者且死願以骸骨屬因指槖中黄金十斤曰以是交長者規許諾敬􅀒其骨千里并黃金置死者家父驚愧之因獻金如亡兒言以爲許君夀規不顧竟去聞者以規爲長者云子逖事後主爲監察御史亦有清節後仕皇朝苛政傳第十四嗚呼立天之道曰隂與陽立地之道曰剛與柔立人之道曰仁與義盖隂陽和同剛柔相濟然後交通成和而物生焉人位其中戴仁抱義所以賛天地之化育也苟忿戾殘忍而不全乎仁義則猶天之獨陽而無隂地之獨剛而無柔其於生成也殆矣古之聖人所以徳刑並用而洽于民心者凢以知此而巳循致後世依􅀔作威􅀝法以削則㓕天地之徳刻生民之性苛細􅃤烈無所不爲可不痛哉昔孔子適楚有婦人哭於路而哀使子貢問之曰爾之哭重有憂乎曰然子貢問其故曰吾舅死於虎吾夫又死焉今吾子又死焉是以哀之子貢曰何不去也曰無苛政孔子聞之曰小子志之苛政猛於虎作苛政傳張宣字致用少事吳爲軍校􅀠大􅀅柴棐棐愛人戢下諸􅀅化之唯宣頗肆􅁀戾部曲苦之従劉信圍􅐚州􅐚人乞師於楚信遣宣及髙審思分兵禦之大敗楚師累遷諸軍都虞候徙爲左街使皆以嚴酷爲理及鎮鄂州置地室以鞠罪人罪無問小大入之則無全活未㡬境内大治道不拾遺會雪中炭肆有闘者録問之言市炭一秤而輕不及數宣使秤之信然乃斬賣炭者梟首懸炭于市自是賣炭者率以十五斤爲秤無敢輕重李徳柔字子懐鄱陽人也始爲小吏善伺人之私捕􅀗亡命所至必得時目爲李猫兒累遷大理卿持法苛峻獄有未成則以蘆蓆卷囚而倒置之死者甚衆徳柔本無學術妄稱博學每呼馬爲韓盧染工爲伶倫雖然不附姦佞善守職分故終其天年􅀄元宗欲置北寺獄徳柔諌曰世豈乏士而俾閹豎得以弄其文墨耶其議遂寢論者韙之嗚呼唐末大亂方鎮僣擬悉以宦官給事考諸前史吳越最多唯南唐載籍脫略閹人内倖用否輕重不可悉考案浮屠傳後主對佛像燃命燈以决大辟自夕至旦火滅則誅之不滅則貰之由是富啇大賈遺賂内官俾續燈􅀗免者甚衆而此又有置獄北寺之􅀃則閹豎之職雖無考據而伺􅂩抵􅇖竊弄威徳亦巳甚矣幸而國君儒雅未嘗嬖倖故不見斥於當時南唐書卷之十八
