body:
  text: 南唐書卷之十九誅死傳第十五嗚呼三代之際刑不上大夫而霸者之命亦曰無專殺大夫則古之所以任大夫者未嘗不以賢而所以待大夫者未嘗不以禮及其世亂刑濫故殺之之甚有見於春秋者書人以殺殺以其罪也稱國以殺殺不以其罪也是以爲人君而不通春秋之義者必蒙首惡之名爲人臣而不通春秋之義者必䧟誅死之罪後世君子耻於自明而爲小人之所誣則賢不肖駢死於市朝而䧟其君於首惡之名者無世無之良史所以直筆書之使後世爲臣者知法之不可犯爲君者知刑之不可濫如陳蕃李固之死君子觀之未嘗不扼腕而歎之董卓王甫之死君子觀之未嘗不憮然而快之是其刑之當否雖千載之後猶足以感發人之喜怒也南唐享國日淺可名之士無㡬而誅死太半如宋齊丘陳覺李徴古李徳明鍾謨張巒禇仁規王建封范冲敏皇甫􅁇勲林仁肇潘佑李平皆死於非命就其未死之行以考之則知其所死者不􅀎無當否矣然則南唐之亡非人亡之亦自亡也爲國而自去其股肱譬諸排空之鳥而自折其羽翮孰有不困者哉昔孔子適晋至河而還者聞晋殺竇鳴犢舜華也故曰刳胎而麟不至覆巢而鳳不翔君子惡傷其􅀋也作誅死傳禇仁規字可則廣陵人也始爲軍中小吏勤幹敏給可􅀍䌓使累除右職出爲海陵鹽監使海陵民好爭訟吏多不􅀎直乃以仁規兼縣事所部魚鹽竹葦之地財用所出國家每有大役常賦不􅀎給仁規使行視民家所有舉籍取之事訖則以次償備罔有逋遺以故民不甚怨而供億公費不知限極烈祖喜之及以海陵爲㤗州遷仁規爲刺史不移治所政亦如故晚年國家少事仁規掊克不已多入私門刑罰滋􅁀加以奢縦宣徽使陳覺有宿嫌宻啓其状侍御史王仲連亦劾之烈祖陽不問而隂欲罷其郡㑹􅀅東廵乃召以爲靜江軍都虞候督舟師以従及還都遂留不遣仁規方承恩遇猥􅀍摧折不勝忿恚乃上書自陳無過而爲䜛佞所間辭甚訐斥烈祖下其事命陳覺充㤗州按鞠使仁規聞覺徃按歎曰吾嘗􅀌立所知者主上而巳陳覺首搆吾事而今以属之何以自明遂自劾即日􅀵付大理賜死妻子徙和州王建封少爲軍校驍勇任俠平建州功冠諸􅀅拜信州刺史爲人剛鷙無所忌憚及陳覺等矯命討李仁逹建封帥師圍福州與諸􅀅争功城垂尅而先退諸軍由此潰散遂失晋安元宗大怒陳覺馮延魯皆􅀍流竄而建封不自安元宗召還慰撫之使掌禁兵建封怙罪愈多僣侈時魏岑鍾謨李徳明皆當清要而岑詭佞尤甚謨及徳明亦輕脫俱不恊衆望戸部貟外郎范沖敏頗耿介􅀒氣深疾岑等而與建封相善以建封方􅀍寵任可去羣黨因勸建封上書歷詆用事者請盡去羣小進用正人元宗大怒以其武臣握禁兵不當干預國政流建封池州賜死于路沖敏棄市李徳明不知何許人也落魄􅀒大節累遷兵部貟外郎文理院學士周世宗伐淮甸下滁州元宗懼先遣牙􅀅王知朗奉書于世宗不荅未㡬楊光舒㤗蘄相次潰元宗益懼乃遣徳明與鍾謨奉表稱臣請獻夀濠泗楚光海六州以求罷兵世宗亦不荅徳明與鍾謨皆留行在明年元宗復使孫晟王崇質削去帝號願効貢賦世宗猶不荅於是鍾謨等見世宗英武而師甚盛乃曰願陛下寛臣五日之誅還取江南表盡獻江北諸州世宗許之遣供奉官安弘道押徳明崇質還江南而謨晟皆見留徳明等歸盛稱世宗英武元宗惡之宋齊丘陳覺等皆以割地無益徳明賣國以圖利元宗大怒命斬徳明于市而益兵以拒周初徳明與鍾謨皆以尚書郎待制恃恩用事百官側目號爲鍾李及謨還因覆案齊丘黨與追贈徳明􅀽州刺史皇甫􅁇勲江州節度使暉之子少以父􅄻爲軍校常従暉軍中滁州之役暉力戰甚急􅁇勲欲遁暉操戈擊之弗及遂逸以暉死事故􅁇勲恩澤優渥累遷􅀅軍池饒二州刺史性謹厚勤於爲理吏民安輯入爲諸軍都虞候數年南唐老􅀅亡殁殆盡􅁇勲雖少遂拜大􅀅軍貲産優贍而錫賚頗優於是營第宅侈車服畜妓樂備珍美擇近郊之地植花構亭珠翠環列擬於王室及王師来伐􅁇勲保惜貲富無効死之志欲後主速降而口不敢發每於衆中但言國􅁆窮促而已或聞敗績則怡愉竊喜或有敢死之士請出効命則杖而拘之由是軍情忿恚百姓切齒近臣屢以爲言後主優容之後託以軍旅稀復朝見召之亦不至後主於是不􅀎容乃親廵城勞軍還誘􅁇勲入宫責其流言不用命之状􅀵付大理始出門而衆軍之士雲集臠割􅁇勲頃刻而盡嗚呼天屬之厚不可薄也於其所厚而薄之則其它無不薄矣皇甫􅁇勲叛父於垂死之際及其事君又可知也忠孝人之大倫而不忠不孝者無容於天地之度内然則􅁇勲之死豈特人怨哉鍾謨字仲益㑹稽人也僑建康少爽悟博學屬文頴脫時軰元宗寵用之㧞自下位累遷吏部郎中顯徳中周師下楊光等州元宗遣謨與李徳明奉表於世宗未報而孫晟王崇質􅁇至謨等謂世宗曰唐畏陛下神武保無二心願歸取表盡獻淮甸之地世宗許之遣徳明崇質還江南而晟與謨皆留行在既而江南拒命世宗大怒案誅晟及舘中二百餘人同死獨赦謨以爲耀州司馬謨在耀州以詩貽其州􅀅其畧云翩翩歸盡塞垣鴻殷殷驚開蟄戸䖝渭北離愁春色裏江南家事戰城中江南暨周平世宗召謨授衛尉卿放還國謨作詩以獻其畧云三年耀武羣侯服一日廽鑾萬國春南北通歡永無事謝恩歸去老陪臣世宗覽而恱之賜黃金五百两意􅀅以間其君臣也元宗果銜之謨歸爲禮部侍郎判尚書省國政悉秉於中臺相府但紏轄而巳謨既秉權鑄大錢改制度恃其才􅀎挾中朝之􅀔尤横恣不法世宗每遣使至必賜詔存問時太子兾叅惣庻政謨薦其所知閻式爲太子司議郎百司􅀜啓多由之􅀄李徳明與謨善徳明之死給事中唐鎬與宋齊丘同議至是鎬不自安又頗納賄謨知之面詰其状鎬大懼及謨復使周以世宗之言覆按齊丘黨與陳覺李徴古以下皆伏誅鎬益懼㑹信州刺史張巒入爲天威軍都虞候常詣謨第相歡或至夜分鎬時掌樞要因搆謨與巒謀爲不􅁤元宗疑之太子兾䘚従嘉以次當立而謨曰従嘉輕肆請立紀國公従善元宗大怒尚以世宗之故未即加誅乃罷其職爲國子司業及世宗崩遂貶謨著作佐郎饒州安置遣中使領侍衛軍十人即日監督上道馳驛發遣家屬自後而去謨時病風眩作絶句十餘章其辭皆悽愴至郡月餘遣人就縊殺之謨尤好古碑奉使中原每道旁碑碣必駐馬歷覽嘗見􅀛趺大碣半沒水中謨欣然解衣以手捫揣黙記其文他日水涸以所錄本就證之無差其爽邁如此􅀄使者至謨望拜曰臣無􅀒國使者曰詔問孫晟獨死状謨復拜曰臣聞命矣遂就縊巒亦賜死于宣州潘佑散騎常侍處常之子氣宇孤峻閉門讀書不營貲産文章贍逸尤敏於論議時譽藹然中書舎人陳喬戸部侍郎韓熈載薦之以秘書省正字釋􅄄俄直崇文舘輔後主於東宫後主即位遷虞部貟外郎史舘脩撰後主納后歷代乆無其禮開元禮亦多􅆣博士陳致雍習知㳂革隨事􅀘正後主使徐鉉與佑叅議佑立論以沮之文彩可觀後主竒其議頗見施用由是恩寵日洽改知制誥明年居中用事極論時政無所廽避後主手札敦喻佑七表不止因請休官逺去乃徙佑􅌹知國史悉罷其職時江南衰削國歩多艱佑所上諌䟽有家國隂隂如日􅀅暮之辭後主惡之又其所薦黜與時軰不協因誣以他事劾佑佑自剄毋及妻子徙饒州佑自言其毋方娠夢古衣􅃣人告曰我顔延之也與夫人爲子及生七􅀊始􅀎語曰兒悮傷白龍爲上帝所罰也因吟詩曰只因􅀐折玉龍腰謫在人間三十六至是果以三十六􅀊䘚李平􅀄爲河中李守貞従事漢􅀮帝立守貞據城叛􅀮帝命周太祖討之守貞遣平與朱元奉表来乞師未返而河中平遂留江南越人宼毘陵平自言有武畧因以爲􅀅固辭乃遷衛尉少卿使領偏師廵江北進逼蘄州周師先遁平入保其城即以爲蘄州刺史㑹朱元叛元宗恐其不自安召之還都使者失㫖鎻平送建康元宗慰勉之拜建州節度副使徴爲衛尉卿平本好神􅋖修飬之事而動多恠妄自言􅋖人神􅀑常與通接潘佑亦好仙平因與親善之言佑父處常今巳爲􅋖官而已與佑亦􅋖官也家置靜室人莫􅀎窺佑既􅀗用請復井田法深抑豪民有買貧户田者使即還之又依周禮造民籍復造牛籍曠土盡令種桑薦平判司農寺以督之命行于下急如星火州縣吏胥因以爲姦百姓大擾聚而爲亂後主知立法之病即罷之佑復薦平知尚書省由是羣議紛紛以爲壊法殃民皆由平始乃先􅀵平下大理使􅀵佑佑自剄平縊于獄妻子徙䖍州明年宥其家􅅒給之南唐書卷之十九
