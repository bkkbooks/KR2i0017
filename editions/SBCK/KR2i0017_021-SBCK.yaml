body:
  text: 南唐書卷之二十一黨與傳下第十七陳覺宋齊丘之客也齊丘薦爲楚王景遷教授累遷兵部侍郎宣徽使覺在外姦佞苛酷及居家不􅀎制義於一妻其妻李氏妬悍親執庖㸑不置妾媵宋齊丘嘗選三婢予之頗有容質李氏亦無戁色奉事三婢禮如舅姑晨夕承侍未嘗輙離左右人問其故則曰此令公寵倖之人見之若面令公敢倨慢耶三婢不自安求還宋第覺唯唯聽従而巳李仁逹據福州齊丘因薦􅁴有智畧可使喻㫖於仁逹必不勞寸刃坐致􅆣下元宗許之乃以覺爲福州宣喻使既至􅀃仁逹入覲仁逹曰安撫未定請俟它年入覲覺還至建安耻􅀃之不行乃矯制發建汀撫信之兵徃討之既而諸軍皆潰士之戰死者無㡬國用遂爲一空於是鎻覺送建康中外皆謂其必誅而齊丘上表爲請乃赦之流覺于蘄州未幾復用如􅀄及救夀春又與朱元有私􅂩而窘之太甚䘚致元叛淮甸既䧟舉國震恐齊丘等因之以圗變覺與李徴古俱爲樞宻副使徴古每於言議無復臣禮覺請元宗深居後宫委國事於宋公臣時得入奉従容譚釋老而已元宗以羣情方撓不欲􅁀其事及使中原囬乃罷近職覺以世宗之命告元宗曰江南連年拒命知是宰相嚴續所爲可殺以謝過元宗知其與續有宿嫌也不信鍾謨請覆實其事乃遣謨告謝責巳言非續之罪世宗大驚曰續果􅀎如是乃忠於所事也何罪之有朕爲天下主肯教人殺忠臣乎謨還報元宗乃下令數􅁴前後罪惡貶饒州安置使殺于路李徴古冝春人也昇元末第進士時宋齊丘廣樹黨與以張聲勢徴古常出入門下保大中與陳覺同掌機宻淮甸兵起劉彦貞敗死人心恼懼元宗歎曰吾家國一至於此因泣下徴古曰陛下當以兵力拒敵泣有何益盃酒過量耶乳保不至耶元宗變色左右皆戰慄徴古亦自若又與陳覺乗間言社稷禍在朝夕請陛下燕居深宫國事盡付宋齊丘以紓䘮亂元宗以戎事未戢􅀮忍不發及畫江罷兵鍾謨至自京師判尚書兼三省之政權􅀔特甚尤切齒齊丘黨與常曰人臣窺國理不可容及陳覺奉使中原欲矯世宗之命殺嚴續謨乞復使周覆實其事齊丘黨與遂敗貶徴古洪州殺之馮延巳字正中廣陵人也父令頵事本郡爲軍吏烈祖署爲歙州鹽鐡院判官禆􅀅樊思藴作亂燒營而火及令頵第叛䘚皆釋兵救火其得人心如此時刺史骨言病甚中外不知存否人心恼恼延已年十四徒歩入見言復傳言教出謝􅀅吏人情乃安及長有辭學多伎藝烈祖以爲秘書郎使與元宗逰處累遷駕部郎中元帥府掌書記與陳覺友善自結於宋齊丘以固恩寵同府在巳上者稍以計遷出之元宗愛其多􅀎而嫌其輕脫貪求特以舊人不􅀎離也孫晟面􅁆之曰君常鄙晟晟知之矣晟文筆不如君也技藝不如君也談諧不如君也諛佞不如君也然上置君於親賢門下者期以道藝相輔不可悞􅀖國大計也聞者韙其言烈祖季年亦惡之復爲常夢錫彈劾必欲斥去未果而烈祖殂元宗即位延已喜形於色未聽政屢入白事一日􅁆見元宗不悅曰書記自有常職此各有所司何其䌓也由是少止遂與宋齊丘更相推唱拜諌議大夫翰林學士復與其弟延魯交結魏岑陳覺查文徽侵損時政時人謂之五􅀑保大四年自中書侍郎拜平章事時論不平出鎮撫州亦無善政延已無才而好大言及再入相乃言巳之智畧足以經營天下而人主躬親庻務宰相備位何以致理於是元宗悉以庻政委之奏可而巳延巳遲疑顧望責成胥吏之手又常􅀏烈祖戢兵以爲齷齪無大畧安陸之役䘮兵數千而輟食咨嗟者旬日此田舎翁安􅀎成大事如今上􅁀師數萬於外而宴樂擊鞠不輟此則真英雄主也故蠧國殃民實此之由爲相之後動多徇私而故人親戚殆於謝絶與弟延魯如􅄷讐延魯所生乃延巳之􅁇毋也亦至踈隔既失湖湘人皆歸咎延巳自劾元宗復使親政割地之後始乞罷相乃罷爲宫傅逾年䘚年五十七著樂章百餘闋其鶴沖天詞云曉月墜宿雲披銀燭錦屏幃建章鐘動玉繩低宫漏出花遲又歸國謡詞云江水碧江上何人吹玉笛扁舟逺送瀟湘客蘆花千里霜月白傷行色明朝便是關山隔見稱於世元宗樂府辭云小樓吹徹玉笙寒延巳有風乍􅁸吹皺一池春水之句皆爲警册元宗嘗戲延巳曰吹皺一池春水干卿何事延巳曰未如陛下小樓吹徹玉笙寒元宗恱􅀄蕭儼深惡延已常廷斥之及儼爲大理卿㫁獄失入舉朝皆欲誅儼獨延已力爭以爲赦前失入罪不當死儼終􅀗免人皆韙之以謂裴冕損怨無以加此延魯延已異母弟也􅀄爲江都判官累遷水部貟外郎中書舎人延魯銳於進趨常欲用事四方以要功名延巳詰曰士以文行飾身勤恪居職則寵光至矣何用行險以圖祿利延魯曰兄自􅀎如此弟不􅀎愔愔待循資爲宰相也建州之役雖查文徽尸其事而延魯實賛之閩人先苦王氏亂政聞唐師至皆伐木開道壺􅄴奉迎既尅建州軍無節制大掠􅁆日民不堪命故雖下其地而人皆解體劉従効李仁逹之徒得以鳩集其民專據郡縣者因其􅂩也及陳覺矯命討晋安表言朝夕可克元宗不得巳發諸路兵應之延魯亦請行拜南面監軍使李仁逹求救於越越人遣兵助守既而延魯魏岑王崇文等各領兵萬􅁆四靣俱至圍城數匝聲動天地有國以来出師之盛未之有也延魯等各務爲已功掎角不相應諸􅀅皆怠莫肯用命故兵勢雖盛而城乆不下越之救兵無所施力欲出不可越人復以舟師浮海而至旁岸阻濘不可登延魯軍中集射之舟人戢矢如蝟延魯曰城所以不下者恃此救也今不與之戰則褁糧坐甲何爲哉不如却軍俟其登岸盡殺之城必降矣禆􅀅孟堅諫曰賊勢巳窮堅壁困之功在漏刻延魯不聽越人登岸果致死力延魯遇敵先走其下皆潰孟堅死之諸軍相次亦潰士之戰死者無㡬而軍資􅄊械委棄畧盡元宗大怒命鎻延魯陳覺至建康韓熈載劾奏請置之死宋齊丘固爭乃流延魯于舒州未㡬復用爲東都留守延魯􅀄至自晋安身􅀍五木鎻鑰甚固延巳歎曰弟不肯爲循資宰相一至於此兄弟由是有隙淮甸兵起延魯棄楊州削髮爲沙門逃歸周人執之歸于京師時誚之曰執節分符始作大軍之帥披緇削髪潜爲行脚之僧割地之後世宗以爲刑部侍郎遣歸報聘遂留金陵拜戸部侍郎建􅂭􅀄李重進来乞師元宗命延魯出告其使曰吾不相救非乏兵也大丈夫不得志而反固有之矣但不得其時爾昔周世宗􅀄崩人心未一上黨作亂大兵北征君不以此時反今天下晏然乃以一城之地抗萬乗之師此自速死爾吾安􅀎救速死之人乎太祖皇帝親征延魯入貢太祖曰爾國連吾叛臣乎延魯徐曰陛下徒問之而未知之乃以實對太祖頷之因曰朕以大軍渡江爾國􅀎拒朕乎延魯曰重進天下之姦雄陛下一鼓平之蕞爾江南安足以抗天威但士大夫感其主恩有必死之志陛下􅀎棄數萬之䘚與之血戰則可矣且大江設險風波不常儻進未尅城退乏糧道亦官守之責也太祖􅀏曰聊戲卿爾吾與江南大義巳明何至於此乃頒師以上皆見陳彭年别録魏岑字景山鄆州人也篤學強識而拙於屬文常逰覽四方凡天下山川勝勢風􅁟美惡無所不知避亂淮南署郡従事乆不得志􅁆以計䇿干宋齊丘薦授校書郎尤好䛕佞善揣人意元宗即位銳意天下有尅復中原之志岑請親祀南郊元宗曰俟天下爲一然後告謝天地及下南閩意以爲諸國可指麾而定岑因侍宴自言臣少逰元城好其風物陛下平中原日臣獨乞任魏州元宗許之岑趨墀下拜謝人皆以爲佞保大六年李守貞乞師以岑兼㳂淮廵撫使聞守貞敗罷爲屯田使入爲兵部侍郎拜樞宻副使後事亡查文徽不知何許人也用宋齊丘薦授元帥府掌書記遷祕書郎元宗即位拜中書舎人保大中閩人連重遇朱文進弑其君曦遣使告亂馮延巳請執其使以伐閩俄以民疫􅆍其議文徽獨以爲可討王延政首亂宜攻自建州議者多不従唯馮延魯賛之翰林待詔臧循者與文徽同閈嘗賈於閩具知山川險易爲陳進兵之計文徽因是決行邊鎬帥洪州屯兵與文徽㑹建安之民苦王氏亂政皆伐木開道以迎我師遂下建陽方且傳檄諭福州而王延政先遣統軍使吳承祐以逰兵廵福州境紿曰唐爲我討賊大軍至矣福州信之禆􅀅林仁翰殺連重遇函其首歸承祐延政以其子􅁇昌守福州親帥衆以拒文徽文徽始以福州之亂伐閩至此延政巳平福州五郡之兵大集敵勢甚盛文徽等次于蓋竹退復屯建陽啓求濟師臧循監偏師屯邵武縣縣民擒之斬于建州市元宗復遣祖全恩何敬洙率萬人至建陽與延政隔谿水而陣全恩使建陽降􅀅孟堅潜師出其後禆􅀅武彦思馬存貴以輕銳􅁇之腹背夾擊延政大敗退而城守福州復亂李仁逹殺􅁇昌及吳承祐以卓儼明爲主儼明老僧也徒衆􅁆千目有重瞳垂手過􅂰故推立之既而無統御之略仁逹復殺之而自稱留後延政益不振建州之險要曰西巖延平津相􅁇下俄克建州執王延政歸于建康漳泉汀皆平而唯福州羈縻而巳遂以文徽爲撫州刺史入爲諌議大夫拜建州節度使及陳覺矯命敗績福州遂屬吳越後二年福州詐言吳越戍兵亂殺李仁逹而遁文徽與劒州刺史陳誨帥舟師應福州以兵出迎誨曰越人謨信謨信無信也閩人語音未可速進文徽曰乆則生變乗其未定亟取之留誨屯江口進至西門伏兵發文徽􅀍擒誨與越人戰大敗之􅀗其􅀅馬先進等元宗送先進等還越越亦歸文徽後事亡南唐書卷之二十一
