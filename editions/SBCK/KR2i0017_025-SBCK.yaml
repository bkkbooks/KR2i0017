body:
  text: 南唐書卷之二十五談諧傳第二十一嗚呼談諧之說其来尚矣秦漢之滑稽後世因爲談諧而爲之者多出乎樂工優人其廓人主之􅄶心譏當時之弊政必先順其所好以攻其所蔽雖非君子之事而有足書者作談諧傳申漸髙不知何許人也在吳爲樂工吳多内難伶人不得志漸高常吹三孔笛賣藥於廣􅁜市昇元初案籍編括漸髙以善音律爲部長時關司歛率尤繁啇人苦之屬近甸亢旱一日宴于北苑烈祖謂侍臣曰畿甸雨都城不􅀨何也得非獄市之間違天意歟漸髙乗談諧進曰雨懼抽稅不敢入京烈祖大􅀏即下令除一切額外稅信宿之間膏澤告足當時以謂優旃􅃮城優孟葬馬無以過也烈祖受禪吳朝老將唯周本爲元勲烈祖患其難制因其勸進至金􅁜曲宴便殿引鴆賜本本疑之旁取一巵均酒之半跪進曰臣與陛下千載一遇陛下不飲此酒殆非君臣同徳也烈祖變色左右莫知所従漸髙舞䄂升殿併飲之内金盞於懐趨出烈祖宻使親信詣漸髙第賜藥解之不及是夕漸髙腦潰而䘚李家明廬州西昌人談諧敏給善爲諷辭元宗好逰家明常従初景遂景逹景逷皆以皇弟加爵而恩未及臣下因置酒殿中家明俳戯爲翁媪列坐諸婦進飲食拜禮頗繁翁媪怒曰自家官自家家何用多拜耶江浙謂舅爲官謂姑爲家元宗􅀏曰吾爲國主恩不外覃於是百官進秩有差家明毋死未葬㑹元宗乗間書草字於便殿家明紿曰臣竊署字與之不疑元宗以麻􅁓大押字命試學焉家明輙於草字上署曰宣州上供庫支錢二百緡付李家明葬毋元宗大􅀏因以賜焉建州王延政僣號元宗遣將平之俘延政于建康封鄱陽王命公卿宴其第延政吝于賜予家明謔之曰賤工無􅇊優賜叵富然告大王乞取一物延政曰汝何求家明曰大殷平天冠今巳無用家明敢取爲優服延政黙然慙恨而罷自是怏怏病䘚元宗賞花後苑率近臣臨池垂釣臣下皆登魚唯元宗獨無所􅀗家明因進詩曰玉甃垂鈎興正濃碧池春暖水溶溶凡鱗不敢吞香餌知是君王合釣龍元宗大喜賜宴極歡甞見牛晚卧美䕃元宗曰牛且􅀬矣家明乗談諧曰曽遭寗戚鞭􅃻角又􅀍田單火燎身閑向斜陽嚼枯草近来問喘爲無人相輔皆慙宋齊丘無子晩年一子輙死逾月猶哭齊王景逹勉之不止家明曰臣􅀎止之矣乃作大􅁓鳶署其上云欲興唐祚革強吳盡是先生􅁸廟謨一箇孩兒􅂸不得譲皇百口合何如尹延範族吳氏齊丘爲謀因以誚焉乗風放之故墜齊丘中庭齊丘見之哭亦止従元宗遷南都時巳失江北十四郡舟楫多行南岸至趙屯因輟樂停觴北望皖公山謂家明曰好青峭􅁆峯不知何名也家明應聲對曰龍舟輕颭錦㠶風正值宸逰望逺空廽首皖公山色翠影斜不到夀盃中元宗慙之俛首而過後主即位家明老而無寵楊名髙本名復名髙其優名也寓黃幡綽著􅀏林頗行于時辭鄙不載王感化善謳歌聲韻悠揚清振林木繫樂部爲歌板色元宗嗣位宴樂擊鞠不輟甞乗醉命感化奏水調詞感化唯歌南朝天子愛風流一句如是者􅁆四元宗輙悟覆盃歎曰使孫陳二主得此一句不當有銜璧之辱也感化由是有寵元宗甞作浣溪沙二闋手寫賜感化曰菡蓞香銷翠葉殘西風愁􅁸碧波間還與容光共憔悴不堪㸔細雨夢廽清漏永小樓吹徹玉笙寒漱漱淚珠多少恨􅀝欄干手捲珠􅄕上玉釣依前春恨鎻重樓風裏落花誰是主思悠悠青鳥不傳雲外信丁香空結雨中愁廽首綠波春色暮接天流後主即位感化以其詞札上之後主感動賞賜感化甚優彭利用廣􅁜人也顯徳中周師下淮南遂奔建康僑廬􅁜利用性朴鄙頗拘古禮雖燕居常拱手正坐對家人稚子下逮奴􅀠言必據書史㫁章破句以代常談俗謂之掉書袋因自爲彭書袋每出逺塗雖冐雨雪不徹􅃣幘或喻之曰䟦渉勞頓當従簡易利用對曰有禮則安無禮則危焉可悖之以爲先聖之罪人哉或問其髙姓對曰隴西之遺苗昌邑之餘胄又問其居處對曰生自廣􅁜長僑螺渚其僕嘗有過利用責之曰始予以爲紀綱之僕人百其身頼爾同心同徳左之右之今乃中道而廢侮慢自賢故勞心勞力日不暇給若而今而後過而勿改予當循公㓕私撻諸市朝任汝自西自東以遨以逰而巳時江南士人毎於宴語必道此以爲戲􅀏利用䘮父客弔之曰賢尊窀穸不勝哀悼利用對曰家君不幸短命諸子糊口四方歸見相如之壁空餘仲堪之棺實可痛心疾首不寒而栗苟泣血三年不可再見遂大慟客復勉之曰自寛哀慼兾闋䘮制利用又曰自古毀不㓕性杖而後􅁸卜其宅兆而安措之雖則君子有終然而孝子不匱三年不改何日忘之又大㱆欷弔者於是失􅀏㑹隣家火災利用徃救徐望之曰煌煌然赫赫然不可嚮邇自鑚燧而降未有若斯之盛其可撲㓕乎又甞與同志逺逰迨至一舎俄不告而返詰旦復至或問之故利用曰忽思朱亥之椎猶􅀝陳平之戸切恐數鈞之重轉傷六尺之􅀌其言可哂者􅀋如此利用雖舉進士之才調鄙俚多􅀋俳優故凡六上不第一夕宴寢而䘚年六十嗚呼古今一道也學古而不知其變祗爲腐儒而巳彭利用摘裂章句不曉理道原其用心蓋亦苦學而陋者也徒以其言􅀋俳優可爲戲􅀏故附談諧傳云南唐書卷之二十五
