body:
  text: 南唐書卷之二十六浮屠傳第二十二嗚呼浮屠之道我知之矣合萬法於一心而虗不失照􅁸一心爲萬法而照不失虗豈爲淺見道哉昧者曽不知此而毀形骸糜金帛説因果以爲法飾土偶以爲佛将以蘄福利耶而妖孰甚焉將以蘄超脫耶而愚孰大焉此梁武齊㐮之徒所以得罪於天下後世也作浮屠傳􅀽宏曰浮屠佛也章懐太子曰浮屠則佛陁也聲之轉耳傳曰齋戒修而梁國亡非釋迦之罪也然則浮屠之法豈固爲後世患哉衰亂之君迷惑而不反則壞法易紀常由於此南唐有國蘭若精舎漸盛於烈祖元宗之世而後主即位好之彌篤輙於禁中崇建寺宇延集僧尼後主與周后頂僧伽帽披袈裟課誦佛經跪拜頓顙至爲瘤贅親削僧徒厠簡試之以頰少有芒刺則再加修治其手不抄常作佛印而行百官士庻稍稍効之募道士願爲僧者予二金僧人犯姦有司具牘則曰僧尼姦滛本圗婚嫁若論如法是従其欲但勒令禮佛百拜輙釋之由是姦濫公行無所禁止諸郡㫁死刑必先奏牘詳覆無疑適幸遇其齋日則於宮中對佛像燃燈以逹旦爲驗謂之命燈若火滅則依法不滅則貸死富商大賈犯法者徃徃厚賂左右内官竊續其燈而􅀗免者甚衆開寳初有淮北僧號小長老自言慕化而至朝夕入論六根四諦天堂地獄循環果報之􅀃後主大喜謂之一佛出世身被紅羅銷金衣後主誚其太奢荅曰陛下不讀華嚴經安知佛富貴因􅀃後主廣施􅆊刹營造塔像自是囷􅁃漸虗財用耗斁又請於牛頭山大􅁸蘭若千餘間廣聚僧徒日設齋供食有不盡者明日再具謂之折倒識者謂折倒乃敗徴也及王師渡江即其寺爲營署又有北僧就采石磯建石塔且云自㓜草衣藿食不渾凡俗後主遺之齋供一無所受王師尅池州繫浮橋于石塔金􅁜受圍後主召小長老問禍福對曰臣當以佛力禦之乃登城大呼周麾數四後主令僧俗軍士念救苦菩薩滿城沸涌未㡬四面矢石俱下復召小長老麾之稱疾不起始疑其誕遂殺之凈徳尼院凡八十餘衆皆宫中人出家者也諸王公卿處子徃徃在焉都城將䧟亦積薪於院庭後主與之約曰如有不虞宫中舉火爲應吾與汝軰當俱焚死是日保儀黃氏焚積書于宫中淨徳遥觀其烟燄遂􅅡積薪皆赴火死無一人肯脫者城中有僧千􅁆表乞被堅執銳以死國難後主不許僧玄寂姓髙自言髙駢族人昇元中受業昇元寺性爽悟博通經蔵保大中詔講法華經授左街僧錄内供奉講經論明教大師賜紫時法禁寛弛僧尼壊戒律者甚衆玄寂屢干憲法有司惜其才輙貰之後主召入問華嚴經玄寂口􅀃􅆊行一品多賜金帛由是益自恣日以狂飲爲事大醉則十數小兒隨之玄寂行歌于路曰酒秃酒秃何榮何辱但見衣􅃣成古丘不見江河變􅁜谷與羣兒互相應和旁若無人坐是落僧職出居長干寺常與狂生籍地酣飲醉死于石子崗僧應之姓王其先南閩人䏻文章習柳氏筆法以善書􅃣江左初舉進士一黜于有司投册罵曰吾不䏻以區區章句取程於庸人遂學爲浮屠保大中授文章應制大徳賜紫凡禱祠章䟽一筆即就意如宿構元宗喜楞嚴經命左㒒射馮延巳爲序其略曰首楞嚴經者自爲菩薩宻因始破阿難之迷終證菩提之悟然則阿難古佛也豈有迷哉迷者悟之對也迷苟不立悟亦何取是故因迷以設問憑悟而明解皇上聰明文思探􅄨索􅀮雲散日朗塵開鏡明以爲大賚四方未爲盛徳普濟一世始曰至仁或啓佛乗必歸法要􅃙應之書鏤版既成上之元宗歎曰是深得公權之法者也吾聞公權甞以筆諌穆宗爲之改容今效其法尚可想見其風采應之書名由是益振遷右街僧錄固辭求居奉先西庵許之應之多著述尤喜音律嘗以讃禮之文寓諸樂譜其聲少下而終歸於􅆊音讃念協律自應之始嗚呼予聞故老説南唐好釋而吳越亦然南唐毎建蘭若必均其土田謂之常住産錢氏則廣造堂宇修餙塑像而已曰桑門取給十方何以産爲至今建康寺院跨州隔縣地過豪右浙僧􅀊出逺近歛率於民雖然田業頗厚而貲不加多歛率常勞而用不加乏豈各因其俗歟妖賊傳第二十三嗚呼神恠茫茫若存若亡而仲尼不語吾何考信焉若張遇賢諸祐之事姑存而不削者非好爲神恠也將以戒妖妄於後世爾春秋之法雖五石六鷁之㣲皆不泯其實傳曰五石六鷁之辭不設則王道不亢况遇賢軰動阡陌之兵駭衆人之耳目者其可泯哉作妖賊傳張遇賢循州羅縣小吏也縣之刻杉鎮有神降于民家所言禍福輙驗遇賢徃禱之因留奉事甚謹㑹羣盗大􅁸各擁􅁆百衆相與禱于神求爲主者神曰張遇賢是第十六羅漢當爲汝主於是共推遇賢爲中天八國王改元永樂署置百官皆衣絳衣遇賢庸懦無統御之畧賊帥各以便宜攻剽州縣告其進退而巳屢爲州兵所窘復告于神神曰可過嶺取􅐚州當成大事遇賢遂襲南康百勝軍節度使賈浩始輕之不設備賊衆連䧟諸縣州兵擊之不勝浩戒嚴城守遇賢據白雲洞造宫室營署羣盗四出攻刼未㡬通事舎人􅁁鎬洪州屯營都虞候嚴思禮各帥師􅁆千出援䖍州賊衆大敗焚其營署走􅁆十里又敗之遇賢困窘復告于神神不復語遂棄營潜遁賊帥李台知其無神也執遇賢及其副黄伯雄謀主僧景全皆斬于建康市嗚呼許嵩云羅陽有神自稱王表言語飲食與人無異而不見其形予始觀之以爲妄誕及得遇賢之事然後知嵩言無足恠也古者以􅀑無靈響物無疵癘爲至徳之世則舉世大亂神恠畢出固其所也且以孫權之竒英猶不䏻無惑况遇賢乎諸祐諸音查蘄州獨木人自言不茹葷者數世䏻使貧者冨富者貧俚民稍稍效之其徒十􅁆男女猱雜互易匹耦謂之忍辱生子不知其父行之􅁆年積數百衆夜行晝息取資於盗競相推唱云祐術䏻升虗空入水火妄意民藏潜使致之而民弗􅁴也先陳􅁸僑蘄春惡其妖昇元中􅁸第進士授黄梅令到官之日里酋畢賀祐獨不至􅁆日􅁸命籍祐爲里長不服祐嫚言曰吾取令頭殺竪子爾起聞大怒㑹周鄴爲廵撫使師次黃梅􅁸藉其兵以執祐等并其婦人㓜稚皆􅅞沃以豕血祐迄不䏻神因索其家得輿服􅄊用皆埓至貴郡將即斬祐等曰婦人何䏻爲㓜稚宜無預意且貰之􅁸曰此皆瀆亂人倫去無遺􅀋遂并斬之􅁸由是知名遷監察御史䘚南唐書卷之二十六
