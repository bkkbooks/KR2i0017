body:
  text: 南唐書卷之二十八滅國傳上第二十五嗚呼閩楚之捷不償於殫殘而淮甸之役輙䘮其膏􅃾易曰智小而謀大鮮不及矣戒之哉戒之哉作滅國傳閩國王審知字信通光州固始人也世爲農唐末群盜起審知與兄潮俱起草莾衆推潮爲主畧地至泉州軍行整肅其耆老相率􅃒道留之潮引兵圍城逾年殺其刺史廖彦若光啓二年福州觀察使陳巖表潮泉州刺史景福元年巖䘚其壻范暉自稱留後潮遣審知攻暉殺之唐即以潮爲福州觀察使潮以審知爲副使審知爲人状貌雄偉常乗白馬軍中號白馬三郎乾寧四年潮䘚審知代立唐以福州爲威武軍拜審知節度使累遷同中書門下平章事封瑯瑘王唐亡梁太祖加拜審知中書令封閩王陞福州爲大都督府審知儉約好禮王倓楊沂徐寅之徒皆依焉又建學四門以教閩士之秀者􅀊遣使泛海入貢于梁後唐同光三年審知䘚謚忠懿長子延翰立建國稱王而猶禀唐正朔延翰長大美晢如玉其妻崔氏陋而滛延翰不䏻制審知䘮未期徹其几筵又多選良家子爲妾崔氏性妬良家子之美者輙幽之别室繫以大械刻木爲人手以擊其頰又以鐡錐刺之一􅀊之中死者八十四人崔氏後病見其祟而䘚十有二月延翰弟泉州刺史延鈞審知飬子建州刺史延禀同以兵入執延翰殺之而延鈞立更名鏻鏻審知次子也荘宗即拜鏻節度使累加檢校太師中書令封閩王鏻既立延禀還建州鏻餞于郊延禀臨訣謂鏻曰善􅁇先志無煩老兄復来鏻銜之長興二年延禀率兵擊鏻鏻遣王仁逹敗之執延禀誚之曰予不䏻􅁇先志果煩老兄復來延禀不䏻對遂殺之三年鏻上書求爲尚書令唐不報鏻遂絶朝貢即皇帝位改元龍啓國號閩追謚審知爲昭武孝皇帝廟號太祖立五廟置百官龍啓三年改元永和王仁逹爲鏻殺延禀而有功典親兵鏻心忌之鏻謂人曰仁逹智畧在吾世可用不可遺後世患因誣以罪殺之鏻妻早䘚􅁇室金氏賢而不荅審知婢金鳳陳氏鏻嬖之遂立之以爲后􅀄鏻有嬖吏歸守明者以色見倖號歸郞鏻後得風疾陳氏與歸郎姦又有百工院使李可殷因歸郎以通陳氏鏻命工作九龍帳國人歌曰誰謂九龍帳惟貯一歸郎鏻婢春鷰有色其子􅁇鵬蒸之鏻巳病􅁇鵬因陳氏以求春鷰鏻怏怏與之其次子􅁇韜怒謀殺􅁇鵬􅁇鵬懼與皇城使李倣圗之乃令壮士先殺李可殷率皇城衛士入鏻聞鼓噪聲走匿九龍帳中衛士刺之不死宫人不忍其苦爲絶之􅁇韜及陳后歸郞皆爲倣所殺鏻立十年見殺謚曰惠皇帝廟號太宗􅁇鵬鏻長子也既立更名昶改元通文晋天福二年昶遣使貢于京師髙祖遣散騎常侍盧損冊昶閩王拜其子􅁇恭臨海郡王損至閩昶稱疾不見令􅁇恭主之又遣中書舎人劉乙勞損于舘乙衣冠偉然騶童甚盛他日損遇乙于塗布衣芒屩而巳損使人誚之曰鳳閣舎人何逼仄之甚也乙羞媿以手掩面而走昶好巫妖人林興以巫見倖三年夏虹見宫中林興傳神言此宗室將爲亂之兆也乃命興帥壮士殺審知子延武延望及其子五人後興事敗亦被殺而昶愈惑亂立父婢春鷰爲淑妃後立以爲皇后昶募勇士爲宸衞都以自衞其賜予給賞獨厚於他軍控鶴都將連重遇拱宸都將朱文進皆以此怒重遇等夜帥衞士縦火焚南宫昶挾愛姬子弟黃門衞士斬􅀜而出宿于野次重遇迎延羲立之延羲令其子􅁇業率兵襲昶及之射殺數人昶知不免擲􅃓于地􅁇業執而殺之及其妻子皆死無遺􅀋延羲立謚昶曰康宗延羲審知少子也既立更名曦遣使朝貢于晋改元永隆鑄大鐡錢以一當十曦自昶世倔彊難制昶相王倓每抑折之曦立而倓已死命發塜戮尸倓面如生血流被體泉州刺史余延英甞矯命掠取良家子曦怒召下御史劾之延英進買宴錢千萬曦曰皇后土貢何在延英又獻皇后錢千萬乃得不劾曦甞嫁女朝士有不賀者笞之御史中丞劉賛坐不紏舉將加笞諌議大夫鄭元弼切諌乃止曦弟延政爲建州節度使封富沙王自曦立不叶數舉兵相攻曦由此惡其宗室多以事誅之諌議大夫黃峻舁櫬詣朝堂極諌曦怒貶峻漳州司戸叅軍校書郎陳光逸上書䟽曦過惡五十餘事曦命衛士鞭之百而不死以繩係頸掛于木乆而乃絶國計使陳匡範増筭啇之法以獻曦曰匡範人中之寳也巳而􅀊入不登其數乃借於民以足之匡範以憂死其後知其借於民也剖匡範棺㫁尸棄之水中曦性滛虐而妻李氏悍而酗酒賢妃尚氏有色而寵諸國皆僣后妃之號李仁遇曦甥也以色嬖之用以爲相曦甞爲牛飲羣臣侍酒有詐及私棄酒者輙殺之并殺其替者連重遇既殺昶常懼爲國人所討曦心疑之以語誚重遇等重遇等流涕自辯李氏妬尚妃之寵欲圗曦而立其子亞澄乃使人謂重遇等曰上心不平於二公柰何重遇等懼六年三月曦出逰醉歸重遇等遣壮士拉於馬上殺之諡曰景宗延政審知子也曦立爲滛虐延政􅁆貽書諌之曦怒遣杜建崇監其軍延政逐之曦乃舉兵攻延政爲延政所敗延政乃以建州建國稱殷改元天徳明年連重遇巳弑曦集閩羣臣告曰昔太祖武皇帝親冐矢石遂啓有閩及其子孫滛虐不道天厭王氏當求有徳以安此土乃掖朱文進陞殿率百官北面而臣之文進以重遇判六軍諸衞事王氏子弟在福州者無少長皆殺之以黃紹顔守泉州程贇守漳州許文縝守汀州用晋正朔稱開運元年泉州軍將劉從効詐其州人曰富沙王取福州矣吾屬世爲王氏臣安䏻交臂事賊乎州人共殺紹顔迎王􅁇勲爲刺史漳州聞之亦殺贇迎王􅁇成爲刺史皆王氏之諸子也文縝懼以汀州降于延政南唐聞亂命查文徽等帥師伐之遂下建陽延政遣統軍吳承祐徃紿福州曰唐兵助我討福州信之故連重遇殺朱文進禆将林仁翰殺連重遇謀迎延政都福州㑹南唐兵方急攻建州延政乃遣其子􅁇昌守福州而自拒唐兵福州軍將李仁逹謂其徒曰唐攻建州富沙王不䏻自保其􅀎有此土耶乃擒􅁇昌及吳承祐殺之欲自立懼衆不附以雪峯僧卓儼明示衆曰此非常人也被以衮冕率諸将吏北面而臣之已而又殺儼明乃自立送􅅃于南唐南唐以仁逹爲威武軍節度使文徽等下建州俘延政于金􅁜封延政鄱陽王閩主劉従効自領泉州李仁逹自領福州羈縻而已明年福州附于吳越南唐書卷之二十八
