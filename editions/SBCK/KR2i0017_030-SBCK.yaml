body:
  text: 州三十有五昇州都吳因唐爲昇州徐温建節陞建康軍南唐建都置江寧府􅃳州鎮海軍置丹陽宫㝷罷常州以江隂縣别置軍歙州宣州寜國軍江州奉化軍洪州鎮南軍顯徳五年東都入于周以州建南都撫州昭武軍以東南境别置建武軍􅀽州吉州䖍州百勝軍筠州保大十年置楊州淮南建東都以六合置雄州俄罷復来肄以天長置天長軍鄂池饒信四州顯徳五年入于周楚州順化軍顯徳五年入于周泗州靜淮軍顯徳五年入于周滁州顯徳五年入于周和州顯徳五年入于周光州顯徳五年入于周黄州顯徳五年入于周舒州顯德五年入于周蘄州顯徳五年入于周廬州保信軍顯徳五年入于周夀州清淮軍顯徳五年入于周海州顯徳五年入于周㤗州昇元元年置顯徳五年入于周濠州定逺軍顯德五年入于周建州忠義軍保大三年取陞永安軍節度俄改志義後降軍事汀州保大三年取劒州保大三年置漳州保大三年取改爲南州俄復舊泉州清源軍保大三年取清源軍節度使取之而復失者十有一州福州保大三年取羈縻而已四年入吳越潭州保大九年取十年失衡州保大九年取十年失灃州保大九年取十年失朗州保大九年取十年失岳州保大九年取十年失道州保大九年取十年失永州保大九年取十年失邵州保大九年取十年失全州保大九年取十年失辰州保大九年取十年失嗚呼乗窘以闘捷者勝之固易地來而民去者守之極難南唐之克楚始雖因其内䦧而終以任用匪人不􅀎振撫故劉言之徒得以復張嗣主􅀄欲罷桂陽之師解益陽之戍即授言以節􅃏與夫曹公之應二􅀽者可同論乎世裔譜第二十八嗚呼春秋之法疑以傳疑信以傳信可不慎乎先主以㓜稚轉徙民間故其所祖難於考究案徐鉉江南錄承建王恪後而五代史著南唐世家亦以恪係四親廟是亦傳疑之意歟作世裔譜臯陶爲士師期于無刑而洽其好生之徳於天下則盛徳之流光宜肇祀於百世矣故歷虞夏商世爲大理以官命族爲理氏至紂之時有理徴者爲翼肄中吳伯弗合於紂抱道而死其妻陳國契和氏與子利貞避亂於伊侯之􅇕食木子得生遂改理爲李氏利貞亦娶契和氏女生昌祖爲陳大夫家于苦縣生肜徳肜徳曽孫碩宗周康王時賜采邑於苦縣五世孫乾字元果爲周上御史大夫娶益夀氏女嬰敷生耳字伯陽一字􅆅周平王時爲太史著書九篇以明道徳至唐祖之以爲玄元皇帝其後有李宗字尊祖魏封於叚爲子木大夫守道不屈生同爲趙大将軍生兊爲趙相生躋趙陽安君二子曰雲曰恪恪生洪秦太子太􅀓生興族字育神秦将軍生曇字貴逺趙伯人侯入秦爲御史大夫葬柏人西生四子崇辨昭璣崇字伯祐隴西守南鄭公生二子長曰平燕次曰瑶字内徳南郡守狄道侯生信字有成大將軍隴西侯生超一名伉字仁髙漢大将軍漁陽太守生二子長曰元曠侍中次曰仲翔河東太守征西將軍討叛羗于素昌戰沒贈太尉葬隴西狄道東川因家焉生柏考隴西河都二郡太守生二子曰尚曰向尚成紀令因居成紀生廣前將軍與匈奴大小七十餘戰匈奴畏之二子長曰當戸生􅁜字少卿慷慨有大志爲騎都尉䧟匈奴次曰敢字㓜卿郎中令關内侯生禹字子通弟忠禹生丞公河南太守先字敬宗蜀郡北平太守生長宗字伯禮漁陽丞生君况字子期博士議郎太中大夫生本字上明郎中侍御史生次公字仲君巴郡太守西夷校尉弟怙次公生䡄字文逸魏臨淮太守司農卿弟潜䡄生隆字彦緒長安令積弩將軍生艾字世績晋驍騎將軍魏郡太守生雍字雋熈濟北東莞二郡太守生二子長曰倫次曰柔字徳逺北地太守武衛將軍安西亭侯生昶字仲堅凉太子侍講生暠字玄盛西凉武昭王興聖皇帝十子譚欹譲愔恂飜豫宏晀亮愔曽孫系飜孫三人曰丞曰茂曰沖曽孫曰成禮豫玄孫曰剛歆字士業西凉後生八子朂紹重耳弘之崇明崇産崇庸崇祐重耳字景順以國亡奔宋爲汝南太守後魏克豫州以地歸之拜恒農太守復爲宋將薛安都所䧟後魏安南將軍豫州刺史生獻祖諱熈字孟良後魏金門鎮將生懿祖諱天賜字徳真三子長曰􅁸頭長安侯生逹摩後魏羽林監太子洗馬長安縣伯其後無聞次曰太祖諱虎次乞豆虎西魏時賜姓大野氏與李弼等八人號八柱國周閔帝受魏禪虎已䘚乃追錄其功封唐國公虎生世祖諱昞襲封唐公昞生髙祖於長安體有三乳性寛仁襲封唐公隋文帝相周復髙祖姓李氏煬帝南逰天下盗􅁸髙祖兵二萬􅁸自太原敗宋老生于霍邑有衆二十萬遂入京城立代王侑爲皇帝遥尊煬帝爲太上皇改元義寜髙祖進封唐王五月戊午隋帝遜于位髙祖即位是爲大唐憲宗子建王恪先主之始祖也恪元和元年始封時緇青節度使李師古死其弟師道丐符節故詔恪爲鄆州大都督平廬軍緇青等節度大使長慶元年薨無子以宗室子爲嗣史亡其名其後有李超者或以爲建王後懿僖之時宗室世逺遂與異姓之臣雜而仕宦至或流落民間超之子志爲徐州判司志生榮號李道者榮生先主先主即位是爲南唐嗚呼春秋之時天子失政而諸侯擅之自平王始諸侯失政而大夫擅之自溴梁始盖􅁜夷之􅀔不可復振而覬覦之心無所饜足則亂臣賊子傚尤爲之者豈特春秋之時乎有唐失御方鎮之帥或浸長於健䘚或崛􅁸於羣盗而楊行宻以江淮二十八州輙建吳國則是春秋諸侯之罪人也行宻既死諸子庸懦而弑渥碁􅄎禄去楊氏則又溴梁大夫之罪人且楊氏建國未乆政在徐温而知訓知誥景通景遷景遂􅁇秉國政者三十餘年隆衍與􅄎位號空存而已故賈崇謂嗣主曰臣事先朝二十餘年韓熈載謂後主曰嚮化踰於四紀胡則曰我等世受主恩由是觀之先主雖以季年得位享國六年而擅命專制其来尚矣南唐書卷之三十終
