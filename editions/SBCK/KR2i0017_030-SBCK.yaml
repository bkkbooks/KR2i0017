front:
  text: 南唐書卷之三十建國譜第二十七嗚呼唐之盛時制天下爲十道統之以都督而遐荒四逹合爲一家中世多故始立方鎮大者連城十􅁆小者猶兼三四雖禀爵命而其􅀔以分僖昭之世則又甚焉盜酋強䘚相與爲亂而一旦破城殺帥者即以其鎮予之於是下竊土地上要封冊終以亡唐而大者稱帝小者稱王故自江以南昇􅃳常歙宣鄂池饒信江洪撫􅀽吉䖍一十五州自江以北楊楚泗和滁光黄舒蘄廬夀海濠一十三州合二十八州楊行宻􅌹據以建吳國南唐因之置㤗州筠州又取汀建漳泉四州復置劒州共三十五州之地號爲大國迨乎顯徳世宗出師而遂取淮南一十四州南唐君臣相顧猶懼其不免乃奉表稱貢趨走不暇削國降號何其速哉大抵僣服興亡不在於強梗庸懦而在乎世之治亂世苟治矣偏據之國雖大必亡逮徳下衰一夫倡亂遂爲敵國爲天下者可不戒哉可不戒哉作建國譜
  hash: sha256:3c57cbcc9666a8407d122df30b77181009f8cf5cd12664b49e129b70d4cf4883
