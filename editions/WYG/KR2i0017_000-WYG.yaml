  text: 欽定四庫全書史部九
  hash: sha256:7259abc35f9c57e48d61e8bd9fb410aa10fef2792f2e1139b2461e6b899d1fba
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2i0017_WYG_000-1a, image: WYG0464/WYG0464-0247a.png}
body:
  text: 南唐書載記𩔖提要臣等謹案南唐書三十卷宋馬令撰令宜興人陳振孫書録觧題載令自序稱其祖太博元康世家金陵多知南唐故事未及撰次令纂先志而成之實崇寧乙酉云云則令乃北宋末人此本不載令自序蓋偶佚也陸游重修南唐書首載元趙世延序稱馬元康胡恢等迭有所述今復罕見竟以為令祖元康所作殆當時未睹其本故𫝊聞致誤歟其書首為先主書一卷嗣主書三卷後主書一卷蓋用蜀志稱主之例次女憲𫝊一卷列后妃公主而附録列女二人次宗室𫝊一卷列楚王景遷等十二人而從度從信二人有録無書次義養𫝊一卷列徐温及其子六人附録二人次列𫝊四卷次儒者𫝊二卷次隠者𫝊一卷次義死𫝊二卷次㢘隅𫝊次苛政𫝊共一卷次誅死𫝊一卷次黨與𫝊二卷次歸𫝊𫝊二卷次方術𫝊一卷次談諧𫝊一卷皆優人也而附以迂儒彭利用次浮屠𫝊次妖賊𫝊共一卷次叛臣𫝊一卷次滅國𫝊二卷閩王氏楚馬氏也次建國譜次世系譜共一卷建國譜者地理志世系譜者叙李氏所自出也每序贊之首必以嗚呼發端其書法亦頗不苟作惟于詩話小説不能割愛遂不免蕪雜瑣碎自穢其書又如建國譜之叙地理僅有軍州而無縣則省不當省世系譜不過出自唐呉王恪于先主書首一句可畢而複述唐代世系逺溯臯陶尤繁不當繁亦乖史體均不及陸游重修之本然椎輪之始令亦有功故今從新舊唐書之例並収録焉乾隆四十五年五月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:1f791d5b07a71488a15bfe69c684a6cb476e69fcaf9c12bf9fd518e0ca598da0
