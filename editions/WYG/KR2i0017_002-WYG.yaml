  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2i0017_WYG_002-1a, image: WYG0464/WYG0464-0255a.png}
body:
  text: 南唐書卷二宋馬令撰嗣主書第二民靡有定誰其奠之弃師閩楚命委輿尸作嗣主書嗣主諱璟字伯玉初名景通烈祖元子也美容止器宇高邁性寛仁有文學甫十歳吟新竹詩云棲鳯枝梢猶軟弱化龍形狀已依稀人皆竒之起家為尚書郎吳讓皇見之曰吾諸子皆不及也累遷諸衞大將軍典治軍旅撫納將校烈祖出鎮金陵拜璟司徒平章事知内外諸軍事加諸道副都統烈祖受禪封吳王累遷太尉中書令諸道元帥録尚書事改封齊王既當儲副之地而固讓再三謙虚下士常若弗及烈祖殂授顧命猶讓諸弟辭益堅侍中徐玠以衮冕被之曰大行付殿下以神器之重殿下固守小節非所以遵先旨崇孝道也乃嗣位改元保大太常博士韓熈載上疏曰踰年改元古之制也事不師古弗可以訓時雖可其奏而制書已行遂改元册母宋氏為皇太后妃鍾氏為皇后弟景遂改封燕王弟景達改封鄂王弟景逷改封保寧王長子冀南昌王文武進位有差洪州宋齊丘入為左丞相江州周宗入為右丞相以元帥府掌書記馮延己為諫議大夫翰林學士夏四月戊申朔日有食之中書侍郎平章事李建勲罷為昭武軍節度使南漢劉晟弑其君玢晟自立為帝不書僣者玢之前已僣也五月司徒兼侍中徐玠卒秋七月燕王景遂改封齊王拜諸道兵馬大元帥大尉中書令鄂王景達改封燕王拜副元帥宣告中外以兄弟相傳之意以元子南昌王冀為江都尹東都留守書元子以見景遂之不得襲位也景遂固讓不許蕭儼上疏其畧曰夏商之後父子相傳不易之典惟仰循古道以裕後昆䟽奏不報冬十月庚戌有星孛于東方妖賊張遇賢聚衆十餘萬䧟䖍州諸縣諸縣舊史失名䖍州城守遇賢據白雲洞命洪州營屯都虞候嚴思禮通事舍人邊鎬討賊鎬思禮擒遇賢及賊副黄伯雄謀主僧曹景全斬於建康市以嚴思禮為海州刺史邊鎬為洪州屯營諸軍都虞候貶百勝軍節度使賈浩為監門衞將軍罪貶故書使池州安置以饒州刺史李翺為百勝軍節度使留後十有二月下令中外庶政並委齊王景遂㕘決文武百司唯樞宻副使魏岑查文徽得白事餘非召對不得見蕭儼上書極論曰元帥開府人猶驚駭况委之大政而羣臣不得時見臣恐中外隔絶姦人得志非陛下之利也書奏不報侍衞軍都虞候賈崇詣閤求見曰臣事先朝二十餘年每見延接踈逺未嘗壅隔羣下之情㒺有不達今陛下始即位所委任者何人而頓與羣臣謝絶深居邃處而欲聞民瘼猶惡隂而入乎隧道也臣老矣長不復奉顔色因涕泗嗚咽帝深為感動引與之坐賜食而出始以手札批喻儼等曰旻天不弔降此鞠凶越予小子常恐弗𩔖于厥徳用災于厥躬故退處㳟黙思底于道而壅隔之弊以為􅀸憂惟予小子實生厲階由是所下之令遂寢時宋齊丘周宗為左右丞相齊丘専執而宗純謹自守及上心旣悟齊丘乃言其非便帝曰公何不早誨我遂罷齊丘為浙西節度使齊丘黨與隆熾造作飛語以誣宗宗泣而上訴帝知之弗問此為明年宗出張本宋齊丘上表乞歸九華舊隠許之賜號九華先生封青陽公食青陽一縣二年春正月右丞相周宗罷除江西節度使門下侍郎平章事張居詠罷除浙西節度使二月辛夘日有白虹二三月左衞上將軍盧文進卒夏閩人朱文進連重遇弑其君曦重遇立文進使來告亂囚其使議伐閩以民疫釋閩使遣之夏四月秋七月鄂州王輿卒以神武統軍韋建為武清軍節度使備書官職者新命也書某州某人代者移鎮也壽州姚景卒以濠州劉崇俊代以楚州刺史劉彦貞為濠州觀察使九月庚午朔日有食之冬十有二月馮延己為翰林學士承旨水部貟外郎馮延魯為中書舍人延魯鋭於功名欲興建州之役乃贊中書舍人查文徽為江西安撫使翰林待詔臧循者嘗賈於閩具知山川險易為文徽陳進兵之計文徽因是請伐閩乃命邊鎬率洪州屯兵與文徽俱行遂入建陽王延政遣統軍使吳承祐以遊兵廵福州境紿曰唐助我討賊大軍至矣福州信之連重遇殺朱文進裨將林仁翰殺重遇函其首歸承祐延政以其子繼昌守福州親率衆以拒我師五郡之兵大集五郡福建江漳泉敵勢甚盛文徽等次于葢竹退復屯建陽啓求濟師三年春二月遣祖全恩何敬洙率萬人以應文徽與延政陣隔水全恩使建陽降將孟堅濳師出其後裨將武彦暉馬存貴以輕鋭繼之腹背夾擊延政大敗以餘兵城守閩人李仁達殺其君之子繼昌前年以福州降延政故以延政為君及其統軍吳承祐立雪峰僧卓儼眀為主儼眀無統御之畧仁達又殺之而自稱留後遣使來降即以仁達為威武軍節度使延政益不振建州之險要曰西巖延平津相繼而平夏四月秋七月庚辰星見而風雨八月甲子朔日有食之遂克建州執王延政歸于建康授羽林大將軍安化軍節度使封鄱陽王泉州刺史王繼勲漳州刺史王繼成汀州刺史許文縝皆請降因而鎮撫之諸將下建州兵無節制剽掠甚衆閩人失望帝以出師有功不録其過升建州為永安軍以祖全恩為節度使查文徽為撫州刺史何敬洙為楚州刺史偏將王建封先登功第一為信州刺史全恩未拜而卒以廬州王崇文鎮建州泉州裨將劉従効劫刺史王繼勲使之入朝従効自領州事於是王繼成許文縝皆至建康以繼勲為池州團練使繼成為和州刺史文縝為蘄州刺史即以劉從効為泉州刺史冬十月皇太后宋氏殂以延平津為劍州割建州之劍浦汀州之沙縣屬焉以建州禆將陳誨為劍州刺史以龍衞都虞候劉仁贍為武清軍節度使升泉州為清源軍以泉州刺史劉従効為節度使四年春正月陳覺諷齊王景遂言宋齊丘先朝布衣之舊委諸山林不允中外之望帝使景遂至青陽召之起拜太傅奉朝請而已以撫州李建勲為左僕射門下侍郎平章事中書侍郎馮延己拜平章事吏部尚書徐連為鎮海軍節度使二月壬戌朔日有食之命建州製的乳茶號曰京挺臈茶之貢自此始罷貢陽羡茶夏四月侍衞諸軍都虞候賈崇為奉化軍節度使留後葬元恭皇后于永陵六月壽州劉崇俊卒以濠州觀察使劉彦貞為清淮軍節度使侍衞諸軍都虞候郭全義出為濠州觀察使以劉崇俊子範為滁州刺史建州之役府庫中耗民不堪命故李仁達劉従効皆羈縻而已至是諸將請討之不許宋齊丘薦陳覺為福建路宣諭使説仁達入覲不従覺還至建安矯制發建汀撫信之師及防戍之兵掩其不意徑至城下時魏岑安撫漳泉聞覺起兵亦擅𤼵兵應覺帝大怒馮延己等為言兵業行不可止乃以王崇文為招討使王建封為副使益兵以會之馮延魯為南面監軍使魏岑為東面監軍使陳覺為諸軍監軍使仁達送欵於吳越吳越以兵三萬應之覺等爭功進退不相應延魯及吳越戰延魯敗績諸軍皆潰帝怒遣使者鎻覺延魯至金陵而馮延己為宰相宋齊丘亦預三公稍觧之貟外郎韓熈載諌曰臣觀覺等罪不容誅但齊丘延己内為陳請所以得全且擅興者不罪則疆塲生事䘮師者獲存則行陣觧體請行顯戮以重軍威帝曰齊丘延己有自咎之表無請赦之辭覺等五木被體一家狼藉永不録用與死何殊乃流覺蘄州流延魯舒州齊丘惡之貶熈載和州司馬冬十有二月壬戌契丹及晉師戰于中渡晉師敗績丙寅杜重威李守貞以王師降于契丹癸酉張彦澤引蕃騎䧟京師彦澤剽刼屠害甚衆晉帝奉表納璽於遼主以其失利勢故不書天子是嵗中原無主宻州刺史皇甫暉青州刺史王建及㳂淮諸戍皆來降方且疲兵東南不暇北顧馮延己延魯魏岑陳覺皆以姦囘得用人情不平旣流延魯及覺而延己為相岑亦居近宻於是御史中丞江文蔚䟽其罪曰二凶雖去未稱民情四罪盡除方明國典帝大怒貶文蔚江州司士㕘軍亦罷延己為太子少傅岑為太子洗馬漳州禆將林贊堯殺監軍周承義以叛討平之以泉州禆將董思安為漳州刺史思安辭以父名章命改漳州為南州副使劉從願殺思安自領州事南州復為漳州南唐書卷二
