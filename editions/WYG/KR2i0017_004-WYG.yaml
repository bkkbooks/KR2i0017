  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2i0017_WYG_004-1a, image: WYG0464/WYG0464-0265a.png}
body:
  text: 南唐書卷四宋馬令撰嗣主書第四十有四年春正月遣司空孫晟禮部侍郎王崇質奉表于周辭益卑服削去帝號天子猶不答留晟等弗遣鍾謨請歸取表盡獻江北之地天子許之遣崇質徳明還始賜江南書曰自有唐失御天歩多艱六紀于茲𤓰分鼎峙自為聲教各擅蒸黎交結四夷憑陵上國華風不競否運所鍾凡百有心孰不興憤朕擅一百州之富庶握三十萬之甲兵農戰交修士卒樂用茍不能恢復内地申畫邊疆便議班旋直同戲劇至於削去尊稱願輸臣節孫權事魏蕭詧奉周古也雖然今則不取但存帝號何爽嵗寒儻堅事大之心必不迫人于險徳明等歸盛稱周天子英武帝尤惡之宋齊丘陳覺等皆以割地無益而徳明賣國以圗利帝怒斬徳明二月遣元帥景達帥師應壽春陳覺為監軍使拜邊鎬為大將許文縝副之中書舍人韓熈載上疏請罷監軍使不報司徒致仕周宗卒三月江州柴克宏卒諸郡屯田相率起義以農器為兵襞帋為鎧處處保聚號曰甲軍周師苦之景達等趨壽州其將朱元李平唐進克復舒蘄泰三州夏大雨周師在楊滁和者皆却諸將請要其險隘擊之宋齊丘曰擊之怨深不若縱之以為徳誡諸將閉壁不得要戰周師皆集於壽州故諸州雖復而壽春之圍益固天子駐於渦口猶欲再幸楊州宰相范質以師老泣諫乃班師以李重進攻廬州向訓守楊州訓請棄楊州併力以攻壽春乃封府庫付主者遣淮南舊將按巡城中秋毫不犯而去淮人大悦皆負糗糧以送周師秋七月楊光滁和復歸于我冬十有一月周殺我行人孫晟十有五年春元帥景達命其將朱元等屯紫金山築甬道以餉壽州二月天子復來伐徙下蔡橋于渦口為鎮淮軍築二城以夾淮周師連破紫金山諸寨監軍陳覺乞罷朱元帝遣大將楊守忠代元且召之元憤怒叛降周諸軍皆潰許文縝邊鎬被擒景達以州兵奔還金陵三月丁未劉仁贍病且死其副孫羽等以壽州降仁贍病卒夏四月己巳天子班師亂兵焚楊州民皆徙江南秋七月冬十月天子復來伐圍濠州刺史郭廷謂降周泗州守将范再遇叛降周廷謂不書叛者力不支也泰州亦潰周師歩騎數萬水陸齊進軍士作檀來之歌聲聞數十里檀來者但來也北人語音十月二月天子駐于楚州城北十有六年春正月大赦改元交泰周師攻楚州守将張彦能鄭昭業城守益堅城壊彦能昭業戰死周人屠其城而戍之丁未海州潰壬辰靜海軍潰周人盡得海泰楊楚之地丁卯周人次楊州癸酉次𤓰州三月壬午朔次泰州丁亥復次楊州辛夘遂幸迎鑾以臨大江周自屠楚州貶書人其後駐幸皆書次至迎鑾復書幸不泯其實也時楊泰滁和壽濠泗光海等州已為周得迺遣陳覺奉表獻廬舒蘄黄畫江以為界天子許之賜書曰皇帝㳟問江南國主勞其良苦而已四年而後克亦已憊矣夏五月下令去帝號稱國主奉周正朔以交泰元年為顯徳五年鍾謨遇延魯至自京師國主復遣謨等奉表拜成且請𫝊位始降號稱國主𫝊位不曰𫝊乎某人者景遷為太弟時未定也天子優詔勞安之𫝊位之意遂止以謨為禮部侍郎延魯户部侍郎以行營應援使林仁肇為浙西節度使前廬州孫漢威為奉化軍節度使贈劉仁贍太師追封衞玉孫晟太傅追封魯國公劉彦貞中書令張彦能侍中其餘將士死國難者追贈有差秋泉州劉従効奉表貢于京師天子不納冬十月禮部侍郎常夢錫卒十有二月流陳覺于饒州流李徴古于洪州皆殺之放宋齊丘于青陽太弟景遷固請歸藩于是以長子冀為太子以景遷為洪州大都督封晉王齊王景達為撫州大都督信王景逷為百勝軍節度使昇元初括定民賦每正苗一斛别輸三斗於官廪授鹽二斤謂之鹽米至是淮甸鹽場皆入於周遂不支鹽而輸米如初以為定式顯徳六年春正月宋齊丘縊死于青陽夏晉王景遂卒秋七月鍾謨請鑄大錢以一當十文曰永通泉貨以信州刺史張巒為天徳軍使九月太子冀卒初丹陽古銘曰天子冀州人以冀應之未幾卒識者謂冀州趙地也明年皇朝受命之符爾次子従嘉封吳王居東宫鍾謨曰従嘉輕肆請立紀國公従善國主怒貶謨為國子司業立從嘉為太子天子使人謂國主曰吾與汝大義已定終慮後世不汝容可及吾世修城隍治要害為子孫計國主因營緝諸城謀遷都于洪州曰建康與敵境隔江而已又在下流敵兵若至閉門自守借使外諸侯能救國難即為劉裕陳霸先爾今吾徙豫章據上流而制根本上策也羣臣多不欲惟樞宻使唐鎬贊成之夏六月熒惑守心光芒相射癸巳天子崩周世宗秋七月升洪州為南昌建南都冬十月流鍾謨于饒州賜死貶張巒為宣州副使殺之十有二月罷鑄大錢明年周亡編年之法絶筆於周亡者清風發而羣隂伏理固然也雖然無所述而遂泯其實則何以著李氏之罪故名器服物慶賞刑威直書其僭將以正其罪爾建隆元年臣属于皇朝夏四月太子太傅馮延己卒是歳李重進使來乞師拒之遣馮延魯入貢以聞二年春以世子従嘉監國國主如南都所過慰勞守宰存問高年疾苦㑹齊王景達于廬山歴覽勝境與従臣譚宴浹日而去三月至南都以何洙為奉化軍節度使敬洙去敬字避皇朝諱豫章迫隘宫府營署皆不能容羣臣日夕思歸國主悔怒唐鎬慙懼發瘍卒六月國主殂于南都年四十有六在位十有九年秋七月國主之喪至自豫章羣臣請殯别宫世子手札不許辭甚哀切書世子手札未即位也見後主書乃殯于萬壽殿遣使入朝乞追復帝號太祖皇帝許之諡眀道崇徳文宣孝皇帝葬順陵廟號元宗先謚而後書葬者因其請號順文勢也徐鉉曰嗣主工筆札善騎射賓禮大臣敦睦九族毎聞臣民不獲其所者輒諮嗟傷憫形於顔色隨加救療居處御服節儉得中初立有經營四方之志邪臣阿諂職為厲階晚歳悔之已不及矣少有至性仍懐高世之量始出閤即命於廬山瀑布前構書齋為他日終焉之計及迫於紹襲遂捨為開先精舍常患民間侈靡第宅衣服咸為節制驅惰遊之人率歸農業及大漸之際羣鶴翔於空雙龍據殿屋遂奄然而化嗚呼甚哉守成之難也非特守之難而授之者尤難非授之難而知其可受者為難商有天下成湯作之太甲守之而中有不𩔖之憂嚮非阿衡之佐則求其思庸之復也難矣周有天下武王作之成王守之而中有流言之變嚮非周公征之則求其鳧鷖之雅也亦難矣以唐太宗之豐功大業一正天下建不拔之基而晉王之立殺父之臣失父之政卒至於大亂矧不及於太宗者乎元宗即位一十九年有經營四方之志約已慎刑勤政如一嚮非任用羣小屏棄忠良國用不殫於閩楚師旅不棄於淮甸則庶幾完成之君也志有之曰楊者易生之木也一人植之十人拔之無生楊矣以新造之唐而守之非道不幾乎朝蒔而夕揠其亡也不旋踵故周世宗以衰世之鋒一鼓而十四州之地掇如也悲夫南唐書卷四
