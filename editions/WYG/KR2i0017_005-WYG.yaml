body:
  text: 南唐書卷五宋馬令撰後主書第五嗚呼春秋之時君薨明年正月公即位自桓公始宣成而下未嘗革也昭公薨于乾侯定公于明年夏六月戊辰即位者其故何哉蓋非常之變起于不可測非常之禮行于不得已古之人觀㑹通以應世則處非常之變用非常之禮者皆禮經之所不得而考也義起於情而已矣且諸侯薨于路寢而昭公客死于乾侯者非常之變起于不測也嗣君釋冕反喪而定公即位于明年六月者非常之禮行于不得已也元宗殂于豫章後主留守建康必待喪還旣殯而後即位其偶合于定昭之事乎且聖人制禮立天下之大經為天下之大防也情偽之變無窮而禮之所載有常以有常之禮御無窮之變則亦隨其宜而已矣故禮不盡而義有餘則禮以義起義不足而禮有餘則義以禮達君子遭變亂而無曠於禮者在審其義爾大喪禮之大典禮經載之詳矣而曾子之所問者禮經有所不及也變禮之不測曾子問載之詳矣而國君薨于外世子立于内者曾子問有所不及也非趨時而合義其孰能與于此哉徳雖不競孰匪天亡日月俱照爝火銷光作後主書後主名煜字重光初名従嘉元宗第六子也少而聦慧善屬文工書畫初封安定郡公淮上兵起為神武軍都虞候㳂淮巡撫使累遷諸衞大將軍諸道副元帥封鄭王太子冀卒四兄皆早亡以次為嗣改王吳拜尚書令知政事建隆二年元宗南遷立煜為太子監國六月元宗殂於豫章七月喪還建康太子即位尊母鍾氏為太后太后父名太章故改號聖尊后妃周氏為國后封弟従善為韓王南都留守従益鄧王従謙宜春王従度昭平郡公従信文陽郡公以右僕射嚴續為司空依前平章事大赦境内文武進位有差罷諸路屯田使委所屬令佐與常賦俱征初南唐屯田置使專掌至此罷其使而屯田佃民絶公吏之撓八月鄂州王崇文卒以南郊巡檢使黄延謙為武清軍節度使留後冬十月以南都留守韓王従善為司徒兼侍中諸道兵馬副元帥以鄧王從益為司空南都留守下令諸司無職事官四品以下至九品日二貟待制於内殿泉州劉従効遣其子紹基來貢三年劉従効卒州人立其次子紹鎡為留後紹基未還統軍使陳洪進執紹鎡并其族送于金陵推立其副張漢思漢思老不任事洪進逐之自稱留後國主即以洪進為清源軍節度使以紹基為殿直軍都虞候紹鎡為監門衞中郎將句容尉張秘上言為理之要詞甚激切國主手批慰喻召為監察御史以神武統軍秋七月建州陳誨卒禮部尚書潘承祐卒以江州何洙為左武衞上將軍封芮國公以宣州朱業鎮江州以神武統軍林仁肇為寧國軍節度使乾徳元年夏左武衞上將軍何洙卒秋七月以兵部尚書游簡言知尚書省遷右僕射是歳南平髙繼沖歸于京師國除初金陵臺閣殿庭皆用鴟吻自乾徳後朝廷使至則去之使還復用二年春正月始用鐵錢以鐵錢使户部侍郎韓熈載為兵部侍郎勤政殿學士初烈祖將殂謂元宗曰徳昌宫泉布億萬緡以給軍用吾死善修鄰好北方有事不可失也及元宗即位兵屢起徳昌泉布既竭遂鑄唐國錢其文曰唐國通寳又鑄大唐通寳與唐國錢通用數年漸弊百姓盗鑄極為輕小保大末兵窘財乏鍾謨改鑄大錢以一當十文曰永通泉貨徑寸七分重十八銖字八分書背面匀好皆有周郭謨誅遂廢至是有鐵錢之議每十錢以鐵錢六雜銅錢四既而不用銅錢民間但以鐵錢貿易物價增涌民復盜鑄頗多芒刺不及官場圎淨雖重其法犯者益衆至末年銅錢一當鐵錢十禮部侍郎湯悦上言泉布屢變亂之招也且豪民富商不保其貲則日益思亂累數百言不報夏鄂州黄延謙卒以宣州林仁肇代九月封長子仲寓清源公次子仲宣宣城公冬十月仲宣卒追封岐王十有一月國后周氏殂三年春葬昭惠后于懿陵蜀孟昶俘于京師國除以江州朱業為神武統軍侍衞都軍使以虔州留後柴克貞為奉化軍節度使夏以司空平章事嚴續鎮潤州秋九月聖尊后鍾氏殂召南都留守鄧王従益還都以鄂州林仁肇為南都留守南昌尹葬光穆皇后于順陵朝廷許元宗追復帝號故鍾氏稱皇后四年夏五月以吉州刺史楊守忠為武清軍節度使留後秋一月神武統軍朱業卒十有二月潤州嚴續卒五年春命兩省侍郎諫議大夫給事中中書舍人集賢勤政殿學士分夕於光政殿宿直國主引與譚論或至夜分開寳元年夏江王景逷卒冬十有一月納后周氏昭惠之母弟也二年春以左僕射游簡言兼門下侍郎平章事夏簡言卒以禮部侍郎湯悦為門下侍郎平章事知制誥張洎上疏曰悦非經綸之才不宜處鈞衡之地國主以悦文學舊臣特加奨用乃罷洎職冬較獵于青龍山還憇大理寺親録囚徒原貸甚衆韓熈載奏獄訟有司之事囹圄之中非車駕所至請捐内帑錢三百萬充軍資庫用國主従之曰繩愆糾謬其熈載之謂乎天子詔國主諭南漢稱臣劉鋹怒執我行人龔慎儀三年中書侍郎韓熈載卒贈平章事命境内崇修佛寺又於禁中廣署僧尼精舍多聚徒衆國主與后頂僧伽帽衣袈裟誦佛經拜跪頓顙至為瘤贅由是建康城中僧徒迨至數千給廪米緡帛以供之四年春劉鋹俘于京師國除夏四月齊王景達卒遣弟韓王従善入朝留于京師授泰寧軍節度使國主表求従善還國不許自従善不還四時宴㑹皆罷登高賦文以見意曰原有鴒兮相従飛嗟嗟季兮不來歸常怏怏以國蹙為憂冬有商人上宻事請往江陵竊燒皇朝戰艦國主懼事泄不聽商人遁去五年春皇朝屯師漢陽鄂州楊守忠以聞人心大恟乃貶損制度下書稱教改中書門下省為左右内侍府尚書省為司㑹府御史臺為司憲府翰林為文館樞宻院為光政院降封韓王従善為南楚國公鄧王従益為江國公吉王従謙為鄂國公其餘官號多有改易殿庭始去鴟吻每遇皇朝使至國主衣紫袍備藩臣禮使退服御如初六年春皇朝使中書舍人盧多遜來聘國主願受封拜不許洪州林仁肇卒冬中書舍人潘佑薦衞尉卿李平判司農寺又薦平知司㑹府羣情紛紛以為朋黨佑上書極言時政凡七章不止有家國隂隂如日將暮之辭國主惡之乃収平下大理自縊妻子徙饒州次収佑佑自剄母及妻子徙虔州七年皇朝使閤門使梁逈來聘従容謂國主曰今歳國家有柴燎之禮當入助祭國主唯唯不答秋中書舍人李穆賫詔曰朕以仲冬有事于圓丘思與卿同閲犧牲國主辭以疾穆反命遂決進取九月王師自荆湖直趨池州池州主將戈彦棄城走遂克池州進軍當塗將軍張溫鄭彦華杜真相繼敗績下教去開寳年號公私牘籍稱甲戌歳江南自周世宗後不復用兵僅二十年老將已死主兵者皆新進少年以功名自負輒抗王師聞兵興踊躍言利害者日有十數及遇輟敗北中外奪氣戒嚴城守國主遣徐鉉周惟簡奉表乞緩師不答王師進屯建業城南十里時雖下池州及姑熟餘郡皆未奉命糧道阻隔樊若水請於采石繫浮橋以利轉輓每歳大江春夏暴漲謂之黄花水及王師至水皆退小故識者知其有天命焉吳越圍常州軍使余成禮刧刺史禹萬誠以降吳越進圍京口議者以京口要害之地當得良將守之乃拜親吏劉澄鎮海軍節度使留後以凌波軍都虞候盧絳為援澄已懐嚮背因說絳還金陵而自率將吏降越袁州萍鄉制置使劉茂忠破潭師於境内拜茂忠袁州刺史八年春閲民為師徒昇元初均量民田以定科賦自二緡以上出一卒號義師中有别籍分居又出一卒號新擬生軍民有新置物産者亦出一卒號新擬軍又於客户内有三丁者抽一卒謂之圍軍後改為拔山軍使物力户為帥以統之保大中許郡縣村社競渡每歳端午官給綵段俾兩兩較其遲速勝者加以銀椀謂之打標舟子皆籍其名至是盡蒐為卒謂之凌波軍又率民間傭奴贅婿謂之義勇軍又募豪民能自備緡帛兵器招集無賴亾命謂之自在軍又括百姓自老弱外能被堅執鋭者謂之排門軍并屯田白甲之𩔖凡一十三等皆使扞敵守把夏誅神衞統軍諸軍都虞候皇甫繼勲秋洪州節度使朱令贇將兵一十五萬屯潯陽湖口與諸將議曰令若前進而王師反據我後則上江阻隔退乏糧道亟為虜矣乃以書招南郡留守劉克貞代鎮湖口克貞以病留令贇亦未進國主累促之令贇以長筏大艦帥水陸諸軍至虎蹲洲與王師遇舟筏俱焚令贇死餘衆皆潰金陵受圍經歳城中斗米者相救藉自潤州降後不聞外信或云令贇已敗國主猶意其不實冬百姓疫死士卒乏食訹云大軍決以十有一月乙未破城國主議遣其子清源公仲㝢出通降欵左右以謂堅壘如此天象無變豈可計日取降是日城果陷宫中圗籍萬卷尤多鍾王墨跡國主嘗謂所幸寳儀黄氏曰此皆累世保惜城若不守爾可焚之無使散逸及城䧟文籍盡煬光政使陳喬曰吾當大政使國家致此非死無以謝乃自縊死諸將戰沒者猶數十人昇元寺閣崇構因山為基高可十丈平旦閣影半江梁時為瓦棺閣至南唐民俗猶因其名士大夫暨豪民富商之家美女少婦避難於其上迨數百人越兵舉火焚之哭聲動天一旦而燼大將曹彬整軍成列至其宫門門開國主跪拜納降彬答拜為之盡禮先是宫中預積薪煜誓言社稷失守當携血屬赴火既降無國主之號故書名旣見彬彬諭以歸朝俸禄有限費用日廣當厚自齎装一歸有司之籍即無及矣遣煜入治装禆將梁逈田欽祚力爭以謂茍有不虞咎將誰執彬笑而不答逈等固諫彬曰彼能出降安能死乎翌日治舟彬遣健卒五百人為津致輜重登舟一卒負籠下道旋彬立斬之負擔者㒺敢蹉跌煜以藏中黄金分遺近臣辦装張佖得金二百兩詣彬自陳不受請奏其事彬以金輸官而不以聞煜舉族冐雨乗舟百司官屬僅千艘煜渡中江望石城泣下自賦詩云江南江北舊家郷三十年來夢一場吳苑宫闈今冷落廣陵臺殿已荒凉雲籠逺岫愁千片雨打歸舟淚萬行兄弟四人三百口不堪閑坐細思量至汴口登普光寺擎拳讚念久之散施緡帛甚衆九年春俘至京師封遺命侯授左千牛衞上將軍太宗皇帝登極改封隴西公太平興國三年公病書公者皇朝所封也命翰林醫官視疾中使慰諭者數四翌日薨在偽位十有五年年四十二追封吳王以王禮葬洛京之北邙山江南人聞之巷哭設齋王著雜説百篇時人以為可繼典論又妙於音律舊曲有念家山王親演為念家山破其聲焦殺而其名不祥乃敗徴也復書王者皇朝追封也徐鉉曰嗣主諸子皆孝而後主特甚敦睦親族亦無不至唯以好生富民為務常欲羣臣和於朝不欲聞人過章疏有糾謫稍訐者皆寢不報酷好古道而國削勢弱羣臣多守常充位不克如意歎曰天卞無周公仲尼吾道不可行也已刑法太寛亦無過此及大兵之際上下感恩故人無異志威令不素著故莫盡死力葢亦天授大宋非人謀所及也嗚呼隋文帝初輔政于周内有五王之難外罹尉遲迴司馬消難王謙之亂方是時指鹿逐兎未知適従武夫悍將誰無覬覦蕭巋承武皇享國之長有席卷山南之勢而區區敬慎不敢連衡迴䇿者信其臣栁荘之言預知隋公之必興故也矧迺蕞爾江南獲覩真人之作而不為之退聽其罪當如何哉李氏有國肇於天福盛於開運削於顯德亡於開寳豈非有幸於亂世而不容於治世歟以周世宗之時削國降號稽首稱藩其勢固已蹙矣及屬皇朝普天之下莫不翹首太平而猶竊土賊民十有六年外示柔服内懐僭偽豈非所謂逆命者哉及其計窮勢迫身為亡虜猶有故國之思何大愚之不靈也若此後主樂府詞云故國夢初歸覺來雙淚垂又云小園昨夜又西風故國不堪翹首月明中皆思故國者也南唐書卷五
