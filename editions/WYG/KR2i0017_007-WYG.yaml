  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2i0017_WYG_007-1a, image: WYG0464/WYG0464-0282a.png}
body:
  text: 南唐書卷七宋馬令撰宗室𫝊第二嗚呼性有善惡法有賞刑弗可概論也漢鑒秦之弊而宗戚子弟茅土過制魏規漢之失而黄初之後宗戚虚封襲漢則善惡兼容沿魏則賢否并棄賞刑惡得而辨哉唐有天下子弟得預外任格則庸否則威故入為尚書九卿出為都督刺史間有人焉南唐宗室委任尤重豈沿唐之舊歟抑亦董之得其道歟葢天下分裂君無世臣臣無定主委任宗室猶愈於他人故也作宗室𫝊楚王景遷烈祖第二子元宗母弟也幼警悟讀書一覽輒不忘及長美姿儀風度和雅尚吳公主為駙馬都尉而服用素儉不事華侈烈祖愛其純謹大和三年烈祖出鎮金陵以元宗為司徒平章事居中輔政宋齊丘每忌元宗欲自結於景遷乃薦陳覺為景遷教授以賈其聲聞齊丘㕘決時政多為不法輒歸過於元宗而盛稱景遷之美烈祖於是召元宗至金陵授鎮海軍節度副使即以景遷為太保平章事代秉國政有奪嫡之漸此齊丘謀也所以然者以景遷幼懦他日得國授之已為元老易於窺竊烈祖覺之遂罷齊丘以為已副景遷猶摠大政天祚二年景遷病請以兄弟自代乃拜其弟景遂為門下侍郎㕘政事景遷卒葬飲馬池之陽禪代之後諸子例封王爵保大初元宗改封諸弟追贈景遷楚王命江文蔚為碑以表其墓以其蚤死無子故後主亡國詩云兄弟四人三百口謂元宗景遂景達景逷也景遷不與焉晉王景遂烈祖第三子元宗母弟也制行雅循有君子之風天祚二年景遷病不能輔政即以景遂為門下侍郎㕘政事父子四人迭輔吳政政在李氏也烈祖受禪封壽王讓皇殂於丹陽景遂往督喪事望柩哀慟觀者悦之元宗即位改王燕俄以景遂代儲副固讓不許遂立為太弟景遂因易字曰退身以示不處之志㕘摠政事時有獻替間與朝士官屬飲宴賦詩嘗以玉杯行酒座客𫝊翫以為寳贊善張易乘醉擲之曰貴寳輕士殿下得無累乎座皆失色而景遂歛容謝之由是待易愈謹易遷工部侍郎泛海使契丹景遂手疏曰朝臣如張易者宜置諸左右不宜使之泛不測之淵投足逺夷元宗答以此行非易不可遂行顯徳五年累表讓儲副乞守舊封授江西道兵馬大元帥封晉王適當危疑啓求大臣以自副命兵部侍郎李徴古副之以徴古傲很專恣陵忽過甚景遂欲斬徴古而自拘於有司寮吏諌止一日暴疾嚮空顧揖退謂左右曰上帝命我代許旌陽遂䘚年三十七復贈太弟諡文成齊王景達字子通烈祖第四子元宗之母弟也順義四年旱七月既望雩祀得雨景達以是日生因小字雨師成童爽悟與羣兒異烈祖器之初封信王元宗即位改封鄂王景遷侍中進封燕王及景遂為太弟以景達為元帥中書令徙王齊為理嚴察人多憚之好神仙修鍊之事記室徐鍇獻述仙賦以諷遂絶所好嘗從元宗遊苑中乘小舟而覆左右惶駭景達入水負元宗出性非善水而能蹈之者忠誠之至也元宗多與宗戚近臣曲宴如馮延己陳覺魏岑之徒喧笑無度景達每呵之嘗與延己會飲延己欲以詭佞賣恩佯醉撫景達背曰爾不得忘我景達大怒入白元宗請致之死元宗慰諭而已出謂所親曰吾悔不先斬以聞太子讚善張易從容謂景達曰羣小構扇其禍不細大王力未能去自宜隠忍景達由是罕預曲宴每被召輒辭以疾景達雖剛毅而不歷軍容及為元帥帥師淮上軍政皆出於陳覺署紙尾而已朱元叛諸軍大敗景達與覺遁還金陵上印綬尋拜浙西節度使景達復以用兵之地固辭改撫州元帥自淮南敗績日以酣飲為務及至鎮委任寮属怠於視事後主即位就加太師尚書令奉以叔父之禮開寳四年䘚於鎮年四十七追贈太弟葬廬山諡孝昭江王景逷字宣逺烈祖第五子也烈祖初受禪以十二月二日為仁壽節南唐誕節唯此一見因事而書以示其僣景逷以是日生故小字仁壽烈祖嬖其母种氏而景逷為季由是愛遇之意過於諸子及种氏得罪景逷尚幼元恭皇后鞠之如己出烈祖以其母嘗有改立之請故封爵不加以逺嫌也至元宗即位始封保寧王改封信王出為䖍州節度使簡易節儉䖍人安之時諸王大臣皆喜浮屠而獨景逷非毁佛書專以六經名教為事贑縣令䘚成喪之日其尉郡繼良張樂飲酒景逷立秦黜之書記孫峴每能諫其過失景逷為之加禮及峴䘚厚給其家時人以此美之後主即位徙王江就拜侍中開寳元年䘚年三十二贈中書令諡昭順太子冀元宗元子初封東平郡公元宗即位徙王南昌避儲副之位留守東都保大三年立景遂為太弟以冀為燕王依前東都留守八年移鎮潤州周師至廣陵越人寇常州元宗以冀尚少不習軍事召還都冀會將吏問之禆將趙鐸曰大王為元帥之重衆心所恃一郤足則部下搖矣冀乃奏多壘之秋義無就逸乞効用以死報國元宗許之乃命柴克宏將兵為援以救常州克宏未至樞宻副使李徴古遣使追而代之冀奏克宏可用果敗越師擒獲甚衆先是有吳以來戰獲將士皆不殺至是冀盡殺之越人不敢西嚮者二十年顯徳五年始還儲副之地㕘決國事涖下有法未幾䘚有司以其靖難之功諡宣武句容尉張洎兾所薦進士也上書論之以太子之徳承順孝愛而已不當摽顯武功以垂後世非防微杜漸之旨也其言甚切元宗善之下其議有司改諡文獻洎由是知名改上元尉遷監察御史兾之門人若是亦可想見其為人也慶王茂字子松元宗第二子甫數歳容貌秀澈有成人風封安樂公拜侍衞諸軍都虞侯時有木平和尚者言人禍福壽夭輒驗元宗以茂見之曰其餘不足問所欲知者壽數爾木平為書九十乙字後至十九嵗卒追贈慶王葬建業城南五里命韓熈載碑以表之韓王從善元宗第七子後主之母弟也初封紀國公後主即位進王韓器識沉邃尤喜武畧開寳中江南迫蹙後主憂之從善自請朝京師以紓國難乃奉表朝貢太祖悦之留授泰寧軍節度使錫賚頗優因命從善貽書後主督之入覲從善曰臣兄以庸菲之才嗣守宗廟陛下垂覆載之恩許其入朝實千載一遇敢不奉詔從善遂為書喻以上意而後主不從王師之討兆於此也金陵平從善病卒初從善與鍾謨親狎嘗有改立之請謨亦由此得罪元宗殂於豫章獨從善扈從因懐非望就徐遊求遺詔遊正色不與至建業具其事以聞後主不問待之愈厚從善奉使不返其妻泣詣後主後主無以為辭每聞其至輒避之妻憂思䘚國人哀之鄧王從益元宗第八子也警敏有文初封舒公進王鄧開寳初出鎮宣州後主率近臣餞綺霞閣自為詩序以送之其畧云秋山滴翠暮壑澄空愛公此行暢乎遐覽其詩有咫尺煙江幾多地不須懐抱重凄凄之句君臣􅆳賦可為盛事徐鉉詩云禁裏花光似水清林煙池影共離情暫移黄閤只三載却望紫垣都數程滿坐清風天子送隨車甘雨郡人迎綺霞閣上詩題在從此還應有頌聲最為警策五年南唐貶損制度従益去王爵封江國公後事亡吉王從謙元宗第九子後主母弟也風采峭整喜為律詩動有規誨後主燕閒嘗與侍臣弈従謙甫數歳侍側後主命賦觀碁詩曰竹林二君子盡日竟沉吟相對終無語爭先各有心恃强斯有失守分固無侵若筭機籌處滄滄海未深後主賞歎久之始封鄂公俄王宜春徙封吉開寳五年損制度降封鄂國公後事亡從慶𫝊亡從信傳亡宣城公仲宣後主子也小字瑞保三歳讀孝經若成誦然聞奏樂輒審音調宫中燕侍頗合禮度出見士大夫改容顧揖如成人禮乾徳二年卒年四歳始封宣城公追贈岐王諡懐獻母昭惠先病聞仲宣死哀苦增劇遂至於殂故後主挽辭曰珠碎眼前珍花凋世外春未銷心裏恨又失掌中身玉笥猶殘藥香奩已染塵前哀將後感無淚可沾巾又艶質同芳樹浮危道畧同正悲春落實又苦雨傷叢穠麗今何在飄零事已空沉沉無問處千載謝東風皆并其母子悼之初仲宣卒後主哀甚然恐重傷昭惠常黙坐飲泣而已因為詩以冩志云永念難消釋孤懐痛自嗟雨深秋寂寞愁引病增加咽絶風前思昏矇眼上花空王應念我窮子正迷家吟詠數四左右為之泣下嗚呼春秋魯君未踰年而卒者書子卒以其不全乎君也先君未葬而嗣君䘚者書子某䘚猶云父前子名也皆不作諡太子兾有諡固非春秋之法至於仲宣幼殤則又甚矣東晉瑯琊世子卒而賀循以為不可作諡君子謂其知禮南唐書卷七
