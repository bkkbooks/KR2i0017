  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2i0017_WYG_009-1a, image: WYG0464/WYG0464-0293a.png}
body:
  text: 南唐書卷九宋馬令撰列傳第四周本舒州宿松人漢南郡太守瑜之後祠廟隴畝皆在子孫守故土者猶數十户本少孤貧嘗在田里獨格猛虎唐末大亂投楊行宻軍中以勇敢聞常先登深入䝉犯矢石身無完肌及歸營自燒鐵烙其創飲㗖言笑自若軍猛将皆服之累遷淮南馬歩軍使天祐五年楊氏始得江西撫州刺史危全諷率諸郡兵十萬來爭其地屯于象牙潭楚人取高安為之援江南守將劉威告急判官嚴可求薦本可用時本従軍圍蘇州不克恥之稱疾不出可求即卧内强起之本曰蘇州之役非彼强我弱也葢上將權輕下皆専命故爾今必見用願無任偏禆可求為言楊氏許之得選兵七千使救髙安本曰楚人非欲取高安也為全諷聲援爾若先敗全諷楚人必走乃疾趨象牙潭劉威要之宴犒不留或曰賊勢甚盛宜審觀形勝計定而後進何其遽也本曰賊有十倍之衆使吾軍知之必將奪氣須乘其鋭而用之既至指授諸將戮力急攻大破其軍擒全諷諸郡之兵皆潰楚人果遁吉州刺史彭玕信州刺史危仔昌棄城走於是江西之地始定以本為信州刺史越将陳璋據衢州歸欵越圍之本受命以兵迎璋既至越人解圍陣於城下璋以其衆來奔禆将吕師道曰敵去我咫尺而陣不動是輕我也必擊之本曰吾受命迎陳使君陳君今在此吾事訖矣何為復戰且彼近而不動必有以待我也擊可勝乎待其先動擊未晚也璋亦以為然乃還越人躡之至中道宿半夜佯驚棄輜重走先設伏於道左越人急追至伏所前後夾擊盡殱其衆越人累至皆敗之唐莊宗入洛陽吳遣司農卿盧蘋使于洛陽荘宗問吳之名將存否而本預焉由是召入為雄武統軍出為壽州節度使移鎮廬州拜太尉中書令封西平王本不知書而愛重儒士賓禮寮屬不撓其權吏民愛之性純樸伎藝無能者唯軍旅之事則如夙習烈祖將受禪徐玠周宗等以本及李徳誠皆位望隆重故諷之以為推戴之首本以昬耄仍不知時變皆少子祚左右其事時吳宗室臨川王濛廢處瀝陽聞將授終乃殺監守者與親信二騎趨詣本本将見之祚固執不可本怒曰我家郎君也何不使我一見祚閉中門拒之濛被殺吳室遂移本隨衆至建康勸進由是愧恨數月而卒子鄴有戰功亦至廬州節度使李徳誠廣陵人也少事宣州趙鍠為給使吳攻宣州鍠敗徳誠及韓球猶隨左右城中推立禆將周進思為主鍠使徳誠往諭進思以城降徳誠暴得熱疾委頓不能受命乃使球往進思斬球擲其首於外徳誠是夕即愈鍠死事吳武王常従征討累遷淮南馬歩軍使擒安仁義於潤州以功拜潤州留後歴撫虔洪三鎮加中書令封南平王烈祖建齊國徳誠率諸將勸進乃其子建勲之謀也昇元中徳誠自洪州入朝烈祖以徳誠前代功臣父子皆㕘佐命優禮之聞其來覲遣内夫人迎於道六官之職因事以書其僣百寮候於門朝堂設幄為具每有大議遣執政就第諮問信王景達先娶徳誠女烈祖復姓有司以同姓非禮制曰南平王國之元老婚不可離信王妃可氏南平楊氏將帥徳誠最無大功特以姻婭顯達而名位壽考諸将莫及有子二十人建勲為相而建封為將相無阿黨將死國事君子善之其餘皆任右職建勲别𫝊王輿少與兄綰俱事吳武王輿始為小校従周本伐危全諷將戰本親臨賊水柵分命諸將指山頭一小營謂輿曰往攻彼以撓賊輿唯唯不行本曰爾憚往耶輿曰公必若以輿為可使願得此柵攻之往彼何為本大喜曰亦知此為賊要害耶乃命之輿乘輕舟先進破其前鋒因排柵而入諸軍乘之遂擒全諷累遷諸軍都虞候讓皇之世禄去公室掌禁兵者尤難其人烈祖以輿為控鶴都虞候持重有法出為光州刺史先是輿兄子拯為海州副史判入北方以為刺史聞輿在光州間遣親信通書幣輿執之以聞因求罷郡復為控鶴都虞候遷左金吾大將軍除浙西節度使従讓皇至潤州移鎮鄂州監軍甄庭堅與輿不協或告庭堅交通境外烈祖使中使繫庭堅下大理輿先知之宻見庭堅曰可乘輕舟自歸闕庭無與中使遇庭堅懼従其計遂獲免由是寮屬稱其長者輿少時從軍圍潤州為大弩射中右耳自左耳出旁一人中之猶死輿卧病百許日及愈耳亦不聾又嘗攻頴州夜夢道士告之曰旦有流星下墜能避當富貴及旦輿仗劍倚柵木驅士攻城城中飛大石正中其柵及輿鎧甲之半皆糜碎而輿無傷輿曰所夢流星是也由此自負終為使相卒年七十四兄綰為虔州節度使先卒李章廬江人従吳武王為騎將與朱瑾相悦瑾殺徐知訓自剄義祖入誅瑾黨章與同事六人當斬五人已斬次至章厲聲曰四郊多壘而斬壯士耶馬仁裕監斬壮其言聞於烈祖釋之𨽻洪州為軍校累遷雄武軍都虞候左街使章雖老而心尚壮善撫士卒勤於職務出為虔州節度使為理嚴重禁戢左右賓禮寮屬㑹周本卒移鎮廬州加中書令卒年九十王安廬江人也少投吳武王為親兵武王嘗升高塜望敵安捧匜器侍側左右皆注目前視陣旁有執槊者疾走徑趨王所左右驚惕失措安置匜器於地取弓射之一發而殪徐内弓弢中復捧器如初顔色不變武王竒之曰汝有器度當至富貴因加奬拔累遷袁州刺史歴典數郡皆以沉黙寛厚為理事烈祖為神武統軍代李章為䖍州節度使卒年七十三韋建少居吳武王軍中嘗従征討以膂力聞後𨽻虔州王綰為禆將郡境曠逺旁接谿洞羣盜充斥建率勵勇士所至克獲百姓賴之累遷諸軍都虞候為左衞使出為袁州刺史建不知書而性淳厚清靜自處無所侵撓郡中大治數年入為統軍以劉仁贍代之仁贍敏悟親綜簿書時有釐革郡政益治而百姓猶思建焉歷任皆如是至老不衰出為鄂州節度使䘚年八十髙審思少事楊行宻以驍勇聞於軍中劉信平䖍州審思為禆將屢立戰功審思為人重厚寡言烈祖竒之常使綜領親兵拜壽州節度使增修城隍守備甚嚴或謂之曰以公威畧守此堅城何懼而過為畏懦也審思曰兵機多變不可不懼過為之防上䇿也顯徳之役壽州城隍最堅亦審思之遺績爾後事舊史亡南唐書卷九
