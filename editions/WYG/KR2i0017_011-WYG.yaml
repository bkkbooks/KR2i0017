  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2i0017_WYG_011-1a, image: WYG0464/WYG0464-0301a.png}
body:
  text: 南唐書卷十一宋馬令撰列傳第六刁彦能上蔡人也父禮遇亂徙居宣城彦能少孤貧事母以孝聞初𨽻節度使王茂章為親兵茂章叛入越彦能當從使家人扶其母俟於路彦能至抱母泣告茂章曰老母在此不能従公茂章許之乃馳入宣州城中已亂彦能登城以劍招之紿曰我従王府來爾輩無動大軍且至矣衆信之稍定義祖聞而嘉之以為軍事校使属徐知訓知訓恣横彦能每以書切諌雖不見納亦常寵遇牙將馬謙帥衆刧吳主登門欲誅知訓朱瑾麾兵却之彦能手劍斬謙知訓忌烈祖每欲加害嘗召烈祖飲伏劍士於室中彦能行酒以手搯烈祖而推之烈祖悟起去又嘗従知訓㑹烈祖于山光寺是日知訓大沉酗決欲害烈祖徐知諫以謀告烈祖烈祖乃奔知訓授彦能劍使追殺之及於中塗彦能舉劍揚袖以示烈祖還紿以弗及既而朱瑾殺知訓義祖稍知其罪惡將吏多被譴責見彦能諫書善之復使事知諫於潤州烈祖受禪召入禁衞叙其舊恩遷天威軍都虞候左衞使元宗即位出為饒信二州刺史建州留後撫州節度使彦能喜讀書委任文吏郡政修理亦好篇詠嘗與李建勲贈答建勲奏之元宗笑曰吾不知彦能乃西班學士也性修嚴所居雖𫝊舍一日必葺周宗何敬洙皆故人也毎飲酒常蓬首裸袒彦能在座則皆儼然卒年六十有八周宗字君太秣陵人也常給使烈祖左右署為牙吏多使喻旨四方敏於事任恩寵日洽義祖卒于金陵知詢謂宗曰僕射望高履危無西渡宗堅請知詢手札示信遽得故茗帖書曰不必奔赴既而徐氏諸子果以不奔赴讓烈祖烈祖因出所書茗紙示之知詢靦顔而已及烈祖鎮金陵宗為都押衙烈祖位望已重常履嫌疑因理白􅧋歎曰國家安而吾老矣宗竊窺其意請如廣陵告宋齊丘以禪代之事齊丘手䟽天時人事未可請斬宗以滅口烈祖懼欲斬宗而行軍司馬徐玠固爭得免黜于池州數歳復召如初既贊禪代累遷樞宻使宗亦淳謹自守而已初俞文正為烈祖幕賓而宗及馬仁裕皆従給使至是宗出鎮江州文正猶為九江巡官輒問宗曰馬押衙何在宗知其涼德笑曰馬相公出鎮浙西久矣文正嘗預公宴俛首咋曰下官飲量棊局令公素知之座皆愕然而宗不之罪其寛厚𩔖如此連歴將相奉法循理然貲産巨億儉嗇愈甚論者鄙之留守東都以老病乞骸骨乃以司徒致仕周兵初起而宗䘚宋齊丘撫棺哭曰君太能黠來亦得時去亦得時元宗聞之不平宗娶繼室生二女皆國色繼為國后侈靡之盛冠于當時馬仁裕字徳寛北平王燧之後遇亂徙居彭城世為將仁裕母方娠夢人謂曰北平來歸及生有紫氣滿庭數嵗學兵書若成誦然初同周宗給使烈祖左右小心敏幹署為右職烈祖移鎮潤州仁裕監蒜山渡首聞朱瑾之亂馳白烈祖即日以州兵渡江定亂烈祖得政基於此也以功拜左領軍將軍烈祖以女妻之是為興國公主出為楚州刺史入為左金吾大將軍烈祖受禪遷潤州節度使明年移鎮廬州為理寛簡吏民便之烈祖左右小臣貴達者唯仁裕與周宗為親信周宗後富而仁裕常貧宗力贊禪代之事仁裕多就外任無所闗預時人稱其長者卒年三十九子文義别𫝊嗚呼貴賤時也上下分也君子知時之無止知分之無常則貴賤上下吾何預焉况生亂世事偏國易牛衣以晝錦起徒歩為朱輪達者觀之特戲事爾文正之抗周宗豈足以識此哉何敬洙幼為吳將李簡厮養簡性殘忍左右過􅄽鮮獲全活敬洙暮與羣兒戲庭下有蒼頭取簡所愛端硯戲諸僮曰誰敢破此羣僮聳肩吐舌相視敬洙厲色曰死生有命乃一擲破之翌日簡責破硯之由敬洙自陳因壮其果敢捨之勿殺簡鎮鄂州令相術董紹顔徧閲諸子紹顔曰諸郎皆善然禄壽無及公者時敬洙侍側指敬洙曰此竒相也可與公齊簡由是益竒之視如己子及長用為軍校敬洙軀貌短陋而趫捷有力簡卒烈祖以為金陵禆將累遷天威軍都虞候建州之役為應援使初至以為僻陋山郡不當勞師辭氣甚憤查文徽開喻之勢不可止乃與邊鎬恊心戮力破西巖延平軍威大振遂下建州敬洙應受上賞王建封爭之以為已功敬洙於是推建封功第一除敬洙楚州刺史嘗従數人親出里巷察人疾苦吏之苛刻無不知之每坐􅆹事與賔客譚宴民有白事者隨其所言親加剖析無不厭服㑹連歳出師楚州當供億之地民不知勞亦敬洙為之節制也及移鎮鄂州稍自矜驕周師伐淮南元宗使敬洙移郭外居人入城為備敬沬不從乃背城除地為戰場曰職當効死於此安能閉門自困也元宗善之未幾召還都年老有足疾後主以其勲舊優禮之拜上將軍奉以上公之秩列門㦸卒年七十七柴克宏吳功臣再用之子疏爽任義不拘小行以父廕為郎將累遷龍武軍都虞候常與賔客博奕以聲酒為務雖職當偏將而未嘗言兵時皆以為非才故久不遷亦不屑意淮甸兵起越人冦常州以克宏為撫州刺史克宏上書乞従軍効用元宗善之使帥師救常州時精兵皆在江北克宏將老弱數千介胄朽蠧入白樞宻副使李徴古曰今以羸兵赴難器甲當得堅利者此色何用徴古素輕其為人因慢罵遣之衆皆憤怒而克宏怡然進及京口徴古使召還以朱業代將克宏不従至常州徴古又使召之克宏曰吾刻日破敵爾來召我必姦人也命斬之使者告以李樞宻之命克宏曰李樞宻親來軍容在我况其使乎遂斬以狥常州有隋末陳果仁祠果仁見夢於克宏曰吾與隂兵助爾及戰有黑牛二頭衝突越兵克宏繼之大敗越人俘馘甚衆克宏奏封果仁為武烈大帝賊走朱業方至克宏善遇之以功拜江州節度使復請北出命未下而發瘍卒克宏常為宣州巡檢使宣州城隍不修戰守無備問其故吏云自頃年田頵李遇繼叛後為宣州者無復為兵備克宏大笑曰時移事異安有此理即繕修守禦之備不日完緝明年越寇至郡人安之劉崇俊字徳修楚州山陽人祖金事吳有功為濠州刺史振威名於境上世典濠梁崇俊弱冠嗣父仁規位為濠州刺史仁規苛酷崇俊初立頗務仁惠數年之後亦漸専恣不拘文法多蓄無賴輩使之過淮剽掠鄉邑獲美婦良馬以自奉雖然郡中畏憚政亦甚理嘗招集騎士得數百人則被以精甲貢于金陵以幸恩寵俄升濠州為定逺軍遂拜節度使其子節尚元宗女太寧公主㑹壽州姚景死崇俊重賂權要求兼領壽州元宗佯不認其意乃移鎮壽州而使楚州刺史劉彦貞馳入濠州代之崇俊自悼失計卒年四十王崇文字光福吳功臣綰之子性重厚儒雅博綜經史少為軍校小心敏幹尚烈祖妹廣徳公主出為歙吉二州刺史吉州民多爭訟古稱難治崇文奉法循理無所侵撓吏民便之遷䖍州節度使初平建州崇文鎮之即日安輯人忘其亂三十年間出領藩鎮入掌禁兵官至使相常褒衣博帶與士大夫譚宴風度夷曠時人親重之福州之役迫于君命雖為大將上則陳覺輩專恣下則王建封劉従効跋扈崇文不能制及師潰元宗歸罪於陳覺馮延魯而崇文及諸將皆弗問頃之移鎮廬州入為神武侍御統軍復出夏口其治皆如初後主即位崇文手疏時宜政體備陳箴誨加中書令未拜而卒邊鎬不知何許人也事烈祖累遷通事舍人保大初年張遇賢為營屯諸軍都虞候查文徽出師建州鎬率洪州屯兵與之俱行遂下建陽尅建泉汀漳等州諸將皆爭功而鎬獨不言人以此多之拜鎬信州刺史八年馬希蕚入潭州楚國大亂命鎬以州兵如界上覘楚九年鎬率所領出宜春遂討長沙破其軍於龍囘關希蕚希崇相繼送欵鎬盡遷馬氏之族歸于金陵以功拜湖南節度使鎬性柔懦御下無法初平建州民所尅獲唯以全活為務閩人徳之號邊羅漢及尅湘潭市不改肆楚人益喜號邊菩薩既而政出多門荏苒無斷人皆失望遂號為邊和尚由是用事者以尅楚為功不欲取費於國乃重歛於楚鎬不能鎮撫楚人多怨及劉言破益陽乘勝攻長沙鎬不能守挺身宵遁將吏皆奔潰元宗削鎬官流饒州未幾復用世宗伐淮南遣鎬帥師出拒周兵及朱元叛鎬與許文縝皆被擒南唐書卷十一
