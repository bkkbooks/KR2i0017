body:
  text: 南唐書卷十四宋馬令撰儒者傳下第九劉洞廬陵人也少遊廬山學詩於陳貺精思不懈至浹日不盥貺卒猶居二十年詩長於五言自號五言金城後主即位詣金陵獻詩百篇後主覽其首篇石城懷古云石城古岸頭一望思悠悠幾許六朝事不禁江水流後主掩卷為之改容不復讀其餘者洞羇旅二年俟召不報遂還廬陵與同門夏寳松相善陳貺嘗謂已詩埒賈島洞亦自言有浪仙之體恨不得與之同時言詩也䖍州陳徳誠尤重其詞學及金陵受圍洞為詩署於路旁云千里長江皆渡馬十年養士得何人又云翻憶潘郎章奏内隂隂日暮好沾巾初潘佑表云家國隂隂如日將暮洞以譏之開寳八年卒其遺集行於世賈島字浪仙江為其先宋州人避亂建陽遂為建陽人遊廬山白鹿洞師事處士陳貺居二十年有風人之體時金陵初復唐制以進士取人為有題白鹿寺詩云吟登蕭寺旃檀閣醉倚王家玳瑁筵元宗南遷駐於寺見其詩稱善久之為由是傲肆自謂俯拾青紫乃詣金陵求舉屢黜於有司為怏怏不能自已欲束書亡越而㑹同謀者上變按得其状伏罪為嘗吟隋堤栁詩云錦纜龍舟萬里來醉鄉繁盛忽塵埃空餘兩岸千株栁雨葉風花作恨媒盛傳於時汪台符歙州人也能文章通古今有王佐才聞烈祖移鎮金陵台符上書陳民間利害十餘條大率以富國阜民為務烈祖善之而宋齊邱疾其才髙屢為詆訾台符由是不平齊邱始字超回台符貽書誚之曰聞足下齊大聖以為名超亞聖以稱字齊邱夫慚改字子嵩因使親信誘台符乗舟痛飲推沉石城蚵蚾磯下昇元中限民田物畜髙下為三等科其均輸以為定制又使民入米請鹽貨鬻有征稅舟行有力勝皆用台符之言史虚白山東人世儒學與韓熙載友善唐晉之間中原多事遂因熙載渡淮聞宋齊邱總相府事虚白放言曰彼可代而相矣齊邱欲窮其伎因宴寮属而致虚白酒數行出詩百詠俾􅆳焉恣女奴玩肆多方撓之虚白談笑獻酬筆不停綴衆昉大驚及見烈祖說之曰今據江淮摘煮山海人民豐阜咸洛之地陛下之先業世亂久矣人思舊徳反斾長驅易若屈指烈祖雖善其説然以初基方輯睦隣境未暇北顧乃署郡從事虚白耻其初言之失意頗不平遂南遊廬山以詩酒自娯元宗即位韓熙載薦之召見問為治之理虚白曰臣草野之人漁釣而已邦國大計不敢預知因醉溺於殿陛元宗曰真處士也賜田五頃遣還及畫江為界虚白為割江賦以誚云舟車有限㳂汀島以俱閑魚鱉無知尚浮游而不止元宗南遷至星子渚復召至聞處士隠居有所得乎對曰臣得漁父一聨云風雨掇却屋全家醉不知元宗變色乆之復賜粟帛遣歸卒於家年六十七郭昭慶其先為廬陵禾川人父鵬保大初進士官至大理司直或告故南平王鍾鏄夫人與僧通姦大理卿蕭儼案法議徒鵬曰法之行自貴者始遂曲法誅之人皆以為寃㑹宋齊邱得罪鵬坐黨免官卒昭慶博通經史擬元經作唐春秋三十卷著治書五十篇皆引古以勵今獻之為左右所沮俾就舉進士昭慶不平復上書曰臣所述皆先聖之遺㫖以懲勸褒貶為任其餘􅎥裂章句補綴雕䖝臣自少而不為因得召對補楊子尉不受復歸禾川邑宰覽之修謁徃候昭慶不與之見宰銜之㑹閱編户乃籍昭慶為新擬軍昭慶復走金陵再獻經國治民論各十餘篇大抵皆指述池州采石堤要害備禦之處及東海隅可以拓之之略後主覽而悅之遂署為著作郎常以才名自居然朝無援引久之不遷開寳嵗貢方物牋表及使命廷勞燕餞之辭一出於昭慶皇朝諸公亦推其辭藻徐鉉徐鍇尤嫉之鍇前通謁而不署名銜昭慶怒乃詬而擲之由是有隙昭慶之居與客將李師義為隣而師義與鍇為姻婭鍇因令師義召昭慶飲潛置鴆於酒昭慶飲之不疑詰旦入朝及階而仆扶出遂絶諸竅皆出血昭慶前所獻治書内有禁絶三篇多天文孫呉之術及經國論等皆行於世唯唐春秋為鉉鍇所匿康仁傑泉州人也少祝髪為僧喜儒學頗自勵因遊江淮㑹陳徳誠出次池陽仁傑以詩投之有紅斾渡江霞蘸水青虵出箧雪侵衣之句德誠勉令就仕乃薦仁傑於執政者仁傑易儒服至金陵㑹群公旬沭宴昇元閣仁傑造席和登閣詩有雲散便凝千里望日斜長占半城隂之句座皆大驚後主聞之問左右曰仁傑如何人或對曰亦詩中苦吟者也然其逺人慕化而至宜姑息而已時陳洪進據漳泉遂召問其風土民俗仁傑對答無滯仍獻所業授鄂州文學補溧陽簿考滿出吉州括量屯田仁傑視肥磽稽田疇無不允當性循素儉門無私謁其所進待乃儒生名士吟噱終日曽不少怠晩年彌苦其志嘗以詩召嘉禾峰僧云只在此山寧有意向來求佛本無心時皆稱善入授汾陽令及金陵敗仁傑亦卒伍喬廬江人也性嗜學以淮人無出已右者遂渡江入廬山國學苦節自勵一夕見人掌自牖隙入中有讀易二字倐爾而却喬黙審其祥取易讀之探索精微迨數年山下有僧夜夢人指大星曰此伍喬星也僧與喬初不相知逹旦入國學訪問得喬喜甚勉之進取喬以匱乏告僧輙罄槖予之喬出與郡計明年春試畫八卦賦霽後望鍾山詩是歲同試數百人初中有司之選者必延之陞堂而加慰飲焉先是宋貞觀登坐張洎續至主司覽程文遂揖貞觀南坐而引洎西首酒數行喬始上卷主司讀之驚歎乃以貞觀處席北辟洎居南登喬為賔首覆考牓出喬果第一洎第二貞觀第三時稱主司精於衡鑒元宗命勒喬程文於石以為永式署宣州幕府考滿遷考功郎卒於官周彬和川人也杜門讀書不治産業其妻譲曰君家兄弟皆力田畝以致豐羡而獨不調玩故紙以自困寧有益耶彬笑曰耕田不如耕道非兒女子所知也聞烈祖鎮金陵招辟儒生彬因獻所習烈祖善之禪代之後制度草創無取士之科㑹有事於南郊彬著郊望論數千言廣陳前古得失上之署諸衛廵官元宗與夀王景遂貽書交辟置之門下賜予頗優告歸省母以所得金玊繒幣陳列於庭彬顧其妻曰伯叔田畝孰愈妻曰此男子事非婦人所能知彬素鄙於鄉里至是猶有嫚言者親友以告彬笑曰昔魯人俚孔子謂之東家邱况庸人乎授大理司直以母憂歸葬謁禾川令直造其㕔署令詰之曰君雖朝省直寮其如桑梓何彬怒因自誓曰吾不歸令於兹有如白日服闋詣建康以前官出宰禾川前令靦顔而去為政廉平鄉里率化有爭訟者以理和觧秩滿邑人詣郡乞留連任七考累遷尚書郎卒於官夏寳松廬陵吉陽人也少學詩於建陽江為為羇旅卧病寳松躬嘗藥餌夜不解帶為徳之與處數年終就其業與詩人劉洞俱顯名於當世百勝軍節度使陳徳誠以詩羙之曰建水舊傳劉夜坐螺川新有夏江城盖劉洞嘗有夜坐詩最為警䇿而寳松有宿江城詩云鴈飛南浦砧初斷月滿西樓酒半醒又曉來羸驥依前去目斷遥山數㸃青故徳誠紀之其為當時延譽𩔖如此晩進儒生求為師事者多齎金帛不逺數百里輻輳其門寳松黷貨毎授弟子未嘗㑹講唯貲帛稍厚者背衆與議而紿曰詩之㫖訣我有一葫蘆兒授之將待價由是多私賂焉徐鍇字楚金與兄鉉同有大名於江左鍇第進士累遷屯田郎中知制誥集賢殿學士鉉鍇兄弟俱叅近侍而其文相軋議者方晉之二陸云鍇著質論十餘篇後主札批其首後主文集復命鍇為序君臣上下互為賁飾儒者榮之鍇以開寳八年卒於金陵圍城中卒之踰月南唐亡鉉畧附歸明傳南唐書卷十四
