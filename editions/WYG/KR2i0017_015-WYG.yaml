  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2i0017_WYG_015-1a, image: WYG0464/WYG0464-0319a.png}
body:
  text: 南唐書卷十五宋馬令撰隠者傳第十嗚呼古之所謂隠士者道徳足乎已而時命大謬則泊然自適於性命之真而非違物離人以為髙也物與人莫為之累而已矣此伯夷叔齊朱張栁下惠之徒所以有徳於天下後世也自秦漢而下士之隠者雖不足以語此而前史載之詳矣南唐之士僅可觀者敘次於左作隠者傳江夢孫字聿修潯陽人也博綜經史儒行髙潔烈祖輔政辟置門下薦為秘書郎久之夢孫自陳迃儒無所禆益且平生讀書意在施恵於民而後已因求一縣以自効烈祖曰縣邑非所以優賢者不許固求之乃補天長令烈祖召之從容示以誥指庭下地曰今日受此明日即趨走於彼矣如何夢孫曰茍遂素志無恤其他乃授之至縣吏告曰正􅆹甚凶前令居之鬼怪畢見請陳設便㕔夢孫固不可曰長吏不居正㕔非禮也禮上之夕若數十人傾倒几案呌嘯甚喧夢孫從容整衣冠呪曰夢孫為縣令合居此㕔爾為鬼神應有柌宇邱墓安得爭此即命復陳設如初自此寂然無患後人安之其治以簡易仁恕為事邑人大悅踰年稱疾求歸田里躬勤耒耜事繼母甚謹毎晨夜具潔服問安侍膳訖乃集諸生講禮朝廷累召不起保大中卒年八十五贈國子司業沈彬筠陽髙安人讀書能詩属唐末亂離南遊湘湖隠於雲陽山十餘年與僧虚中齊已為詩侣迄不遇世乃歴名山治方術烈祖鎮金陵命所属郡縣辟致之彬知其欲取呉國因獻畫山水詩云尺素隠清輝一毫分險阻授校書郎入輔呉世子璉於東宫未幾乞罷以尚書郎致仕禪代之後絶不求進髙安士人多為給其粟帛元宗南遷彬年逾八十詣南昌求見曰臣自處山野世事不預臣妻謂臣曰汝主人郎君今為貴子兾接清光死且不朽元宗優禮待之賜粟帛遣還署其子元為秘書省正字彬尤工詩而未嘗喜名如再過金陵詩云玉樹歌終王氣收鴈行髙送石城秋江山不管興亡事一任斜陽伴客愁又都門送客詩云岸柳蕭疎野荻秋都門行客莫回頭一條㶚水清如劒不為離人割斷愁皆盛稱於士大夫惜乎簡編散失不得見其全集彬學方外之術迄無所異唯手植一樹命諸子曰吾死塟此及彬卒發之得石椁一上有篆刻八字云開成二年夀椁一所因就塟焉陳貺南閩人性沉澹志操古朴而不茍於仕進一卧廬山三十年學者多師事焉元宗以幣致之布裘鹿鞹進止閑肆因獻景陽臺懐古詩云景陽六朝地運極自依依一㑹皆同是到頭誰論非酒濃沉逺慮花好失前機見此尤宜戒正當家國肥元宗稱善欲授以官貺固不受賜粟帛遣還舊隠卒年七十陳陶世居嶺表以儒業名家陶挾冊長安聲詩厯象無不精究常以台鉉之器自負恨世亂不得逞昇元中至南昌将詣建康聞宋齊邱秉政凡所進擢不愜士論自料與齊邱不合乃築室於西山日以詩酒為事㑹宋齊邱出鎮南昌陶志不屈而齊邱亦不為之薦辟陶作詩自詠曰一顧成周力有餘白雲閑釣五溪魚中原莫道無麟鳯自是皇家結網踈陶少與水部貟外郎任晼相善嘗以詩遺之云好向明朝薦遺逸莫教千古弔靈均元宗雖聞其詩名而未及召之㑹有星孛陶歎曰國家其幾亡乎既而果失淮甸陶所居幽邃性尤嗜鮓元宗南遷至落星灣欲有所問而恐陶不盡言因偽使人賣鮓至陶門陶果出㗖鮓喜甚賣者曰官舟抵落星矣翁知之乎陶笑曰星落不還元宗至南都未幾殂不還之說果驗陶後以修養煉丹為事有詩云乾坤見了文章懶龍虎成來印綬疎又云長愛真人王子喬五松山月伴吹簫任他浮世悲生死獨駕蒼龍入九霄又題徐穉亭詩云伏龍山横洲渚地人如白蘋自生死洪崖成道二千年唯有徐君播青史陶所遁西山先産藥物數十種陶採而餌之開寳中常見一叟角髪被褐與老媪貨藥於市獲錢則市鮓對飲旁若無人既醉行舞而歌曰藍採禾藍採禾塵世紛紛事更多爭如賣藥沽酒飲歸去深崖拍手歌或疑為陶之夫婦云許堅不知其家世或曰晋長史穆之裔形陋而恠或寓廬阜白鹿洞桑門道舘行吟自若幘巾芒屩短襴至骭亦無齎装唯自負布嚢常括不解毎沭浴不脫衣就谿澗出而暵之或問其故則言天象昭布雖白晝亦常參列人自昧之爾其可祼䄇乎堅癖嗜魚或得大魚則全體而烹不加醯鹽熟即㗖之遊溧陽下山寺吟詩曰地枕呉溪與越峯前朝恩賜雲泉額南唐以大唐為前朝竹林層建鴈塔髙石室幽棲幾禪伯荒榛蕪没蒼苔深古池香泛荷花白客有經年説二林落日猿啼情脉脉後或居茅山或入九華適意往返人不能測舊與樊若水相善若水北渡後因轉輓於江南遇堅於簡寂觀勉之以仕則顰蹙不答堅嘗至陽羡人不之識一日渉西津淩波濶歩若平地然衆昉神之不知其所在云毛炳豐城人也好學不能自給因隨里人入廬山毎與諸生曲講茍獲貲鏹即市酒盡醉時彭㑹好茶而炳好酒或嘲之曰彭生說賦茶三斤毛氏傳經酒半升炳聞之小哂而已自後或遊螺川諸邑遇酒即飲不醉不止嘗宿於酒家大醉悞坐爐炭主人出之翌日尻痛炳疑因酒乖忤遭其笞撻訊之乃知又嘗醉於道旁有里首張谷掖之而起炳瞑目曰起予者為誰對曰張谷也炳呵之曰毛炳不干於張谷張谷不學於毛炳醉者自醉醒者自醒醒醉之道兩者固殊安用掖為復呵之曰汝可速去無撓予卧由是人頗重之是真全於酒者也後聚生徒數十講誦於南臺山迨數年自署於齋壁云先生不在此千載只空山因大醉一夕卒有詩集傳於世顔詡魯郡公真卿之後唐末徙居木川詡少孤兄弟數人事繼母以孝聞雅辭翰謹禮法多循先業迨末年一門百口家法嚴肅男女異序少長敦睦子姪二十餘人皆服儒業毎延賓侣寓門下者常十數詡晨暮延揖飲饌燕笑未嘗不躬自接對雖遇姻戚冲孺亦為之􅃣帶盡禮就所居第依泉石築亭榭開軒四敞則碧鮮叢遶翠㣲環列蕭爽之趣杜絶塵囂水部貟外郎孟賓于嘗以詩羙之云園林蕭爽聞來久欲訪因循二十秋此日開襟吟不盡碧山重疊水長流又司農卿何蒙殿中丞蒯鼇史舘孫伯純各為詩序以述其幽隠詡聞子弟有與賔客戲者未嘗靣責手寫韋昭博奕論署於屋壁使之自愧家人未嘗見其喜愠初季父非理據鄉人桑詣邑求治令尹下詡評之詡償以已緡其訟遂止卒年七十餘鄭元素京兆華原人也少習詩禮避亂南遊隠居於廬山青牛谷髙卧四十餘年採薇食蕨絃歌自若搆椽剪茅於舎後㑹集古書殆至千餘卷元素温韜之甥也自言韜發昭陵從埏道下見宫室制度閎麗不異人間中為正寢東西廂列石牀牀上石函中有鐡匣悉藏前世圖書鍾王墨跡紙墨如新韜悉取之韜死元素得之為多嗚呼業不素修自羣鹿豕斯謂之隠者樵夫牧子之事爾非吾所謂隠也故隠士儒術出處雖異易地則皆然或曰江夢孫沈彬嘗仕矣而列於隠士劉洞史虚白嘗隠矣而列于儒術何哉曰彬與夢孫志於隠而仕不得已焉洞與虚白志於仕而隠不得已焉予何容心乎亦各成其志而已至如陳陶翻然有改而所得多矣志不足言之也南唐書卷十五
