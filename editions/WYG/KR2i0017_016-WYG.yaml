  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2i0017_WYG_016-1a, image: WYG0464/WYG0464-0323a.png}
body:
  text: 南唐書卷十六宋馬令撰義死傳上第十一嗚呼大哉君乎猶天之覆焉猶地之載焉天地以為籠而東西南北鬼方殊域無出於天地之度内則君臣之義孰可逃哉此事君者無適而非君也且人情莫不喜安存而惡危亡也及以身事人而與君同戚則由是而循義由是而死節將以終吾身而已又豈偷生忍耻以獲罪於天下後世歟禮曰大夫死衆士死制子思曰如伋去君誰與守此君臣之義盡矣雖然仕以行道而致君為堯舜躋時為太平者君子之所欲也所欲者不可必得則不擇地而安之不臨難而免之者亦所以行吾道也故唐虞之際君臣都俞於廟堂之上則所謂守節循義者存之而弗試不幸罹於亂世而人君戚戚於憂勞之地則上焉學士大夫下焉武夫悍卒披肝􅄋膽夷險一節忠義皎然貫諸白日之上是亦衰世之意也魏鄭公所以願為良臣而不願為忠臣者可謂有意於致君矣嗚呼三代而下縉紳先生多能言之五代之際覇據角立君無世臣臣無定主而視神噐為蘧廬則士之全節者無幾劉仁贍之守孤城孫晟之不負永陵一坏土與夫張彦能皇甫暉孟堅陳喬劉彦貞朱令贇胡則之徒雖非蹈道有足稱者作義死傳劉仁贍字守惠彭城人也父金事呉武王為濠滁二州刺史以驍勇知名仁贍為将輕財重士法令嚴肅頗通兵法事烈祖為左監門衛将軍黄袁二州刺史拜武昌軍節度使平楚之役仁贍以舟師克巴陵撫納降附人皆恱集入掌親軍出鎮夀州先是毎歲淮水淺涸分兵屯守謂之把淺監軍呉廷紹以為境上無事虚費糧用悉罷之仁贍以為不可未及報而周師猥至郡人皆恐仁贍神氣閑暇部分守禦有若平常群情乃安五代史周師先至而後以仁贍守夀州比先除仁贍而後周師至據江南錄野錄遺事别錄皆與此同當以此書為是彦貞軰不用其言以至喪敗故仁贍軍令益信用周饒計破城南大寨剋獲甚衆仁贍按兵城守世宗圍之數重以方舟載礮自淝河中流擊其城又束巨竹數十竿上施版屋號為竹龍載甲士以攻之又决其水砦入淝河攻之百端自正月至於四月不能下而歲大暑􅍂雨彌旬周兵營寨水深數尺淮淝暴漲礮舟竹龍皆飄南岸為唐兵所焚周兵多死世宗東趨濠梁以李重進為廬夀都招討使元宗遣元帥齊王景逹等列砦紫金山下為夾道以屬城中而重進與張永徳兩軍相疑不協仁贍屢請出戰景逹不許由是憤惋成疾明年正月世宗復至淮上盡破紫金山砦壊其夾道淮兵大敗諸將多見擒而廣陵馮延魯光州張經舒州周祚㤗州方訥泗州范再遇等或走或降皆不能守江南君臣亦皆震懾奉表稱臣願割土地輸貢賦以効誠欵而仁贍獨堅守不可下世宗使江南使者孫晟等至城喻仁贍降晟望城中改其辭呼曰無隳臣節援兵即至矣仁贍於是城守益堅仁贍子崇諌幸其父病謀與諸将出降仁贍立命斬之監軍使周廷搆哭於中門救之不得於是士卒皆感泣願以死守三月仁贍病甚喘喘垂死其副使孫羽詐為仁贍書以城降世宗命舁仁贍至帳前歎嗟久之賜以玊帶御馬復使入城養疾是日卒世宗制曰劉仁贍盡忠所事抗節無虧前代名臣幾人可比予之南伐得爾為多乃拜仁贍檢校太尉兼中書令天平軍節度使仁贍不能受而卒年五十八世宗遣使弔祭䘮事官給追封彭城郡王以其子崇讃為懐州刺史賜莊宅各一區元宗聞仁贍卒哭之慟及贈太師焚其誥曰魂兮有知鑒周惠耶歆吾命耶夜夢仁贍拜墀下若受命然夀州故治夀春世宗以其難剋遂徙城下蔡而復其軍曰忠正曰吾以旌仁贍之節也孫晟初名鳯又名忌宻州人也好學有文辭尤工於詩少為道士居廬山簡寂宫嘗畫唐詩人賈島像置於屋壁晨夕事之簡寂宫道士惡晟為妖以杖驅出之昜儒服北之趙魏謁唐荘宗於鎮州荘宗以晟為著作佐郎天成中朱守殷鎮汴州辟為判官守殷反伏誅晟乃棄其妻子亡命陳宋之間安重誨惡晟以謂教守殷反者晟也􅀞其像購之不可得遂族其家晟來奔於呉時烈祖輔政多招四方之士得晟喜甚晟為人口吃遇人不能道寒暄已而坐定談辯風生聽者忘倦烈祖尤愛之引與計議多合意以為右僕射與馮延已並相元宗晟輕延已為人嘗曰金碗玉盃而盛狗屎可乎晟事烈祖元宗二十餘年官至司空家益富驕毎食不設几案使衆妓各執一噐環立而侍號肉臺盤時人多效之周世宗征淮元宗懼始遣泗州牙将王知郎至滁州奉書以求和世宗不答又遣翰林學士鍾謨文理院學士李徳明奉表稱臣不答乃遣禮部尚書王崇質副晟奉表謨與晟等皆言唐願割夀濠楚泗光海六州之地歲貢百萬以佐軍而世宗已取滁楊濠泗諸州欲盡取淮南乃止因留使者不遣而攻夀州益急謨等曰願陛下寛臣五日之誅容臣還取江南表盡獻江北諸州世宗許之遣供奉官安宏道押徳明崇質南還而謨與晟皆見留徳明等既還元宗悔不肯割地世宗亦以暑雨班師留李重進張永徳等分攻廬夀州兵所得楊㤗諸州皆不能守唐兵復振重進與永徳兩軍相疑有隙永徳上書言重進反世宗不聽初晟之奉使也語崇質曰吾行必不免然吾終不忍負永陵一坏土及崇質還而晟留與鍾謨俱至京師舘於都亭驛待之甚厚毎朝㑹入閣使班東省官後召見必飲以醇酒已而周兵數敗盡失所得諸州世宗憂之召晟問江南事晟不對世宗怒亟召侍衛軍虞侯韓通收晟下獄及其從者二百餘人皆殺之晟臨刑世宗猶遣近臣問之晟終不對神色怡然正甚衣冠南望而拜曰臣以死報國乃就刑其後世宗頗憐晟忠悔殺之元宗聞晟死贈魯國公張彦能為楚州守将周師伐淮南諸郡皆降獨楚州不可下周人圍之數月城中兵食殆盡而彦能與其副鄭昭業城守益堅世宗親督兵洞屋穿宂而焚之彦能昭業戰死餘衆皆死誓無降者世宗屠其城嚴兵以戍之元宗嘉彦能忠贈侍中南唐書卷十六
