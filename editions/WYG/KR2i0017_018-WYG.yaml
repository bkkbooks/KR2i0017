  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2i0017_WYG_018-1a, image: WYG0464/WYG0464-0330c.png}
body:
  text: 南唐書卷十八宋馬令撰亷隅傳第十三嗚呼崇髙富有人之所欲也其崇髙乎天地之間者若鷦鷯巢於一枝一枝之外無所居也其富有於萬物之上者若偃䑕飲於長河滿腹之外無所容也天地亦大矣萬物亦衆矣一身之所為曽未得其萬萬之一而固已厭足則一身之外我何與焉古之人其志有在於是者許由聞其風而悅之其無待於外而傲睨於萬物之上則在我者皆道之真而在彼者皆物之粗道者吾之所固有而物者時之所儻來故榱題數尺後車數十乗不足以望吾㤗山堪巗之安也食前方丈侍妾數百人不足以易吾飲水曲肱之樂也古之人其志有在於是者王子搜聞其風而悅之大而天下重而一國有所不受則脩吾身以標凖於天下不亦貴乎馴致後世喪已於物忘真於利則清風不競而亷隅遂喪如姚景之取予有節魯崇範之一介不受馬文義之不入府庫許規之不顧遺金皆後世之難能者作廉隅傳姚景始事劉金為廐卒金暇日至廐中見景晝瞑有二赤虵悠揚景靣少頃入鼻竅而寤金由是竒之引為親信俄遷禆将金以女妻之烈祖亦重其為人使典親兵歴制置刺史拜清淮軍節度使夀春望鎮供億滋厚而主将歛率浮於他郡民尤苦之景至一切供億悉罷去常俸不給刓衣弊􅃣漠然古風初吏請家諱景大署於紙尾曰諱􅂍吏於是属吏拱手稍知廉隅諸子為牙将景登城見其長子導從甚盛過市市人皆廢業辟路景召其子杖之魯崇範廬陵人也竈薪不属而讀書自若烈祖初建學校丁亂世典籍多闕旁求諸郡崇範雖窶九經子史世藏于家刺史賈皓就取進之薦其名不報皓以已緡償其直崇範笑曰墳典天下公器世亂藏於家世治藏於國其實一也吾非書肆何估直以償耶郤之皓謝曰俗吏凂濁以遺先生羞不然何以見髙義㑹皓赴闕與崇範俱至金陵表薦之召試東宫授太子洗馬復守廉儉唯食月俸其餘四時錫賚非次優與拜而弗取悉班諸親舊之貧者元宗即位尤重之除東宫使卒于仕馬文義彭城人也父仁裕事烈祖為使相文義以廕授千牛備身補浙西支使建州之役𨽻祖全恩為判官既下建州将吏皆入府庫爭取金貝文義獨收民籍歸幕故建州雖經亂而民皆安堵文義與有力焉遷讚善大夫卒子禹昌甫二歲妻朱氏大将軍業女也􅐠贈一無所受盖其廉如此故能率其妻如此許規髙陽人祖儒義不食梁粟自雍州襁負東走隠江南山谷中終身不出儒生稠稠生規規好道家言故不事事嘗羇旅宣歙間聞旁舍呻呼就訊之曰我某郡人也察君長者且死願以骸骨屬因指槖中黄金十斤曰以是交長者規許諾敬負其骨千里并黄金置死者家父驚愧之因獻金如亡兒言以為許君夀規不顧竟去聞者以規為長者云子逖事後主為監察御史亦有清節後仕皇朝苛政傳第十四嗚呼立天之道曰隂與陽立地之道曰剛與柔立人之道曰仁與義盖隂陽和同剛柔相濟然後交通成和而物生焉人位其中戴仁抱義所以贊天地之化育也茍忿戾殘忍而不全乎仁義則猶天之獨陽而無隂地之獨剛而無柔其於生成也殆矣古之聖人所以徳刑並用而洽於民心者凢以知此而已循致後世依勢作威倚法以削則㓕天地之徳刻生民之性苛細􅃤烈無所不為可不痛哉昔孔子適楚有婦人哭於路而哀使子貢問之曰爾之哭重有憂乎曰然子貢問其故曰吾舅死於虎吾夫又死焉今吾子又死焉是以哀之子貢曰何不去也曰無苛政孔子聞之曰小子志之苛政猛於虎作苛政傳張宣字致用少事呉為軍校𨽻大将柴棐棐愛人戢下諸将化之唯宣頗肆暴戾部曲苦之從劉信圍虔州虔人乞師於楚信遣宣及髙審思分兵禦之大敗楚師累遷諸軍都虞侯徙為左街使皆以嚴酷為理及鎮鄂州置地室以鞠罪人罪無問小大入之則無全活未幾境内大治道不拾遺㑹雪中炭肆有闘者録問之言市炭一秤而輕不及數宣使秤之信然乃斬賣炭者梟首懸炭於市自是賣炭者率以十五斤為秤無敢輕重李徳柔字子懐鄱陽人也始為小吏善伺人之私捕獲亡命所至必得時目為李猫兒累遷大理卿持法苛峻獄有未成則以蘆蓆卷囚而倒置之死者甚衆徳柔本無學術妄稱博學毎呼馬為韓盧染工為伶倫雖然不附姦佞善守職分故終其天年初亢宗欲置北寺獄徳柔諌曰世豈乏士而俾閹豎得以弄其文墨耶其議遂寢論者韙之嗚呼唐末大亂方鎮僣擬悉以宦官給事考諸前史呉越最多唯南唐載籍脫略閹人内倖用否輕重不可悉考案浮屠傳後主對佛像燃命燈以决大辟自夕至旦火㓕則誅之不㓕則貰之由是富商大賈遺賂内官俾續燈獲免者甚衆而此又有置獄北寺之説則閹豎之職雖無考據而伺隙抵巇竊弄威徳亦已甚矣幸而國君儒雅未嘗嬖倖故不見斥於當時南唐書卷十八
