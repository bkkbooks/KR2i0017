  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2i0017_WYG_019-1a, image: WYG0464/WYG0464-0333c.png}
body:
  text: 南唐書卷十九宋馬令撰誅死傳第十五嗚呼三代之際刑不上大夫而霸者之命亦曰無專殺大夫則古之所以任大夫者未嘗不以賢而所以待大夫者未嘗不以禮及其世亂刑濫故殺之之甚有見於春秋者書人以殺殺以其罪也稱國以殺殺不以其罪也是以為人君而不通春秋之義者必蒙首惡之名為人臣而不通春秋之義者必䧟誅死之罪後世君子恥於自明而為小人之所誣則賢不肖駢死於市朝而䧟其君於首惡之名者無世無之良史所以直筆書之使後世為臣者知法之不可犯為君者知刑之不可濫如陳蕃李固之死君子觀之未嘗不扼腕而歎之董卓王甫之死君子觀之未嘗不憮然而快之是其刑之當否雖千載之後猶足以感發人之喜怒也南唐享國日淺可名之士無幾而誅死太半如宋齊邱陳覺李徴古李徳明鍾謨張巒禇仁規王建封范冲敏皇甫繼勲林仁肇潘佑李平皆死於非命就其未死之行以考之則知其所死者不能無當否矣然則南唐之亡非人亡之亦自亡也為國而自去其股肱譬諸排空之鳥而自折其羽翮孰有不困者哉昔孔子適晋至河而還者聞晋殺竇鳴犢舜華也故曰刳胎而麟不至覆巢而鳯不翔君子惡傷其𩔖也作誅死傳禇仁規字可則廣陵人也始為軍中小吏勤幹敏給可被繁使累除右職出為海陵鹽監使海陵民好爭訟吏多不能直乃以仁規兼縣事所部魚鹽竹葦之地財用所出國家毎有大役常賦不能給仁規使行視民家所有舉籍取之事訖則以次償備罔有逋遺以故民不甚怨而供億公費不知限極烈祖喜之及以海陵為㤗州遷仁規為刺史不移治所政亦如故晩年國家少事仁規掊克不已多入私門刑罰滋暴加以奢縦宣徽使陳覺有宿嫌宻啟其状侍御史王仲連亦劾之烈祖陽不問而隂欲罷其郡㑹将東廵乃召以為靜江軍都虞侯督舟師以從及還都遂留不遣仁規方承恩遇猥被摧折不勝忿恚乃上書自陳無過而為讒佞所間辭甚訐斥烈祖下其事命陳覺充㤗州按鞠使仁規聞覺往按歎曰吾嘗孤立所知者主上而已陳覺首搆吾事而今以属之何以自明遂自劾即日收付大理賜死妻子徙和州王建封少為軍校驍勇任俠平建州功冠諸将拜信州刺史為人剛鷙無所忌憚及陳覺等矯命討陳仁逹建封帥師圍福州與諸将爭功城垂尅而先退諸軍由此潰散遂失晉安元宗大怒陳覺馮延魯皆被流竄而建封不自安元宗召還慰撫之使掌禁兵建封怙罪愈多僭侈時魏岑鍾謨李徳明皆當清要而岑詭佞尤甚謨及徳明亦輕脫俱不恊衆望户部貟外即范沖敏頗耿介負氣深疾岑等而與建封相善以建封方被寵任可去羣黨因勸建封上書歴詆用事者請盡去羣小進用正人元宗大怒以其武臣握禁兵不當干預國政流建封池州賜死於路沖敏棄市李徳明不知何許人也落魄負大節累遷兵部貟外郎文理院學士周世宗伐淮甸下滁州元宗懼先遣牙将王知朗奉書於世宗不答未幾楊光舒㤗蘄相次潰元宗益懼乃遣徳明與鍾謨奉表稱臣請獻夀濠泗楚光海六州以求罷兵世宗亦不答徳明與鍾謨皆留行在明年元宗復使孫晟王崇質削去帝號願効貢賦世宗猶不答於是鍾謨等見世宗英武而師甚盛乃曰願陛下寛臣五日之誅還取江南表盡獻江北諸州世宗許之遣供奉官安宏道押徳明崇質還江南而謨晟皆見留徳明等歸盛稱世宗英武元宗惡之宋齊邱陳覺等皆以割地無益徳明賣國以圖利元宗大怒命斬徳明於市而益兵以拒周初徳明與鍾謨皆以尚書郎待制恃恩用事百官側目號為鍾李及謨還因覆案齊邱黨與追贈徳明袁州刺史皇甫繼勲江州節度使暉之子少以父廕為軍校常從暉軍中滁州之役暉力戰甚急繼勲欲遁暉操戈擊之弗及遂逸以暉死事故繼勲恩澤優渥累遷将軍池饒二州刺史性謹厚勤於為理吏民安輯入為諸軍都虞侯數年南唐老将亡殁殆盡繼勲雖少遂拜大将軍貲産優贍而錫賚頗優於是營第宅侈車服畜妓樂備珍羙擇近郊之地植花構亭珠翠環列擬於王室及王師來伐繼勲保惜貲富無効死之志欲後主速降而口不敢發毎於衆中但言國數窮促而已或聞敗績則怡愉竊喜或有敢死之士請出効命則杖而拘之由是軍情忿恚百姓切齒近臣屢以為言後主優容之後託以軍旅稀復朝見召之亦不至後主於是不能容乃親廵城勞軍還誘繼勲入宫責其流言不用命之状收付大理始出門而衆軍之士雲集臠割繼勲頃刻而盡嗚呼天屬之厚不可薄也於其所厚而薄之則其它無不薄矣皇甫繼勲叛父於垂死之際及其事君又可知也忠孝人之大倫而不忠不孝者無容於天地之度内然則繼勲之死豈特人怨哉鍾謨字仲益㑹稽人也僑建康少爽悟博學屬文頴脫時軰元宗寵用之㧞自下位累遷吏部郎中顯徳中周師下楊光等州元宗遣謨與李徳明奉表於世宗未報而孫晟王崇質繼至謨等謂世宗曰唐畏陛下神武保無二心願歸取表盡獻淮甸之地世宗許之遣徳明崇質還江南而晟與謨皆留行在既而江南拒命世宗大怒案誅晟及舘中二百餘人同死獨赦謨以為耀州司馬謨在耀州以詩貽其州将其略云翩翩歸盡塞垣鴻殷殷驚開蟄户䖝渭北離愁春色裏江南家事戰塵中江南暨周平世宗召謨授衞尉卿放還國謨作詩以獻其略云三年耀武羣侯服一日廻鑾萬國春南北通歡永無事謝恩歸去老陪臣世宗覽而悦之賜黄金五百兩意将以間其君臣也元宗果銜之謨歸為禮部侍郎判尚書省國政悉秉於中臺相府但紏轄而已謨既秉權鑄大錢改制度恃其才能挾中朝之勢尤横恣不法世宗毎遣使至必賜詔存問時太子兾叅惣庶政謨薦其所知閻式為太子司議郎百司關啟多由之初李徳明與謨善徳明之死給事中唐鎬與宋齊邱同議至是鎬不自安又頗納賄謨知之面詰其状鎬大懼及謨復使周以世宗之言覆按齊邱黨與陳覺李徴古以下皆伏誅鎬益懼㑹信州刺史張巒入為天威軍都虞侯常詣謨第相歡或至夜分鎬時掌樞要因搆謨與巒謀為不軌元宗疑之太子兾卒從嘉以次當立而謨曰從嘉輕肆請立紀國公從善元宗大怒尚以世宗之故未即加誅乃罷其職為國子司業及世宗崩遂貶謨著作佐郎饒州安置遣中使領侍衛軍十人即日監督上道馳驛發遣家屬自後而去謨時病風眩作絶句十餘章其辭皆悽愴至郡月餘遣人就縊殺之謨尤好古碑奉使中原毎道旁碑碣必駐馬歴覽嘗見龜趺大碣半没水中謨欣然解衣以手捫揣黙記其文他日水涸以所録本就證之無差其爽邁如此初使者至謨望拜曰臣無負國使者曰詔問孫晟獨死状謨復拜曰臣聞命矣遂就縊巒亦賜死於宣州潘佑散騎常侍處常之子氣宇孤峻閉門讀書不營貲産文章贍逸尤敏於論議時譽藹然中書舎人陳喬户部侍郎韓熙載薦之以秘書省正字釋褐俄直崇文舘輔後主於東宫後主即位遷虞部貟外郎史舘修撰後主納后歴代久無其禮開元禮亦多闕博士陳致雍習知㳂革隨事補正後主使徐鉉與佑叅議佑立論以沮之文彩可觀後主竒其議頗見施用由是恩寵日洽改知制誥明年居中用事極論時政無所廽避後主手札敦喻佑七表不止因請休官逺去乃徙佑專知國史悉罷其職時江南衰削國歩多艱佑所上諌疏有家國隂隂如日將暮之辭後主惡之又其所薦黜與時軰不協因誣以他事劾佑佑自剄母及妻子徙饒州佑自言其母方娠夢古衣冠人告曰我顔延之也與夫人為子及生七歲始能語曰兒悞傷白龍為上帝所罰也因吟詩曰只因騎折玉龍腰謫在人間三十六至是果以三十六歲卒李平初為河中李守貞從事漢隠帝立守貞據城叛隠帝命周太祖討之守貞遣平與朱元奉表來乞師未返而河中平遂留江南越人寇毘陵平自言有武略因以為将固辭乃遷衛尉少卿使領偏師廵江北進逼蘄州周師先遁平入保其城即以為蘄州刺史㑹朱元叛元宗恐其不自安召之還都使者失㫖鎻平送建康元宗慰勉之拜建州節度副使徴為衛尉卿平本好神􅋖修養之事而動多怪妄自言􅋖人神鬼常與通接潘佑亦好仙平因與親善之言佑父處常今已為􅋖官而已與佑亦􅋖官也家置靜室人莫能窺佑既獲用請復井田法深抑豪民有買貧户田者使即還之又依周禮造民籍復造牛籍曠土盡令種桑薦平判司農寺以督之命行於下急如星火州縣吏胥因以為姦百姓大擾聚而為亂後主知立法之病即罷之佑復薦平知尚書省由是羣議紛紛以為壊法殃民皆由平始乃先收平下大理使收佑佑自剄平縊於獄妻子徙䖍州明年宥其家廩給之南唐書卷十九
