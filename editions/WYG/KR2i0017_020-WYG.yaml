body:
  text: 南唐書卷二十宋馬令撰黨與傳上第十六嗚呼漢以黨錮衰唐以朋黨㓕漢唐之亂雖愚者與知焉迨乎利害相攻則為之而不知其非盖亦蔽於好惡之情而已南唐之士亦各有黨智者觀之君子小人見矣或曰宋齊邱陳覺李徴古馮延己延魯魏岑查文徽為一黨孫晟常夢錫蕭儼韓熙載江文蔚鍾謨李徳明為一黨而或列為黨與或各敘於傳者何哉盖世衰道䘮小人阿附以消君子而君子小人反𩔖不合故自小人觀之因謂之黨與而君子未嘗有黨也予之所論一入於黨與則宜無君子而各著於篇者未必皆小人嗚呼弗可不察也作黨與傳宋齊邱豫章人也其父誠為江西鍾傳副使卒於任時天下已亂經籍道熄齊邱獨好學有大志及鍾傳敗齊邱益窮隨衆東下糊口於倡優魏氏烈祖時為昇州刺史延四方之士齊邱依焉因以鳯皇臺詩見志曰嵯峨壓洪泉岝峉撑碧落宜哉秦始皇不驅亦不鑿上有布政臺八顧背城郭山蹙龍虎健水黒螭蜃作白虹欲吞人赤􅂹相􅘤爍畫棟泥金碧石路盤磽确倒掛哭月猿危立思天鶴鑿池養蛟龍栽松棲鸑鷟梁間燕教鶵石罅虵懸殻養花如養賢去草如去惡日晩嚴城鼓風來蕭寺鐸掃地驅塵埃剪蒿除鳥雀金桃帶葉摘綠李和衣嚼貞竹無盛衰媚桞先揺落塵飛景陽井草合臨春閣芙蓉如佳人廽首似調謔當軒有直道無人肯駐脚夜半鼠窸窣天隂鬼㪣啄松孤不易立石醜難安著自怜啄木鳥去蠧終不錯曉風吹梧桐樹頭鳴嚗嚗峩峩江令石青苔何淡薄不話興亡事舉首思𦕈邈吁哉未到此褊劣同尺蠖籠鶴羨鳬毛猛虎愛蝸角一日賢太守與我觀槖籥徃徃獨自語天帝相唯諾風雲偶不來寰宇銷一略我欲烹長鯨四海為鼎鑊我欲取大鵬天地為矰􅗤安得生羽翰雄飛上寥廓烈祖竒其才以國士待之歙人汪台符投書於烈祖齊邱忌其名頗排斥之齊邱本字超回台符因是貽書侮之曰聞足下齊大聖以為名超亞聖以為字齊邱慙即改字子蒿隨烈祖鎮京口入定朱瑾之難雖叅謀議而怯於鼓鐸故不預戰功烈祖輔政勵精為理脩舉禮法以遏强衆親附卿士寛徭薄賦人用安輯齊邱頗有力焉烈祖欲進用之而為徐義祖所惡乃以為殿直軍判官凢十年義祖卒始拜右司貟外郎累遷左諌議兵部侍郎居中用事期以相之齊邱自以名望甚淺欲為退譲以自重乃告如豫章改塟其父因入九華山啟求退居呉主連徴不至元宗時爲大将軍烈祖使元宗親徃敦廹乃起除中書侍郎遷右僕射平章事烈祖出鎮金陵以元宗入輔政委齊邱左右之齊邱於是益樹朋黨潜自封殖時烈祖權位日隆中外皆知有禪代之勢而烈祖恭謹守道懼羣下不協欲待嗣君齊邱亦盛贊其說與烈祖意合烈祖次子景遷呉主之壻也美姿儀風度和雅烈祖鍾愛特甚齊邱使陳覺為景遷教授以賈其聲價齊邱叅决時政多為不法輒歸過於元宗而盛稱景遷之羙幾有奪嫡之計所以然者以呉主少而烈祖老必不能待他日得國授於景遷景遷昜制已為元老威權無上矣此其日夕之謀也烈祖覺之乃召齊邱如金陵以為已副遥兼節度使無所闗預從容而已行軍司馬徐玠副使李建勲判官孫晟賈潭呉相王令謀都校周宗之徒相為推挽决行大事既建齊國以齊邱為左丞相遷司空徐玠為右丞相明年烈祖即位徐玠為使相張居詠張延翰李建勲皆平章事周宗為樞宻使齊邱但遷司徒而已自悼失計復恥無功不勝其忿受宣之日聞制辭云布衣時陛下乃一刺史爾今日為天子可不用老臣矣拂衣而出闔門請罪烈祖但遜辭以喻之不為改官齊邱久之計無所出乃更上書請議遷譲皇他郡以絶人望呉世子璉烈祖子壻也又請絶其婚而斥逺之其詞云非獨婦人有七出夫有罪亦可出之聞者莫不大笑居數年復自陳以輔相之重不可不與政烈祖許其入中書視事又以兩省事多委給事舎人而中外繁劇之務皆在尚書省乃求知尚書省事亦許之於是悉取朝廷附已者分掌六司下及胥史皆用所親吏視事數月有親吏夏昌圖者盗官錢三百萬齊邱特判貸其死烈祖大怒切責所司刑部官吏自劾請罪久之乃解昌圗坐斬齊邱臥疾不出烈祖遣夀王景遂徃問之許其出鎮本州旬日遂起拜洪州節度使委任羣小政事不治所居舊里愛親坊改為衣錦坊大啓第宅窮極宏壯居坊中人皆使修飾牆屋門巷極備華潔民不堪命相率逃去坊中為之空前後四任本州其行事多𩔖此在富貴權要之地三十年唯欲人之順已其一言不同者必被排擯酷好術數凢天文地理占相卜祝之徒在門下者數十人厚禄以給之相傳言齊邱少時曽夢乗龍上天凢文武百司皆布朋黨毎國家有善政其黨輒但言宋公之為也事有不合羣望者則曰不用宋公之言也毎舉一事必知物議不可則羣黨競以巧詞先為之地及有論議者皆以墮其計中羣臣敢言者常夢錫蕭儼江文蔚韓熙載等十數人而常蕭尤甚夢錫性褊而簡言儼無文而辭繁碎故皆不能勝然雖正人切齒而流俗疏逺之人猶瞻仰以為元老故趨附者益多及國家多難因欲遂其窺竊之計卒以此敗元宗謂近臣曰齊邱之才安能當此大難不過率國中以降自為功爾窺竊之計與當大難之事皆具陳喬陳覺傳及放歸青陽即舊第之外别院處之重門外鎻穴牆以給食明年自縊死年七十三諡醜謬齊邱初舘於倡妓魏氏藉其貲給遂以為正室亦封國夫人無子以從子摩詰為嗣及後主即位召其妻子還建康舘給之連坐者皆宥齊邱為文有天才而寡學不經師友議論詞尚詭誕多違戾先王之㫖自以古今獨歩書札不工亦自矜衒而嗤鄙歐虞之徒馮延己亦工書逺勝齊邱而佯為師授以求媚齊邱謂之曰子書非不善然不能精意徃徃似虞世南其何堪也其狂瞽如此承二君不世之恩而自䧟刑辟識者知有天道焉嗚呼俗説江南堅甲精兵雖數十萬而長江天塹險過湯池可當十萬國老宋齊邱機變如神可當十萬周世宗欲取江表故齊邱以反間死斯言殆非君子之說閭巷小人之語也龍衮因是著於野錄以欺惑後世而後世之人亦頗信之且民之至愚欺之則昜信况齊邱益樹朋黨以賈譽於當時自非特立獨行之士安能知其妄偽哉孔子嘗以鄉人皆好之為未可盖鄉人之情未必公也不如鄉人之善者好之則信善矣嗚呼善人吾不得見則齊邱之事安所考信哉蓋亦考其所言與其所行而已觀其著書云􅀞者不敢昜圖像苟易之必有咎刻者不敢侮木偶茍侮之必貽禍始制作於我又要敬於我又寘禍於我此意以社稷之功自任而無復君臣之禮也又云見食象者食牛不足見戴冕者戴冠不足則窺竊之計於是乎萌矣予以是知齊邱之所言也伐南閩攻仁逹以空其國用逐常夢錫韓熙載江文蔚以間其忠言予以是知齊邱之所行也然則齊邱之死自速辜爾謂之反間者妄也南唐書卷二十
