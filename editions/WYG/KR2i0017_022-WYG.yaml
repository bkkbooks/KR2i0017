  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2i0017_WYG_022-1a, image: WYG0464/WYG0464-0348a.png}
body:
  text: 南唐書卷二十二宋馬令撰歸明𫝊上第十八嗚呼生草昧之世事偏據之國君臣上下􅁳行而已矣及其一覩聖人之化而得其所歸則何異于離蔀屋之幽即天日之鑒哉故南唐之士事皇朝者皆謂之歸明而歸明之士未必皆善也作歸明𫝊蕭儼廬陵人也甫十嵗詣廣陵以童子擢第及長志量穏正交不茍合授秘書省正字烈祖受禪遷大理司直拜刑部郎中明清平恕號稱職烈祖季年性辯急羣臣多貽訶責陳覺居近職不自安請告數月烈祖殂覺以宣遺詔日出叅儼劾曰陳覺側聆私室以俟升遐請案其罪不許元宗即位委政齊王景遂馮延己魏岑之徒因以隔絶中外儼上書極論遂出聴政昇元之法禁以良人為賤賣奴婢者通官作劵至是馮延魯等欲廣置妓妾因矯遺制許民私賣已子儼駁曰此非大行之命延魯矯為之爾昔延魯為東都判官上疏貧民不自給者聴鬻已子大行問臣臣曰往者陛下出府金以贖民子故得天下歸心大寳自至今乃許民賣子以資豪民非防微之道也由是延魯之請不行今復行之故知其矯先㫖也議者以遺詔已出不可改遂行烈祖山陵儼與韓熈載江文蔚同定禮儀諡法遷大理卿兼給事中因㫁獄失入用事者欲誅之賴宰相馮延己固争以謂赦前失入罪不當死遂貶南昌令因歸葬廬陵幞巾素裾詣郡􅈦設拜敬守桑梓言談服御不改鄉俗㑹醼故老姻舊語笑雍穆俄復舊官後主初嗣位屢與嬖倖對奕儼入白事舉奩投于地後主大怒曰汝與魏徴孰愈儼従容曰臣若非魏徵陛下亦非太宗矣後主黙然罷奕儼秉身方直彈奏不阿百官貴戚歛祍避之歸皇朝以老病居鄉里因訟至郡言辭舛錯郡倅不知其疾以為愚謬乃詰之曰江南用汝輩為正卿不亡何待卒年七十至無一金劉承勲不知何許人也美風度善數計事烈祖為郡従事改糧料判官出納無弊號為稱職遷徳昌宫使南唐自呉建國保有江淮籠山澤之利帑藏頗盈徳昌宫其外府也金帛泉貨多在焉禪代之後邦國新造而簿籍淆亂鉤校不明承勲由是多入私家盜用無算家畜妓樂迨百數人每置一妓費數百緡而珠金服飾亦各稱此承勲善為詭佞常以寳貨遺賂權要故雖朱門甲第窮極富侈而人弗之譴太祖皇帝既平荆湖詔江南具舟運湘中米承勲請行乃督巨艘數百柁自長沙抵迎鑾本以奸心預自結于皇朝為異時計及金陵平承勲歸于京師首陳運米事以為已績太祖曰此李煜勤王之職豈汝功耶特弗叙用既而窮困祼􅃝丐食于路不勝其苦凍餒而卒邵拙宣城人也孤峭不撓博通經史飲酒常至百盞偶沈酗遂絶飲雖筵宴終日唯茶漿而已著書埒韓栁有詩三百篇尚書郎孫邁為之序命曰廬嶽集曹郎趙慶以詩貽之云邁古文章金鸑鷟出羣行止玉麒麟歸皇朝就應制科有司以聞未詔而卒郡將哀之籍其裝得拙手書史𫝊文集三百卷藏于官府時悼其苦學能文而不得達于名位或議其詩有萬國未得雨孤雲猶在山之句斯為應矣門人袁氏買地葬之舒雅世為宣城人姿容秀發以才思自命因隨計金陵以所學獻于吏部侍郎韓熈載一見如疇昔館給之雅性巧黠應答如流熈載待之為忘年之交出入卧内曽無間然熈載性懶不拘禮法常與雅易服燕戲猱雜侍婢入末念酸以為笑樂或云熈載所著格言半雅之辭迨數年㑹熈載知貢舉以雅為第一朝野無間者以雅之才為當也歸皇朝守舒州出見山秀竒田疇沃壤遂有終焉之志考滿以本官掌靈仙觀卒盧絳字晉卿南昌人也讀書畧通大義不事事常以博奕角觝為務鄉里鄙之絳慙憤入廬山國學與諸葛濤蒯鼇相善諸生篋笥稍豐輒强取之山下桑門亦苦其無賴號為廬山三害㑹朱弼為國子助教規其過遂亡去往還澗壁遇大雪乏薪絳恃膂力踊折簷桶燒之病痁且死夜夢白衣婦人頗有姿色歌菩薩蠻勸絳罇酒其辭云玉京人去秋蕭索畫簷鵲起梧桐落欹枕悄無言月和殘夢圓背燈惟暗泣甚處碪聲急眉黛小山攅芭蕉生暮寒歌數闋因謂絳曰子之疾食蔗即愈詰朝求蔗食之疾果差迨數夕又夢前白衣麗人曰妾乃玉真也他日富貴相見于固子坡絳寤襟懐豁然唯不測固子坡之說後入金陵詣後主上書陳京口至澗壁要衝之地宜立柵屯戍其餘利害數十事書上未報復為書詣光政陳喬喬與語數日大竒之因表署為本院承㫖經營制置頗見榦績俄轉㳂江諸營兵馬監押絳于是召募無賴少年便習舟楫水道者得馬雄王川軍等數千人立為偏禆使督卒伍日習水戰節以金鼓麾以旗幟迴舟轉戈皆如節制時有一舟應節稍遲即斬其舟長復試之可使泝逆流蹈巨浪常于海門遮獲越人船舫鹽貨獻于金陵後主賞其功拜上柱國及王師克池州授陵波軍都虞候㳂江都部署王師屢攻秦淮口水柵絳數拒之皇甫繼勲鄭彦華等忌絳功名出已說後主遣絳出援丹陽絳率所部百艘為八字陣突圍出至京口麾兵三戰越人三北就拜絳太師自絳出建康水陸之攻愈急絳還赴難㑹宣州叛乃授絳宣州節度使討平之金陵既平諸郡皆下絳獨不順殺歙州刺史龔慎儀謀奔嶺表朝廷數遣使喻㫖絳遂降授冀州團練使㑹龔慎儀姪頴為右讃善大夫上言求復季父之讐乃命斬絳絳臨刑有白衣婦人同斬姿貌宛如所夢問其受刑之地即固子坡也婦人姓耿名玉真其夫死與前婦之子通當極法與絳同斬焉劉茂忠廬陵安城人也貌魁雄善用大矟剽畧旁縣頗為民患縣吏捕獲之械送本郡㑹赦減死論時上江羣盜趙晟蕭榮等聚徒數百郡縣捕之彌年不獲茂忠于是自陳擒晟等以贖餘罪郡將釋之示以恩信茂忠感憤因亡入賊中與捕吏為内應討平之署茂忠諸色捕捉軍頭又廬陵有呉先等招集亡命居鷓鴣洞四出攻剽茂忠掩擊殆盡遂斬先持其首詣郡奏授吉州兵馬監押繕理城隍戎事整肅遷袁州萍鄉制置以捍潭衡之境因縦獵出界潭人拒之茂忠怒乗勢大畧至灃陵而還潭衡巡撫使祖洎惡其犯境欲襲取之㑹冬至日意茂忠醼飲乃帥步騎數千亟趣萍鄉屯寨皆遁候騎告急座皆恼懼茂忠飲㗖自若酒數行報騎又至將士請行茂忠笑曰日旰矣此時出師主將不利潜出竒兵躡潭人後焚橋梁伏道左然後躬擐甲胄去寨十里與潭師遇合戰迨晡勝負未決茂忠下馬持大矟深入敵陣所向無前潭人奔還而橋路已絶旁遇伏兵腹背擊之殺傷殆盡遂執其副使以軍禮見之後主嘉其功拜袁州刺史未㡬金陵平後主入朝吉州刺史申屠令堅約茂忠為亂事未發而令堅卒茂忠遂降舟次淮口修謁稱袁州刺史闗津吏擲刺于地大罵曰亡國之俘何刺史也遂以牓帖賛見將階其􅈦署朱復叱之令執杖庭叅至京師授登州刺史數月朱抵罪羈管適𨽻登州茂忠令日兩衙立于庭下朱慙憤死南唐季世每除節度刺史皆質其家于都城茂忠守袁州金陵城破而亡其妻女茂忠意為軍士所畧及歸京師潜使女奴賣衣于諸營得其狀以聞遂取還之後因據枵夜坐庭下忽一人自外躍劒刺茂忠茂忠以枵自悍連舉數四而枵迨絶刄不能中㑹左右執送軍廵按斬之乃畧女兵也茂忠微時所持大矟後將有鬭戰則夜響嘗與潭人挑戰親持奮擊前無堅敵左右中者皆洞胷脅茂忠因敗其膞至是疾作臂不能舉數日卒李元清濠州人也周世宗征淮南其父聚鄉里義士襞紙為鎧號白甲軍與官軍同守濠州水寨周人驅駱駞為前鋒濠人驚駭不戰而潰元清渡江居建業趫捷有勇走及奔馬常入梁宋伺周人情狀開寳中以吉州永新與潭衡接境因改永新為制置以元清充使每數月一託病不衙潜入潭部人不之知先是夏賦準貢見緡民苦之元清奏請納帛一疋折錢一千以為定制常以便宜科率民無怨望摠諸科物十餘萬數漕運入金陵平例歸京師元清偽為目疾召驗之揮刃而目不瞬遂放歸濠上卒陸昭符金陵秣陵人開寳末朝廷問罪江南恼懼後主遣潘慎修入貢且求緩師昭符時為進奏使以其物數難辦請市于富民石守信家得絹十萬疋後主以昭符善計度累加任使金陵平盧絳入歙州胡則據江州昭符集逃民欲應絳則朝廷遣使宣喻示以恩信昭符送款朝廷禄之昭符嘗為常州刺史常州當呉越之衝城邑荒虛户不滿千數昭符為理寛簡招納散亡未㡬户口蕃庶如初一日坐郡􅈦忽遇雷電遶庭官吏震懾昭符撫案叱之雷霆頓止及舉案幃得大鐵索重數百斤人尤駭之而昭符神色自若命收鐵索付官庫以示後人南唐書卷二十二
