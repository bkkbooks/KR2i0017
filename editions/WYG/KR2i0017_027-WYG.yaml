  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2i0017_WYG_027-1a, image: WYG0464/WYG0464-0368a.png}
body:
  text: 南唐書卷二十七宋馬令撰叛臣𫝊第二十四嗚呼諸侯死社稷大夫死衆士死制又豈違道以亡其國乎五代之際憂起蕭牆禍生天屬而大夫不能死邱墓者無國無之且為人臣者身非我有死君之難而已職非我有任君之事而已富貴非我有享君之禄爵而已又況土地人民我何有焉而専以予人其獲罪于天下後世當如何哉春秋之法竊君之土而致于人則曰以某地来奔若邾庶其莒夷牟之𩔖是也據君之地以専于已則曰入某地以叛若晉荀寅衛孫林父是也其文雖異而其叛一矣作叛臣𫝊劉澄宣城人也保大中後主掌禁兵澄趣使左右元宗南遷後主為太子監國署澄為軍校累遷侍衛廂都虞侯及王師圍金陵越人乗間䧟常州進攻潤州議者以京口要害當得良將守之後主以澄舊事藩邸尤為親信乃拜澄潤州節度使留後臨行後主謂澄曰卿本不合離孤孤亦難與卿别但此行非卿不可澄涕泗奉命歸家盡輦金玉以往謂人曰此皆國家前後所賜今國家有難當散此以圖勲業後主聞之益喜及越兵初至營柵未成左右請出兵掩之時澄已懐向背乃曰出兵不勝則立為虜矣當俟應援然後圖戰未㡬盧絳率師為援絳至越兵屢却絳昉入城圍復合矣澄與絳固守累月自相猜忌絳怒一禆將殺之未決澄私謂曰盧公怒爾爾不生矣禆將泣涕請命澄曰吾有一言告爾非徒免死且得富貴因諭以降事令先出道意禆將曰柰家口在都城何澄曰事急當為身謀我家百口亦不暇顧矣是夜禆將踰城出絳猶未知明日澄與絳同食典軍者來告澄偽作色曰吾謂公已斬之何得令走徐謂絳曰間言都城受圍日急若都城不守守此何為絳亦知金陵終䧟乃曰君為守將不可棄城宜赴難者唯絳爾澄偽為戁色久之曰君言是也絳潰圍出澄遍召將卒告曰澄守城數旬志不負國事勢如此須求生計諸君以為何如將卒皆發聲大哭澄懼變亦泣曰澄受恩深于諸君且有父母在都城寧不知忠孝乎但力不能抗爾諸軍不聞楚州耶初世宗圍楚州久不下既尅遂屠之故澄以此脅焉于是率將吏開門請降後主聞澄已降猶欲赦其家屬光政使陳喬令收澄父母妻子皆斬于市澄女許嫁未適美而艶喬欲活之女曰叛逆之餘義不求生遂斬之朱元蒲津人也事本郡節度使李守貞為従事漢髙祖崩守貞謂漢室新造人心未一天下易以圖乃以河中反漢命周太祖討之元與李平奉守貞表来乞師未復而守貞敗元遂留金陵累遷尚書郎或言元有反相不可委以外任及淮甸兵與諸郡相繼䧟劉仁贍堅守夀州元宗命齊王景達帥師應之元𨽻景達軍中善撫士卒甘苦共之遂率所領克舒州蘄泰楊光滁亦相繼而復元自紫金山築甬道以餉夀春兵勢甚盛㑹景達監軍使陳覺先與元有私隙召元至濠州計事且欲害之元不往覺因奏元不受節制元宗遣楊守忠代元且召還都元憤怒以其衆降周諸軍皆潰元宗怒命斬元妻子元妻乃宣徽使查文徽女年少有國色文徽累表救之誠欵懇切元宗署其表曰只斬朱元妻不斬查家女文徽辭窮遂斬元妻尸于市文徽以珠籠覆尸哭之大慟市人為之泣下世宗以降虜别作一營授元蔡州刺史亦不顯用劉従効泉州人也仕本郡為統軍使閩亡従効說其刺史王建勲入朝而自領州事元宗即以従効為泉州刺史従効出自寒微知人疾苦及得郡以勤儉為務衆所不便者皆除去之常衣布素置公服于中門出視事則服之入則復衣弊布自言我素貧賤不可忘本也由是大得民情據有漳泉之地閩主王氏遺二女在郡従効事之如故資給甚厚陞泉州為清源軍拜従効節度使加中書令封鄂國公及淮甸失守従効因越人奉表貢于世宗世宗以割地之故不納建隆初元宗遷都南昌従効大懼以為見討乃遣其子紹基来貢㑹元宗殂因至建康後主善待之紹基未還従効病卒州人立其次子紹鎡未㡬統軍陳洪進執紹鎡歸于建康言其將召越人為叛推立副使張漢思為留後洪進為副使漢思老而惷事無巨細皆決于洪進漢思諸子為牙將伏劒士殺洪進不克洪進遂逐漢思自稱留後後主即以洪進為泉州節度使紹鎡至建康釋之以為監門衛中郎將紹基為殿直軍都虞侯嗚呼附劉従効于叛臣之後者豈無意哉盖亂臣賊子皆春秋之所誅也臣于人而反覆不常是亦春秋之罪人爾従効始事閩而閩亡幸國家之亂遂劫其使君而自領州事元宗因而予之亦已厚矣及淮甸失地國步多艱従効伺多壘之秋而附越人以貢于上國其意之所圖者固可知也故洪進之徒相繼作亂蓋従効所圖不軌則不軌之事應之曽子曰出乎爾者反乎爾為人臣者可不戒哉南唐書卷二十七
