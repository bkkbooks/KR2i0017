body:
  text: 南唐書卷二十八宋馬令撰滅國𫝊上第二十五嗚呼閩楚之捷不償于殫殘而淮甸之役輒喪其膏腴易曰智小而謀大鮮不及矣戒之哉戒之哉作滅國𫝊閩國王審知字信通光州固始人也世為農唐末羣盜起審知與兄潮俱起草莽衆推潮為主畧地至泉州軍行整肅其耆老相率遮道留之潮引兵圍城逾年殺其刺史廖彦若光啓二年福州觀察使陳巖表潮泉州刺史景福元年巖卒其壻范暉自稱留後潮遣審知攻暉殺之唐即以潮為福州觀察使潮以審知為副使審知為人狀貌雄偉常乗白馬軍中號白馬三郎乾寧四年潮卒審知代立唐以福州為威武軍拜審知節度使累遷同中書門下平章事封瑯瑘王唐亡梁太祖加拜審知中書令封閩王陞福州為大都督府審知儉約好禮王倓楊沂徐寅之徒皆依焉又建學四門以教閩士之秀者嵗遣使泛海入貢于梁後唐同光三年審知卒諡忠懿長子延翰立建國稱王而猶禀唐正朔延翰長大美晢如玉其妻崔氏陋而淫延翰不能制審知喪未期徹其几筵又多選良家子為妾崔氏性妬良家子之美者輒幽之别室繫以大械刻木為人手以擊其頰又以鐵錐刺之一嵗之中死者八十四人崔氏後病見其祟而卒十有二月延翰弟泉州刺史延鈞審知養子建州刺史延禀同以兵入執延翰殺之而延鈞立更名鏻鏻審知次子也莊宗即拜鏻節度使累加檢校太師中書令封閩王鏻既立延稟還建州鏻錢于郊延稟臨訣謂鏻曰善繼先志無煩老兄復來鏻銜之長興二年延稟率兵擊鏻鏻遣王仁達敗之執延稟誚之曰予不能繼先志果煩老兄復來延稟不能對遂殺之三年鏻上書求為尚書令唐不報鏻遂絶朝貢即皇帝位改元龍啓國號閩追諡審知為昭武孝皇帝廟號太祖立五廟置百官龍啓三年改元永和王仁達為鏻殺延稟而有功典親兵鏻心忌之鏻謂人曰仁達智畧在吾世可用不可遺後世患因誣以罪殺之鏻妻早卒繼室金氏賢而不荅審知婢金鳯陳氏鏻嬖之遂立之以為后初鏻有嬖吏歸守明者以色見倖號歸郎鏻後得風疾陳氏與歸郎姦又有百工院使李可殷因歸郎以通陳氏鏻命工作九龍帳國人歌曰誰謂九龍帳惟貯一歸郎鏻婢春鷰有色其子繼鵬蒸之鏻已病繼鵬因陳氏以求春鷰鏻怏怏與之其次子繼韜怒謀殺繼鵬繼鵬懼與皇城使李倣圖之乃令壯士先殺李可殷率皇城衛士入鏻聞鼓噪聲走匿九龍帳中衛士刺之不死宫人不忍其苦為絶之繼韜及陳后歸郎皆為倣所殺鏻立十年見殺諡曰惠皇帝廟號太宗繼鵬鏻長子也既立更名昶改元通文晉天福二年昶遣使貢于京師髙祖遣散騎常侍盧損冊昶閩王拜其子繼恭臨海郡王損至閩昶稱疾不見令繼恭主之又遣中書舍人劉乙勞損于館乙衣冠偉然騶童甚盛他日損遇乙于塗布衣芒屩而已損使人誚之曰鳯閣舍人何逼仄之甚也乙羞媿以手掩面而走昶好巫妖人林興以巫見倖三年夏虹見宫中林興𫝊神言此宗室將為亂之兆也乃命興帥壯士殺審知子延武延望及其子五人後興事敗亦被殺而昶愈惑亂立父婢春鷰為淑妃後立以為皇后昶募勇士為宸衛都以自衛其賜予給賞獨厚于他軍控鶴都連重遇拱宸都將朱文進皆以此怒重遇等夜帥衛士縦火焚南宫昶挾愛姬子弟黄門衛士斬闗而出宿于野次重遇迎延羲立之延羲令其子繼業率兵襲昶及之射殺數人昶知不免擲弓于地繼業執而殺之及其妻子皆死無遺𩔖延羲立諡昶曰康宗延羲審知少子也既立更名曦遣使朝貢于晉改元永隆鑄大鐵錢以一當十曦自昶世倔彊難制昶相王倓每抑折之曦立而倓已死命發塜戮尸倓面如生血流被體泉州刺史余延英嘗矯命掠取良家子曦怒召下御史劾之延英進買宴錢千萬曦曰皇后土貢何在延英又獻皇后錢千萬乃得不劾曦嘗嫁女朝士有不賀者笞之御史中丞劉賛坐不糾舉將加笞諌議大夫鄭元弼切諫乃止曦弟延政為建州節度使封富沙王自曦立不叶輒舉兵相攻曦由此惡其宗室多以事誅之諫議大夫黄峻舁櫬詣朝堂極諫曦怒貶峻漳州司户叅軍校書郎陳光逸上書疏曦過惡五十餘事曦命衛士鞭之百而不死以繩係頸掛于木久而乃絶國計使陳匡範増算商之法以獻曦曰匡範人中之寶也已而嵗入不登其數乃借于民以足之匡範以憂死其後知其借于民也剖匡範棺㫁尸棄之水中曦性淫虐而妻李氏悍而酗酒賢妃尚氏有色而寵諸國皆僣后妃之號李仁遇曦甥也以色嬖之用以為相曦嘗為牛飲羣臣侍酒有詐及私棄酒者輒殺之並殺其替者連重遇既殺昶嘗懼為國人所討曦心疑之以語誚重遇等重遇等流涕自辯李氏妬尚妃之寵欲圖曦而立其子亞澄乃使人謂重遇等曰上心不平于二公柰何重遇等懼六年三月曦出遊醉歸重遇等遣壯士拉于馬上殺之諡曰景宗延政審知子也曦立為淫虐延政數貽書諫之曦怒遣杜建崇監其軍延政逐之曦乃舉兵攻之延政為延政所敗延政乃以建州建國稱殷改元天徳明年連重遇已弑曦集閩羣臣告曰昔太祖武皇帝親冒矢石遂啓有閩及其子孫淫虐不道天厭王氏當求有徳以安此土乃掖朱文進陞殿率百官北面而臣之文進以重遇判六軍諸衛事王氏子弟在福州者無少長皆殺之以黄紹顔守泉州程贇守漳州許文縝守汀州用晉正朔稱開運元年泉州軍將劉従効詐其州人曰富沙王取福州矣吾屬世為王氏臣安能交臂事賊乎州人共殺紹顔迎王繼勲為刺史漳州聞之亦殺贇迎王繼成為刺史皆王氏之諸子也文縝懼以汀州降于延政南唐聞亂命查文徽等帥師伐之遂下建陽延政遣統軍呉承祐往給福州曰唐兵助我討福州信之故連重遇殺朱文進禆將林仁翰殺連重遇謀迎延政都福州㑹南唐兵方急攻建州延政乃遣其子繼昌守福州而自拒唐兵福州軍將李仁達謂其徒曰唐攻建州富沙王不能自保其能有此土耶乃擒繼昌及呉承祐殺之欲自立懼衆不附以雪峯僧卓儼明示衆曰此非常人也被以衮冕率諸將吏北面而臣之已而又殺儼明乃自立送款于南唐南唐以仁達為威武軍節度使文徽等下建州俘延政于金陵封延政鄱陽王閩將劉従効自領泉州李仁達自領福州羈縻而已明年福州附于呉越南唐書卷二十八
